name: Deploy Pages (auto-retry)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages (1回目)
        id: deploy1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: 一時障害の回復待ち(90秒)
        if: steps.deploy1.outcome == 'failure'
        run: sleep 90

      - name: Deploy to GitHub Pages (自動リトライ)
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4
