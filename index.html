<!--
  ============================================================
  UWASA SNS OPS 合体版 — AIコックピット11機能 + 自動投稿管理
  ============================================================
  【セットアップ】
  1. 下のCONFIGに3つ入れる:
     - SUPABASE_URL : SupabaseのProject URL
     - SUPABASE_ANON: anon public(またはsb_publishable_)キー
     - GAS_URL      : GASウェブアプリのURL(認証リンク兼AI中継)
  2. GAS側(uwasa_x_autopost.gs v3)に ANTHROPIC_API_KEY を登録して再デプロイ
  3. このファイルをgithub.io等に置く
  ログインはSupabase Authのユーザー(Authentication > Users で作成)
-->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#04060C; --surface:#0F1422; --surface2:#0C1120; --border:#1D2A47;
    --accent:#FF2E7E; --accent2:#00E5FF; --violet:#B44DFF;
    --text:#EAF0FF; --muted:#7E8BA8; --ok:#3DFFA8; --bad:#FF7B7B;
    --mono:"SF Mono",ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box}
  body{
    margin:0;min-height:100vh;background:var(--bg);color:var(--text);
    font-family:"Hiragino Sans","Noto Sans JP",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    background-image:
      radial-gradient(ellipse 90% 40% at 50% -5%, rgba(255,46,126,.13), transparent),
      radial-gradient(ellipse 70% 40% at 90% 105%, rgba(0,229,255,.08), transparent),
      repeating-linear-gradient(0deg, rgba(29,42,71,.22) 0 1px, transparent 1px 34px),
      repeating-linear-gradient(90deg, rgba(29,42,71,.22) 0 1px, transparent 1px 34px);
  }
  .wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
  h1{font-size:20px;font-weight:900;letter-spacing:.06em;margin:0;
    background:linear-gradient(92deg,var(--accent),var(--violet),var(--accent2));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .sub{font-size:9px;letter-spacing:.3em;color:var(--muted);font-family:var(--mono);margin-top:2px}
  .hud{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;margin-top:14px;position:relative}
  .hud::before,.hud::after{content:"";position:absolute;width:14px;height:14px;border:1.5px solid rgba(0,229,255,.5);pointer-events:none}
  .hud::before{top:-1px;left:-1px;border-right:none;border-bottom:none;border-top-left-radius:14px}
  .hud::after{bottom:-1px;right:-1px;border-left:none;border-top:none;border-bottom-right-radius:14px}
  h2{margin:0;font-size:17px;font-weight:800}
  .desc{margin:6px 0 0;font-size:13.5px;line-height:1.7;color:var(--muted)}
  .howto{margin-top:12px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:10px 14px}
  .howto .hd{font-size:10px;font-weight:800;letter-spacing:.2em;color:var(--accent);font-family:var(--mono);margin-bottom:6px}
  .howto .st{display:flex;gap:9px;align-items:baseline;font-size:13px;line-height:1.8}
  .howto .st b{color:var(--accent);font-family:var(--mono);font-size:11.5px;font-weight:800}
  label.fld{display:block;font-size:10.5px;font-weight:800;letter-spacing:.18em;color:var(--accent2);font-family:var(--mono);margin:16px 0 8px}
  input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;
    color:var(--text);padding:12px 14px;font-size:15px;outline:none;font-family:inherit}
  textarea{line-height:1.6;resize:vertical}
  .btn{width:100%;padding:14px;border-radius:12px;border:none;cursor:pointer;margin-top:16px;
    background:linear-gradient(92deg,var(--accent),var(--violet));color:#fff;
    font-size:15px;font-weight:800;letter-spacing:.05em;box-shadow:0 0 18px rgba(255,46,126,.35)}
  .btn:disabled{opacity:.5;cursor:wait}
  .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--accent2);box-shadow:none}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{padding:8px 14px;border-radius:999px;border:1px solid var(--border);background:transparent;
    color:var(--muted);font-size:13px;font-weight:700;cursor:pointer}
  .chip.on{border-color:var(--accent);background:rgba(255,46,126,.12);color:var(--accent);box-shadow:0 0 12px rgba(255,46,126,.3)}
  .chip.on.cyan{border-color:var(--accent2);background:rgba(0,229,255,.1);color:var(--accent2);box-shadow:0 0 12px rgba(0,229,255,.25)}
  .out{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent2);
    border-radius:12px;padding:16px;margin-top:14px;position:relative;box-shadow:0 0 24px rgba(0,229,255,.06)}
  .out pre{white-space:pre-wrap;word-break:break-word;margin:0;font-family:inherit;font-size:14.5px;line-height:1.75}
  .copybtn{position:absolute;top:10px;right:10px;background:var(--surface2);color:var(--muted);
    border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer}
  nav{display:flex;gap:8px;overflow-x:auto;padding:12px 0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  nav::-webkit-scrollbar{display:none}
  .navbtn{flex-shrink:0;padding:9px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface);
    color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:7px}
  .navbtn b{font-size:9.5px;opacity:.75;font-family:var(--mono);font-weight:800}
  .navbtn.on{border-color:var(--accent);background:rgba(255,46,126,.12);color:var(--accent);box-shadow:0 0 14px rgba(255,46,126,.3)}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .snsw{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:3px;gap:2px}
  .snsbtn{width:40px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:999px;border:none;
    background:transparent;color:var(--muted);cursor:pointer}
  .snsbtn.on{background:linear-gradient(92deg,var(--accent),var(--violet));color:#fff;box-shadow:0 0 12px rgba(255,46,126,.45)}
  .modes{display:flex;align-items:center;gap:10px;margin-top:8px}
  .modes .lbl{font-size:9.5px;letter-spacing:.2em;color:var(--muted);font-family:var(--mono);flex-shrink:0}
  .buzz-mode{position:relative;overflow:visible}
  .buzz-on{
    border-color:#FF6A00!important;
    color:#fff!important;
    background:linear-gradient(180deg,#FF2E7E,#FF6A00,#FFD000)!important;
    background-size:100% 200%!important;
    animation:buzzFlame .7s ease-in-out infinite alternate, buzzShift 1.2s linear infinite;
    box-shadow:0 0 16px rgba(255,106,0,.7), 0 0 32px rgba(255,46,126,.5)!important;
    text-shadow:0 0 6px rgba(255,255,255,.6);
  }
  @keyframes buzzFlame{
    from{box-shadow:0 0 12px rgba(255,106,0,.6), 0 0 24px rgba(255,46,126,.4); transform:translateY(0) scale(1)}
    to{box-shadow:0 0 22px rgba(255,160,0,.9), 0 0 44px rgba(255,46,126,.6); transform:translateY(-1px) scale(1.04)}
  }
  @keyframes buzzShift{ from{background-position:0 0} to{background-position:0 -200%} }
  .row{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-top:10px;font-size:13.5px;line-height:1.7}
  .meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
  .pill{font-size:10.5px;font-weight:700;border-radius:999px;padding:2px 9px;border:1px solid}
  .pill.time{color:var(--ok);border-color:rgba(61,255,168,.4);font-family:var(--mono)}
  .pill.acct{color:var(--accent2);border-color:rgba(0,229,255,.4);font-family:var(--mono)}
  .pill.genre{color:var(--violet);border-color:rgba(180,77,255,.4)}
  .pill.type{color:var(--accent);border-color:rgba(255,46,126,.35)}
  .pill.st-pending{color:var(--violet);border-color:rgba(180,77,255,.4)}
  .pill.st-posted,.pill.st-active{color:var(--ok);border-color:rgba(61,255,168,.4)}
  .pill.st-error,.pill.st-revoked{color:var(--bad);border-color:rgba(255,123,123,.4)}
  .acts{display:flex;gap:8px;margin-top:10px}
  .mini{flex:1;padding:9px;border-radius:10px;border:1px solid var(--border);background:transparent;
    color:var(--muted);font-size:12.5px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none}
  .mini.primary{border:none;background:linear-gradient(92deg,var(--accent),var(--violet));color:#fff;font-weight:800}
  .mini.cyan{border-color:rgba(0,229,255,.4);color:var(--accent2)}
  .err{color:var(--bad);font-size:13px;margin-top:10px;line-height:1.5}
  .okmsg{color:var(--ok);font-size:13px;margin-top:10px}
  .muted{color:var(--muted);font-size:13px}
  .count{font-size:11px;color:var(--muted);text-align:right;margin-top:4px;font-family:var(--mono)}
  .count.over{color:var(--bad);font-weight:800}
  .hidden{display:none}
  .stat{flex:1;min-width:0;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:11px 8px;text-align:center}
  .stat .l{font-size:9.5px;color:var(--muted);font-weight:800;letter-spacing:.12em;font-family:var(--mono)}
  .stat .v{font-size:17px;font-weight:800;margin:3px 0 1px;white-space:nowrap;font-family:var(--mono)}
  .stat .s{font-size:10.5px;font-weight:700;white-space:nowrap}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <svg width="34" height="34" viewBox="0 0 48 48" aria-hidden="true">
        <defs>
          <linearGradient id="xg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#FF2E7E"/><stop offset=".55" stop-color="#B44DFF"/><stop offset="1" stop-color="#00E5FF"/>
          </linearGradient>
        </defs>
        <!-- バーストの火花 -->
        <g stroke="url(#xg)" stroke-width="2.4" stroke-linecap="round" opacity=".85">

<script>
/* ============ CONFIG(ここを書き換える) ============ */
const SUPABASE_URL = "https://hwoltvzmsznprsbyrbaj.supabase.co";
const SUPABASE_ANON = "sb_publishable_1JsQKCxHNyH4fGzFUJeEHg_czjaZxPR";
const GAS_URL = "https://script.google.com/macros/s/AKfycbyQ3OxIQ3fA60kAOKf3_kcXWtE0N8A3WPH4c4uG-KdyiYwo2HIS0U8IjmS-AHftieOP/exec";
/* ================================================== */

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

/* ============ 状態 ============ */
const S = { sns: "X", mode: "標準", profile: "", genres: ["シーシャバー(店舗)","ゲーム制作","開発・ツール"], tab: "calendar", clients: [], activeAccount: "_default_" };

/* 生成設定のひな形 */
function defaultCfg() {
  return {
    useBiz: false, bizName: "", bizArea: "", bizType: "",
    tone: "カジュアル", emoji: "少なめ", words: "", wordFreq: 30, hook: 60,
    url: "", urlFreq: 20, ngWords: "", origProfile: "",
    gender: "不問",
    useHours: false, openTime: "19:00", closeTime: "02:00",
    closedDays: [],
  };
}

/* 現在アクティブなアカウントの設定。各AI機能はこれを読む */
let CFG = defaultCfg();

/* アカウント名→設定 のキャッシュ */
const CFG_CACHE = {};

/* 指定アカウントの設定をSupabaseから読み込んでCFGにセット */
async function loadCfgFor(account) {
  S.activeAccount = account || "_default_";
  if (CFG_CACHE[S.activeAccount]) { CFG = CFG_CACHE[S.activeAccount]; return; }
  const saved = await kvGet("gen_config:" + S.activeAccount, null);
  const c = Object.assign(defaultCfg(), saved || {});
  CFG_CACHE[S.activeAccount] = c;
  CFG = c;
}
/* キャッシュにあれば即CFGを差し替え(通信なし)。表示の即時切替に使う */
function loadCfgSync(account) {
  const a = account || "_default_";
  S.activeAccount = a;
  if (CFG_CACHE[a]) { CFG = CFG_CACHE[a]; return true; }
  return false; // 未キャッシュ
}
async function saveCfg() {
  CFG_CACHE[S.activeAccount] = CFG;
  await kvSet("gen_config:" + S.activeAccount, CFG);
}

/* 店舗情報の文を作る(オフor未入力なら空) */
function bizClause() {
  let extra = "";
  if (CFG.useHours) {
    extra = "営業時間は" + CFG.openTime + "〜" + CFG.closeTime + "。これと矛盾する時間を本文に書かない。";
  }
  if (CFG.closedDays && CFG.closedDays.length) {
    extra += "定休日は" + CFG.closedDays.join("・") + "曜。定休日には営業を促す告知をせず、休業のお知らせや営業再開日の案内など定休日に合った内容にする。営業日の投稿で定休日を来店日として案内しない。";
  }
  if (!CFG.useBiz) return extra ? "\n\n【店舗情報】" + extra : "";
  const parts = [];
  if (CFG.bizArea) parts.push(CFG.bizArea);
  if (CFG.bizType) parts.push(CFG.bizType);
  if (CFG.bizName) parts.push("「" + CFG.bizName + "」");
  let s = parts.length ? "対象の事業: " + parts.join("・") + "。" : "";
  if (extra) s += extra;
  return s;
}

/* 文体・絵文字・ワード・フックの指示をまとめて返す */
function sc() {
  let out = "";
  const biz = bizClause();
  if (biz) out += "\n\n" + biz;

  /* 業種が設定されていれば、その業種から外れた題材の混入を禁止 */
  if (CFG.bizType && CFG.bizType.trim()) {
    out += "\n\n【題材の固定】この投稿は必ず「" + CFG.bizType.trim() + "」に関する内容にする。他業種・別ジャンルの題材(例: 設定外のギャンブル・スポーツ・無関係な商材など)を本文に混ぜてはならない。";
  }

  /* オリジナル文体(このアカウント専用に学習済みなら最優先) */
  if (CFG.origProfile && CFG.origProfile.trim()) {
    out += "\n\n【文体指示・最優先】以下はこのアカウントの本人の文体プロファイル。これに完全に従い、本人が書いたとしか思えない文章にせよ:\n" + CFG.origProfile;
  } else if (S.mode === "自分の文体" && S.profile) {
    out += "\n\n【文体指示】以下の文体プロファイルに完全に従い、本人が書いたとしか思えない文章にせよ:\n" + S.profile;
  } else if (S.mode === "バズ特化") {
    out += "\n\n【バズ最優先指示】拡散・保存・引用されることを最優先に、次の型を徹底せよ:\n" +
      "・1行目は必ず「問いかけ / 逆張り(常識否定) / 具体的な数字 / 続きが気になる欠落」のどれかで作り、スクロールを止める\n" +
      "・2行目以降は『共感 → 裏切り(意外な事実) → 気づき』の流れで展開し、最後まで読ませる\n" +
      "・具体的な数字・固有名詞・体験談を入れてリアリティを出す\n" +
      "・読者が『わかる』『保存したい』『誰かに言いたい』と感じる一言を必ず入れる\n" +
      "・締めは言い切り or 問いかけでリプ・引用を誘発する\n" +
      "・各文は短く、改行を多めにしてテンポよく\n" +
      "・ただし誇大広告・断定的な効能・射幸心を過度に煽る表現は避け、品は保つ";
  }

  /* 書き手の性別 */
  if (CFG.gender === "男性") {
    out += "\n\n【書き手の性別】書き手は男性。一人称・語尾・言い回しを男性らしく自然にする(不自然なオネエ口調などにはしない)。";
  } else if (CFG.gender === "女性") {
    out += "\n\n【書き手の性別】書き手は女性。一人称・語尾・言い回しを女性らしく自然にする。";
  }

  /* トーン */
  const toneMap = {
    "丁寧": "丁寧で礼儀正しく、敬語ベースの落ち着いた性格",
    "カジュアル": "親しみやすく明るいカジュアルな性格",
    "専門的": "専門知識が豊富で説得力のある知的な性格",
    "フランク": "友達のように話すフランクでタメ口寄りの性格",
    "強め": "断言が多く勢いのある強気でグイグイくる性格",
  };
  out += "\n\n【書き手の性格】" + (toneMap[CFG.tone] || CFG.tone) + "で書く。";

  /* 絵文字 */
  const emojiMap = {
    "なし": "絵文字は一切使わない。",
    "少なめ": "絵文字は1投稿に0〜1個まで。",
    "普通": "絵文字を適度に(1投稿2〜3個)使う。",
    "多め": "絵文字を多めに(1投稿4個以上)使い華やかにする。",
  };
  out += emojiMap[CFG.emoji] || "";

  /* 入れたいワード */
  if (CFG.words.trim()) {
    out += "\n\n【必須ワード】次の語を投稿に自然に織り込む: " + CFG.words.trim() +
      "。ただし全投稿の約" + CFG.wordFreq + "%程度の頻度で登場させ、毎回は入れない(不自然にならない範囲で)。";
  }

  /* フック強度 */
  out += "\n\n【冒頭フック強度】" + CFG.hook + "%。" +
    (CFG.hook >= 70 ? "1行目で強烈に引き込み、続きを読まずにいられない出だしにする。"
     : CFG.hook >= 40 ? "1行目はそこそこ引きを作りつつ自然に。"
     : "1行目は誇張せず落ち着いた入りにする。");

  /* 入れたいURL */
  if (CFG.url.trim()) {
    out += "\n\n【URL挿入】次のURLを投稿末尾に置く: " + CFG.url.trim() +
      "。全投稿の約" + CFG.urlFreq + "%程度の頻度で入れ、毎回は入れない(告知・誘導したい投稿に絞る)。" +
      "Xでは140字にURL分を含めて収める。";
  }

  /* NGワード */
  if (CFG.ngWords.trim()) {
    out += "\n\n【禁止ワード】次の語は絶対に使わない(言い換えも含めて避ける): " + CFG.ngWords.trim() + "。";
  }

  return out;
}

/* ============ Supabase KV(設定保存) ============ */
async function kvGet(key, fallback) {
  const { data } = await sb.from("kv_store").select("value").eq("key", key).maybeSingle();
  return data && data.value !== null && data.value !== undefined ? data.value : fallback;
}
async function kvSet(key, value) {
  await sb.from("kv_store").upsert({ key, value, updated_at: new Date().toISOString() });
}

/* ============ AI呼び出し(GAS中継) ============ */
async function callAI(prompt, useSearch) {
  const { data } = await sb.auth.getSession();
  if (!data.session) throw new Error("ログインが切れた。リロードして。");
  const doFetch = async (p) => {
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ auth: data.session.access_token, prompt: p, useSearch: !!useSearch }),
    });
    const j = await res.json();
    if (j.error) throw new Error(j.error);
    return j.text;
  };

  let text = await doFetch(prompt);

  /* 業種外題材の混入チェック。検索系(無料予想など)は対象外 */
  if (!useSearch && CFG.bizType && CFG.bizType.trim()) {
    const banned = bannedTopicsFor(CFG.bizType.trim());
    const hit = banned.find((w) => text.includes(w));
    if (hit) {
      /* 1回だけ、禁止題材を明示して作り直し */
      const retryPrompt = prompt +
        "\n\n【厳重注意・再生成】前回の生成は「" + hit + "」など『" + CFG.bizType.trim() +
        "』と無関係な題材を含んでいた。今回は絶対にそれらの題材・単語を一切使わず、『" +
        CFG.bizType.trim() + "』だけの内容で書き直せ。";
      const retry = await doFetch(retryPrompt);
      if (!banned.find((w) => retry.includes(w))) text = retry;
      else text = retry; // 2回目もダメなら諦めて返す(無限ループ防止)
    }
  }
  return text;
}

/* 業種ごとの「混ざってはいけない題材ワード」 */
function bannedTopicsFor(bizType) {
  const b = bizType;
  const isBoat = /競艇|ボート|レース|公営競技|舟券/.test(b);
  const LISTS = {
    boat: ["万舟","舟券","競艇","ボートレース","回収率","本命","穴狙い","3連単","レース","出走","選手","モーター","予想"],
  };
  /* 競艇系アカウントなら競艇ワードは許可、それ以外の業種では競艇ワードを禁止 */
  if (isBoat) return [];
  return LISTS.boat;
}

/* ============ 共通部品 ============ */
function head(el, title, desc, steps) {
  const d = document.createElement("div");
  d.innerHTML = "<h2>" + esc(title) + '</h2><p class="desc">' + esc(desc) + "</p>" +
    '<div class="howto"><div class="hd">HOW TO USE</div>' +
    steps.map((s, i) => '<div class="st"><b>' + String(i + 1).padStart(2, "0") + "</b><span>" + esc(s) + "</span></div>").join("") +
    "</div>";
  el.appendChild(d);
}
function fld(el, label) {
  const l = document.createElement("label"); l.className = "fld"; l.textContent = "▸ " + label; el.appendChild(l);
}
function ta(el, rows, ph) {
  const t = document.createElement("textarea"); t.rows = rows; t.placeholder = ph || ""; el.appendChild(t); return t;
}
function inp(el, ph, type) {
  const t = document.createElement("input"); t.type = type || "text"; t.placeholder = ph || ""; el.appendChild(t); return t;
}
function chipsSingle(el, options, initial, cyan) {
  const w = document.createElement("div"); w.className = "chips"; el.appendChild(w);
  const state = { value: initial };
  function draw() {
    w.innerHTML = "";
    options.forEach((o) => {
      const c = document.createElement("button");
      c.className = "chip" + (state.value === o ? (cyan ? " on cyan" : " on") : "");
      c.textContent = o;
      c.onclick = () => { state.value = o; draw(); };
      w.appendChild(c);
    });
  }
  draw(); return state;
}
function chipsMulti(el, options, initial) {
  const w = document.createElement("div"); w.className = "chips"; el.appendChild(w);
  const state = { values: initial.slice() };
  function draw() {
    w.innerHTML = "";
    options.forEach((o) => {
      const c = document.createElement("button");
      c.className = "chip" + (state.values.includes(o) ? " on cyan" : "");
      c.textContent = o;
      c.onclick = () => {
        state.values = state.values.includes(o) ? state.values.filter((x) => x !== o) : [...state.values, o];
        draw();
      };
      w.appendChild(c);
    });
  }
  draw(); return state;
}
function runBtn(el, label) {
  const b = document.createElement("button"); b.className = "btn"; b.textContent = label; el.appendChild(b); return b;
}
function outArea(el) {
  const e = document.createElement("div"); el.appendChild(e);
  return {
    box: e,
    err(m) { e.innerHTML = m ? '<div class="err">⚠ ' + esc(m) + "</div>" : ""; },
    show(text) {
      e.innerHTML = '<div class="out"><button class="copybtn">コピー</button><pre></pre></div>';
      e.querySelector("pre").textContent = text;
      const cb = e.querySelector(".copybtn");
      cb.onclick = () => { navigator.clipboard.writeText(text); cb.textContent = "コピー済"; setTimeout(()=>cb.textContent="コピー",1500); };
    },
    clear() { e.innerHTML = ""; },
  };
}
async function runAI(btn, out, promptFn, useSearch) {
  out.clear(); out.err("");
  btn.disabled = true; const orig = btn.textContent; btn.textContent = "処理中…";
  try { out.show(await callAI(promptFn(), useSearch)); }
  catch (e) { out.err(e.message); }
  btn.disabled = false; btn.textContent = orig;
}

/* ============ 汎用AIタブ(02-08) ============ */
function aiTab(el, cfg) {
  head(el, cfg.title, cfg.desc, cfg.steps);

  /* 対象アカウント選択(そのアカウントの設定で生成) */
  let acctVal = S.activeAccount;
  const actives = S.clients.filter((c)=>c.status==="active");
  if (actives.length) {
    fld(el, "対象アカウント");
    const asel = document.createElement("select");
    const od = document.createElement("option"); od.value = "_default_"; od.textContent = "共通設定(既定)"; asel.appendChild(od);
    actives.forEach((c)=>{ const o=document.createElement("option"); o.value=c.screen_name; o.textContent="@"+c.screen_name; asel.appendChild(o); });
    asel.value = S.activeAccount;
    asel.onchange = () => { acctVal = asel.value; };
    el.appendChild(asel);
    const note = document.createElement("p"); note.className = "desc"; note.style.margin = "6px 0 0";
    note.textContent = "選んだアカウントの業種・性格・文体に合わせて分析・生成する。";
    el.appendChild(note);
  }

  const refs = {};
  cfg.fields.forEach((f) => {
    fld(el, f.label);
    if (f.type === "ta") refs[f.key] = ta(el, f.rows, f.ph);
    else if (f.type === "in") refs[f.key] = inp(el, f.ph);
    else if (f.type === "chips") refs[f.key] = chipsSingle(el, f.options, f.options[0]);
    else if (f.type === "multi") refs[f.key] = chipsMulti(el, f.options, f.initial || []);
  });
  const btn = runBtn(el, cfg.btn);
  const out = outArea(el);
  btn.onclick = async () => {
    const v = {};
    for (const k in refs) v[k] = refs[k].value !== undefined ? refs[k].value : (refs[k].values || refs[k].value);
    cfg.fields.forEach((f) => { if (f.type === "ta" || f.type === "in") v[f.key] = refs[f.key].value; });
    if (!cfg.validate(v)) { out.err("入力が足りん。"); return; }
    await loadCfgFor(acctVal || "_default_"); // 選んだアカウントの設定を適用
    runAI(btn, out, () => cfg.prompt(v), cfg.useSearch);
  };
}

/* 単一選択チップを指定要素に描画(コールバック付き) */
function chipsSingleInto(host, options, initial, onChange) {
  const w = document.createElement("div"); w.className = "chips"; host.appendChild(w);
  let cur = initial;
  function draw() {
    w.innerHTML = "";
    options.forEach((o) => {
      const c = document.createElement("button");
      c.className = "chip" + (cur === o ? " on" : "");
      c.textContent = o;
      c.onclick = () => { cur = o; onChange(o); draw(); };
      w.appendChild(c);
    });
  }
  draw();
}

/* ---- 📭 書き漏れチェック(全アカ横断で空き日を検出・古いdraft自動掃除) ---- */
BUILDERS.gapcheck = (el) => {
  head(el, "📭 書き漏れチェック", "全アカウントを横断して、今週7日間で投稿が入ってない日を検出。空きがあるアカだけ出す。古い下書き(7日以上前)は自動で掃除。", [
    "アプリを開くと自動でチェック",
    "空きアカ・空き日が出たら埋める",
    "古い下書きは勝手に消える",
  ]);

  const status = document.createElement("p");
  status.className = "desc"; status.textContent = "チェック中…";
  el.appendChild(status);

  const result = document.createElement("div");
  el.appendChild(result);

  const reBtn = runBtn(el, "🔄 もう一度チェック");

  async function cleanOldDrafts() {
    /* 7日以上前のdraftを削除 */
    try {
      const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 7);
      await sb.from("scheduled_posts")
        .delete()
        .eq("status", "draft")
        .lt("scheduled_at", cutoff.toISOString());
    } catch(e) { /* 失敗しても致命的でない */ }
  }

  async function run() {
    status.textContent = "チェック中…";
    result.innerHTML = "";
    await cleanOldDrafts();

    const actives = S.clients.filter((c)=>c.status==="active" && c.screen_name !== "_test_" && !/^_test/.test(c.screen_name));
    if (!actives.length) { status.textContent = "連携中のアカウントがない(テスト用は除外)。"; return; }

    /* 今日から7日間の日付 */
    const wd = ["日","月","火","水","木","金","土"];
    const days = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(); d.setDate(d.getDate() + i);
      const ds = d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
      days.push({ ds, label: wd[d.getDay()], md: (d.getMonth()+1) + "/" + d.getDate() });
    }
    const from = new Date(days[0].ds + "T00:00:00").toISOString();
    const to = new Date(days[6].ds + "T23:59:59").toISOString();

    /* 全アカの予約・下書き・投稿済みを一括取得
       (postedも「その日は書いた」とカウント。予約管理の表示では消えてても判定には使う) */
    let rows = [];
    try {
      const { data } = await sb.from("scheduled_posts")
        .select("screen_name,scheduled_at,status,posted_at")
        .in("status", ["pending","draft","posted"])
        .gte("scheduled_at", from).lte("scheduled_at", to);
      rows = data || [];
    } catch(e) {
      status.textContent = "投稿データの取得に失敗した。";
      return;
    }

    /* アカ×日付で「埋まってるか」を集計。postedは実投稿日(posted_at)も見る */
    const taken = {}; // screen_name -> {ds:true}
    const dayKey = (dt) => dt.getFullYear() + "-" + String(dt.getMonth()+1).padStart(2,"0") + "-" + String(dt.getDate()).padStart(2,"0");
    rows.forEach((r) => {
      (taken[r.screen_name] = taken[r.screen_name] || {});
      taken[r.screen_name][dayKey(new Date(r.scheduled_at))] = true;
      if (r.status === "posted" && r.posted_at) {
        taken[r.screen_name][dayKey(new Date(r.posted_at))] = true;
      }
    });

    /* 空きがあるアカだけ抽出 */
    const flagged = [];
    actives.forEach((c) => {
      const gaps = days.filter((d) => !(taken[c.screen_name] && taken[c.screen_name][d.ds]));
      if (gaps.length) flagged.push({ acc: c.screen_name, gaps });
    });

    status.textContent = "";
    if (!flagged.length) {
      result.innerHTML =
        '<div style="position:relative;overflow:hidden;background:linear-gradient(135deg,rgba(16,185,129,.18),rgba(0,229,255,.12),rgba(168,85,247,.15));border:1px solid rgba(16,185,129,.5);border-radius:18px;padding:32px 20px;text-align:center;box-shadow:0 0 40px rgba(16,185,129,.25),inset 0 0 30px rgba(16,185,129,.08)">' +
          '<div style="font-size:46px;line-height:1;margin-bottom:12px;filter:drop-shadow(0 0 12px rgba(16,185,129,.6))">🏆</div>' +
          '<div style="font-size:20px;font-weight:800;letter-spacing:.04em;background:linear-gradient(90deg,#10b981,#00e5ff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px">ALL CLEAR</div>' +
          '<div style="font-size:14px;font-weight:700;color:#e8fff5;margin-bottom:4px">全アカウント 今週ぜんぶ埋まってる</div>' +
          '<div style="font-size:12px;color:rgba(255,255,255,.6);letter-spacing:.08em">7 DAYS · NO GAPS · 書き漏れゼロ</div>' +
          '<div style="margin-top:14px;font-size:11px;color:rgba(16,185,129,.85);letter-spacing:.12em;text-transform:uppercase">Keep the streak going 🔥</div>' +
        '</div>';
      return;
    }

    const intro = document.createElement("p");
    intro.className = "desc"; intro.style.margin = "0 0 10px";
    intro.textContent = flagged.length + "アカウントに書き漏れあり。埋まってるアカは省略。";
    result.appendChild(intro);

    flagged.forEach((f) => {
      const card = document.createElement("div");
      card.style.cssText = "background:var(--card);border:1px solid var(--bad);border-radius:12px;padding:12px 14px;margin:8px 0";
      const name = document.createElement("div");
      name.style.cssText = "font-weight:700;font-size:14px;margin-bottom:8px";
      name.innerHTML = '<span style="color:var(--accent)">@'+esc(f.acc)+'</span> <span style="color:var(--bad);font-size:12px">'+f.gaps.length+'日 空き</span>';
      card.appendChild(name);
      /* 空き日ごとに「この日を生成」ボタン */
      const btnWrap = document.createElement("div");
      btnWrap.style.cssText = "display:flex;flex-wrap:wrap;gap:6px";
      f.gaps.forEach((g) => {
        const b = document.createElement("button");
        b.className = "btn"; b.style.cssText = "margin:0;padding:8px 12px;font-size:13px";
        b.textContent = "✏️ " + g.md + "(" + g.label + ")";
        b.onclick = () => genOneDay(f.acc, g, b);
        btnWrap.appendChild(b);
      });
      card.appendChild(btnWrap);
      result.appendChild(card);
    });
  }

  /* 指定アカ・指定日の投稿を1本生成して、その場で見せる(確認後に予約管理へ) */
  async function genOneDay(account, gap, btn) {
    const o = btn.textContent;
    btn.disabled = true; btn.textContent = "生成中…";
    try {
      await loadCfgFor(account);
      const isBoat = /競艇|ボートレース|ボート/.test(CFG.bizType || "");
      const prompt =
        `${S.sns}の投稿を1本作る。日付: ${gap.ds}(${gap.label}曜)。\n` +
        `このアカウントの業種・性格・文体設定に沿って、その日にふさわしい投稿を1本。\n` +
        `バズりやすい推奨投稿時刻(HH:MM)も決める。\n` +
        (isBoat ? "競艇アカだが、無料予想は別ボタンで出すので、ここでは予想以外の通常投稿(コラム・小ネタ・煽り・日常)にする。\n" : "") +
        `出力フォーマット(厳守):\n時刻: HH:MM\n本文:\n(投稿本文)\n\n前置き不要。日本語。${sc()}`;
      const text = await callAI(prompt, false);
      if (!text || !text.trim()) throw new Error("AIが空を返した。もう一回試して。");
      let h = "12:00", bodyTxt = text.trim();
      const mt = text.match(/時刻[:：]\s*(\d{1,2}:\d{2})/);
      if (mt) h = mt[1];
      const mb = text.match(/本文[:：]\s*([\s\S]+)/);
      if (mb) bodyTxt = mb[1].trim();
      btn.disabled = false; btn.textContent = o;
      /* その場に本文を表示して、確認してから送る */
      showDraftPreview(account, gap, bodyTxt, h, btn);
    } catch (e) {
      alert("生成失敗: " + (e.message || e));
      btn.disabled = false; btn.textContent = o;
    }
  }

  /* 生成した本文をその場に出して、予約管理へ送る/作り直すを選ばせる */
  function showDraftPreview(account, gap, bodyTxt, h, srcBtn) {
    /* 既存のプレビューがあれば消す */
    const existing = document.getElementById("gapPreview");
    if (existing) existing.remove();
    const card = document.createElement("div");
    card.id = "gapPreview";
    card.style.cssText = "background:var(--card);border:1px solid var(--accent);border-radius:12px;padding:14px;margin:12px 0;box-shadow:0 0 20px rgba(255,45,149,.15)";
    const ttl = document.createElement("div");
    ttl.style.cssText = "font-weight:700;font-size:14px;margin-bottom:8px";
    ttl.innerHTML = '<span style="color:var(--accent)">@'+esc(account)+'</span> '+gap.md+'('+gap.label+') の投稿案';
    card.appendChild(ttl);
    /* 時刻 */
    const tRow = document.createElement("div");
    tRow.style.cssText = "display:flex;align-items:center;gap:8px;margin-bottom:8px";
    const tLbl = document.createElement("span"); tLbl.textContent = "⏰ 投稿時刻"; tLbl.style.fontSize = "13px";
    const tIn = document.createElement("input"); tIn.type = "time"; tIn.value = h;
    tIn.style.cssText = "padding:6px 10px;font-family:var(--mono);width:auto";
    tRow.appendChild(tLbl); tRow.appendChild(tIn);
    card.appendChild(tRow);
    /* 本文(編集可) */
    const body = document.createElement("textarea");
    body.rows = 7; body.value = bodyTxt;
    body.style.cssText = "width:100%;font-size:13.5px;line-height:1.6";
    card.appendChild(body);
    const cnt = document.createElement("p"); cnt.className = "desc"; cnt.style.margin = "4px 0 8px";
    const updCnt = () => { cnt.textContent = body.value.length + "字" + (S.sns==="X" && body.value.length>140 ? " ⚠140字超" : ""); };
    body.oninput = updCnt; updCnt();
    /* ボタン: 送る / 作り直す */
    const acts = document.createElement("div");
    acts.style.cssText = "display:flex;gap:8px;flex-wrap:wrap";
    const sendBtn = document.createElement("button");
    sendBtn.className = "btn"; sendBtn.style.cssText = "margin:0;flex:1;min-width:140px;background:linear-gradient(135deg,#10b981,#059669)";
    sendBtn.textContent = "✅ 予約管理へ送る";
    sendBtn.onclick = async () => {
      sendBtn.disabled = true; sendBtn.textContent = "送信中…";
      try {
        const { error } = await sb.from("scheduled_posts").insert({
          screen_name: account,
          text: body.value.trim(),
          scheduled_at: new Date(gap.ds + "T" + (tIn.value||"12:00") + ":00").toISOString(),
          status: "draft",
        });
        if (error) throw new Error(error.message);
        card.innerHTML = '<div style="text-align:center;color:#10b981;font-weight:700;padding:8px">✓ '+gap.md+' を予約管理に送った!</div>';
        if (srcBtn) { srcBtn.textContent = "✓ "+gap.md+" 作成済"; srcBtn.style.background = "linear-gradient(135deg,#10b981,#059669)"; srcBtn.disabled = true; }
      } catch (e) { sendBtn.disabled = false; sendBtn.textContent = "✅ 予約管理へ送る"; alert("送信失敗: " + e.message); }
    };
    const reBtn = document.createElement("button");
    reBtn.className = "btn"; reBtn.style.cssText = "margin:0;flex:1;min-width:140px";
    reBtn.textContent = "🔀 作り直す";
    reBtn.onclick = () => { card.remove(); genOneDay(account, gap, srcBtn); };
    acts.appendChild(sendBtn); acts.appendChild(reBtn);
    card.appendChild(acts);
    /* 結果エリアの先頭に差し込む */
    result.insertBefore(card, result.firstChild);
    card.scrollIntoView({ behavior: "smooth", block: "center" });
  }

  reBtn.onclick = run;
  run();
};

/* ---- 07+ 営業リプ(大手に絡んで新規フォロワー獲得) ---- */
BUILDERS.outreach = (el) => {
  head(el, "🎯 営業リプ", "伸びてる投稿のURLを貼る→刺さるリプを生成→コピーして飛んで送信。リプ欄で目立って新規フォロワーを取る。", [
    "Xで競艇・地域の伸びてる投稿を見つける",
    "その投稿URLを貼る→リプ生成",
    "コピー→アカに飛ぶ→リプ送信&フォロー",
  ]);

  /* 対象アカウント選択 */
  let acctVal = S.activeAccount;
  const actives = S.clients.filter((c)=>c.status==="active");
  if (actives.length) {
    fld(el, "自分のどのアカウントで営業する?");
    const asel = document.createElement("select");
    const od = document.createElement("option"); od.value="_default_"; od.textContent="共通設定(既定)"; asel.appendChild(od);
    actives.forEach((c)=>{ const o=document.createElement("option"); o.value=c.screen_name; o.textContent="@"+c.screen_name; asel.appendChild(o); });
    asel.value = S.activeAccount;
    asel.onchange = () => { acctVal = asel.value; loadCfgSync(acctVal); };
    el.appendChild(asel);
  }

  fld(el, "絡む投稿のURL");
  const urlIn = inp(el, "https://x.com/ユーザー名/status/12345...");
  fld(el, "投稿の本文(任意・貼るとより刺さるリプに)");
  const bodyIn = ta(el, 4, "その投稿の本文をコピペ(空でもOK)");
  fld(el, "トーン");
  const toneRef = chipsSingle(el, ["丁寧(敬語)","フレンドリー","ノリ重視","専門家っぽく"], "丁寧(敬語)");
  fld(el, "作るもの");
  const kindRef = chipsSingle(el, ["リプ(返信で絡む)","引用RT(拡散狙い)","DM誘導(LINEへ)"], "リプ(返信で絡む)");
  fld(el, "誘導先LINE(DM誘導の時だけ使う・任意)");
  const lineIn = inp(el, "https://lin.ee/xxxx など");
  /* ターゲット情報の表示エリア */
  const targetBox = document.createElement("div");
  targetBox.style.cssText = "margin:10px 0;display:none";
  el.appendChild(targetBox);

  /* 履歴警告エリア */
  const warnBox = document.createElement("div");
  warnBox.style.cssText = "margin:8px 0";
  el.appendChild(warnBox);

  /* URLからユーザー名を抜く */
  function extractUser(url) {
    const m = (url||"").match(/(?:x\.com|twitter\.com)\/([A-Za-z0-9_]+)/);
    return m ? m[1] : "";
  }

  /* 入力URLが変わったらターゲット情報と履歴警告を更新 */
  async function refreshTarget() {
    const user = extractUser(urlIn.value);
    if (!user) { targetBox.style.display="none"; warnBox.innerHTML=""; return; }
    /* ターゲットのプロフィール&投稿リンクボタン */
    targetBox.style.display = "block";
    targetBox.innerHTML = "";
    const lbl = document.createElement("p"); lbl.className="desc"; lbl.style.margin="0 0 6px";
    lbl.textContent = "ターゲット: @" + user; targetBox.appendChild(lbl);
    const row = document.createElement("div"); row.style.cssText="display:flex;gap:8px;flex-wrap:wrap";
    const profBtn = document.createElement("a");
    profBtn.href = "https://x.com/" + user; profBtn.target = "_blank";
    profBtn.className = "btn"; profBtn.style.cssText="margin:0;text-decoration:none;flex:1;text-align:center;min-width:120px";
    profBtn.textContent = "👤 @"+user+"に飛ぶ";
    row.appendChild(profBtn);
    if (/\/status\/\d+/.test(urlIn.value)) {
      const twBtn = document.createElement("a");
      twBtn.href = urlIn.value; twBtn.target = "_blank";
      twBtn.className = "btn"; twBtn.style.cssText="margin:0;text-decoration:none;flex:1;text-align:center;min-width:120px";
      twBtn.textContent = "💬 この投稿に飛ぶ";
      row.appendChild(twBtn);
    }
    targetBox.appendChild(row);

    /* 履歴チェック: この相手に最近絡んだか */
    try {
      const { data } = await sb.from("outreach_log")
        .select("created_at,status")
        .eq("account", acctVal).eq("target", user)
        .order("created_at", { ascending:false }).limit(1);
      warnBox.innerHTML = "";
      if (data && data.length) {
        const days = Math.floor((Date.now() - new Date(data[0].created_at).getTime()) / 86400000);
        if (days <= 7) {
          warnBox.innerHTML = '<div style="background:rgba(255,77,109,.12);border:1px solid var(--bad);border-radius:8px;padding:8px 10px;font-size:13px;color:var(--bad)">🔴 最近絡んだばかり('+days+'日前)。連投は控えめに。</div>';
        } else if (days <= 30) {
          warnBox.innerHTML = '<div style="background:rgba(255,193,7,.12);border:1px solid #ffc107;border-radius:8px;padding:8px 10px;font-size:13px;color:#ffc107">🟡 前に絡んだことあり('+days+'日前)。絡んでOKやけど一応。</div>';
        }
      }
    } catch(e) { /* テーブル未作成でも動く */ }
  }
  urlIn.oninput = refreshTarget;

  const btn = runBtn(el, "🎯 生成する");
  const out = outArea(el);
  /* 選択に応じてボタン文言を更新(chipsSingleにonChangeが無いので軽く監視) */
  let lastKind = kindRef.value;
  const updateBtnLabel = () => {
    const k = kindRef.value;
    btn.textContent = k.indexOf("引用RT")>=0 ? "🎯 引用RT文を生成" : (k.indexOf("DM誘導")>=0 ? "🎯 DM誘導文を生成" : "🎯 刺さるリプを生成");
  };
  updateBtnLabel();
  setInterval(() => { if (kindRef.value !== lastKind) { lastKind = kindRef.value; if (!btn.disabled) updateBtnLabel(); } }, 400);

  btn.onclick = async () => {
    const url = urlIn.value.trim();
    const user = extractUser(url);
    const kindNow = kindRef.value;
    if (!user && kindNow.indexOf("DM誘導") < 0) { out.err("投稿のURLを貼って(x.com/ユーザー名/status/... の形)。DM誘導だけはURL無しでもOK。"); return; }
    await loadCfgFor(acctVal);
    btn.disabled = true; const orig = btn.textContent; btn.textContent = "生成中…";
    try {
      const body = bodyIn.value.trim();
      const tone = toneRef.value;
      const kind = kindRef.value;
      const lineUrl = lineIn.value.trim();
      const toneRule = tone.indexOf("敬語") >= 0
        ? "必ず敬語(です・ます調)で、礼儀正しく書く。タメ口や馴れ馴れしい表現は使わない。"
        : (tone === "ノリ重視" ? "砕けた口語でテンポよく。" : (tone === "専門家っぽく" ? "落ち着いた専門家の語り口で。" : "親しみやすい自然な口調で。"));
      const ctx = body
        ? `絡む投稿の本文:\n${body}\n\n`
        : `絡む相手: @${user} の投稿(本文は不明なので、競艇/地域系の一般的な内容と想定)\n\n`;

      let prompt;
      if (kind.indexOf("引用RT") >= 0) {
        /* 引用リポスト: 自分のフォロワーにも見える。拡散狙い */
        prompt =
          `${S.sns}で、フォロワーの多い他人の投稿を「引用リポスト(引用RT)」して、自分のフォロワーにも見せつつ元投稿の人にも気づいてもらい、新規フォロワーを狙う引用文を作る。\n\n` +
          ctx +
          `トーンは「${tone}」。${toneRule} 引用文を3案作る。\n` +
          `引用RTの鉄則:\n` +
          `- 元投稿に乗っかりつつ、自分の視点・専門性で付加価値を足す(競艇なら独自の見解、店なら地域目線)\n` +
          `- 自分のフォロワーにも「お、なるほど」と思わせる中身。単なる感想で終わらせない\n` +
          `- 元投稿者を立てる(けなさない・上から目線にしない)\n` +
          `- 100〜120字程度。ハッシュタグは付けすぎない(0〜2個)\n` +
          `出力は【案1】【案2】【案3】の見出しを付けて改行で区切る。前置き不要。日本語。${sc()}`;
      } else if (kind.indexOf("DM誘導") >= 0) {
        /* DM誘導: リプで反応くれた人をLINEへ。収益導線 */
        prompt =
          `競艇予想アカウントの運用で、リプやフォローで反応してくれた見込みの人に送る「DMメッセージ」を作る。狙いは、無料予想に興味を持ってくれた人を公式LINE(無料予想や限定情報を配信)へ自然に誘導すること。\n\n` +
          ctx +
          `トーンは「${tone}」。${toneRule} DM文を3案作る。\n` +
          (lineUrl ? `誘導先LINE: ${lineUrl}(各案の最後に自然に載せる)\n` : `※LINE URLは「(LINEはこちら→)」のように差し込み位置だけ示す\n`) +
          `DM誘導の鉄則:\n` +
          `- いきなり営業しない。まず反応へのお礼や軽い一言から入る\n` +
          `- 押し売り禁止。「無料で予想配信してる」「よかったら覗いてみて」くらいの軽さ\n` +
          `- 怪しい・スパムっぽい定型文にしない。一人ひとりに送ってる感を出す\n` +
          `- 3〜4行程度。絵文字は1〜2個まで\n` +
          `出力は【案1】【案2】【案3】の見出しを付けて改行で区切る。前置き不要。日本語。${sc()}`;
      } else {
        /* 通常のリプ */
        prompt =
          `${S.sns}で、フォロワーの多い他人の投稿に「営業リプ」を送り、リプ欄を見た人に興味を持たせて自分(@${user!==acctVal?acctVal:"自分"})のアカウントをフォローしてもらう狙いのリプ案を作る。\n\n` +
          ctx +
          `トーンは「${tone}」。${toneRule} リプ案を3つ作る。\n` +
          `営業リプの鉄則:\n` +
          `- 媚びない・宣伝くさくない。まず相手の投稿に共感や付加価値(豆知識・気の利いた一言)を返す\n` +
          `- 専門性や個性がさりげなく伝わる(競艇なら予想の鋭さ、店なら地域愛やユーモア)\n` +
          `- リプ欄の他人が「このアカ気になる」と思う絶妙な存在感。露骨な「フォローして」「予想見て」は禁止\n` +
          `- 短く自然に(40〜60字)。絵文字は1個まで。敵を作らない\n` +
          `出力は【案1】【案2】【案3】の見出しを付けて各案を改行で区切る。前置き不要。日本語。${sc()}`;
      }
      const text = await callAI(prompt, false);

      /* 案ごとに分割してコピーボタン付きで表示 */
      out.clear();
      const cases = text.split(/【案\s*\d+】/).map(s=>s.trim()).filter(Boolean);
      const list = cases.length ? cases : [text.trim()];
      list.forEach((c, i) => {
        const card = document.createElement("div");
        card.style.cssText = "background:rgba(0,229,255,.04);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin:8px 0";
        const t = document.createElement("div");
        t.style.cssText = "font-size:13.5px;line-height:1.6;white-space:pre-wrap;margin-bottom:8px";
        t.textContent = c;
        card.appendChild(t);
        const cp = document.createElement("button");
        cp.className = "btn"; cp.style.cssText = "margin:0;padding:6px 12px;font-size:13px";
        cp.textContent = "📋 案"+(i+1)+"をコピー";
        cp.onclick = () => {
          navigator.clipboard.writeText(c);
          cp.textContent = "✓ コピーした!"; setTimeout(()=>cp.textContent="📋 案"+(i+1)+"をコピー", 1500);
        };
        card.appendChild(cp);
        out.box.appendChild(card);
      });

      /* 営業記録ボタン(送信したら押す→履歴に記録) */
      if (user) {
        const recRow = document.createElement("div");
        recRow.style.cssText = "margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center";
        const recBtn = document.createElement("button");
        recBtn.className = "btn"; recBtn.style.cssText = "margin:0;background:linear-gradient(135deg,#10b981,#059669)";
        recBtn.textContent = "✅ 営業した！と記録";
        recBtn.onclick = async () => {
          try {
            await sb.from("outreach_log").insert({ account: acctVal, target: user, tweet_url: url, status: "replied" });
            recBtn.textContent = "✓ 記録した"; recBtn.disabled = true;
            refreshTarget();
          } catch(e) { out.err("記録に失敗(outreach_logテーブル未作成かも): " + e.message); }
        };
        recRow.appendChild(recBtn);
        const hint = document.createElement("span"); hint.className="desc"; hint.textContent = "送ったら押す→次から「絡んだ」と分かる";
        recRow.appendChild(hint);
        out.box.appendChild(recRow);
      }
    } catch (e) { out.err(e.message); }
    finally { btn.disabled = false; btn.textContent = orig; }
  };

  /* 営業履歴の一覧表示 */
  fld(el, "最近の営業履歴");
  const histBox = document.createElement("div");
  el.appendChild(histBox);
  (async () => {
    try {
      const { data } = await sb.from("outreach_log")
        .select("target,status,created_at,tweet_url")
        .eq("account", acctVal)
        .order("created_at", { ascending:false }).limit(20);
      if (!data || !data.length) { histBox.innerHTML = '<p class="desc" style="margin:0">まだ営業履歴なし。絡んだら「記録」を押すとここに出る。</p>'; return; }
      histBox.innerHTML = "";
      data.forEach((r) => {
        const days = Math.floor((Date.now() - new Date(r.created_at).getTime()) / 86400000);
        const color = days<=7 ? "var(--bad)" : (days<=30 ? "#ffc107" : "var(--muted)");
        const row = document.createElement("div");
        row.style.cssText = "display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px";
        const left = document.createElement("a");
        left.href = "https://x.com/" + r.target; left.target="_blank";
        left.style.cssText = "color:var(--fg);text-decoration:none;font-weight:600";
        left.textContent = "@" + r.target;
        const right = document.createElement("span");
        right.style.color = color;
        right.textContent = days===0 ? "今日" : days+"日前";
        row.appendChild(left); row.appendChild(right);
        histBox.appendChild(row);
      });
    } catch(e) {
      histBox.innerHTML = '<p class="desc" style="margin:0;color:var(--bad)">履歴の読み込み失敗。Supabaseでv5のSQL(outreach_log)を実行して。</p>';
    }
  })();
};

  prompt: (v) => `あなたは${S.sns}でフォロワー数十万のアカウントを複数運用するプロ。以下の${S.sns}投稿の下書きを投稿前診断せよ。\n\n${v.draft}\n\n出力(日本語・前置き不要):\n■総合スコア: ◯◯/100\n■項目別(各20点+一言): フック / 読みやすさ・改行 / 具体性 / 感情・共感 / CTA\n■赤入れ(直すべき箇所を具体的に)\n■修正版(満点を狙った書き直し${S.sns==="X"?"・140字以内":""})${sc()}`,
});

/* ---- 01 カレンダー ---- */
BUILDERS.calendar = (el) => {
  head(el, "投稿カレンダー自動生成",
    "選んだアカウントの業種・性格に沿った投稿計画+バズりやすい推奨時間付き。完成文はそのまま予約に送れる。",
    ["送信先アカウントと期間を選ぶ","入れたいネタがあれば書く(任意)","生成→「予約管理に送る」→GOで自動投稿確定"]);

  fld(el, "期間");
  const span = chipsSingle(el, ["週間","15日","月間"], "週間");
  fld(el, "予約送信先アカウント(Xのみ)");
  const acct = document.createElement("select"); el.appendChild(acct);
  S.clients.filter((c)=>c.status==="active").forEach((c)=>{ const o=document.createElement("option"); o.value=c.screen_name; o.textContent="@"+c.screen_name; acct.appendChild(o); });
  if (!acct.options.length) { const o=document.createElement("option"); o.textContent="(クライアント未登録)"; o.value=""; acct.appendChild(o); }
  acct.value = S.activeAccount;
  acct.onchange = async () => {
    /* まずキャッシュから即座に切替→ボタン表示を即更新 */

    if (!hit) { await loadCfgFor(acct.value || "_default_"); updateYosouVisibility(); }

  };
  const acctHint = document.createElement("p"); acctHint.className = "desc"; acctHint.style.margin = "6px 0 0";
  acctHint.textContent = "選んだアカウントの「生成設定」(性格・絵文字・無料予想の有無など)で文章が作られる。";
  el.appendChild(acctHint);
  fld(el, "店・事業の予定やネタ(任意)");
  const events = ta(el, 4, "例:\n6/20 DJイベント\n新フレーバー入荷\n新作ゲームのデモ完成間近");

  const gen = runBtn(el, "カレンダーを生成する");
  const out = outArea(el);

  /* 今日/明日の無料予想ボタン(業種が競艇/ボートのアカウントの時だけ表示) */
  const yosouFld = document.createElement("div");
  yosouFld.style.cssText = "margin-top:12px";
  yosouFld.style.display = "none"; // 既定は非表示。判定で出す
  const btnRow = document.createElement("div"); btnRow.className = "acts"; yosouFld.appendChild(btnRow);
  const todayBtn = document.createElement("button"); todayBtn.className = "btn"; todayBtn.style.margin = "0"; todayBtn.textContent = "🚤 今日の無料予想";
  btnRow.appendChild(todayBtn);
  const yosouOut = document.createElement("div"); yosouFld.appendChild(yosouOut);
  el.appendChild(yosouFld);

  /* 競艇/ボート業種の時だけ無料予想を表示。アカウント切替のたびに呼ぶ */
  function updateYosouVisibility() {
    const isBoat = /競艇|ボートレース|ボート/.test(CFG.bizType || "");
    yosouFld.style.display = isBoat ? "block" : "none";
    if (!isBoat) yosouOut.innerHTML = ""; // 非競艇に切り替えたら結果も消す
  }
  /* 初期表示: キャッシュがあれば即判定、なければ通信 */
  (async () => {
    const hit = loadCfgSync(acct.value || "_default_");
    updateYosouVisibility();
    if (!hit) { await loadCfgFor(acct.value || "_default_"); updateYosouVisibility(); }
  })();

  {
    const runYosou = async (btn, label) => {
      btn.disabled = true; const orig = btn.textContent; btn.textContent = "生成中…(検索)";
      if (acct.value) await loadCfgFor(acct.value); else await loadCfgFor("_default_");
      /* 念のため再判定: 競艇業種でなければ中止 */
      if (!/競艇|ボートレース|ボート/.test(CFG.bizType || "")) { updateYosouVisibility(); btn.disabled = false; btn.textContent = orig; return; }
      const base = new Date();
      if (label === "明日") base.setDate(base.getDate() + 1);
      const WD = ["日","月","火","水","木","金","土"];
      const p = {
        d: (base.getMonth()+1) + "/" + base.getDate(), w: WD[base.getDay()],
        h: "11:00", g: "", t: label + "の無料予想", y: "予想",
      };
      try {
        await genYosou(p, label);
        /* 明日の予想は今日の夜に告知投稿する(投稿日を今日に) */
        if (p._postToday) {
          const t = new Date();
          const WD = ["日","月","火","水","木","金","土"];
          p.d = (t.getMonth()+1) + "/" + t.getDate(); p.w = WD[t.getDay()];
        }
        yosouOut.innerHTML = "";
        /* GASでレース取得に失敗した場合はエラーコードを出して終了 */
        if (p._raceErr) {
          const ebox = document.createElement("div");
          ebox.style.cssText = "font-size:13px;line-height:1.7;white-space:pre-wrap;background:rgba(255,77,109,.08);border:1px solid var(--bad);border-radius:10px;padding:10px 12px;margin-top:10px;color:var(--bad)";
          ebox.textContent = "⚠ " + p._raceErr + "\n\n(GASを最新コードで再デプロイしたか確認。それでも出る場合はこのコードを伝えて)";
          yosouOut.appendChild(ebox);
          btn.disabled = false; btn.textContent = orig;
          return;
        }
        const box = document.createElement("div");
        box.style.cssText = "font-size:13.5px;line-height:1.7;white-space:pre-wrap;background:rgba(0,229,255,.04);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-top:10px";
        box.textContent = p._text; yosouOut.appendChild(box);
        const info = document.createElement("p"); info.className = "desc"; info.style.margin = "6px 0 0";
        const setInfo = () => {
          if (p._postToday) info.textContent = "明日のレース予想を今夜 " + (p.h||"21:00") + " に告知投稿(締切" + (p._deadline||"要確認") + ")。";
          else if (p._deadline) info.textContent = "投稿時刻は締切" + p._deadline + "の15分前(" + (p.h||"?") + ")に自動設定。";
          else info.textContent = "⚠ 締切時刻が取れなかった。下の欄に正しい締切を入れて(15分前に自動設定)。";
        };
        setInfo();
        if (!p._deadlineUnknown && !p._postToday) info.style.color = "var(--muted)";
        else if (p._deadlineUnknown && !p._postToday) info.style.color = "var(--bad)";
        yosouOut.appendChild(info);

        /* 締切時刻の手入力(検索が外れた時の修正用) */
        const dlRow = document.createElement("div"); dlRow.style.cssText = "display:flex;align-items:center;gap:8px;margin-top:8px";
        const dlLbl = document.createElement("span"); dlLbl.className = "desc"; dlLbl.textContent = "締切を直す:"; dlRow.appendChild(dlLbl);
        const dlIn = document.createElement("input"); dlIn.type = "time"; dlIn.value = p._deadline || "";
        dlIn.style.cssText = "flex:0 0 auto;width:auto;padding:6px 10px;font-family:var(--mono)";
        dlIn.onchange = () => {
          if (!/^\d{1,2}:\d{2}$/.test(dlIn.value)) return;
          p._deadline = dlIn.value; p._deadlineUnknown = false;
          if (!p._postToday) {
            const [hh, mm] = dlIn.value.split(":").map(Number);
            let total = hh*60+mm-15; if (total<0) total = hh*60+mm;
            p.h = String(Math.floor(total/60)).padStart(2,"0")+":"+String(total%60).padStart(2,"0");
          }
          info.style.color = "var(--muted)"; setInfo();
        };
        dlRow.appendChild(dlIn);
        yosouOut.appendChild(dlRow);

        const acts = document.createElement("div"); acts.className = "acts"; yosouOut.appendChild(acts);
        const re = document.createElement("button"); re.className = "mini"; re.textContent = "🔀 作り直し";
        re.onclick = async () => { re.disabled = true; await genYosou(p, label); if (p._postToday) { const t=new Date(); const WD=["日","月","火","水","木","金","土"]; p.d=(t.getMonth()+1)+"/"+t.getDate(); p.w=WD[t.getDay()]; } box.textContent = p._text; dlIn.value = p._deadline || ""; info.style.color = p._deadlineUnknown && !p._postToday ? "var(--bad)" : "var(--muted)"; setInfo(); re.disabled = false; };
        acts.appendChild(re);
        const send = document.createElement("button"); send.className = "mini primary"; send.textContent = "予約管理に送る";
        send.onclick = async () => {
          if (!acct.value) { yosouOut.innerHTML += '<div class="err">クライアント未登録</div>'; return; }
          send.disabled = true;
          const dt = planDate(p);
          const { error } = await sb.from("scheduled_posts").insert({
            screen_name: acct.value, text: p._text, scheduled_at: dt.toISOString(), status: "draft",
          });
          if (error) { send.disabled = false; yosouOut.innerHTML += '<div class="err">'+error.message+'</div>'; return; }
          send.textContent = "送った✓";
        };
        acts.appendChild(send);
      } catch (e) { yosouOut.innerHTML = '<div class="err">'+e.message+'</div>'; }
      btn.disabled = false; btn.textContent = orig;
    };
    todayBtn.onclick = () => runYosou(todayBtn, "本日");
  }

  /* 特定日に1本だけ追加(空いた日の穴埋め用) */
  const addFld = document.createElement("div");
  addFld.style.cssText = "margin-top:16px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px";
  addFld.innerHTML = '<div style="font-size:10.5px;font-weight:800;letter-spacing:.18em;color:var(--accent2);font-family:var(--mono);margin-bottom:10px">▸ 特定の日に1本だけ追加</div>';
  const addDay = document.createElement("input"); addDay.type = "datetime-local";
  addDay.style.marginBottom = "8px"; addFld.appendChild(addDay);
  const addTheme = document.createElement("input"); addTheme.placeholder = "テーマ(任意・例: 週末営業の告知)";
  addTheme.style.marginBottom = "8px"; addFld.appendChild(addTheme);
  const addBtn = document.createElement("button"); addBtn.className = "mini cyan"; addBtn.style.width = "100%"; addBtn.textContent = "この日の投稿を1本作る";
  addFld.appendChild(addBtn);
  const addOut = document.createElement("div"); addFld.appendChild(addOut);
  el.appendChild(addFld);

  addBtn.onclick = async () => {
    if (!addDay.value) { return; }
    addBtn.disabled = true; addBtn.textContent = "生成中…";
    if (acct.value) await loadCfgFor(acct.value); else await loadCfgFor("_default_");
    const dt = new Date(addDay.value);
    const WD = ["日","月","火","水","木","金","土"];
    const p = {
      d: (dt.getMonth()+1) + "/" + dt.getDate(), w: WD[dt.getDay()],
      h: String(dt.getHours()).padStart(2,"0") + ":" + String(dt.getMinutes()).padStart(2,"0"),
      g: "", t: addTheme.value || "おまかせ", y: "単発",
    };
    try {
      await genOne(p);
      addOut.innerHTML = "";
      const box = document.createElement("div");
      box.style.cssText = "font-size:13.5px;line-height:1.7;white-space:pre-wrap;background:rgba(0,229,255,.04);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-top:10px";
      box.textContent = p._text; addOut.appendChild(box);
      const acts = document.createElement("div"); acts.className = "acts"; addOut.appendChild(acts);
      const re = document.createElement("button"); re.className = "mini"; re.textContent = "🔀 作り直し";
      re.onclick = async () => { re.disabled = true; await genOne(p, true); box.textContent = p._text; re.disabled = false; };
      acts.appendChild(re);
      const send = document.createElement("button"); send.className = "mini primary"; send.textContent = "予約管理に送る";
      send.onclick = async () => {
        if (!acct.value) { addOut.innerHTML += '<div class="err">クライアント未登録</div>'; return; }
        send.disabled = true;
        const { error } = await sb.from("scheduled_posts").insert({
          screen_name: acct.value, text: p._text, scheduled_at: dt.toISOString(), status: "draft",
        });
        if (error) { send.disabled = false; addOut.innerHTML += '<div class="err">'+error.message+'</div>'; return; }
        send.textContent = "送った✓";
      };
      acts.appendChild(send);
    } catch (e) { addOut.innerHTML = '<div class="err">'+e.message+'</div>'; }
    addBtn.disabled = false; addBtn.textContent = "この日の投稿を1本作る";
  };

  const listEl = document.createElement("div"); el.appendChild(listEl);
  let lastPlan = null;

  function parseJSONArr(text) {
    let t = text.replace(/```json|```/g, "").trim();
    t = t.slice(t.indexOf("["));
    try { return JSON.parse(t); }
    catch (e) { const cut = t.lastIndexOf("}"); if (cut > 0) return JSON.parse(t.slice(0, cut + 1) + "]"); throw e; }
  }

  gen.onclick = async () => {
    out.clear(); out.err(""); listEl.innerHTML = "";
    gen.disabled = true; gen.textContent = "生成中…";
    /* 送信先アカウント専用の生成設定を適用(なければ共通) */
    if (acct.value) await loadCfgFor(acct.value); else await loadCfgFor("_default_");
    const today = new Date();
    const days = span.value === "週間" ? 7 : span.value === "15日" ? 15 : 30;
    const fmt = S.sns === "X" ? "140字以内" : "キャプション形式・ハッシュタグ5個";
    const timeRule = S.sns === "X"
      ? "Xの伸びやすい時間帯(通勤7-8時/昼12時/夜21-23時/深夜0-1時)を踏まえ、内容と客層に合う時間。夜営業の店の告知は夜〜深夜が強い"
      : "Instagramの伸びやすい時間帯(昼12時前後/夜20-22時)を踏まえる";
    try {
      const text = await callAI(
        `今日は${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日。${S.sns}アカウント用に、明日から${days}日分の投稿計画を作れ。1日1投稿。` +
        (CFG.closedDays && CFG.closedDays.length ? `\n\n【定休日】${CFG.closedDays.join("・")}曜は定休日。その曜日には来店を促す営業告知を入れず、休業のお知らせや「明日から営業」等の定休日に合った内容にする。` : "") +
        `\n\n話題は事業内容(業種・店舗情報)に沿って自然に散らす。告知・豆知識・体験談・共感ネタなどをバランス良く配分し、店舗系の告知は週末に厚く。\n\n入れたいネタ・予定:\n${events.value||"特になし(業種に合うおまかせで)"}\n\nバズ狙いと告知をバランス良く。投稿時間は${timeRule}。\n\n` +
        (span.value === "週間"
          ? `JSON配列のみ出力(マークダウン記法・前置き禁止): [{"d":"6/13","w":"土","g":"話題カテゴリ","h":"21:00","t":"テーマ","y":"投稿の型","x":"完成した投稿文(${fmt})"}] 7要素。${sc()}`
          : `JSON配列のみ出力(マークダウン記法・前置き禁止): [{"d":"6/13","w":"土","g":"話題カテゴリ","h":"21:00","t":"テーマ(15字以内)","y":"型(6字以内)"}] ${days}要素。完成文は不要。`)
      );
      const parsed = parseJSONArr(text);
      const filtered = parsed;
      /* 時刻(h)が空の日を補完。曜日や順番で散らす */
      const defaultTimes = S.sns === "X" ? ["21:00","22:00","12:00","20:00","23:00","19:00","21:30"] : ["20:00","21:00","12:00","19:00"];
      filtered.forEach((p, i) => {
        if (!p.h || !/^\d{1,2}:\d{2}$/.test(p.h)) { p.h = defaultTimes[i % defaultTimes.length]; }
      });
      /* 週間は完成文(x)をそのまま反映 */
      filtered.forEach((p) => { if (p.x) p._text = p.x; });
      renderPlan(filtered);

      /* 週間以外(15日・月間)は枠だけ来てるので、続けて全日分の本文を自動生成 */
      if (span.value !== "週間") {
        gen.textContent = "本文を生成中… 0/" + filtered.length;
        for (let i = 0; i < filtered.length; i++) {
          await genOne(filtered[i]);
          gen.textContent = "本文を生成中… " + (i+1) + "/" + filtered.length;
          renderPlan(filtered);
        }
      }
    } catch (e) { out.err("生成に失敗。もう一度押して。(" + e.message.slice(0, 80) + ")"); }
    gen.disabled = false; gen.textContent = "カレンダーを生成する";
  };

  function planDate(p) {
    const [m, d] = p.d.split("/").map(Number);
    const [hh, mm] = (p.h || "21:00").split(":").map(Number);
    const now = new Date();
    let y = now.getFullYear();
    if (m < now.getMonth() + 1 - 1) y += 1; // 年またぎ対策
    return new Date(y, m - 1, d, hh, mm || 0);
  }

  function renderPlan(plan) {
    lastPlan = plan;
    listEl.innerHTML = "";
    if (S.sns === "X") {
      const bulk = document.createElement("button");
      bulk.className = "btn"; bulk.textContent = "完成してる分を全部 予約管理に送る";
      bulk.onclick = async () => {
        if (!acct.value) { out.err("クライアント未登録。先に認証リンクから登録して。"); return; }
        const rows = plan.filter((p) => p._text).map((p) => ({
          screen_name: acct.value, text: p._text, scheduled_at: planDate(p).toISOString(), status: "draft",
        }));
        if (!rows.length) { out.err("完成した投稿文がまだない。"); return; }
        bulk.disabled = true;
        const { error } = await sb.from("scheduled_posts").insert(rows);
        if (error) { out.err("送信エラー: " + error.message); bulk.disabled = false; return; }
        bulk.textContent = rows.length + "件送った✓ 予約管理タブでGOを出すと確定";
      };
      listEl.appendChild(bulk);
    }
    plan.forEach((p, i) => {
      const div = document.createElement("div"); div.className = "row";
      const meta = document.createElement("div"); meta.className = "meta";
      meta.innerHTML = '<span class="pill time">' + esc(p.d) + "(" + esc(p.w||"") + ")</span>" +
        (p.g ? '<span class="pill genre">' + esc(p.g) + "</span>" : "") +
        '<span class="pill type">' + esc(p.y||"") + "</span>";
      div.appendChild(meta);

      /* 時刻編集(送る前にカーソルで) */
      const timeRow = document.createElement("div");
      timeRow.style.cssText = "display:flex;align-items:center;gap:8px;margin:6px 0";
      const clock = document.createElement("span"); clock.textContent = "⏰"; timeRow.appendChild(clock);
      const tIn = document.createElement("input"); tIn.type = "time"; tIn.value = (p.h||"21:00");
      tIn.style.cssText = "flex:0 0 auto;width:auto;padding:6px 10px;font-family:var(--mono)";
      tIn.onchange = () => { p.h = tIn.value; };
      timeRow.appendChild(tIn);
      div.appendChild(timeRow);

      const theme = document.createElement("div"); theme.style.cssText = "font-weight:700;margin-bottom:6px"; theme.textContent = p.t||"";
      div.appendChild(theme);

      const body = document.createElement("div"); div.appendChild(body);
      listEl.appendChild(div);

      const renderBody = () => {
        body.innerHTML = "";
        if (p._text) { drawText(body, p, p._text); }
        else {
          const hint = document.createElement("div"); hint.className = "muted"; hint.style.fontSize = "12.5px";
          hint.textContent = "(本文は生成中…/シャッフルで作り直せる)";
          body.appendChild(hint);
        }
      };

      /* p.h / p.t が変わった時に時刻欄・テーマ表示を同期 */
      const syncMeta = () => {
        tIn.value = p.h || "21:00";
        theme.textContent = p.t || "";
      };

      /* この日専用ツール: シャッフル(生成/作り直し) / 無料予想(競艇のみ) */
      const tools = document.createElement("div"); tools.className = "acts"; tools.style.marginTop = "8px";
      const shuf = document.createElement("button"); shuf.className = "mini cyan";
      shuf.textContent = p._text ? "🔀 シャッフル(作り直し)" : "✍ 投稿文を作る";
      shuf.onclick = async () => { shuf.disabled = true; shuf.textContent = "生成中…"; await genOne(p, !!p._text); shuf.disabled = false; shuf.textContent = "🔀 シャッフル(作り直し)"; syncMeta(); renderBody(); };
      tools.appendChild(shuf);
      /* 生成設定の「業種」に競艇/ボートが入ってる時だけ無料予想ボタンを出す */
      const bizText = (CFG.bizType || "");
      if (/競艇|ボートレース|ボート/.test(bizText)) {
        const yosou = document.createElement("button"); yosou.className = "mini"; yosou.textContent = "🚤 無料予想";
        yosou.onclick = async () => { yosou.disabled = true; yosou.textContent = "予想生成中…"; await genYosou(p); yosou.disabled = false; yosou.textContent = "🚤 無料予想"; syncMeta(); renderBody(); };
        tools.appendChild(yosou);
      }
      div.appendChild(tools);

      renderBody();
    });
  }

  /* 通常の1投稿生成(shuffle=trueで毎回違う角度に) */
  async function genOne(p, shuffle) {
    try {
      const variant = shuffle ? "\n※前回と違う切り口・フック・語り口で、新鮮な別パターンにすること。" : "";
      const text = await callAI(`${S.sns}投稿を1本書け。\n日付: ${p.d}(${p.w}) ${p.h||""}投稿予定 / ジャンル: ${p.g||""} / テーマ: ${p.t} / 型: ${p.y}\n${S.sns==="X"?"140字以内。":"キャプション形式・ハッシュタグ5個。"}投稿文のみ出力。前置き禁止。${variant}${sc()}`);
      p._text = text.trim();
    } catch (e) { out.err(e.message); }
  }

  /* 無料予想生成: GASで実レース取得→Claudeで予想本文化 */
  async function genYosou(p, whenLabel) {
    const label = whenLabel || "本日";
    const dateWord = label === "明日" ? "明日" : "本日";
    try {
      const { data: sess } = await sb.auth.getSession();
      if (!sess.session) throw new Error("ログインが切れた。リロードして。");
      const yyyymmdd = (() => {
        const base = new Date();
        if (label === "明日") base.setDate(base.getDate() + 1);
        return "" + base.getFullYear() + String(base.getMonth()+1).padStart(2,"0") + String(base.getDate()).padStart(2,"0");
      })();

      /* STEP A: GASで締切が近い実レースを取得(Load failed対策で2回までリトライ) */
      const callPick = async () => {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 60000); // 60秒で打ち切り
        try {
          const r = await fetch(GAS_URL, {
            method: "POST", headers: { "Content-Type": "text/plain" }, signal: ctrl.signal,
            body: JSON.stringify({
              auth: sess.session.access_token, action: "pickBoatRace",
              hd: yyyymmdd,
              minMinutes: label === "明日" ? -100000 : 15,
              maxMinutes: label === "明日" ? 100000 : 20,
              exclude: (window._recentRaces || []),
            }),
          });
          return await r.json();
        } finally { clearTimeout(timer); }
      };
      let race;
      try { race = await callPick(); }
      catch (e1) {
        await new Promise(r => setTimeout(r, 1500));
        try { race = await callPick(); }
        catch (e2) { p._text=""; p._deadline=""; p._deadlineUnknown=true; p._raceErr="通信失敗(Load failed)。電波を確認してもう一度押して。"; p.t=label+"の無料予想(通信失敗)"; return; }
      }
      if (race.error) {
        p._text = "";
        p._deadline = "";
        p._deadlineUnknown = true;
        p._raceErr = "レース取得失敗: " + race.error + (race.code?" (code:"+race.code+")":"") + (race.detail?" / "+race.detail:"") + (race.checked!==undefined?" / 確認"+race.checked+"件":"");
        p.t = label + "の無料予想(取得失敗)";
        return;
      }
      /* 使ったレースを記録(次回除外。直近5件まで保持) */
      window._recentRaces = window._recentRaces || [];
      window._recentRaces.push(race.jcd + "-" + race.rno);
      if (window._recentRaces.length > 5) window._recentRaces.shift();

      /* STEP B: 取得した実データでClaudeに予想本文を作らせる */
      /* 3連単: 人気トップ6をシャッフル + 大穴(100倍あたり)1点 = 計7点 */
      let formationText = "";
      let buyLines = null;
      const tri = race.trifecta || []; // [{combo,odds}] オッズ昇順
      if (tri.length >= 6) {
        /* 人気トップ6を取り出してシャッフル */
        const top6 = tri.slice(0, 6).map(c => c.combo);
        for (let i = top6.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [top6[i], top6[j]] = [top6[j], top6[i]];
        }
        /* 大穴: オッズ80〜150倍あたりの候補からランダムで1点。無ければ最も高オッズ寄りから */
        const ana = tri.filter(c => c.odds >= 80 && c.odds <= 150);
        let anaPick;
        if (ana.length) anaPick = ana[Math.floor(Math.random() * ana.length)];
        else {
          /* 帯に無ければ100倍に最も近い1点 */
          anaPick = tri.reduce((best, c) =>
            Math.abs(c.odds - 100) < Math.abs(best.odds - 100) ? c : best, tri[tri.length-1]);
        }
        const lines = top6.slice();
        lines.push("🎯大穴：" + anaPick.combo + "（" + anaPick.odds + "倍）");
        buyLines = lines;
        formationText = "\n\n【買い目・この7行をこのまま使う】\n" +
          buyLines.join("\n") +
          "\n※上6点=3連単オッズ人気トップ6を並べ替えたもの。最後の1点=100倍前後の大穴。番号・順番・大穴表記すべてこのまま本文に書き、勝手に変えない。";
      }

      const prompt =
        `次は${race.venue}${race.rno}R(締切${race.deadline})の実際の出走表・直前情報。これを根拠に無料予想の投稿本文を作れ。\n\n` +
        `【出走表】\n${(race.racelistText||"").slice(0,3500)}\n\n【直前情報】\n${(race.beforeText||"").slice(0,2500)}\n` +
        formationText + `\n\n` +
        `出力は投稿本文のみ(JSON不要・前置き不要)。フォーマット:\n` +
        `1行目は必ず「${dateWord}の無料予想を1レース公開」と書く(出走表に別の日付や「〇日目」表記があっても無視し、必ず「${dateWord}」とする)。\n空行\n【${race.venue}${race.rno}R】\n` +
        (buyLines
          ? buyLines.join("\n") + "\n"
          : "X-X-X\nX-X-X\nX-X-X\nX-X-X\nX-X-X\nX-X-X\n🎯大穴：X-X-X\n") +
        `空行\n展開予想を1〜2行(出走表・直前情報の根拠を添える)\n「回収率重視の厳選予想」「結果はあとで報告します」的な締め\n\n` +
        (buyLines
          ? `ルール: 買い目は上記【買い目】の7行を、番号・順番・大穴表記すべてそのまま本文に書く。展開予想の表現は毎回新鮮に。注意書き・免責文(自己責任・参考まで等)は入れない。${sc()}`
          : `ルール: 買い目は3連単6点(人気どころ)+大穴1点の計7点を縦に並べる。最後の大穴は100倍前後の高オッズ。表現は毎回新鮮に。注意書き・免責文は入れない。${sc()}`);
      const text = await callAI(prompt, false);

      p._text = text.trim();
      p._venue = race.venue + race.rno + "R";
      p._deadline = race.deadline || "";
      p._deadlineUnknown = !(race.deadline && /^\d{1,2}:\d{2}$/.test(race.deadline));
      p._raceErr = "";

      if (label === "明日") {
        /* 明日の予想は前夜(今日の21時)に告知 */
        p.h = "21:00"; p._postToday = true;
      } else if (!p._deadlineUnknown) {
        /* 今日の予想は締切15分前 */
        const [hh, mm] = race.deadline.split(":").map(Number);
        let total = hh * 60 + mm - 15; if (total < 0) total = hh * 60 + mm;
        p.h = String(Math.floor(total/60)).padStart(2,"0") + ":" + String(total%60).padStart(2,"0");
      }
      p.t = label + "の無料予想" + (p._deadline ? "(締切" + p._deadline + ")" : "");
    } catch (e) { p._raceErr = String(e.message||e); out.err(e.message); }
  }

  function drawText(body, p, text) {
    p._text = text;
    const box = document.createElement("div");
    box.style.cssText = "font-size:13.5px;line-height:1.7;white-space:pre-wrap;background:rgba(0,229,255,.04);border:1px solid var(--border);border-radius:10px;padding:10px 12px";
    box.textContent = text; body.appendChild(box);
    const acts = document.createElement("div"); acts.className = "acts"; body.appendChild(acts);
    const cp = document.createElement("button"); cp.className = "mini"; cp.textContent = "コピー";
    cp.onclick = () => { navigator.clipboard.writeText(text); cp.textContent = "コピー済"; setTimeout(()=>cp.textContent="コピー",1500); };
    acts.appendChild(cp);
    if (S.sns === "X") {
      const sd = document.createElement("button"); sd.className = "mini primary"; sd.textContent = "予約管理に送る";
      sd.onclick = async () => {
        if (!acct.value) { out.err("クライアント未登録。先に認証リンクから登録して。"); return; }
        sd.disabled = true;
        const { error } = await sb.from("scheduled_posts").insert({
          screen_name: acct.value, text: p._text, scheduled_at: planDate(p).toISOString(), status: "draft",
        });
        if (error) { out.err("送信エラー: " + error.message); sd.disabled = false; return; }
        sd.textContent = "送った✓";
      };
      acts.appendChild(sd);
      const a = document.createElement("a"); a.className = "mini"; a.textContent = "Xで投稿→";
      a.href = "https://twitter.com/intent/tweet?text=" + encodeURIComponent(p._text); a.target = "_blank";
      acts.appendChild(a);
    }
  }
};

/* ---- 09 推移記録 ---- */
BUILDERS.followers = (el) => {
  const METRICS = { X: ["フォロワー","インプ(日)"], Instagram: ["フォロワー","リーチ(日)"] };
  head(el, "フォロワー推移の記録",
    `毎日の数字を入れるだけで増減・ペース・目標到達予測を自動計算。${S.sns}の数字だけ表示(右上で切替)。同日は上書き。`,
    [`${S.sns}のアプリでフォロワー数を見る`,"数字を入れて「記録」","目標を設定すると「いつ届くか」も予測"]);

  fld(el, "記録する指標");
  const metric = chipsSingle(el, METRICS[S.sns], METRICS[S.sns][0]);
  fld(el, "今日の数値");
  const rowEl = document.createElement("div"); rowEl.style.cssText = "display:flex;gap:10px"; el.appendChild(rowEl);
  const num = document.createElement("input"); num.type = "number"; num.placeholder = "1234"; rowEl.appendChild(num);
  const rec = document.createElement("button"); rec.className = "mini primary"; rec.style.flex = "0 0 80px"; rec.textContent = "記録"; rowEl.appendChild(rec);
  const msg = document.createElement("div"); msg.className = "okmsg"; el.appendChild(msg);
  const statsEl = document.createElement("div"); el.appendChild(statsEl);
  const goalEl = document.createElement("div"); el.appendChild(goalEl);
  const chartEl = document.createElement("div"); el.appendChild(chartEl);
  const aiEl = document.createElement("div"); el.appendChild(aiEl);
  const histEl = document.createElement("div"); el.appendChild(histEl);

  let records = [], goals = {};
  const key = (m) => S.sns + ":" + m;
  const fmtJP = (d) => parseInt(d.slice(5,7)) + "/" + parseInt(d.slice(8,10));

  (async () => {
    records = await kvGet("followers", []);
    goals = await kvGet("goals", {});
    drawAll();
  })();

  rec.onclick = async () => {
    const n = parseInt(num.value); if (isNaN(n)) return;
    const today = new Date().toISOString().slice(0, 10);
    records = records.filter((r) => !(r.date === today && r.platform === key(metric.value)));
    records.push({ date: today, platform: key(metric.value), count: n });
    records.sort((a,b)=>a.date.localeCompare(b.date));
    await kvSet("followers", records);
    num.value = ""; msg.textContent = fmtJP(today) + " の" + metric.value + "を " + n.toLocaleString() + " で記録した";
    setTimeout(()=>msg.textContent="",2500);
    drawAll();
  };

  function fSeries() { return records.filter((r)=>r.platform===key("フォロワー")).sort((a,b)=>a.date.localeCompare(b.date)); }

  function drawAll() { drawStats(); drawGoal(); drawChart(); drawAI(); drawHist(); }

  function calcStats() {
    const fs = fSeries(); if (!fs.length) return null;
    const last = fs[fs.length-1];
    const prev = fs.length>1 ? fs[fs.length-2] : null;
    const since = (days) => {
      const cutoff = new Date(Date.now()-days*86400000).toISOString().slice(0,10);
      const base = fs.filter((r)=>r.date<=cutoff).pop() || fs[0];
      if (base.date === last.date) return null;
      const dd = Math.max(1, Math.round((new Date(last.date)-new Date(base.date))/86400000));
      return { diff: last.count-base.count, perDay: (last.count-base.count)/dd };
    };
    return { last, prevDiff: prev ? last.count-prev.count : null, w: since(7), m: since(30) };
  }
  const sign = (n) => (n>=0?"+":"")+Math.round(n).toLocaleString();
  const dc = (n) => n>=0 ? "var(--ok)" : "var(--bad)";

  function drawStats() {
    const st = calcStats(); statsEl.innerHTML = "";
    if (!st) return;
    const w = document.createElement("div"); w.style.cssText = "display:flex;gap:8px;margin-top:18px"; statsEl.appendChild(w);
    [["NOW", st.last.count.toLocaleString(), st.prevDiff!==null?"前回 "+sign(st.prevDiff):"", st.prevDiff!==null?dc(st.prevDiff):""],
     ["7 DAYS", st.w?sign(st.w.diff):"—", st.w?(st.w.perDay>=0?"+":"")+st.w.perDay.toFixed(1)+"/日":"記録待ち", st.w?dc(st.w.diff):""],
     ["30 DAYS", st.m?sign(st.m.diff):"—", st.m?(st.m.perDay>=0?"+":"")+st.m.perDay.toFixed(1)+"/日":"記録待ち", st.m?dc(st.m.diff):""]
    ].forEach(([l,v,s,c]) => {
      const d = document.createElement("div"); d.className = "stat";
      d.innerHTML = '<div class="l">'+l+'</div><div class="v">'+esc(v)+'</div>'+(s?'<div class="s" style="color:'+(c||"var(--muted)")+'">'+esc(s)+"</div>":"");
      w.appendChild(d);
    });
  }

  function drawGoal() {
    goalEl.innerHTML = "";
    fld(goalEl, "目標フォロワー数");
    const goal = goals[S.sns];
    const st = calcStats();
    if (goal) {
      let fc = null;
      if (st && st.w && st.w.perDay > 0) {
        const remain = goal - st.last.count;
        if (remain <= 0) fc = { done: true };
        else { const days = Math.ceil(remain/st.w.perDay); const d = new Date(Date.now()+days*86400000);
          fc = { days, date: (d.getMonth()+1)+"/"+d.getDate(), remain }; }
      }
      const d = document.createElement("div"); d.className = "row"; d.style.borderLeft = "3px solid var(--ok)";
      d.innerHTML = '<b style="color:var(--ok);font-family:var(--mono)">' + goal.toLocaleString() + "</b> " +
        (fc ? (fc.done ? "— 達成済み🎉" : "まで残り <b>"+fc.remain.toLocaleString()+"</b>。今のペースなら <b style='color:var(--accent2)'>約"+fc.days+"日後("+fc.date+")</b> に到達")
            : "— 7日分くらい記録が貯まると予測が出る") +
        ' <button class="mini" style="float:right;flex:none;padding:4px 8px;font-size:11px">変更</button>';
      d.querySelector("button").onclick = async () => { delete goals[S.sns]; await kvSet("goals", goals); drawGoal(); drawChart(); };
      goalEl.appendChild(d);
    } else {
      const w = document.createElement("div"); w.style.cssText = "display:flex;gap:10px"; goalEl.appendChild(w);
      const gi = document.createElement("input"); gi.type = "number"; gi.placeholder = "例: 1000"; w.appendChild(gi);
      const gb = document.createElement("button"); gb.className = "mini cyan"; gb.style.flex = "0 0 80px"; gb.textContent = "設定"; w.appendChild(gb);
      gb.onclick = async () => { const n = parseInt(gi.value); if (!n) return; goals[S.sns] = n; await kvSet("goals", goals); drawGoal(); drawChart(); };
    }
  }

  function drawChart() {
    chartEl.innerHTML = "";
    const pts = fSeries(); if (pts.length < 2) return;
    const W=340,H=190,PL=46,PR=12,PT=14,PB=26;
    const goal = goals[S.sns];
    const mn = Math.min(...pts.map((r)=>r.count)), mx = Math.max(...pts.map((r)=>r.count));
    const pad = Math.max(1, Math.round((mx-mn)*.1));
    const lo = mn-pad, hi = mx+pad, sp = hi-lo||1;
    const x = (i) => PL + (i/(pts.length-1))*(W-PL-PR);
    const y = (c) => PT + (1-(c-lo)/sp)*(H-PT-PB);
    const fmtV = (v) => v>=10000 ? (v/10000).toFixed(1)+"万" : v.toLocaleString();
    let svg = '<div class="fld" style="font-size:10px;font-weight:800;letter-spacing:.2em;color:var(--accent2);font-family:var(--mono);margin:16px 0 8px">FOLLOWER GRAPH</div>' +
      '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;background:var(--surface2);border-radius:12px;border:1px solid var(--border)">';
    [lo, lo+sp/2, hi].map(Math.round).forEach((v) => {
      svg += '<line x1="'+PL+'" x2="'+(W-PR)+'" y1="'+y(v)+'" y2="'+y(v)+'" stroke="#1D2A47" stroke-dasharray="3 4"/>' +
        '<text x="'+(PL-6)+'" y="'+(y(v)+3.5)+'" text-anchor="end" font-size="9.5" fill="#7E8BA8" font-family="Menlo">'+fmtV(v)+"</text>";
    });
    if (goal && goal>=lo && goal<=hi) {
      svg += '<line x1="'+PL+'" x2="'+(W-PR)+'" y1="'+y(goal)+'" y2="'+y(goal)+'" stroke="#3DFFA8" stroke-width="1.5" stroke-dasharray="5 4"/>' +
        '<text x="'+(W-PR)+'" y="'+(y(goal)-4)+'" text-anchor="end" font-size="9.5" fill="#3DFFA8" font-weight="700">目標 '+goal.toLocaleString()+"</text>";
    }
    const line = pts.map((r,i)=>(i?"L":"M")+x(i)+","+y(r.count)).join(" ");
    svg += '<path d="'+line+' L'+x(pts.length-1)+','+(H-PB)+' L'+PL+','+(H-PB)+' Z" fill="rgba(255,46,126,.1)"/>' +
      '<path d="'+line+'" fill="none" stroke="#FF2E7E" stroke-width="2.5" stroke-linejoin="round"/>';
    const step = Math.max(1, Math.ceil(pts.length/5));
    pts.forEach((r,i) => {
      svg += '<circle cx="'+x(i)+'" cy="'+y(r.count)+'" r="3.5" fill="#04060C" stroke="#FF2E7E" stroke-width="2"/>';
      if (i%step===0 || i===pts.length-1)
        svg += '<text x="'+x(i)+'" y="'+(H-8)+'" text-anchor="middle" font-size="9.5" fill="#7E8BA8" font-family="Menlo">'+fmtJP(r.date)+"</text>";
    });
    chartEl.innerHTML = svg + "</svg>";
  }

  function drawAI() {
    aiEl.innerHTML = "";
    const fs = fSeries(); if (fs.length < 3) return;
    const b = document.createElement("button"); b.className = "btn btn-ghost"; b.textContent = "AIに推移を分析させる"; aiEl.appendChild(b);
    const out = outArea(aiEl);
    b.onclick = () => runAI(b, out, () =>
      `${S.sns}アカウントのフォロワー推移:\n${fs.map((r)=>r.date+": "+r.count).join("\n")}\n目標: ${goals[S.sns]||"未設定"}\n\nこのデータから日本語で簡潔に:\n■伸びの評価(加速中/横ばい/鈍化+理由)\n■原因の仮説2つ\n■今週の打ち手3つ(${S.sns}の機能を使った具体策)\n前置き不要。`);
  }

  function drawHist() {
    histEl.innerHTML = "";
    const sr = records.filter((r)=>r.platform.startsWith(S.sns+":"));
    if (!sr.length) { histEl.innerHTML = '<div class="muted" style="text-align:center;margin-top:20px">まだ記録なし。今日の数字から始める。</div>'; return; }
    fld(histEl, "記録履歴(最新10件)");
    sr.slice().sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10).forEach((r) => {
      const d = document.createElement("div");
      d.style.cssText = "display:flex;align-items:center;justify-content:space-between;padding:9px 4px;border-bottom:1px solid var(--border);font-size:13.5px";
      d.innerHTML = '<span class="muted" style="width:48px;font-family:var(--mono)">'+fmtJP(r.date)+"</span>" +
        '<span class="muted" style="flex:1">'+esc(r.platform.split(":")[1])+"</span>" +
        '<b style="margin-right:12px;font-family:var(--mono)">'+r.count.toLocaleString()+"</b>" +
        '<button style="background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer">×</button>';
      d.querySelector("button").onclick = async () => {
        records = records.filter((x)=>!(x.date===r.date&&x.platform===r.platform));
        await kvSet("followers", records); drawAll();
      };
      histEl.appendChild(d);
    });
  }
};
