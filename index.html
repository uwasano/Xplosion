  /* 通常の1投稿生成(shuffle=trueで毎回違う角度に。forceMix=trueでミックス確定) */
  async function genOne(p, shuffle, forceMix) {
    try {
      /* 噂のシーシャBar: forceMix指定時、または(指定なしで)頻度に当たればミックス紹介に */
      const shishaOn = isUwasaShisha(acct.value, CFG.bizName) && CFG.mixOn;
      const doMix = shishaOn && (forceMix === true || (forceMix === undefined && Math.random()*100 < (CFG.mixFreq||0)));
      if (doMix) {
        const pd = planDate(p);
        const ds = pd.getFullYear()+"-"+String(pd.getMonth()+1).padStart(2,"0")+"-"+String(pd.getDate()).padStart(2,"0");
        const sc2 = shPickScene(null, ds);
        const r = await shMixPostText(null, sc2);
        if (r && r.thread) {
          p._text = r.thread[0]; p._thread = r.thread;
          p.t = "ミックス("+(sc2?sc2.scene:"おすすめ")+")"+(r.thread.length>1?" 🧵":""); p.y = "ミックス"; p.g = "シーシャミックス";
          if (!p._lockTime && (!p.h || !/^\d{1,2}:\d{2}$/.test(p.h))) p.h = "21:00";
          return;
        }
      }
      const variant = shuffle ? "\n※前回と違う切り口・フック・語り口で、新鮮な別パターンにすること。" : "";
      /* 噂のシーシャBarの時、AIが勝手にフレーバー配合・おすすめミックス紹介を書くのを禁止
         (ミックス紹介は専用エンジンが星評価付きで担当するため) */
      const noMix = shishaOn
        ? "\n【禁止】具体的なフレーバーの配合比やおすすめミックスの紹介は書かない(別機能が担当)。代わりに店の雰囲気・豆知識・季節・営業案内・共感ネタなどで書く。"
        : "";
      /* 日本のイベントが近い日は、一部の投稿(約45%)にだけイベント要素を混ぜる(毎日同じネタにならないよう確率的) */
      let evHint = "";
      const pd2 = planDate(p);
      const ds2 = pd2.getFullYear()+"-"+String(pd2.getMonth()+1).padStart(2,"0")+"-"+String(pd2.getDate()).padStart(2,"0");
      const ev = pickJpEvent(ds2);
      if (ev && Math.random() < 0.45) {
        evHint = "\n【時季のヒント】今は「"+ev.name+"」の時季。"+ev.hint+"。ただし必ずこのアカウントの業種・事業の範囲内で絡めること(業種外の話題は持ち込まない)。自然に絡められそうなら投稿に織り込む(無理なら無視してよい。露骨な宣伝にしない)。";
      }
      const text = await callAI(`${S.sns}投稿を1本書け。\n日付: ${p.d}(${p.w}) ${p.h||""}投稿予定 / ジャンル: ${p.g||""} / テーマ: ${p.t} / 型: ${p.y}\n${S.sns==="X"?"140字以内。":"キャプション形式・ハッシュタグ5個。"}投稿文のみ出力。前置き禁止。${variant}${noMix}${evHint}${sc()}`);
      p._text = text.trim();
    } catch (e) { out.err(e.message); }
  }

  /* 無料予想生成: GASで実レース取得→Claudeで予想本文化 */
  async function genYosou(p, whenLabel) {
    const label = whenLabel || "本日";
    const dateWord = label === "明日" ? "明日" : "本日";
    try {
      const { data: sess } = await sb.auth.getSession();
      if (!sess.session) throw new Error("ログインが切れた。リロードして。");
      const yyyymmdd = (() => {
        const base = new Date();
        if (label === "明日") base.setDate(base.getDate() + 1);
        return "" + base.getFullYear() + String(base.getMonth()+1).padStart(2,"0") + String(base.getDate()).padStart(2,"0");
      })();

      /* STEP A: GASで締切が近い実レースを取得(Load failed対策で2回までリトライ) */
      const callPick = async () => {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 60000); // 60秒で打ち切り
        try {
          const r = await fetch(GAS_URL, {
            method: "POST", headers: { "Content-Type": "text/plain" }, signal: ctrl.signal,
            body: JSON.stringify({
              auth: sess.session.access_token, action: "pickBoatRace",
              hd: yyyymmdd,
              minMinutes: label === "明日" ? -100000 : 15,
              maxMinutes: label === "明日" ? 100000 : 20,
              exclude: (window._recentRaces || []),
            }),
          });
          return await r.json();
        } finally { clearTimeout(timer); }
      };
      let race;
      try { race = await callPick(); }
      catch (e1) {
        await new Promise(r => setTimeout(r, 1500));
        try { race = await callPick(); }
        catch (e2) { p._text=""; p._deadline=""; p._deadlineUnknown=true; p._raceErr="通信失敗(Load failed)。電波を確認してもう一度押して。"; p.t=label+"の無料予想(通信失敗)"; return; }
      }
      if (race.error) {
        p._text = "";
        p._deadline = "";
        p._deadlineUnknown = true;
        p._raceErr = "レース取得失敗: " + race.error + (race.code?" (code:"+race.code+")":"") + (race.detail?" / "+race.detail:"") + (race.checked!==undefined?" / 確認"+race.checked+"件":"");
        p.t = label + "の無料予想(取得失敗)";
        return;
      }
      /* 使ったレースを記録(次回除外。直近5件まで保持) */
      window._recentRaces = window._recentRaces || [];
      window._recentRaces.push(race.jcd + "-" + race.rno);
      if (window._recentRaces.length > 5) window._recentRaces.shift();

      /* STEP B: 取得した実データでClaudeに予想本文を作らせる */
      /* 3連単: 人気トップ6をシャッフル + 大穴(100倍あたり)1点 = 計7点 */
      let formationText = "";
      let buyLines = null;
      const tri = race.trifecta || []; // [{combo,odds}] オッズ昇順
      if (tri.length >= 6) {
        /* 人気トップ6を取り出してシャッフル */
        const top6 = tri.slice(0, 6).map(c => c.combo);
        for (let i = top6.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [top6[i], top6[j]] = [top6[j], top6[i]];
        }
        /* 大穴: オッズ80〜150倍あたりの候補からランダムで1点。無ければ最も高オッズ寄りから */
        const ana = tri.filter(c => c.odds >= 80 && c.odds <= 150);
        let anaPick;
        if (ana.length) anaPick = ana[Math.floor(Math.random() * ana.length)];
        else {
          /* 帯に無ければ100倍に最も近い1点 */
          anaPick = tri.reduce((best, c) =>
            Math.abs(c.odds - 100) < Math.abs(best.odds - 100) ? c : best, tri[tri.length-1]);
        }
        const lines = top6.slice();
        lines.push("🎯大穴：" + anaPick.combo + "（" + anaPick.odds + "倍）");
        buyLines = lines;
        formationText = "\n\n【買い目・この7行をこのまま使う】\n" +
          buyLines.join("\n") +
          "\n※上6点=3連単オッズ人気トップ6を並べ替えたもの。最後の1点=100倍前後の大穴。番号・順番・大穴表記すべてこのまま本文に書き、勝手に変えない。";
      }

      const prompt =
        `次は${race.venue}${race.rno}R(締切${race.deadline})の実際の出走表・直前情報。これを根拠に無料予想の投稿本文を作れ。\n\n` +
        `【出走表】\n${(race.racelistText||"").slice(0,3500)}\n\n【直前情報】\n${(race.beforeText||"").slice(0,2500)}\n` +
        formationText + `\n\n` +
        `出力は投稿本文のみ(JSON不要・前置き不要)。フォーマット:\n` +
        `1行目は必ず「${dateWord}の無料予想を1レース公開」と書く(出走表に別の日付や「〇日目」表記があっても無視し、必ず「${dateWord}」とする)。\n空行\n【${race.venue}${race.rno}R】\n` +
        (buyLines
          ? buyLines.join("\n") + "\n"
          : "X-X-X\nX-X-X\nX-X-X\nX-X-X\nX-X-X\nX-X-X\n🎯大穴：X-X-X\n") +
        `空行\n展開予想を1〜2行(出走表・直前情報の根拠を添える)\n「回収率重視の厳選予想」「結果はあとで報告します」的な締め\n\n` +
        (buyLines
          ? `ルール: 買い目は上記【買い目】の7行を、番号・順番・大穴表記すべてそのまま本文に書く。展開予想の表現は毎回新鮮に。注意書き・免責文(自己責任・参考まで等)は入れない。${sc()}`
          : `ルール: 買い目は3連単6点(人気どころ)+大穴1点の計7点を縦に並べる。最後の大穴は100倍前後の高オッズ。表現は毎回新鮮に。注意書き・免責文は入れない。${sc()}`);
      const text = await callAI(prompt, false);

      p._text = text.trim();
      p._venue = race.venue + race.rno + "R";
      p._deadline = race.deadline || "";
      p._deadlineUnknown = !(race.deadline && /^\d{1,2}:\d{2}$/.test(race.deadline));
      p._raceErr = "";

      if (label === "明日") {
        /* 明日の予想は前夜(今日の21時)に告知 */
        p.h = "21:00"; p._postToday = true;
      } else if (!p._deadlineUnknown) {
        /* 今日の予想は締切15分前 */
        const [hh, mm] = race.deadline.split(":").map(Number);
        let total = hh * 60 + mm - 15; if (total < 0) total = hh * 60 + mm;
        p.h = String(Math.floor(total/60)).padStart(2,"0") + ":" + String(total%60).padStart(2,"0");
      }
      p.t = label + "の無料予想" + (p._deadline ? "(締切" + p._deadline + ")" : "");
    } catch (e) { p._raceErr = String(e.message||e); out.err(e.message); }
  }

  function drawText(body, p, text) {
    p._text = text;
    const box = document.createElement("textarea");
    box.rows = 6;
    box.style.cssText = "width:100%;font-size:13.5px;line-height:1.7";
    box.value = text; body.appendChild(box);
    /* 編集したらp._textに反映(送信・コピーに使う) */
    box.oninput = () => { p._text = box.value; };
    /* スレッド2本目以降(あれば編集欄を出す) */
    const threadAreas = [];
    if (p._thread && p._thread.length > 1) {
      p._thread.slice(1).forEach((t2, i) => {
        const lbl = document.createElement("p"); lbl.className="desc"; lbl.style.margin="6px 0 2px"; lbl.textContent = "🧵 "+(i+2)+"本目(リプ)";
        body.appendChild(lbl);
        const ta2 = document.createElement("textarea"); ta2.rows = 5; ta2.value = t2;
        ta2.style.cssText = "width:100%;font-size:13px;line-height:1.6";
        body.appendChild(ta2); threadAreas.push(ta2);
      });
    }
    const acts = document.createElement("div"); acts.className = "acts"; body.appendChild(acts);
    const cp = document.createElement("button"); cp.className = "mini"; cp.textContent = "コピー";
    cp.onclick = () => { navigator.clipboard.writeText(p._text); cp.textContent = "コピー済"; setTimeout(()=>cp.textContent="コピー",1500); };
    acts.appendChild(cp);
    if (S.sns === "X") {
      const sd = document.createElement("button"); sd.className = "mini primary"; sd.textContent = "予約管理に送る";
      sd.onclick = async () => {
        if (!acct.value) { out.err("クライアント未登録。先に認証リンクから登録して。"); return; }
        sd.disabled = true;
        const threadVals = threadAreas.map(t=>t.value.trim()).filter(Boolean);
        const { error } = await saveScheduledPost({
          screen_name: acct.value, text: p._text, scheduled_at: planDate(p).toISOString(), status: "draft",
          thread: threadVals.length ? threadVals : null,
        });
        if (error) { out.err("送信エラー: " + error.message); sd.disabled = false; return; }
        sd.textContent = threadVals.length ? "送った✓(🧵"+(threadVals.length+1)+")" : "送った✓";
      };
      acts.appendChild(sd);
      const a = document.createElement("a"); a.className = "mini"; a.textContent = "Xで投稿→";
      a.href = "https://twitter.com/intent/tweet?text=" + encodeURIComponent(p._text); a.target = "_blank";
      a.onclick = () => { a.href = "https://twitter.com/intent/tweet?text=" + encodeURIComponent(p._text); };
      acts.appendChild(a);
    }
  }
};

/* ---- 09 推移記録 ---- */
BUILDERS.followers = (el) => {
  const METRICS = { X: ["フォロワー","インプ(日)"], Instagram: ["フォロワー","リーチ(日)"] };
  head(el, "フォロワー推移の記録",
    `毎日の数字を入れるだけで増減・ペース・目標到達予測を自動計算。${S.sns}の数字だけ表示(右上で切替)。同日は上書き。`,
    [`${S.sns}のアプリでフォロワー数を見る`,"数字を入れて「記録」","目標を設定すると「いつ届くか」も予測"]);

  /* 対象アカウント選択(アカ別に記録を分ける) */
  let recAcct = S.activeAccount || "_default_";
  const actives = S.clients.filter((c)=>c.status==="active" && c.screen_name !== "_test_" && !/^_test/.test(c.screen_name));
  if (actives.length) {
    fld(el, "どのアカウントの記録?");
    const asel = document.createElement("select");
    const od = document.createElement("option"); od.value="_default_"; od.textContent="共通(既定)"; asel.appendChild(od);
    actives.forEach((c)=>{ const o=document.createElement("option"); o.value=c.screen_name; o.textContent="@"+c.screen_name; asel.appendChild(o); });
    asel.value = recAcct;
    asel.onchange = async () => { recAcct = asel.value; await reload(); };
    el.appendChild(asel);
  }

  fld(el, "記録する指標");
  const metric = chipsSingle(el, METRICS[S.sns], METRICS[S.sns][0]);
  fld(el, "今日の数値");
  const rowEl = document.createElement("div"); rowEl.style.cssText = "display:flex;gap:10px"; el.appendChild(rowEl);
  const num = document.createElement("input"); num.type = "number"; num.placeholder = "1234"; rowEl.appendChild(num);
  const rec = document.createElement("button"); rec.className = "mini primary"; rec.style.flex = "0 0 80px"; rec.textContent = "記録"; rowEl.appendChild(rec);
  const msg = document.createElement("div"); msg.className = "okmsg"; el.appendChild(msg);
  const statsEl = document.createElement("div"); el.appendChild(statsEl);
  const goalEl = document.createElement("div"); el.appendChild(goalEl);
  const chartEl = document.createElement("div"); el.appendChild(chartEl);
  const aiEl = document.createElement("div"); el.appendChild(aiEl);
  const histEl = document.createElement("div"); el.appendChild(histEl);

  let records = [], goals = {};
  /* アカ別の保存キー。_default_は従来キー(既存データ互換)、それ以外は followers:アカ名 */
  const recKey = () => recAcct === "_default_" ? "followers" : "followers:" + recAcct;
  const goalKey = () => recAcct === "_default_" ? "goals" : "goals:" + recAcct;
  const key = (m) => S.sns + ":" + m;
  const fmtJP = (d) => parseInt(d.slice(5,7)) + "/" + parseInt(d.slice(8,10));

  async function reload() {
    records = await kvGet(recKey(), []);
    goals = await kvGet(goalKey(), {});
    drawAll();
  }
  reload();

  rec.onclick = async () => {
    const n = parseInt(num.value); if (isNaN(n)) return;
    const today = new Date().toISOString().slice(0, 10);
    records = records.filter((r) => !(r.date === today && r.platform === key(metric.value)));
    records.push({ date: today, platform: key(metric.value), count: n });
    records.sort((a,b)=>a.date.localeCompare(b.date));
    await kvSet(recKey(), records);
    num.value = ""; msg.textContent = fmtJP(today) + " の" + metric.value + "を " + n.toLocaleString() + " で記録した";
    setTimeout(()=>msg.textContent="",2500);
    drawAll();
  };

  function fSeries() { return records.filter((r)=>r.platform===key("フォロワー")).sort((a,b)=>a.date.localeCompare(b.date)); }

  function drawAll() { drawStats(); drawGoal(); drawChart(); drawAI(); drawHist(); }

  function calcStats() {
    const fs = fSeries(); if (!fs.length) return null;
    const last = fs[fs.length-1];
    const prev = fs.length>1 ? fs[fs.length-2] : null;
    const since = (days) => {
      const cutoff = new Date(Date.now()-days*86400000).toISOString().slice(0,10);
      const base = fs.filter((r)=>r.date<=cutoff).pop() || fs[0];
      if (base.date === last.date) return null;
      const dd = Math.max(1, Math.round((new Date(last.date)-new Date(base.date))/86400000));
      return { diff: last.count-base.count, perDay: (last.count-base.count)/dd };
    };
    return { last, prevDiff: prev ? last.count-prev.count : null, w: since(7), m: since(30) };
  }
  const sign = (n) => (n>=0?"+":"")+Math.round(n).toLocaleString();
  const dc = (n) => n>=0 ? "var(--ok)" : "var(--bad)";

  function drawStats() {
    const st = calcStats(); statsEl.innerHTML = "";
    if (!st) return;
    const w = document.createElement("div"); w.style.cssText = "display:flex;gap:8px;margin-top:18px"; statsEl.appendChild(w);
    [["NOW", st.last.count.toLocaleString(), st.prevDiff!==null?"前回 "+sign(st.prevDiff):"", st.prevDiff!==null?dc(st.prevDiff):""],
     ["7 DAYS", st.w?sign(st.w.diff):"—", st.w?(st.w.perDay>=0?"+":"")+st.w.perDay.toFixed(1)+"/日":"記録待ち", st.w?dc(st.w.diff):""],
     ["30 DAYS", st.m?sign(st.m.diff):"—", st.m?(st.m.perDay>=0?"+":"")+st.m.perDay.toFixed(1)+"/日":"記録待ち", st.m?dc(st.m.diff):""]
    ].forEach(([l,v,s,c]) => {
      const d = document.createElement("div"); d.className = "stat";
      d.innerHTML = '<div class="l">'+l+'</div><div class="v">'+esc(v)+'</div>'+(s?'<div class="s" style="color:'+(c||"var(--muted)")+'">'+esc(s)+"</div>":"");
      w.appendChild(d);
    });
  }

  function drawGoal() {
    goalEl.innerHTML = "";
    fld(goalEl, "目標フォロワー数");
    const goal = goals[S.sns];
    const st = calcStats();
    if (goal) {
      let fc = null;
      if (st && st.w && st.w.perDay > 0) {
        const remain = goal - st.last.count;
        if (remain <= 0) fc = { done: true };
        else { const days = Math.ceil(remain/st.w.perDay); const d = new Date(Date.now()+days*86400000);
          fc = { days, date: (d.getMonth()+1)+"/"+d.getDate(), remain }; }
      }
      const d = document.createElement("div"); d.className = "row"; d.style.borderLeft = "3px solid var(--ok)";
      d.innerHTML = '<b style="color:var(--ok);font-family:var(--mono)">' + goal.toLocaleString() + "</b> " +
        (fc ? (fc.done ? "— 達成済み🎉" : "まで残り <b>"+fc.remain.toLocaleString()+"</b>。今のペースなら <b style='color:var(--accent2)'>約"+fc.days+"日後("+fc.date+")</b> に到達")
            : "— 7日分くらい記録が貯まると予測が出る") +
        ' <button class="mini" style="float:right;flex:none;padding:4px 8px;font-size:11px">変更</button>';
      d.querySelector("button").onclick = async () => { delete goals[S.sns]; await kvSet(goalKey(), goals); drawGoal(); drawChart(); };
      goalEl.appendChild(d);
    } else {
      const w = document.createElement("div"); w.style.cssText = "display:flex;gap:10px"; goalEl.appendChild(w);
      const gi = document.createElement("input"); gi.type = "number"; gi.placeholder = "例: 1000"; w.appendChild(gi);
      const gb = document.createElement("button"); gb.className = "mini cyan"; gb.style.flex = "0 0 80px"; gb.textContent = "設定"; w.appendChild(gb);
      gb.onclick = async () => { const n = parseInt(gi.value); if (!n) return; goals[S.sns] = n; await kvSet(goalKey(), goals); drawGoal(); drawChart(); };
    }
  }

  function drawChart() {
    chartEl.innerHTML = "";
    const pts = fSeries(); if (pts.length < 2) return;
    const W=340,H=190,PL=46,PR=12,PT=14,PB=26;
    const goal = goals[S.sns];
    const mn = Math.min(...pts.map((r)=>r.count)), mx = Math.max(...pts.map((r)=>r.count));
    const pad = Math.max(1, Math.round((mx-mn)*.1));
    const lo = mn-pad, hi = mx+pad, sp = hi-lo||1;
    const x = (i) => PL + (i/(pts.length-1))*(W-PL-PR);
    const y = (c) => PT + (1-(c-lo)/sp)*(H-PT-PB);
    const fmtV = (v) => v>=10000 ? (v/10000).toFixed(1)+"万" : v.toLocaleString();
    let svg = '<div class="fld" style="font-size:10px;font-weight:800;letter-spacing:.2em;color:var(--accent2);font-family:var(--mono);margin:16px 0 8px">FOLLOWER GRAPH</div>' +
      '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;background:var(--surface2);border-radius:12px;border:1px solid var(--border)">';
    [lo, lo+sp/2, hi].map(Math.round).forEach((v) => {
      svg += '<line x1="'+PL+'" x2="'+(W-PR)+'" y1="'+y(v)+'" y2="'+y(v)+'" stroke="#1D2A47" stroke-dasharray="3 4"/>' +
        '<text x="'+(PL-6)+'" y="'+(y(v)+3.5)+'" text-anchor="end" font-size="9.5" fill="#7E8BA8" font-family="Menlo">'+fmtV(v)+"</text>";
    });
    if (goal && goal>=lo && goal<=hi) {
      svg += '<line x1="'+PL+'" x2="'+(W-PR)+'" y1="'+y(goal)+'" y2="'+y(goal)+'" stroke="#3DFFA8" stroke-width="1.5" stroke-dasharray="5 4"/>' +
        '<text x="'+(W-PR)+'" y="'+(y(goal)-4)+'" text-anchor="end" font-size="9.5" fill="#3DFFA8" font-weight="700">目標 '+goal.toLocaleString()+"</text>";
    }
    const line = pts.map((r,i)=>(i?"L":"M")+x(i)+","+y(r.count)).join(" ");
    svg += '<path d="'+line+' L'+x(pts.length-1)+','+(H-PB)+' L'+PL+','+(H-PB)+' Z" fill="rgba(255,46,126,.1)"/>' +
      '<path d="'+line+'" fill="none" stroke="#FF2E7E" stroke-width="2.5" stroke-linejoin="round"/>';
    const step = Math.max(1, Math.ceil(pts.length/5));
    pts.forEach((r,i) => {
      svg += '<circle cx="'+x(i)+'" cy="'+y(r.count)+'" r="3.5" fill="#04060C" stroke="#FF2E7E" stroke-width="2"/>';
      if (i%step===0 || i===pts.length-1)
        svg += '<text x="'+x(i)+'" y="'+(H-8)+'" text-anchor="middle" font-size="9.5" fill="#7E8BA8" font-family="Menlo">'+fmtJP(r.date)+"</text>";
    });
    chartEl.innerHTML = svg + "</svg>";
  }

  function drawAI() {
    aiEl.innerHTML = "";
    const fs = fSeries(); if (fs.length < 3) return;
    const b = document.createElement("button"); b.className = "btn btn-ghost"; b.textContent = "AIに推移を分析させる"; aiEl.appendChild(b);
    const out = outArea(aiEl);
    b.onclick = () => runAI(b, out, () =>
      `${S.sns}アカウントのフォロワー推移:\n${fs.map((r)=>r.date+": "+r.count).join("\n")}\n目標: ${goals[S.sns]||"未設定"}\n\nこのデータから日本語で簡潔に:\n■伸びの評価(加速中/横ばい/鈍化+理由)\n■原因の仮説2つ\n■今週の打ち手3つ(${S.sns}の機能を使った具体策)\n前置き不要。`);
  }

  function drawHist() {
    histEl.innerHTML = "";
    const sr = records.filter((r)=>r.platform.startsWith(S.sns+":"));
    if (!sr.length) { histEl.innerHTML = '<div class="muted" style="text-align:center;margin-top:20px">まだ記録なし。今日の数字から始める。</div>'; return; }
    fld(histEl, "記録履歴(最新10件)");
    sr.slice().sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10).forEach((r) => {
      const d = document.createElement("div");
      d.style.cssText = "display:flex;align-items:center;justify-content:space-between;padding:9px 4px;border-bottom:1px solid var(--border);font-size:13.5px";
      d.innerHTML = '<span class="muted" style="width:48px;font-family:var(--mono)">'+fmtJP(r.date)+"</span>" +
        '<span class="muted" style="flex:1">'+esc(r.platform.split(":")[1])+"</span>" +
        '<b style="margin-right:12px;font-family:var(--mono)">'+r.count.toLocaleString()+"</b>" +
        '<button style="background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer">×</button>';
      d.querySelector("button").onclick = async () => {
        records = records.filter((x)=>!(x.date===r.date&&x.platform===r.platform));
        await kvSet(recKey(), records); drawAll();
      };
      histEl.appendChild(d);
    });
  }
};

    "自分の過去投稿を食わせると口調プロファイルを保存。MODEを「自分の文体」にすると全機能の生成が自分の口調になる。",

    if (S.profile) {

      d.innerHTML = '<div style="font-size:10px;font-weight:800;letter-spacing:.2em;color:var(--ok);font-family:var(--mono);margin-bottom:8px">PROFILE LOADED ✓</div><pre style="white-space:pre-wrap;margin:0;font-family:inherit;font-size:13.5px;line-height:1.7"></pre>';
      d.querySelector("pre").textContent = S.profile;
      body.appendChild(d);
      const del = document.createElement("button"); del.className = "btn btn-ghost"; del.textContent = "削除して再学習する";
      del.onclick = async () => { S.profile = ""; await kvSet("style_profile", ""); renderTop(); draw(); };
      body.appendChild(del);
    } else {
      fld(body, "自分の過去投稿(5〜10本・「---」区切り推奨)");
      const posts = ta(body, 10, "自分の投稿1\n---\n自分の投稿2");
      const b = runBtn(body, "文体を学習する");
      const out = outArea(body);
      b.onclick = async () => {
        if (!posts.value.trim()) return;
        b.disabled = true; b.textContent = "学習中…";
        try {
          const t = await callAI(`以下は同一人物が書いたSNS投稿。この人の文体を完全に再現するためのプロファイルを作れ。\n\n${posts.value}\n\n出力(日本語・箇条書き・前置き不要):\n・一人称と読者への呼びかけ方\n・語尾の癖(です/ます・関西弁・言い切り等)\n・テンションと感情の出し方\n・絵文字/記号の使い方と頻度\n・改行と文の長さの癖\n・よく使う言い回し(実例5つ)\n・絶対に書かなそうな表現(NG例3つ)`);
          S.profile = t; await kvSet("style_profile", t); renderTop(); draw();
        } catch (e) { out.err(e.message); b.disabled = false; b.textContent = "文体を学習する"; }
      };
    }
  }
  draw();
};

/* ---- 12 予約管理 ---- */
BUILDERS.schedule = (el) => {
  head(el, "予約管理", "カレンダーから送った投稿はまず「承認待ち」に入る。GOを出した分だけ予約確定になり、時間が来たら自動投稿される。GOを出すまでは何も投稿されない。",
    ["承認待ちを確認 → 個別GOか「全部GO」","予約確定分は時間が来たらGASが自動投稿","ミスったらキャンセル(投稿前ならいつでも消せる)"]);
  fld(el, "アカウント");
  const acct = document.createElement("select"); el.appendChild(acct);
  S.clients.filter((c)=>c.status==="active").forEach((c)=>{ const o=document.createElement("option"); o.value=c.screen_name; o.textContent="@"+c.screen_name; acct.appendChild(o); });
  fld(el, "投稿日時");
  const when = document.createElement("input"); when.type = "datetime-local"; el.appendChild(when);
  fld(el, "本文");
  const text = ta(el, 5, "投稿する文面");
  const cnt = document.createElement("div"); cnt.className = "count"; cnt.textContent = "0字"; el.appendChild(cnt);
  text.addEventListener("input", () => { cnt.textContent = text.value.length + "字"; cnt.classList.toggle("over", text.value.length > 140); });
  fld(el, "画像/動画(任意)");
  /* スマホから直接アップ */
  const upRow = document.createElement("div"); upRow.style.cssText = "display:flex;gap:8px;align-items:center;margin-bottom:8px";
  const fileBtn = document.createElement("button"); fileBtn.className = "mini cyan"; fileBtn.textContent = "📷 スマホから画像を選ぶ";
  const fileInput = document.createElement("input"); fileInput.type = "file"; fileInput.accept = "image/*"; fileInput.style.display = "none";
  upRow.appendChild(fileBtn); upRow.appendChild(fileInput); el.appendChild(upRow);
  const upStatus = document.createElement("div"); upStatus.className = "desc"; upStatus.style.margin = "0 0 8px"; el.appendChild(upStatus);
  const mediaIn = document.createElement("input"); mediaIn.placeholder = "または画像/動画の直リンクURL"; el.appendChild(mediaIn);
  const mediaHint = document.createElement("p"); mediaHint.className = "desc"; mediaHint.style.margin = "6px 0 0";
  mediaHint.textContent = "スマホから選ぶと自動でアップロードしてURLが入る。直リンクURLを直接貼ってもOK。画像は5MBまで。";
  el.appendChild(mediaHint);

  /* プレビュー */
  const preview = document.createElement("img"); preview.style.cssText = "display:none;max-width:100%;border-radius:10px;margin-top:8px;border:1px solid var(--border)";
  el.appendChild(preview);
  function showPreview(url) {
    if (url && /\.(jpg|jpeg|png|gif|webp)(\?|$)/i.test(url)) { preview.src = url; preview.style.display = "block"; }
    else { preview.style.display = "none"; }
  }
  mediaIn.addEventListener("input", () => showPreview(mediaIn.value.trim()));

  fileBtn.onclick = () => fileInput.click();
  fileInput.onchange = async () => {
    const f = fileInput.files[0];
    if (!f) return;
    if (f.size > 5 * 1024 * 1024) { upStatus.innerHTML = '<span style="color:var(--bad)">5MBを超えてる。小さい画像を選んで。</span>'; return; }
    fileBtn.disabled = true; upStatus.textContent = "アップロード中…";
    try {
      const ext = (f.name.split(".").pop() || "jpg").toLowerCase();
      const path = (acct.value || "anon") + "/" + Date.now() + "_" + Math.random().toString(36).slice(2,8) + "." + ext;
      const { error: upErr } = await sb.storage.from("post-media").upload(path, f, { contentType: f.type, upsert: false });
      if (upErr) throw upErr;
      const { data: pub } = sb.storage.from("post-media").getPublicUrl(path);
      mediaIn.value = pub.publicUrl;
      showPreview(pub.publicUrl);
      upStatus.innerHTML = '<span style="color:var(--ok)">アップ完了 ✓ URLが入った</span>';
    } catch (e) {
      upStatus.innerHTML = '<span style="color:var(--bad)">アップ失敗: ' + (e.message||e) + '<br>(Supabaseで post-media バケットを公開で作る必要あり)</span>';
    }
    fileBtn.disabled = false; fileInput.value = "";
  };
  const save = runBtn(el, "予約する");
  const cancel = document.createElement("button"); cancel.className = "btn btn-ghost hidden"; cancel.textContent = "編集をやめる"; el.appendChild(cancel);
  const out = outArea(el);

  /* 横タブ(予約待ち / 予約確定 / 履歴) */
  const tabBar = document.createElement("div");
  tabBar.style.cssText = "display:flex;gap:6px;margin:14px 0 10px;border-bottom:1px solid var(--border);padding-bottom:0";
  const tabDefs = [
    { key: "draft", label: "📋 予約待ち" },
    { key: "pending", label: "⏰ 予約確定" },
    { key: "done", label: "✅ 履歴" },
  ];
  let activeSub = "draft";
  const tabBtns = {};
  tabDefs.forEach((t) => {
    const b = document.createElement("button");
    b.textContent = t.label;
    b.style.cssText = "flex:1;padding:10px 4px;font-size:13px;font-weight:700;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;transition:.15s";
    b.onclick = () => { activeSub = t.key; updateTabs(); };
    tabBar.appendChild(b); tabBtns[t.key] = b;
  });
  el.appendChild(tabBar);

  const draftEl = document.createElement("div"); el.appendChild(draftEl);
  const pendingEl = document.createElement("div"); el.appendChild(pendingEl);
  const histEl = document.createElement("div"); el.appendChild(histEl);

  function updateTabs() {
    tabDefs.forEach((t) => {
      const on = activeSub === t.key;
      tabBtns[t.key].style.color = on ? "var(--accent)" : "var(--muted)";
      tabBtns[t.key].style.borderBottomColor = on ? "var(--accent)" : "transparent";
    });
    draftEl.style.display = activeSub === "draft" ? "block" : "none";
    pendingEl.style.display = activeSub === "pending" ? "block" : "none";
    histEl.style.display = activeSub === "done" ? "block" : "none";
  }

  let editingId = null;

  function resetForm() { editingId = null; text.value = ""; when.value = ""; mediaIn.value = ""; cnt.textContent = "0字"; save.textContent = "予約する"; cancel.classList.add("hidden"); preview.style.display = "none"; upStatus.textContent = ""; }
  cancel.onclick = resetForm;

  save.onclick = async () => {
    out.err("");
    if (!acct.value || !when.value || !text.value.trim()) { out.err("全部入れて。"); return; }
    save.disabled = true;
    const rec = { screen_name: acct.value, scheduled_at: new Date(when.value).toISOString(), text: text.value.trim(), media_url: mediaIn.value.trim() || null };
    const { error } = editingId
      ? await sb.from("scheduled_posts").update(rec).eq("id", editingId)
      : await saveScheduledPost({ ...rec, status: "draft" });
    save.disabled = false;
    if (error) { out.err("保存エラー: " + error.message); return; }
    resetForm(); load();
  };

  function hhmm(iso) { const d = new Date(iso); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }
  function fmtD(iso) { const d = new Date(iso); return (d.getMonth()+1)+"/"+d.getDate()+" "+hhmm(iso); }

  function postRow(p, actions) {
    const d = document.createElement("div"); d.className = "row";
    const threadCount = (p.thread && p.thread.length) ? p.thread.length : 0;
    const isPast = p.status === "draft" && new Date(p.scheduled_at).getTime() <= Date.now();
    d.innerHTML = '<div class="meta"><span class="pill time">'+hhmm(p.scheduled_at)+'</span><span class="pill acct">@'+esc(p.screen_name)+"</span>" +
      (isPast?'<span class="pill" style="background:rgba(239,68,68,.18);color:#f87171;border:1px solid rgba(239,68,68,.4)">⏰ 時間切れ</span>':"") +
      (p.media_url?'<span class="pill genre">🖼 画像</span>':"") +
      (threadCount?'<span class="pill genre">🧵 '+(threadCount+1)+'連投</span>':"") + "</div>" +
      "<pre style='white-space:pre-wrap;margin:0;font-family:inherit'></pre>" +
      (threadCount ? '<div style="font-size:12px;color:var(--muted);border-left:2px solid var(--border);padding-left:8px;margin-top:6px"></div>' : "") +
      '<div class="acts">' + actions.map((a,i)=>'<button class="mini '+(a.primary?'primary':'')+'" data-i="'+i+'">'+a.label+'</button>').join("") + '</div>';
    d.querySelector("pre").textContent = p.text;
    if (threadCount) {
      d.querySelector("pre + div").textContent = "🧵 " + p.thread.map((t,i)=>"("+(i+2)+") "+t).join("\n\n");
    }
    actions.forEach((a,i)=>{ d.querySelector('[data-i="'+i+'"]').onclick = a.fn; });
    return d;
  }

  function editPost(p) {
    editingId = p.id; acct.value = p.screen_name; text.value = p.text; mediaIn.value = p.media_url || ""; showPreview(p.media_url || "");
    const dt = new Date(p.scheduled_at); dt.setMinutes(dt.getMinutes()-dt.getTimezoneOffset());
    when.value = dt.toISOString().slice(0,16); cnt.textContent = p.text.length+"字";
    save.textContent = "更新する"; cancel.classList.remove("hidden"); window.scrollTo({top:0,behavior:"smooth"});
  }

  async function load() {
    const { data, error } = await sb.from("scheduled_posts").select("*").order("scheduled_at");
    if (error) { out.err(error.message); return; }
    const byTime = (a,b) => a.scheduled_at.localeCompare(b.scheduled_at);
    const drafts = data.filter((p)=>p.status==="draft").sort(byTime);
    const pending = data.filter((p)=>p.status==="pending").sort(byTime);
    const done = data.filter((p)=>p.status!=="pending"&&p.status!=="draft").sort((a,b)=>(b.posted_at||b.scheduled_at).localeCompare(a.posted_at||a.scheduled_at)).slice(0,20);

    /* タブのラベルに件数を反映 */
    tabBtns["draft"].textContent = "📋 予約待ち" + (drafts.length?" ("+drafts.length+")":"");
    tabBtns["pending"].textContent = "⏰ 予約確定" + (pending.length?" ("+pending.length+")":"");
    tabBtns["done"].textContent = "✅ 履歴" + (done.length?" ("+done.length+")":"");

    /* 日付区切りヘッダーを挟みながらリスト描画 */
    const WD = ["日","月","火","水","木","金","土"];
    function dayLabel(iso) {
      const d = new Date(iso);
      return (d.getMonth()+1) + "/" + d.getDate() + "(" + WD[d.getDay()] + ")";
    }
    function renderList(host, items, makeActions) {
      let lastDay = "";
      items.forEach((p) => {
        const dl = dayLabel(p.scheduled_at);
        if (dl !== lastDay) {
          lastDay = dl;
          const hd = document.createElement("div");
          hd.style.cssText = "font-family:var(--mono);font-weight:800;font-size:12px;color:var(--accent);letter-spacing:.1em;margin:14px 0 4px;padding-bottom:4px;border-bottom:1px solid var(--border)";
          hd.textContent = "📅 " + dl;
          host.appendChild(hd);
        }
        host.appendChild(postRow(p, makeActions(p)));
      });
    }

    /* === 予約待ちタブ === */
    draftEl.innerHTML = "";
    if (!drafts.length) draftEl.innerHTML = '<div class="muted" style="text-align:center;margin-top:20px">承認待ちなし。カレンダーや書き漏れから投稿を送るとここに入る。</div>';
    else {
      const bulkRow = document.createElement("div"); bulkRow.className = "acts";
      const goAll = document.createElement("button"); goAll.className = "mini primary"; goAll.textContent = "全部GO(" + drafts.length + "件を一括確定)";
      goAll.onclick = async () => {
        const now = Date.now();
        const past = drafts.filter((p) => new Date(p.scheduled_at).getTime() <= now);
        const future = drafts.filter((p) => new Date(p.scheduled_at).getTime() > now);
        if (past.length && !future.length) {
          showMiniModal("投稿時間を超えています", past.length + "件すべて投稿予定時刻を過ぎています。時刻を編集してからGOしてください。", [{ label: "OK", primary: true }], "⏰");
          return;
        }
        if (past.length) {
          showMiniModal("一部が時間切れです", "時刻を過ぎた" + past.length + "件は確定できません。先に進む" + future.length + "件だけ確定しますか?", [
            { label: "やめる" },
            { label: future.length + "件を確定", primary: true, fn: async () => {
              for (const p of future) await sb.from("scheduled_posts").update({ status: "pending" }).eq("id", p.id);
              activeSub = "pending"; load();
            } },
          ], "⏰");
          return;
        }
        await sb.from("scheduled_posts").update({ status: "pending" }).eq("status", "draft");
        activeSub = "pending"; load();
      };
      const delAll = document.createElement("button"); delAll.className = "mini"; delAll.textContent = "全部キャンセル";
      delAll.onclick = async () => {
        if (!confirm("承認待ち" + drafts.length + "件を全部キャンセルする?")) return;
        await sb.from("scheduled_posts").delete().eq("status", "draft");
        load();
      };
      bulkRow.appendChild(goAll); bulkRow.appendChild(delAll);
      draftEl.appendChild(bulkRow);
      renderList(draftEl, drafts, (p) => [
        { label: "GO", primary: true, fn: async () => {
          if (new Date(p.scheduled_at).getTime() <= Date.now()) {
            showMiniModal("投稿時間を超えています", "この投稿は予定時刻を過ぎています。「編集」で投稿時刻をやり直してください。", [
              { label: "閉じる" },
              { label: "時刻を編集", primary: true, fn: () => editPost(p) },
            ], "⏰");
            return;
          }
          await sb.from("scheduled_posts").update({ status: "pending" }).eq("id", p.id); load();
        } },
        { label: "編集", fn: () => editPost(p) },
        { label: "キャンセル", fn: async () => { await sb.from("scheduled_posts").delete().eq("id", p.id); load(); } },
      ]);
    }

    /* === 予約確定タブ === */
    pendingEl.innerHTML = "";
    if (!pending.length) pendingEl.innerHTML = '<div class="muted" style="text-align:center;margin-top:20px">予約確定なし。予約待ちでGOを出すとここに入る。</div>';
    else renderList(pendingEl, pending, (p) => [
      { label: "編集", fn: () => editPost(p) },
      { label: "予約キャンセル", fn: async () => { if (!confirm("この予約をキャンセルする?")) return; await sb.from("scheduled_posts").delete().eq("id", p.id); load(); } },
    ]);

    /* === 履歴タブ === */
    histEl.innerHTML = "";
    if (!done.length) histEl.innerHTML = '<div class="muted" style="text-align:center;margin-top:20px">履歴なし。</div>';
    done.forEach((p) => {
      const d = document.createElement("div"); d.className = "row";
      const threadCount = (p.thread && p.thread.length) ? p.thread.length : 0;
      d.innerHTML = '<div class="meta"><span class="pill time">'+fmtD(p.scheduled_at)+'</span><span class="pill acct">@'+esc(p.screen_name)+'</span><span class="pill st-'+p.status+'">'+(p.status==="posted"?"投稿済":"エラー")+"</span>"+(threadCount?'<span class="pill genre">🧵'+(threadCount+1)+'</span>':"")+"</div><pre style='white-space:pre-wrap;margin:0;font-family:inherit'></pre>"+(p.error_msg?'<div class="err">'+esc(p.error_msg)+"</div>":"");
      d.querySelector("pre").textContent = p.text;
      histEl.appendChild(d);
    });

    updateTabs();
  }
  load();
};

/* ---- ⏰ オート予定(今日のキュー一覧・時刻変更可) ---- */
BUILDERS.autoqueue = (el) => {
  head(el, "オート予定", "今日オートで投稿される予定の一覧。時刻をタップすると変更できる。生成は各投稿時刻の少し前に自動で行われる。",
    ["朝に自動で今日の予定が作られる","投稿時刻が近づくと内容が生成される","時刻を変えたい時はタップして調整"]);

  const KIND_LABEL = { trend: "🔥 トレンド", normal: "📝 通常投稿", yosou: "🚤 無料予想", yokoku: "📣 レース予告", enjou: "🔥 炎上ニュース", flavor: "💨 フレーバー" };
  const STATUS_LABEL = { waiting: "待機中", processing: "生成中…", done: "生成済✓", error: "エラー" };

  const bar = document.createElement("div"); bar.style.cssText = "display:flex;gap:8px;margin-bottom:10px";
  const mkBtn = (txt) => { const b = document.createElement("button"); b.className="btn btn-ghost"; b.textContent=txt; b.style.margin="0"; return b; };
  const todayBtn = mkBtn("今日"); const refreshBtn = mkBtn("更新");
  bar.appendChild(todayBtn); bar.appendChild(refreshBtn); el.appendChild(bar);
  const listEl = document.createElement("div"); el.appendChild(listEl);

  async function draw() {
    listEl.innerHTML = '<div class="muted">読み込み中…</div>';
    const today = new Date();
    const ymd = today.getFullYear() + "-" + String(today.getMonth()+1).padStart(2,"0") + "-" + String(today.getDate()).padStart(2,"0");
    let rows = [];
    try {
      const { data, error } = await sb.from("auto_queue").select("*").eq("run_date", ymd).order("scheduled_at");
      if (error) throw error;
      rows = data || [];
    } catch(e) { listEl.innerHTML = '<div class="err">読み込み失敗: '+e.message+'</div>'; return; }

    if (!rows.length) {
      listEl.innerHTML = '<div class="muted" style="padding:12px">今日の予定はまだありません。<br>オートをONにしていれば、朝に自動で予定が作られます。</div>';
      return;
    }
    listEl.innerHTML = "";
    const todayStr = today.toDateString();
    const tmrw = new Date(today.getTime() + 86400000).toDateString();
    let lastDateKey = null;
    rows.forEach((q) => {
      const tm = new Date(q.scheduled_at);
      /* 日付が変わったら見出しを挿入 */
      const dKey = tm.toDateString();
      if (dKey !== lastDateKey) {
        lastDateKey = dKey;
        const head2 = document.createElement("div");
        const wd = ["日","月","火","水","木","金","土"][tm.getDay()];
        let label = (tm.getMonth()+1) + "/" + tm.getDate() + "(" + wd + ")";
        if (dKey === todayStr) label = "📅 今日 " + label;
        else if (dKey === tmrw) label = "🌅 明日 " + label;
        head2.textContent = label;
        head2.style.cssText = "font-weight:800;font-size:13px;color:var(--accent);margin:14px 2px 6px;padding-bottom:4px;border-bottom:1px solid var(--border)";
        listEl.appendChild(head2);
      }
      const d = document.createElement("div"); d.className = "row";
      d.style.cssText = "display:flex;align-items:center;gap:10px;flex-wrap:wrap";
      /* 時刻(タップで変更) */
      const timeBtn = document.createElement("input"); timeBtn.type = "time";
      timeBtn.value = String(tm.getHours()).padStart(2,"0")+":"+String(tm.getMinutes()).padStart(2,"0");
      timeBtn.style.cssText = "width:auto;padding:6px 10px;font-family:var(--mono);font-size:15px;font-weight:800;color:var(--accent2);background:rgba(0,229,255,.08);border:1px solid var(--accent2);border-radius:8px";
      timeBtn.disabled = (q.status === "done" || q.status === "processing");
      timeBtn.onchange = async () => {
        if (!/^\d{1,2}:\d{2}$/.test(timeBtn.value)) return;
        const [h,mi] = timeBtn.value.split(":").map(Number);
        const nd = new Date(tm.getFullYear(), tm.getMonth(), tm.getDate(), h, mi, 0, 0);
        const { error } = await sb.from("auto_queue").update({ scheduled_at: nd.toISOString() }).eq("id", q.id);
        if (error) { alert("変更失敗: "+error.message); return; }
        timeBtn.style.borderColor = "var(--ok)"; setTimeout(()=>{ timeBtn.style.borderColor="var(--accent2)"; }, 1200);
      };
      d.appendChild(timeBtn);
      /* 種類 */
      const kind = document.createElement("span"); kind.className = "pill genre";
      kind.textContent = KIND_LABEL[q.kind] || q.kind; d.appendChild(kind);
      /* アカウント */
      const acct = document.createElement("span"); acct.className = "pill acct";
      acct.textContent = "@"+q.screen_name; d.appendChild(acct);
      /* ステータス */
      const st = document.createElement("span"); st.className = "muted"; st.style.cssText="font-size:12px;margin-left:auto";
      st.textContent = STATUS_LABEL[q.status] || q.status; d.appendChild(st);
      /* 生成済みなら本文プレビュー */
      if (q.status === "done" && q.result_text) {
        const pre = document.createElement("div");
        pre.style.cssText = "width:100%;font-size:12.5px;color:var(--muted);white-space:pre-wrap;margin-top:4px;padding-top:6px;border-top:1px solid var(--border)";
        pre.textContent = q.result_text.length > 120 ? q.result_text.slice(0,120)+"…" : q.result_text;
        d.appendChild(pre);
      }
      if (q.status === "error" && q.error_msg) {
        const er = document.createElement("div"); er.className="err"; er.style.cssText="width:100%;margin-top:4px"; er.textContent = q.error_msg; d.appendChild(er);
      }
      listEl.appendChild(d);
    });
  }
  draw();
  todayBtn.onclick = draw; refreshBtn.onclick = draw;
};

/* ---- 13 クライアント ---- */
BUILDERS.clients = (el) => {
  head(el, "クライアント管理", "連携済みアカウントの一覧。新規追加は認証リンクを相手に送って「許可」を押してもらうだけ。キーの受け渡し不要。",
    ["「認証リンクをコピー」を押す","LINE等でクライアントに送る","相手が許可したら一覧に自動で出る(更新ボタン)"]);
  const listEl = document.createElement("div"); el.appendChild(listEl);
  let drawGen = 0;
  async function draw() {
    const myGen = ++drawGen;
    await loadClients();
    /* オート設定(全種類)をまとめて取得: {screen_name: {kind: {enabled,count}}} */
    let autoMap = {};
    try {
      const { data } = await sb.from("auto_config").select("screen_name,kind,enabled,count");
      (data||[]).forEach(r => { (autoMap[r.screen_name] = autoMap[r.screen_name] || {})[r.kind] = r; });
    } catch(e) {}
    /* 各アカウントの業種を取得(競艇/シーシャ判定用) */
    let bizMap = {};
    for (const c of S.clients) {
      try {
        const cfg = await kvGet("gen_config:" + c.screen_name, null);
        bizMap[c.screen_name] = (cfg ? ((cfg.bizType||"") + " " + (cfg.bizName||"")) : "");
      } catch(e) { bizMap[c.screen_name] = ""; }
    }

    /* 1つのオート機能の行(トグル+3/5/10)を作る共通ヘルパー */
    function autoFeatureRow(screen, kind, title, sub, accentOn, fixedOnce) {
      const cur = (autoMap[screen] && autoMap[screen][kind]) ? autoMap[screen][kind] : { enabled: false, count: fixedOnce ? 1 : 3 };
      let curCount = fixedOnce ? 1 : (cur.count || 3);
      const wrap = document.createElement("div");
      wrap.style.cssText = "margin-top:8px;padding-top:8px;border-top:1px solid var(--border)";
      const top = document.createElement("div");
      top.style.cssText = "display:flex;align-items:center;justify-content:space-between";
      const lbl = document.createElement("div");
      lbl.style.cssText = "font-size:12.5px;line-height:1.4";
      lbl.innerHTML = title + '<br><span class="muted" style="font-size:11px">' + sub + '</span>';
      const sw = document.createElement("button");
      const paint = (on) => {
        sw.textContent = on ? "ON" : "OFF";
        sw.style.cssText = "min-width:64px;padding:8px 14px;border-radius:20px;border:none;font-weight:800;font-size:13px;cursor:pointer;" +
          (on ? "background:"+accentOn+";color:#fff" : "background:rgba(255,255,255,.1);color:#94a3b8");
      };
      paint(!!cur.enabled);
      top.appendChild(lbl); top.appendChild(sw); wrap.appendChild(top);
      /* 3/5/10 */
      const cntRow = document.createElement("div");
      cntRow.style.cssText = "display:flex;gap:6px;margin-top:8px";
      const cl = document.createElement("span"); cl.className="desc"; cl.style.cssText="align-self:center;margin-right:4px"; cl.textContent="1日の回数:";
      cntRow.appendChild(cl);
      const save = async (enabled, count) => {
        const { error } = await sb.from("auto_config").upsert({ screen_name: screen, kind, enabled, count, updated_at: new Date().toISOString() }, { onConflict: "screen_name,kind" });
        if (error) { alert("保存失敗: "+error.message); return false; }
        return true;
      };
      const btns = {};
      if (!fixedOnce) {
        [1,3,5,10].forEach((n) => {
          const b = document.createElement("button");
          const pc = () => { b.style.cssText = "flex:1;padding:7px;border-radius:8px;border:1px solid var(--border);font-weight:700;font-size:12.5px;cursor:pointer;" + (curCount===n ? "background:rgba(0,229,255,.18);color:var(--accent2);border-color:var(--accent2)" : "background:transparent;color:var(--muted)"); };
          b.textContent = n+"回"; pc(); btns[n] = pc;
          b.onclick = async () => { curCount = n; Object.values(btns).forEach(f=>f()); await save(sw.textContent==="ON", n); };
          cntRow.appendChild(b);
        });
        wrap.appendChild(cntRow);
      } else {
        /* 1回固定: 回数選択は出さず、説明だけ */
        const fx = document.createElement("div"); fx.className = "desc"; fx.style.cssText = "margin-top:8px;font-size:11.5px";
        fx.textContent = "1日1回・21時台に自動投稿";
        wrap.appendChild(fx);
      }
      sw.onclick = async () => { const next = sw.textContent==="OFF"; sw.disabled=true; const ok = await save(next, curCount); sw.disabled=false; if (ok) paint(next); };
      /* サンプル確認ボタン */
      const sampleRow = document.createElement("div"); sampleRow.style.cssText = "margin-top:6px";
      const sampleBtn = document.createElement("button"); sampleBtn.className = "mini";
      sampleBtn.textContent = "👀 投稿内容のサンプルを見る";
      sampleBtn.style.cssText = "width:100%;padding:7px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--accent2);font-size:12.5px;font-weight:700;cursor:pointer";
      const sampleOut = document.createElement("div");
      sampleBtn.onclick = async () => {
        sampleBtn.disabled = true; sampleBtn.textContent = "生成中…"; sampleOut.innerHTML = "";
        try {
          const { data: sess } = await sb.auth.getSession();
          if (!sess.session) throw new Error("ログインが切れた。リロードして。");
          const res = await fetch(GAS_URL, {
            method: "POST", headers: { "Content-Type": "text/plain" },
            body: JSON.stringify({ auth: sess.session.access_token, action: "autoSample", screen_name: screen, kind }),
          });
          const j = await res.json();
          const box = document.createElement("div");
          box.style.cssText = "background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;margin-top:6px;font-size:13px;line-height:1.6;white-space:pre-wrap";
          box.textContent = (j && j.text) ? j.text : "(生成できず)";
          sampleOut.appendChild(box);
          const note = document.createElement("p"); note.className="desc"; note.style.margin="4px 0 0";
          const threadNote = (j && j.threadCount && j.threadCount > 1) ? "🧵" + j.threadCount + "本のスレッドで投稿される。" : "";
          note.textContent = threadNote + "※これはサンプル。実際のオート投稿はこの調子で毎回違う内容が作られる。表現がおかしければ生成設定の文体・性格を調整して。";
          sampleOut.appendChild(note);
        } catch(e) { sampleOut.innerHTML = '<div class="err">'+e.message+'</div>'; }
        sampleBtn.disabled = false; sampleBtn.textContent = "👀 投稿内容のサンプルを見る";
      };
      sampleRow.appendChild(sampleBtn); sampleRow.appendChild(sampleOut);
      wrap.appendChild(sampleRow);
      return wrap;
    }

    const frag = document.createElement("div");
    if (!S.clients.length) frag.innerHTML = '<div class="muted">まだ登録なし。</div>';
    S.clients.forEach((c) => {
      const d = document.createElement("div"); d.className = "row";
      d.innerHTML = '<div class="meta"><span class="pill acct">@'+esc(c.screen_name)+'</span><span class="pill st-'+c.status+'">'+(c.status==="active"?"連携中":"連携解除")+'</span></div><span class="muted">登録: '+new Date(c.created_at).toLocaleDateString("ja-JP")+"</span>";
      const biz = bizMap[c.screen_name] || "";
      /* 全アカウント共通: トレンド・通常 */
      d.appendChild(autoFeatureRow(c.screen_name, "trend", "🔥 オートトレンド投稿", "毎日、今のトレンドからバズ投稿をバラバラの時間に自動投稿", "linear-gradient(135deg,#ff2d95,#a855f7)"));
      d.appendChild(autoFeatureRow(c.screen_name, "enjou", "🔥 オート炎上ニュース", "炎上系ニュースに自分の視点でコメント(2日以内・話題が無い日は投稿なし)", "linear-gradient(135deg,#ff6b35,#ff2d95)"));
      d.appendChild(autoFeatureRow(c.screen_name, "normal", "📝 オート通常投稿", "毎日、いつもの投稿をバラバラの時間に自動投稿", "linear-gradient(135deg,#a855f7,#6366f1)"));
      /* 競艇業種のみ: 予想 */
      if (/競艇|ボートレース|ボート/.test(biz)) {
        d.appendChild(autoFeatureRow(c.screen_name, "yosou", "🚤 オート無料予想", "毎日、締切が近いレースを自動予想して締切15分前に投稿", "linear-gradient(135deg,#00e5ff,#a855f7)"));
        d.appendChild(autoFeatureRow(c.screen_name, "yokoku", "📣 オート明日の予告", "明日の開催情報を取得して『明日◯◯でレース!注目選手!』の集客予告を21時台に投稿(数字予想は出さない)", "linear-gradient(135deg,#00e5ff,#22c55e)", true));
      }
      /* シーシャ業種のみ: フレーバー(店名が「噂のシーシャBar」系の時だけ。ミックスDBが専用のため) */
      if (/(噂|ウワサ|うわさ|uwasa).{0,4}(シーシャ|sisha|shisha)/i.test(biz)) {
        d.appendChild(autoFeatureRow(c.screen_name, "flavor", "💨 オートおすすめフレーバー", "毎日、おすすめミックスをバラバラの時間に自動投稿", "linear-gradient(135deg,#22c55e,#06b6d4)"));
      }
      frag.appendChild(d);
    });
    /* 自分より後に開始されたdrawがあれば、この結果は捨てる(多重実行で重複しないように) */
    if (myGen !== drawGen) return;
    listEl.innerHTML = "";
    listEl.appendChild(frag);
  }
  draw();
  const cp = document.createElement("button"); cp.className = "btn btn-ghost"; cp.textContent = "認証リンクをコピー(新規クライアント用)"; el.appendChild(cp);
  const ok = document.createElement("div"); ok.className = "okmsg"; el.appendChild(ok);
  cp.onclick = () => { navigator.clipboard.writeText(GAS_URL); ok.textContent = "コピーした。LINE等で送って。"; setTimeout(()=>ok.textContent="",2500); };
  const rf = document.createElement("button"); rf.className = "btn btn-ghost"; rf.textContent = "一覧を更新"; el.appendChild(rf);
  rf.onclick = draw;
};
</script>
</body>
