function showMiniModal(title, body, actions, icon) {
  const m = document.getElementById("miniModal");
  document.getElementById("miniModalIcon").textContent = icon || "⚠️";
  document.getElementById("miniModalTitle").textContent = title;
  document.getElementById("miniModalBody").textContent = body;
  const acts = document.getElementById("miniModalActs");
  acts.innerHTML = "";
  (actions || [{ label: "OK", primary: true }]).forEach((a) => {
    const b = document.createElement("button");
    b.textContent = a.label;
    b.style.cssText = "flex:1;padding:12px;border-radius:12px;border:none;font-weight:800;font-size:14px;cursor:pointer;" +

    b.onclick = () => { m.style.display = "none"; if (a.fn) a.fn(); };
    acts.appendChild(b);
  });
  m.style.display = "flex";
}

function timeAgo(createdAt) {
  if (!createdAt) return "";
  const d = new Date(createdAt);
  if (isNaN(d.getTime())) return "";
  const diffMs = Date.now() - d.getTime();
  const min = Math.floor(diffMs / 60000);
  if (min < 1) return "たった今";
  if (min < 60) return min + "分前";
  const hr = Math.floor(min / 60);
  if (hr < 24) return hr + "時間前";
  const day = Math.floor(hr / 24);
  if (day < 7) return day + "日前";
  return (d.getMonth() + 1) + "月" + d.getDate() + "日";
}

function shIsBanned(names){
  for(let i=0;i<names.length;i++)for(let j=i+1;j<names.length;j++){
    if(SHISHA_BANNED_SET.has([names[i],names[j]].sort().join("|"))) return true;
  }
  for(const s of SHISHA_DYN_CITRUS_BAN) if(names.includes(s)) for(const x of names) if(SHISHA_CITRUS.has(x)) return true;
  return false;
}
function shScoreCombo(combo){
  const names = combo.map(c=>c.name);
  if(new Set(names).size!==names.length) return {sc:-999};
  if(shIsBanned(names)) return {sc:-999};
  if(names.filter(n=>SHISHA_CITRUS.has(n)).length>=3) return {sc:-999};
  const acc = combo.filter(c=>SHISHA_ACCENT.has(c.name));
  if(acc.length>=2) return {sc:-999};
  if(combo.some(c=>SHISHA_ACCENT.has(c.name)&&c.ratio>=2)) return {sc:-999};
  const leadByRatio = combo.slice().sort((a,b)=>b.ratio-a.ratio)[0];
  if(shVget(leadByRatio.name)[5] < 7) return {sc:-999};
  let sc=70, ss=0, s=0, a=0;
  for(let i=0;i<names.length;i++)for(let j=i+1;j<names.length;j++){
    const r=shPairRank(names[i],names[j]);
    if(r==="SS"){sc+=9;ss++;} else if(r==="S"){sc+=6;s++;} else if(r==="A"){sc+=4;a++;}
  }
  if(ss>=2) sc=Math.max(sc,90);
  const vs=names.map(shVget);
  if(vs.filter(v=>v[0]>=8).length>=3) sc-=8;
  if(vs.filter(v=>v[3]>=7).length>=3) sc-=8;
  if(names.filter(n=>SHISHA_CITRUS.has(n)).length>=2) sc-=3;
  if(acc.length===1) sc+=3;
  sc=Math.min(sc,99);

  return {sc, ss, s, a, rank, info:`SS${ss}/S${s}/A${a}`};
}

function shGenerate(audience, count){
  const items = shAllItems();
  const conf = SHISHA_AUD[audience]||SHISHA_AUD["おまかせ"];
  const banSet = conf.ban;
  let leads = items.filter(it=>it.v[5]>=7 && !SHISHA_ACCENT.has(it.name) && !SHISHA_CITRUS.has(it.name) && !banSet.has(it.name));
  if(conf.lead) leads = leads.filter(it=>conf.lead.includes(it.name)||conf.lead.includes(shNm(it.name)));
  if(leads.length===0) leads = items.filter(it=>it.v[5]>=7 && !SHISHA_ACCENT.has(it.name) && !SHISHA_CITRUS.has(it.name));
  const results=[], seen=new Set(); let tries=0;
  while(results.length<count && tries<4000){
    tries++;
    if(leads.length===0) break;
    const lead = leads[(Math.random()*leads.length)|0];
    const ln = lead.name;
    let mates = items.filter(it=>shPairRank(ln,it.name) && it.name!==ln && !banSet.has(it.name));
    if(mates.length===0) continue;
    const helper = mates[(Math.random()*mates.length)|0].name;
    let outlineCand = items.filter(it=>(shPairRank(ln,it.name)||SHISHA_CITRUS.has(it.name)) && ![ln,helper].includes(it.name) && !banSet.has(it.name));
    const useOutline = outlineCand.length>0 && Math.random()<0.85;
    const outline = useOutline ? outlineCand[(Math.random()*outlineCand.length)|0].name : null;
    const accChoices = ["ミント","ミント","ミント","アイス","アブソリュートゼロ"].filter(x=>!banSet.has(x));
    const acc = accChoices[(Math.random()*accChoices.length)|0];
    let parts=[ln,helper]; if(outline)parts.push(outline); parts.push(acc);
    parts=[...new Set(parts)];
    if(parts.length<2) continue;
    const ratios = shRatioFor(parts.length);
    const combo = parts.map((n,i)=>({name:n, ratio:ratios[i]||1}));
    const res = shScoreCombo(combo);
    if(res.sc>=80){
      const key=parts.slice().sort().join("|");
      if(seen.has(key)) continue;
      seen.add(key);
      results.push({combo, ...res});
    }
  }
  results.sort((a,b)=>b.sc-a.sc);
  return results;
}

/* 予約投稿をDBに保存する共通関数。textが140字超なら自動でスレッド分割。
   既にthread指定がある場合(ミックス等)はそれを優先しつつ、1本目が長ければさらに分割。 */
async function saveScheduledPost(rec) {
  /* rec: { screen_name, text, scheduled_at, status, media_url?, thread? } */
  const existingThread = Array.isArray(rec.thread) ? rec.thread.slice() : [];
  const split = autoSplitThread(rec.text, 140);
  let finalText = split.text;
  let finalThread = [];
  if (split.thread) finalThread = finalThread.concat(split.thread);
  /* 既存のthread(2本目以降)も、それぞれ140字超なら分割して足す */
  existingThread.forEach((t) => {
    const s2 = autoSplitThread(t, 140);
    finalThread.push(s2.text);
    if (s2.thread) finalThread = finalThread.concat(s2.thread);
  });
  const payload = {
    screen_name: rec.screen_name,
    text: finalText,
    scheduled_at: rec.scheduled_at,
    status: rec.status || "draft",
    media_url: rec.media_url || null,
    thread: finalThread.length ? finalThread : null,
  };
  return await sb.from("scheduled_posts").insert(payload);
}

function shMixName(combo){ const s=combo.slice().sort((a,b)=>b.ratio-a.ratio); return (s[0]?s[0].name:"")+(s[1]?"×"+s[1].name:""); }

/* 長文を140字以内のツイート配列に自動分割する(スレッド用)。
   返り値 { text, thread } : text=1本目, thread=2本目以降(無ければnull)。
   段落(空行)→文(句点)→読点や区切り の順で、できるだけ文の意味が途切れない位置で割る。 */
function autoSplitThread(full, limit) {
  limit = limit || 140;
  const src = String(full || "").trim();
  if (src.length <= limit) return { text: src, thread: null };

  /* テキストを「これ以上分けたくない最小単位」に砕く。
     優先: 段落(空行) > 文末(。！？と改行) > 読点・中黒・スラッシュ > それでも長ければ単語境界 */
  function tokenize(text) {
    /* まず段落 */
    return text.split(/\n\s*\n/).map(s => s.trim()).filter(Boolean);
  }
  /* 1ピースが長すぎる時、自然な区切りでさらに砕く(文の途中で切らない) */
  function breakPiece(piece) {
    if (piece.length <= limit) return [piece];
    /* 文末(。！？)や改行で割る。区切り文字は前の文にくっつける */
    let parts = piece.split(/(?<=[。！？\n])/).map(s => s).filter(s => s.length);
    /* まだlimit超の塊があれば、読点・中黒・スラッシュ・空白で割る */
    const refined = [];
    parts.forEach(pt => {
      if (pt.length <= limit) { refined.push(pt); return; }
      let sub = pt.split(/(?<=[、，・/／\s])/).filter(s => s.length);
      let buf = "";
      sub.forEach(token => {
        if (token.length > limit) {
          /* 1トークンが長すぎる(URLや長い単語)→最終手段で機械的に割るが、できるだけ境界で */
          if (buf) { refined.push(buf); buf = ""; }
          for (let i = 0; i < token.length; i += limit) refined.push(token.slice(i, i + limit));
        } else if ((buf + token).length > limit) {
          if (buf) refined.push(buf);
          buf = token;
        } else {
          buf += token;
        }
      });
      if (buf) refined.push(buf);
    });
    return refined;
  }

  /* 段落を取り、各段落を必要なら砕いて、limit以内に詰め込む */
  const pieces = [];
  tokenize(src).forEach(block => { breakPiece(block).forEach(p => pieces.push(p)); });

  /* ピースを順に詰めてツイートを作る(境界をまたいで文を切らない) */
  const tweets = [];
  let cur = "";
  pieces.forEach(piece => {
    const sep = cur ? (cur.endsWith("\n") ? "" : "\n") : "";
    if ((cur + sep + piece).length > limit) {
      if (cur.trim()) tweets.push(cur.trim());
      cur = piece;
    } else {
      cur += sep + piece;
    }
  });
  if (cur.trim()) tweets.push(cur.trim());

  if (!tweets.length) return { text: src.slice(0, limit), thread: null };
  return { text: tweets[0], thread: tweets.length > 1 ? tweets.slice(1) : null };
}

    "出張最終日":      () => dow===4 || dow===5,        // 週後半
    "明日帰る":        () => dow===5 || dow===6 || dow===0, // 週末に寄せる
    "明日の仕事を忘れたい": () => dow===5 || dow===6,    // 金土の夜
    "金沢最後の夜":    () => dow===5 || dow===6 || dow===0,
    "記念日":          () => false, // 任意日には出さない(店が把握できないので自動からは除外)
    "誕生日":          () => false, // 同上
  };
  /* 候補シーンを集める(日付依存はルールに合う時だけ採用) */
  const cats = category ? [category] : Object.keys(SHISHA_SCENES);
  const pool = [];
  cats.forEach((cat) => {
    SHISHA_SCENES[cat].forEach((scene) => {
      const rule = DATE_RULES[scene];
      if (rule && !rule()) return; // 日付に合わないシーンは除外
      pool.push({ category: cat, scene, aud: SHISHA_SCENE_AUD[cat]||"おまかせ" });
    });
  });
  if (!pool.length) return null;
  return pool[Math.floor(Math.random()*pool.length)];
}

/* ============================================================
 * 日本のイベントカレンダー(全アカウント共通)
 * 投稿日がイベント期間(事前告知〜当日〜期間中)に入っていれば、
 * そのイベントを話題ヒントとして返す。強制ではなく、呼び出し側で
 * 確率的に一部の投稿にだけ混ぜる。
 * ============================================================ */
const JP_EVENTS = [
  /* name: イベント名 / pre: 何日前から事前告知 / 判定はmatch(month,day)で行う */
  { name: "ゴールデンウィーク", hint: "GW・大型連休。連休中の営業/休業、連休の夜の過ごし方を絡める", match: (m,d)=> (m===4&&d>=26)||(m===5&&d<=6) },
  { name: "母の日", hint: "5月第2日曜。感謝・家族をテーマに", match: (m,d,dow,wk)=> m===5&&wk===2&&dow===0 || (m===5&&d>=6&&d<=14) },
  { name: "梅雨", hint: "じめじめした雨の季節。雨の日の過ごし方・室内で楽しむ話題", match: (m,d)=> (m===6&&d>=10)||(m===7&&d<=20) },
  { name: "七夕", hint: "7月7日。願い事・夏の風物詩", match: (m,d)=> m===7&&d>=4&&d<=7 },
  { name: "お盆", hint: "お盆・夏季休暇。帰省・連休中の営業/休業、夏の夜の過ごし方", match: (m,d)=> m===8&&d>=10&&d<=16 },
  { name: "夏休み・真夏", hint: "真夏・夏休みシーズン。暑い夜・夏らしい爽やかな話題", match: (m,d)=> (m===7&&d>=21)||(m===8&&d>=1&&d<=31) },
  { name: "ハロウィン", hint: "10月31日。仮装・イベント・パーティーの夜", match: (m,d)=> m===10&&d>=25&&d<=31 },
  { name: "クリスマス", hint: "12月24〜25日。クリスマス・聖夜の特別な夜、デート・パーティー", match: (m,d)=> m===12&&d>=18&&d<=25 },
  { name: "年末", hint: "年末・仕事納め。今年お疲れ様・年末の営業案内", match: (m,d)=> m===12&&d>=26&&d<=31 },
  { name: "年始・お正月", hint: "お正月・新年。あけましておめでとう・新年の営業開始", match: (m,d)=> m===1&&d>=1&&d<=7 },
  { name: "成人の日", hint: "1月第2月曜。成人式・新成人をお祝い", match: (m,d,dow,wk)=> m===1&&wk===2&&dow===1 || (m===1&&d>=8&&d<=14) },
  { name: "バレンタイン", hint: "2月14日。チョコ・甘い・恋愛・特別な夜", match: (m,d)=> m===2&&d>=8&&d<=14 },
  { name: "ホワイトデー", hint: "3月14日。お返し・甘い・感謝", match: (m,d)=> m===3&&d>=10&&d<=14 },
  { name: "春・桜シーズン", hint: "桜・お花見・新生活シーズン。春の夜・新しい出会い", match: (m,d)=> (m===3&&d>=20)||(m===4&&d<=10) },
  { name: "ハッピーニューイヤー前夜", hint: "大晦日・カウントダウン。年越しの夜", match: (m,d)=> m===12&&d>=30 },
];
/* 投稿日(dateStr=YYYY-MM-DD)に当てはまるイベントを返す。なければnull */
function pickJpEvent(dateStr){
  const d = dateStr ? new Date(dateStr+"T12:00:00") : new Date();
  const m = d.getMonth()+1, day = d.getDate(), dow = d.getDay();
  const wk = Math.floor((day-1)/7)+1; /* 第何週か */
  const hits = JP_EVENTS.filter(e => { try { return e.match(m, day, dow, wk); } catch(_){ return false; } });
  if (!hits.length) return null;
  return hits[Math.floor(Math.random()*hits.length)];
}


/* おすすめミックスを投稿文にする(噂のシーシャBar用)
   scene指定があればそのシチュエーションに寄せる。Haikuで高速生成・性格はCFGから */
async function shMixPostText(audience, sceneObj){
  const aud = sceneObj ? sceneObj.aud : (audience||"おまかせ");
  const picks = shGenerate(aud, 1);
  if (!picks.length) return null;
  const m = picks[0];
  const haigou = m.combo.map(c=>c.name+"("+shBrandOf(c.name)+") "+c.ratio).join(" / ");
  const sweet=Math.round(shAvg(m.combo,0)), sour=Math.round(shAvg(m.combo,1)), cool=Math.round(shAvg(m.combo,2)), heavy=Math.round(shAvg(m.combo,3));
  const star = (v) => { const f=Math.max(1,Math.min(6,Math.round(v*6/10))); return "★".repeat(f)+"☆".repeat(6-f); };
  const osusume = m.sc>=90?6:(m.sc>=85?5:4);
  const gekioshi = m.ss>=3?6:(m.ss>=2?5:(m.ss>=1?4:3));
  /* 性格・文体をCFGから引っ張る */
  let persona = "";
  if (CFG.origProfile && CFG.origProfile.trim()) {
    persona = "\n【この店長の文体・性格(必ず再現)】\n" + CFG.origProfile + "\n";
  } else {
    const toneMap = { "カジュアル":"フランクでフレンドリー", "丁寧":"丁寧で落ち着いた", "ノリ重視":"テンション高めでノリのいい", "クール":"クールで大人っぽい" };
    persona = "\n口調: " + (toneMap[CFG.tone] || "自然体な") + "感じ。絵文字は" + (CFG.emoji||"少なめ") + "。\n";
  }
  /* 星評価ブロック(固定で付ける) */
  const starBlock =
    (sceneObj ? "こんなあなたに "+star(8)+"\n" : "") +
    "オススメ度 "+star(osusume*10/6)+"\n激推し度 "+star(gekioshi*10/6)+"\n" +
    "甘さ "+star(sweet)+" / 酸味 "+star(sour)+"\n清涼感 "+star(cool)+" / 吸いごたえ "+star(heavy);
  const prompt =
    `金沢・片町のシーシャ店の店長として、おすすめミックスを紹介する短いX投稿の「本文だけ」を書く。\n` +
    persona +
    (sceneObj ? `\nこの投稿の切り口:「${sceneObj.scene}」という気分・状況の人に語りかける。この言葉を不自然に名詞化・言い換えせず、共感する一言から自然に始める。\n` : "") +
    `\nミックス: ${shMixName(m.combo)}\n配合: ${haigou}\n味: 甘さ${sweet}/酸味${sour}/清涼${cool}/吸いごたえ${heavy}(10段階)\n` +
    `\n書き方の注意(重要):\n` +
    `- AIっぽい・広告っぽい文章にしない。店長が実際にXでつぶやくようなリアルなノリでOK\n` +
    `- 「〜な夜に寄り添う」「登場」みたいなテンプレ広告表現は使わない\n` +
    `- 自然な日本語で書く。「〜した時間」「〜したい時」など、文法的に正しく自然な言い回しにする(不自然な体言止めや誤用をしない)\n` +
    `- フレーバー名は正式名称で正確に(略さない)。配合(銘柄と比率)は本文に1行入れる\n` +
    `- 「飲みごたえ」は誤り。シーシャなので「吸いごたえ」「煙」「キック」を使う\n` +
    `- 100〜130字程度。ハッシュタグは付けても1個\n` +
    `- 星評価は書かなくていい(こちらで後ろに付ける)\n` +
    `本文のみ出力・前置き禁止。`;
  /* Haikuで高速生成 */
  const text = await callAI(prompt, false, "haiku");
  if (!text || !text.trim()) return null;
  const body = text.trim();
  /* 味の補足説明(2本目に入れる) */
  const flavorNote = "🌿味の詳細\n" + shMixName(m.combo) + "\n" + haigou;
  const second = flavorNote + "\n\n" + starBlock;
  /* 1本目+2本目を結合した時に140字以内なら1本、超えるならスレッド */
  const combined = body + "\n\n" + starBlock;
  if (combined.length <= 140) {
    return { thread: [combined] };
  }
  return { thread: [body, second] };
}

/* ============ Supabase KV(設定保存) ============ */
async function kvGet(key, fallback) {
  const { data } = await sb.from("kv_store").select("value").eq("key", key).maybeSingle();
  return data && data.value !== null && data.value !== undefined ? data.value : fallback;
}
async function kvSet(key, value) {
  await sb.from("kv_store").upsert({ key, value, updated_at: new Date().toISOString() });
}

/* ============ AI呼び出し(GAS中継) ============ */
/* グローバル: GASにアクション+引数を送る(各タブから使える) */
async function gasFetch_(action, extra) {
  const { data } = await sb.auth.getSession();
  if (!data.session) throw new Error("ログインが切れた。リロードして。");
  const res = await fetch(GAS_URL, {
    method: "POST", headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(Object.assign({ auth: data.session.access_token, action }, extra || {})),
  });
  return await res.json();
}

async function callAI(prompt, useSearch, model, wantUrls) {
  const { data } = await sb.auth.getSession();
  if (!data.session) throw new Error("ログインが切れた。リロードして。");
  let lastUrls = [];
  const doFetch = async (p) => {
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ auth: data.session.access_token, prompt: p, useSearch: !!useSearch, model: model || null }),
    });
    const j = await res.json();
    if (j.error) throw new Error(j.error);
    lastUrls = j.urls || [];
    return j.text;
  };

  let text = await doFetch(prompt);

  /* 業種外題材の混入チェック。検索系(無料予想など)は対象外 */
  if (!useSearch && CFG.bizType && CFG.bizType.trim()) {
    const banned = bannedTopicsFor(CFG.bizType.trim());
    const hit = banned.find((w) => text.includes(w));
    if (hit) {
      /* 1回だけ、禁止題材を明示して作り直し */
      const retryPrompt = prompt +
        "\n\n【厳重注意・再生成】前回の生成は「" + hit + "」など『" + CFG.bizType.trim() +
        "』と無関係な題材を含んでいた。今回は絶対にそれらの題材・単語を一切使わず、『" +
        CFG.bizType.trim() + "』だけの内容で書き直せ。";
      const retry = await doFetch(retryPrompt);
      if (!banned.find((w) => retry.includes(w))) text = retry;
      else text = retry; // 2回目もダメなら諦めて返す(無限ループ防止)
    }
  }
  return wantUrls ? { text, urls: lastUrls } : text;
}

/* 業種ごとの「混ざってはいけない題材ワード」 */
function bannedTopicsFor(bizType) {
  const b = bizType;
  const isBoat = /競艇|ボート|レース|公営競技|舟券/.test(b);
  const isShisha = /シーシャ|シーシャ|水たばこ|水タバコ|フーカー|hookah|shisha/i.test(b);
  const LISTS = {
    boat: ["万舟","舟券","競艇","ボートレース","回収率","本命","穴狙い","3連単","レース","出走","選手","モーター","予想"],
    shisha: ["シーシャ","水たばこ","水タバコ","フレーバー","フーカー","ミックス","チャコール","ボウル","煙"],
  };
  let banned = [];
  /* 競艇系アカウントでなければ競艇ワードを禁止 */
  if (!isBoat) banned = banned.concat(LISTS.boat);
  /* シーシャ系アカウントでなければシーシャワードを禁止 */
  if (!isShisha) banned = banned.concat(LISTS.shisha);
  return banned;
}

  await loadClients();
  /* 全アクティブアカウントの設定を先読みキャッシュ(切替を即座に) */
  for (const c of S.clients.filter((x)=>x.status==="active")) {
    if (!CFG_CACHE[c.screen_name]) {
      const saved = await kvGet("gen_config:" + c.screen_name, null);
      CFG_CACHE[c.screen_name] = Object.assign(defaultCfg(), saved || {});
    }
  }
  renderTop(); renderNav(); showTab(S.tab);
}

async function loadClients() {
  const { data } = await sb.from("clients").select("*").order("created_at");
  /* screen_nameで重複排除(念のため・描画2重防止) */

  (data || []).forEach(c => { if (!seen[c.screen_name]) { seen[c.screen_name] = 1; uniq.push(c); } });
  S.clients = uniq;
}

/* ============ 共通部品 ============ */
function head(el, title, desc, steps) {
  const d = document.createElement("div");
  d.innerHTML = "<h2>" + esc(title) + '</h2><p class="desc">' + esc(desc) + "</p>" +
    '<div class="howto"><div class="hd">HOW TO USE</div>' +
    steps.map((s, i) => '<div class="st"><b>' + String(i + 1).padStart(2, "0") + "</b><span>" + esc(s) + "</span></div>").join("") +
    "</div>";
  el.appendChild(d);
}
function fld(el, label) {
  const l = document.createElement("label"); l.className = "fld"; l.textContent = "▸ " + label; el.appendChild(l);
}
function ta(el, rows, ph) {
  const t = document.createElement("textarea"); t.rows = rows; t.placeholder = ph || ""; el.appendChild(t); return t;
}
function inp(el, ph, type) {
  const t = document.createElement("input"); t.type = type || "text"; t.placeholder = ph || ""; el.appendChild(t); return t;
}
function chipsSingle(el, options, initial, cyan) {
  const w = document.createElement("div"); w.className = "chips"; el.appendChild(w);
  const state = { value: initial };
  function draw() {
    w.innerHTML = "";
    options.forEach((o) => {
      const c = document.createElement("button");
      c.className = "chip" + (state.value === o ? (cyan ? " on cyan" : " on") : "");
      c.textContent = o;
      c.onclick = () => { state.value = o; draw(); };
      w.appendChild(c);
    });
  }
  draw(); return state;
}
function chipsMulti(el, options, initial) {
  const w = document.createElement("div"); w.className = "chips"; el.appendChild(w);
  const state = { values: initial.slice() };
  function draw() {
    w.innerHTML = "";
    options.forEach((o) => {
      const c = document.createElement("button");
      c.className = "chip" + (state.values.includes(o) ? " on cyan" : "");
      c.textContent = o;
      c.onclick = () => {
        state.values = state.values.includes(o) ? state.values.filter((x) => x !== o) : [...state.values, o];
        draw();
      };
      w.appendChild(c);
    });
  }
  draw(); return state;
}
function runBtn(el, label) {
  const b = document.createElement("button"); b.className = "btn"; b.textContent = label; el.appendChild(b); return b;
}
function outArea(el) {
  const e = document.createElement("div"); el.appendChild(e);
  return {
    box: e,
    err(m) { e.innerHTML = m ? '<div class="err">⚠ ' + esc(m) + "</div>" : ""; },
    show(text) {
      e.innerHTML = '<div class="out"><button class="copybtn">コピー</button><pre></pre></div>';
      e.querySelector("pre").textContent = text;
      const cb = e.querySelector(".copybtn");
      cb.onclick = () => { navigator.clipboard.writeText(text); cb.textContent = "コピー済"; setTimeout(()=>cb.textContent="コピー",1500); };
    },
    clear() { e.innerHTML = ""; },
  };
}
async function runAI(btn, out, promptFn, useSearch) {
  out.clear(); out.err("");
  btn.disabled = true; const orig = btn.textContent; btn.textContent = "処理中…";
  try { out.show(await callAI(promptFn(), useSearch)); }
  catch (e) { out.err(e.message); }
  btn.disabled = false; btn.textContent = orig;
}

/* ============ 汎用AIタブ(02-08) ============ */
function aiTab(el, cfg) {
  head(el, cfg.title, cfg.desc, cfg.steps);

  /* 対象アカウント選択(そのアカウントの設定で生成) */
  let acctVal = S.activeAccount;
  const actives = S.clients.filter((c)=>c.status==="active");
  if (actives.length) {
    fld(el, "対象アカウント");
    const asel = document.createElement("select");
    const od = document.createElement("option"); od.value = "_default_"; od.textContent = "共通設定(既定)"; asel.appendChild(od);
    actives.forEach((c)=>{ const o=document.createElement("option"); o.value=c.screen_name; o.textContent="@"+c.screen_name; asel.appendChild(o); });
    asel.value = S.activeAccount;
    asel.onchange = () => { acctVal = asel.value; };
    el.appendChild(asel);
    const note = document.createElement("p"); note.className = "desc"; note.style.margin = "6px 0 0";
    note.textContent = "選んだアカウントの業種・性格・文体に合わせて分析・生成する。";
    el.appendChild(note);
  }

  const refs = {};
  cfg.fields.forEach((f) => {
    fld(el, f.label);
    if (f.type === "ta") refs[f.key] = ta(el, f.rows, f.ph);
    else if (f.type === "in") refs[f.key] = inp(el, f.ph);
    else if (f.type === "chips") refs[f.key] = chipsSingle(el, f.options, f.options[0]);
    else if (f.type === "multi") refs[f.key] = chipsMulti(el, f.options, f.initial || []);
  });
  const btn = runBtn(el, cfg.btn);
  const out = outArea(el);
  btn.onclick = async () => {
    const v = {};
    for (const k in refs) v[k] = refs[k].value !== undefined ? refs[k].value : (refs[k].values || refs[k].value);
    cfg.fields.forEach((f) => { if (f.type === "ta" || f.type === "in") v[f.key] = refs[f.key].value; });
    if (!cfg.validate(v)) { out.err("入力が足りん。"); return; }
    await loadCfgFor(acctVal || "_default_"); // 選んだアカウントの設定を適用
    runAI(btn, out, () => cfg.prompt(v), cfg.useSearch);
  };
}

      };
      origBox.appendChild(learn); origBox.appendChild(lerr);
    }
  }
  drawOrig();

  /* === 噂のシーシャBar専用: おすすめミックスブロック === */
  const mixBox = document.createElement("div"); el.appendChild(mixBox);
  function drawMix() {
    /* 判定: 店名/事業名が噂のシーシャBarの時だけ表示 */
    const show = isUwasaShisha(S.activeAccount, CFG.bizName);
    if (!show) { mixBox.innerHTML = ""; mixBox.style.display = "none"; return; }
    mixBox.style.display = "block";
    mixBox.innerHTML = "";
    /* バッジ */

    badge.style.cssText = "margin-top:20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap";
    badge.innerHTML = '<span style="font-size:11px;font-weight:800;letter-spacing:.12em;font-family:var(--mono);background:linear-gradient(135deg,#ff2d95,#a855f7);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent">🌿 SHISHA MIX AI</span><span style="font-size:10px;color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:2px 8px">噂のシーシャBar 専用</span>';
    mixBox.appendChild(badge);
    /* ON/OFFトグル */
    const tg = document.createElement("div");
    tg.style.cssText = "display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:10px";
    tg.innerHTML = '<div><div style="font-weight:700;font-size:14px">おすすめシーシャミックス</div><div style="font-size:11px;color:var(--muted)">味の構造で組む・禁止組合せ自動除外</div></div>';
    const sw = document.createElement("button");
    sw.style.cssText = "flex:0 0 auto;width:52px;height:28px;border-radius:14px;border:none;cursor:pointer;transition:.2s;position:relative;" + (CFG.mixOn ? "background:linear-gradient(135deg,#10b981,#059669)" : "background:#3a3a4a");
    sw.innerHTML = '<span style="position:absolute;top:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.2s;'+(CFG.mixOn?"left:27px":"left:3px")+'"></span>';
    sw.onclick = async () => { CFG.mixOn = !CFG.mixOn; await save(); drawMix(); };
    tg.appendChild(sw);
    mixBox.appendChild(tg);
    if (!CFG.mixOn) return; /* OFFなら以下は出さない */

    /* 頻度スライダー */
    const fwrap = document.createElement("div"); fwrap.style.cssText = "margin-top:12px";
    const flbl = document.createElement("div"); flbl.style.cssText = "display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px";
    flbl.innerHTML = '<span>投稿での出現頻度</span><span style="color:var(--accent);font-weight:700" id="mixFreqVal">'+CFG.mixFreq+'%</span>';
    fwrap.appendChild(flbl);
    const sl = document.createElement("input"); sl.type="range"; sl.min=0; sl.max=100; sl.step=5; sl.value=CFG.mixFreq;
    sl.style.cssText = "width:100%";
    const fhint = document.createElement("div"); fhint.style.cssText="font-size:11px;color:var(--muted);margin-top:4px";
    const updHint = () => { fhint.textContent = "10投稿につき約"+Math.round(CFG.mixFreq/10)+"回ミックス提案が混ざる"; };
    sl.oninput = () => { CFG.mixFreq = parseInt(sl.value); document.getElementById("mixFreqVal").textContent = CFG.mixFreq+"%"; updHint(); };
    sl.onchange = () => save();
    fwrap.appendChild(sl); updHint(); fwrap.appendChild(fhint);
    mixBox.appendChild(fwrap);

    /* 客層選択 */
    fld(mixBox, "客層を選んで生成");
    const audWrap = document.createElement("div"); audWrap.style.cssText="display:flex;flex-wrap:wrap;gap:6px";
    const AUDS = ["おまかせ","初心者","女性人気","男性人気","フルーツ系","紅茶系","スイーツ系","重め"];

    AUDS.forEach((a)=>{
      const c = document.createElement("button"); c.className="mini"; c.textContent=a;
      if(a===selAud){ c.style.background="linear-gradient(135deg,#ff2d95,#a855f7)"; c.style.color="#fff"; }

      audWrap.appendChild(c);
    });
    mixBox.appendChild(audWrap);

    /* 生成ボタン+在庫情報 */
    const genRow = document.createElement("div"); genRow.style.cssText="display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap";
    const genB = document.createElement("button"); genB.className="mini cyan"; genB.textContent="この客層で生成";
    genRow.appendChild(genB);
    const editB = document.createElement("button"); editB.className="mini"; editB.textContent="📦 在庫を編集";
    genRow.appendChild(editB);
    const DB = shishaDB();
    const nB = Object.keys(DB).length, nF = Object.values(DB).reduce((s,o)=>s+Object.keys(o).length,0);
    const inv = document.createElement("span"); inv.style.cssText="font-size:11px;color:var(--muted)"; inv.textContent = "在庫: "+nB+"ブランド / "+nF+"フレーバー";
    genRow.appendChild(inv);
    mixBox.appendChild(genRow);

    /* 在庫編集パネル */
    const editPanel = document.createElement("div"); editPanel.style.display = "none"; mixBox.appendChild(editPanel);
    editB.onclick = () => {
      if (editPanel.style.display === "none") { editPanel.style.display = "block"; editB.textContent = "📦 在庫編集を閉じる"; drawInventory(); }
      else { editPanel.style.display = "none"; editB.textContent = "📦 在庫を編集"; }

    function drawInventory() {
      const db = shishaDB();
      editPanel.innerHTML = "";
      const note = document.createElement("p"); note.className="desc"; note.style.margin="8px 0";
      note.textContent = "実際の在庫に合わせて編集。削除したフレーバーはミックス生成に使われなくなる。新規追加は数値を後で調整推奨。";

        if (!confirm("在庫をデフォルト97種に戻す?編集内容は消える。")) return;
        CFG.mixDB = null; await save(); drawInventory(); drawMix();

      editPanel.appendChild(resetB);

      Object.keys(db).forEach((brand) => {
        const bcard = document.createElement("div");
        bcard.style.cssText = "background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:8px";
        const bh = document.createElement("div"); bh.style.cssText="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px";

        const delBrand = document.createElement("button"); delBrand.className="mini"; delBrand.style.cssText="padding:2px 8px;font-size:11px"; delBrand.textContent="ブランド削除";
        delBrand.onclick = async () => {
          if (!confirm(brand+" を丸ごと削除する?")) return;
          const ndb = JSON.parse(JSON.stringify(shishaDB())); delete ndb[brand]; CFG.mixDB = ndb; await save(); drawInventory(); drawMix();
        };
        bh.appendChild(delBrand); bcard.appendChild(bh);
        /* フレーバーチップ */
        const chips = document.createElement("div"); chips.style.cssText="display:flex;flex-wrap:wrap;gap:5px";
        Object.keys(db[brand]).forEach((fl) => {
          const chip = document.createElement("span");
          chip.style.cssText = "display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:14px;padding:3px 6px 3px 10px;font-size:12px";
          chip.textContent = fl;
          const x = document.createElement("button"); x.textContent="×"; x.style.cssText="border:none;background:none;color:var(--bad);cursor:pointer;font-size:14px;padding:0 2px;line-height:1";
          x.onclick = async () => {
            const ndb = JSON.parse(JSON.stringify(shishaDB())); delete ndb[brand][fl];
            if (Object.keys(ndb[brand]).length===0) delete ndb[brand];
            CFG.mixDB = ndb; await save(); drawInventory(); drawMix();
          };
          chip.appendChild(x); chips.appendChild(chip);
        });
        bcard.appendChild(chips);
        /* フレーバー追加 */
        const addRow = document.createElement("div"); addRow.style.cssText="display:flex;gap:5px;margin-top:6px";
        const addIn = document.createElement("input"); addIn.placeholder="フレーバー名を追加"; addIn.style.cssText="font-size:12px;padding:5px 8px";
        const addBtn = document.createElement("button"); addBtn.className="mini cyan"; addBtn.style.cssText="padding:4px 10px;font-size:12px;flex:0 0 auto"; addBtn.textContent="追加";
        addBtn.onclick = async () => {
          const name = addIn.value.trim(); if (!name) return;
          const ndb = JSON.parse(JSON.stringify(shishaDB()));
          ndb[brand][name] = [5,2,0,3,8,5]; /* 仕様書のデフォルト数値 */
          CFG.mixDB = ndb; await save(); drawInventory(); drawMix();
        };
        addRow.appendChild(addIn); addRow.appendChild(addBtn); bcard.appendChild(addRow);
        editPanel.appendChild(bcard);
      });
      /* ブランド追加 */
      const newBrandRow = document.createElement("div"); newBrandRow.style.cssText="display:flex;gap:5px;margin-top:8px";
      const nbIn = document.createElement("input"); nbIn.placeholder="新ブランド名"; nbIn.style.cssText="font-size:12px;padding:6px 8px";
      const nbBtn = document.createElement("button"); nbBtn.className="mini cyan"; nbBtn.style.cssText="flex:0 0 auto"; nbBtn.textContent="ブランド追加";
      nbBtn.onclick = async () => {
        const b = nbIn.value.trim(); if (!b) return;
        const ndb = JSON.parse(JSON.stringify(shishaDB())); if (!ndb[b]) ndb[b] = {}; CFG.mixDB = ndb; await save(); drawInventory(); drawMix();
      };
      newBrandRow.appendChild(nbIn); newBrandRow.appendChild(nbBtn); editPanel.appendChild(newBrandRow);
    }

    const mixOut = document.createElement("div"); mixBox.appendChild(mixOut);
    genB.onclick = () => {
      genB.disabled = true; genB.textContent = "生成中…";
      setTimeout(() => { /* 計算は同期だが体感のため */
        const picks = shGenerate(selAud, 3);
        mixOut.innerHTML = "";
        if (!picks.length) { mixOut.innerHTML = '<div class="err">条件に合うミックスが見つからん。在庫を増やすか客層を変えて。</div>'; genB.disabled=false; genB.textContent="この客層で生成"; return; }
        picks.forEach((p)=> mixOut.appendChild(renderMixCard(p, selAud)));
        genB.disabled = false; genB.textContent = "この客層で生成";
      }, 50);
    };
  }
  drawMix();
  /* 店名変更で判定が変わるので、bizName入力を監視して再描画 */
  window._redrawMix = drawMix;

  const done = runBtn(el, "保存して全機能に反映");
  const okm = document.createElement("div"); okm.className = "okmsg"; el.appendChild(okm);
  done.onclick = async () => { await save(); okm.textContent = "保存した。全AI機能に反映される。"; setTimeout(()=>okm.textContent="",2500); drawMix(); };
};

/* ミックス結果カードを描画 */
function renderMixCard(p, audience) {
  const card = document.createElement("div");
  card.style.cssText = "background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-top:10px";
  const sweet=shAvg(p.combo,0), sour=shAvg(p.combo,1), cool=shAvg(p.combo,2), heavy=shAvg(p.combo,3);
  const lead = p.combo.slice().sort((a,b)=>b.ratio-a.ratio)[0];
  const label = shLabel(p.sc);
  const labelColor = p.sc>=90?"#10b981":(p.sc>=85?"var(--accent)":"var(--muted)");
  let h = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
  h += '<span style="font-weight:800;font-size:15px">'+esc(shMixName(p.combo))+'</span>';
  h += '<span style="font-size:13px;font-weight:800;color:'+labelColor+'">'+p.sc+'点 '+label+'</span></div>';
  /* こんなあなたにおすすめ(客層訴求) */
  const pitch = {
    "初心者":"シーシャ初めての人・吸いやすさ重視","女性人気":"女性・甘い系や華やかな香り好き",
    "男性人気":"男性・しっかり吸いごたえ重視","フルーツ系":"フルーツの爽やかさが好きな人",
    "紅茶系":"紅茶・茶葉の香り好き","スイーツ系":"甘いデザート系・スイーツ好き","重め":"濃厚で重ため・吸い応え重視",
  }[audience];
  if (pitch) h += '<div style="font-size:11.5px;color:var(--accent);background:rgba(255,45,149,.08);border-radius:6px;padding:4px 8px;margin-bottom:8px">💡 こんなあなたに: '+esc(pitch)+'</div>';
  /* 配合 */
  h += '<div style="font-size:12.5px;color:var(--muted);margin-bottom:8px">';
  h += p.combo.map(c=>esc(c.name)+'<span style="opacity:.6">('+esc(shBrandOf(c.name))+')</span> '+c.ratio).join(' / ');
  h += '</div>';
  /* バー */
  const barRow = (lbl,v) => '<div style="display:flex;align-items:center;gap:8px;font-size:11px;margin:2px 0"><span style="width:42px;color:var(--muted)">'+lbl+'</span><span style="font-family:var(--mono);letter-spacing:-1px;color:var(--accent)">'+shBar(v)+'</span></div>';
  h += barRow("甘さ",sweet)+barRow("酸味",sour)+barRow("清涼",cool)+barRow("重さ",heavy);
  h += '<div style="font-size:11px;color:var(--muted);margin-top:6px">相性 '+p.info+'</div>';
  card.innerHTML = h;
  /* コピーボタン */
  const cp = document.createElement("button"); cp.className="mini"; cp.style.marginTop="8px"; cp.textContent="📋 配合をコピー";
  const txt = shMixName(p.combo)+"\n"+p.combo.map(c=>c.name+"("+shBrandOf(c.name)+") "+c.ratio).join(" / ")+"\nおすすめ度: "+p.sc+"点 "+label+(pitch?"\nこんなあなたに: "+pitch:"");
  cp.onclick = () => { navigator.clipboard.writeText(txt); cp.textContent="✓ コピーした"; setTimeout(()=>cp.textContent="📋 配合をコピー",1500); };
  card.appendChild(cp);
  return card;
}

/* 単一選択チップを指定要素に描画(コールバック付き) */
function chipsSingleInto(host, options, initial, onChange) {
  const w = document.createElement("div"); w.className = "chips"; host.appendChild(w);
  let cur = initial;
  function draw() {
    w.innerHTML = "";
    options.forEach((o) => {
      const c = document.createElement("button");
      c.className = "chip" + (cur === o ? " on" : "");
      c.textContent = o;
      c.onclick = () => { cur = o; onChange(o); draw(); };
      w.appendChild(c);
    });
  }
  draw();
}

/* ---- 📭 書き漏れチェック(全アカ横断で空き日を検出・古いdraft自動掃除) ---- */
BUILDERS.gapcheck = (el) => {
  head(el, "📭 書き漏れチェック", "全アカウントを横断して、今週7日間で投稿が入ってない日を検出。空きがあるアカだけ出す。古い下書き(7日以上前)は自動で掃除。", [
    "アプリを開くと自動でチェック",
    "空きアカ・空き日が出たら埋める",
    "古い下書きは勝手に消える",
  ]);

  const status = document.createElement("p");
  status.className = "desc"; status.textContent = "チェック中…";
  el.appendChild(status);

  const result = document.createElement("div");
  el.appendChild(result);

  const reBtn = runBtn(el, "🔄 もう一度チェック");

  async function cleanOldDrafts() {
    /* 7日以上前のdraftを削除 */
    try {
      const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 7);
      await sb.from("scheduled_posts")
        .delete()
        .eq("status", "draft")
        .lt("scheduled_at", cutoff.toISOString());
    } catch(e) { /* 失敗しても致命的でない */ }
  }

  async function run() {
    status.textContent = "チェック中…";
    result.innerHTML = "";
    await cleanOldDrafts();

    const actives = S.clients.filter((c)=>c.status==="active" && c.screen_name !== "_test_" && !/^_test/.test(c.screen_name));
    if (!actives.length) { status.textContent = "連携中のアカウントがない(テスト用は除外)。"; return; }

    /* 今日から7日間の日付 */
    const wd = ["日","月","火","水","木","金","土"];
    const days = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(); d.setDate(d.getDate() + i);
      const ds = d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
      days.push({ ds, label: wd[d.getDay()], md: (d.getMonth()+1) + "/" + d.getDate() });
    }
    const from = new Date(days[0].ds + "T00:00:00").toISOString();
    const to = new Date(days[6].ds + "T23:59:59").toISOString();

    /* 全アカの予約・下書き・投稿済みを一括取得
       (postedも「その日は書いた」とカウント。予約管理の表示では消えてても判定には使う) */
    let rows = [];
    try {
      const { data } = await sb.from("scheduled_posts")
        .select("screen_name,scheduled_at,status,posted_at")
        .in("status", ["pending","draft","posted"])
        .gte("scheduled_at", from).lte("scheduled_at", to);
      rows = data || [];
    } catch(e) {
      status.textContent = "投稿データの取得に失敗した。";
      return;
    }

    /* アカ×日付で「埋まってるか」を集計。postedは実投稿日(posted_at)も見る */
    const taken = {}; // screen_name -> {ds:true}
    const dayKey = (dt) => dt.getFullYear() + "-" + String(dt.getMonth()+1).padStart(2,"0") + "-" + String(dt.getDate()).padStart(2,"0");
    rows.forEach((r) => {
      (taken[r.screen_name] = taken[r.screen_name] || {});
      taken[r.screen_name][dayKey(new Date(r.scheduled_at))] = true;
      if (r.status === "posted" && r.posted_at) {
        taken[r.screen_name][dayKey(new Date(r.posted_at))] = true;
      }
    });

    /* 空きがあるアカだけ抽出 */
    const flagged = [];
    actives.forEach((c) => {
      const gaps = days.filter((d) => !(taken[c.screen_name] && taken[c.screen_name][d.ds]));
      if (gaps.length) flagged.push({ acc: c.screen_name, gaps });
    });

    status.textContent = "";
    if (!flagged.length) {
      result.innerHTML =
        '<div style="position:relative;overflow:hidden;background:linear-gradient(135deg,rgba(16,185,129,.18),rgba(0,229,255,.12),rgba(168,85,247,.15));border:1px solid rgba(16,185,129,.5);border-radius:18px;padding:32px 20px;text-align:center;box-shadow:0 0 40px rgba(16,185,129,.25),inset 0 0 30px rgba(16,185,129,.08)">' +
          '<div style="font-size:46px;line-height:1;margin-bottom:12px;filter:drop-shadow(0 0 12px rgba(16,185,129,.6))">🏆</div>' +
          '<div style="font-size:20px;font-weight:800;letter-spacing:.04em;background:linear-gradient(90deg,#10b981,#00e5ff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px">ALL CLEAR</div>' +
          '<div style="font-size:14px;font-weight:700;color:#e8fff5;margin-bottom:4px">全アカウント 今週ぜんぶ埋まってる</div>' +
          '<div style="font-size:12px;color:rgba(255,255,255,.6);letter-spacing:.08em">7 DAYS · NO GAPS · 書き漏れゼロ</div>' +
          '<div style="margin-top:14px;font-size:11px;color:rgba(16,185,129,.85);letter-spacing:.12em;text-transform:uppercase">Keep the streak going 🔥</div>' +
        '</div>';
      return;
    }

    const intro = document.createElement("p");
    intro.className = "desc"; intro.style.margin = "0 0 10px";
    intro.textContent = flagged.length + "アカウントに書き漏れあり。埋まってるアカは省略。";
    result.appendChild(intro);

    flagged.forEach((f) => {
      const card = document.createElement("div");
      card.style.cssText = "background:var(--card);border:1px solid var(--bad);border-radius:12px;padding:12px 14px;margin:8px 0";
      const name = document.createElement("div");
      name.style.cssText = "font-weight:700;font-size:14px;margin-bottom:8px";
      name.innerHTML = '<span style="color:var(--accent)">@'+esc(f.acc)+'</span> <span style="color:var(--bad);font-size:12px">'+f.gaps.length+'日 空き</span>';
      card.appendChild(name);
      /* 空き日ごとに「この日を生成」ボタン */
      const btnWrap = document.createElement("div");
      btnWrap.style.cssText = "display:flex;flex-wrap:wrap;gap:6px";
      f.gaps.forEach((g) => {
        const b = document.createElement("button");
        b.className = "btn"; b.style.cssText = "margin:0;padding:8px 12px;font-size:13px";
        b.textContent = "✏️ " + g.md + "(" + g.label + ")";
        b.onclick = () => genOneDay(f.acc, g, b);
        btnWrap.appendChild(b);
      });
      card.appendChild(btnWrap);
      result.appendChild(card);
    });
  }

  /* 指定アカ・指定日の投稿を1本生成して、その場で見せる(確認後に予約管理へ) */
  async function genOneDay(account, gap, btn) {
    const o = btn.textContent;
    btn.disabled = true; btn.textContent = "生成中…";
    try {
      await loadCfgFor(account);
      const isBoat = /競艇|ボートレース|ボート/.test(CFG.bizType || "");
      /* 噂のシーシャBar: 頻度に応じてミックス紹介投稿にする */
      if (isUwasaShisha(account, CFG.bizName) && CFG.mixOn && Math.random()*100 < (CFG.mixFreq||0)) {
        const sc2 = shPickScene(null, gap.ds);
        const r = await shMixPostText(null, sc2);
        if (r && r.thread) {
          btn.disabled = false; btn.textContent = o;
          showDraftPreview(account, gap, r.thread[0], "20:00", btn, r.thread.length>1?r.thread.slice(1):null);
          return;
        }
      }
      const prompt =
        `${S.sns}の投稿を1本作る。日付: ${gap.ds}(${gap.label}曜)。\n` +
        `このアカウントの業種・性格・文体設定に沿って、その日にふさわしい投稿を1本。\n` +
        `バズりやすい推奨投稿時刻(HH:MM)も決める。\n` +
        (isBoat ? "競艇アカだが、これは未来の日付の投稿で、その日のレース・出走表・モーター・展示データはまだ存在しない。\n【絶対禁止】具体的なレース場名(蒲郡・尼崎・徳山など)・レース番号・艇番・選手名・連勝率・モーター情報・展示タイム・的中実績など、データに基づく具体的な予想や数値を一切書かない(まだ確定していないデータを書くのは捏造になる)。\n代わりに、データが不要な内容にする: 競艇への向き合い方・心構え、過去の一般的な振り返り、買い方のノウハウや考え方、フォロワーへの告知・あいさつ、X運用上の小ネタ。具体的なその日の予想は別の『無料予想』機能が当日データを取得して出すので、ここでは出さない。\n" : "") +
        `出力フォーマット(厳守):\n時刻: HH:MM\n本文:\n(投稿本文)\n\n前置き不要。日本語。${sc()}`;
      const text = await callAI(prompt, false);
      if (!text || !text.trim()) throw new Error("AIが空を返した。もう一回試して。");
      let h = "12:00", bodyTxt = text.trim();
      const mt = text.match(/時刻[:：]\s*(\d{1,2}:\d{2})/);
      if (mt) h = mt[1];
      const mb = text.match(/本文[:：]\s*([\s\S]+)/);
      if (mb) bodyTxt = mb[1].trim();
      btn.disabled = false; btn.textContent = o;
      /* その場に本文を表示して、確認してから送る */
      showDraftPreview(account, gap, bodyTxt, h, btn);
    } catch (e) {
      alert("生成失敗: " + (e.message || e));
      btn.disabled = false; btn.textContent = o;
    }
  }

  /* 生成した本文をその場に出して、予約管理へ送る/作り直すを選ばせる */
  function showDraftPreview(account, gap, bodyTxt, h, srcBtn, threadRest) {
    /* 既存のプレビューがあれば消す */
    const existing = document.getElementById("gapPreview");
    if (existing) existing.remove();
    const card = document.createElement("div");
    card.id = "gapPreview";
    card.style.cssText = "background:var(--card);border:1px solid var(--accent);border-radius:12px;padding:14px;margin:12px 0;box-shadow:0 0 20px rgba(255,45,149,.15)";
    const ttl = document.createElement("div");
    ttl.style.cssText = "font-weight:700;font-size:14px;margin-bottom:8px";
    ttl.innerHTML = '<span style="color:var(--accent)">@'+esc(account)+'</span> '+gap.md+'('+gap.label+') の投稿案'+(threadRest&&threadRest.length?' 🧵スレッド':'');
    card.appendChild(ttl);
    /* 時刻 */
    const tRow = document.createElement("div");
    tRow.style.cssText = "display:flex;align-items:center;gap:8px;margin-bottom:8px";
    const tLbl = document.createElement("span"); tLbl.textContent = "⏰ 投稿時刻"; tLbl.style.fontSize = "13px";
    const tIn = document.createElement("input"); tIn.type = "time"; tIn.value = h;
    tIn.style.cssText = "padding:6px 10px;font-family:var(--mono);width:auto";
    tRow.appendChild(tLbl); tRow.appendChild(tIn);
    card.appendChild(tRow);
    /* 1本目本文(編集可) */
    const body = document.createElement("textarea");
    body.rows = 6; body.value = bodyTxt;
    body.style.cssText = "width:100%;font-size:13.5px;line-height:1.6";
    card.appendChild(body);
    const cnt = document.createElement("p"); cnt.className = "desc"; cnt.style.margin = "4px 0 8px";
    const updCnt = () => { cnt.textContent = "1本目 "+body.value.length + "字" + (S.sns==="X" && body.value.length>140 ? " ⚠140字超" : ""); };
    body.oninput = updCnt; updCnt();
    /* スレッド2本目以降(編集可) */
    const threadAreas = [];
    if (threadRest && threadRest.length) {
      threadRest.forEach((t2, i) => {
        const lbl = document.createElement("p"); lbl.className="desc"; lbl.style.margin="6px 0 2px"; lbl.textContent = "🧵 "+(i+2)+"本目(リプ)";
        card.appendChild(lbl);
        const ta2 = document.createElement("textarea"); ta2.rows = 5; ta2.value = t2;
        ta2.style.cssText = "width:100%;font-size:13px;line-height:1.6";
        card.appendChild(ta2); threadAreas.push(ta2);
      });
    }
    /* ボタン: 送る / 作り直す */
    const acts = document.createElement("div");
    acts.style.cssText = "display:flex;gap:8px;flex-wrap:wrap;margin-top:8px";
    const sendBtn = document.createElement("button");
    sendBtn.className = "btn"; sendBtn.style.cssText = "margin:0;flex:1;min-width:140px;background:linear-gradient(135deg,#10b981,#059669)";
    sendBtn.textContent = "✅ 予約管理へ送る";
    sendBtn.onclick = async () => {
      sendBtn.disabled = true; sendBtn.textContent = "送信中…";
      try {
        const threadVals = threadAreas.map(t=>t.value.trim()).filter(Boolean);
        const { error } = await saveScheduledPost({
          screen_name: account,
          text: body.value.trim(),
          scheduled_at: new Date(gap.ds + "T" + (tIn.value||"12:00") + ":00").toISOString(),
          status: "draft",
          thread: threadVals.length ? threadVals : null,
        });
        if (error) throw new Error(error.message);
        card.innerHTML = '<div style="text-align:center;color:#10b981;font-weight:700;padding:8px">✓ '+gap.md+' を予約管理に送った!'+(threadVals.length?' (🧵'+(threadVals.length+1)+'連投)':'')+'</div>';
        if (srcBtn) { srcBtn.textContent = "✓ "+gap.md+" 作成済"; srcBtn.style.background = "linear-gradient(135deg,#10b981,#059669)"; srcBtn.disabled = true; }
      } catch (e) { sendBtn.disabled = false; sendBtn.textContent = "✅ 予約管理へ送る"; alert("送信失敗: " + e.message); }
    };
    const reBtn = document.createElement("button");
    reBtn.className = "btn"; reBtn.style.cssText = "margin:0;flex:1;min-width:140px";
    reBtn.textContent = "🔀 作り直す";
    reBtn.onclick = () => { card.remove(); genOneDay(account, gap, srcBtn); };
    acts.appendChild(sendBtn); acts.appendChild(reBtn);
    card.appendChild(acts);
    /* 結果エリアの先頭に差し込む */
    result.insertBefore(card, result.firstChild);
    card.scrollIntoView({ behavior: "smooth", block: "center" });
  }

  reBtn.onclick = run;
  run();
};

      goBtn.disabled = false; goBtn.textContent = "💎 伸びてるポストを取得してリプ量産"; return;
    }
    /* いいね数でソートして伸びてるポストTOP10 */
    allPosts.sort((a,b)=> (b.likes||0) - (a.likes||0));
    const top = allPosts.slice(0, 10);
    out.innerHTML = '<div class="desc" style="margin:6px 0">伸びてるポスト'+top.length+'件。各ポストにリプ案を生成中…</div>';

        let reps = text.split(/\n?===+\n?/).map(s=>s.trim()).filter(s=>s.length>2 && !/^(承知|了解)/.test(s));
        reps.slice(0, perPost).forEach(rep => {
          const rWrap = document.createElement("div"); rWrap.style.cssText = "background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px;margin-top:6px";
          const rTxt = document.createElement("div"); rTxt.style.cssText="font-size:13px;line-height:1.5;white-space:pre-wrap"; rTxt.textContent = rep;
          rWrap.appendChild(rTxt);

          const go = document.createElement("a"); go.className="mini cyan"; go.textContent="↗ ポストに飛ぶ"; go.href = p.url || ("https://x.com/"+p._author); go.target="_blank";
          go.style.cssText="text-decoration:none;display:inline-block;padding:6px 10px;border-radius:8px";
          acts.appendChild(cp); acts.appendChild(go); rWrap.appendChild(acts);
          repBox.appendChild(rWrap);
        });
      } catch(e) { repBox.innerHTML = '<div class="err">'+e.message+'</div>'; }

    goBtn.disabled = false; goBtn.textContent = "💎 伸びてるポストを取得してリプ量産";
  };

  /* リプ生成プロンプト */
  function replyFactoryPrompt(postText, n) {
    return `次のXのポストに対する「リプライ(返信)」を${n}案作る。\n`
      + `\n【相手のポスト】\n${postText}\n`
      + personaClause()
      + `\n【リプの狙い】\n`
      + `- このポストを見た人や投稿主に「お、いいこと言うな」と思わせて、プロフィールを見てもらいフォローにつなげる\n`
      + `- 投稿主への共感・補足・自分の体験・気の利いたひと言など、自然で感じのいいリプ\n`
      + `\n【ルール】\n`
      + `- 宣伝・売り込み・リンク貼りは絶対しない(リプ欄で嫌われる)。あくまで自然な会話\n`
      + `- 媚びすぎ・テンプレ褒め(「素敵です!」だけ等)はNG。中身のある一言\n`
      + `- 相手を否定・論破しない。感じよく\n`
      + `- 設定された文体・性格そのまま。1案40〜80字くらい、長すぎない\n`
      + `- 絵文字は使いすぎない\n`
      + `\n出力形式(厳守): 前置きなし。${n}案を「===」だけの行で区切って本文のみ。`;
  }
};

    const xLen = (s) => {

    };

  /* GAS呼び出し(引数付き) */
  async function fetchYahooArg(action, extra) {
    const { data: sess } = await sb.auth.getSession();
    if (!sess.session) throw new Error("ログインが切れた。リロードして。");
    const res = await fetch(GAS_URL, {
      method: "POST", headers: { "Content-Type": "text/plain" },
      body: JSON.stringify(Object.assign({ auth: sess.session.access_token, action }, extra || {})),
    });
    return await res.json();
  }

      + `- 自分の知識・記憶・想像を足さない(誰が誰で、どこ出身で、過去がどう…等を勝手に補わない)\n`

      return "\n【このアカウントの文体・性格(必ず再現)】\n" + CFG.origProfile.trim() + "\n";

  }

  /* トレンドワード → まず検索で内容を確認し、その話題に対する"自分の感想・意見"を投稿3案。
     ニュース説明・読み上げは禁止。前置きも書かせない。 */
  function buzzPromptForTrend(tw, shuffle) {
    return `「${tw}」は今まさにXでトレンドになっているワード。\n`
      + `【最初に必ずやること】Web検索して、「${tw}」が"今日・直近"何の話題でトレンドになっているのか、正確な事実を確認する。複数の検索結果で内容を裏取りする。\n`
      + `古い情報や別の同名トピックと混同しないこと。あくまで"今トレンドになっている理由"を掴む。\n`

      + `この3つを説明口調にならないよう1つの自然なつぶやきに溶け込ませる。\n`
      + `\n【お手本の形】「○○(固有名詞)が△△(出来事)って時点でめっちゃ熱い🔥 □□(感想)」\n`
      + `\n【絶対NG】\n`
      + `- 検索で確認できていない内容を書く(例: 番組名・金額・人物などを推測で書く)。確信が持てない事実は書かない\n`
      + `- 事実報告だけで感想が無い / 「正直この人見てると〜」のように何の話か分からない\n`
      + `- 「9割の人が〜」「実は〜なの」みたいな空っぽの煽り / 知ったかぶり / 誹謗中傷・決めつけ\n`
      + `\n【話題に応じたトーン】\n`
      + `・事件/事故/訃報/社会問題 → 茶化し・煽りNG。誠実で人に「たしかに」と思わせる本音や視点\n`
      + `・芸能/スポーツ/エンタメ → 共感・ツッコミ・素直な気持ちでOK\n`
      + `\n設定された文体・性格そのまま。業種の宣伝に着地させない。\n`
      + `【字数】各案140字以内。\n`

  /* 人気ポスト → その型を真似た文体そのままのバズ投稿3案プロンプト */
  function buzzPromptForPost(srcText, shuffle) {
    const biz = (CFG.bizType && CFG.bizType.trim()) ? CFG.bizType.trim() : "";
    const bizLine = biz
      ? `\n【あなたの事業】「${biz}」。3案すべてこの事業に関係する、具体的で中身のある投稿にする。Web制作・マーケなど無関係な業種の話は絶対に書かない。\n`
      : `\n【注意】事業設定が未入力。当たり障りのない一般的な内容ではなく、具体的で実体験に基づく投稿にする。\n`;
    return `次のバズってる人気ポストがなぜ伸びたか(フックの作り方・話の運び・読後感)を分析し、その“伸ばし方”だけを参考に、自分の投稿を【3案】作る。\n`
      + `参考ポスト(これは別人の別業種の投稿。内容・話題は一切パクらず、伸ばし方の構造だけ参考にする): 「${srcText.slice(0,160)}」\n`
      + bizLine
      + personaClause()
      + `\n【最重要・これをやったら失敗】\n`
      + `- 参考ポストの話題(パチスロ・新台など)をそのまま使うのは禁止。あくまで自分の事業「${biz||"自分の事業"}」の話題で書く\n`
      + `- 「ここ大事だからね」「ここテストに出るよ」「実は〇〇が大事」「9割の人が」「ほぼ誰も気づいてない」のような、中身のない空っぽの煽り・もったいぶりは全部禁止\n`
      + `- 「〇〇」と伏せて具体を書かない穴埋め文は禁止。必ず具体的な中身を書く\n`
      + `\n条件:\n- 読んだ人が「わかる」「なるほど」と思える、具体的で中身のある投稿にする\n`
      + `- この人の素の文体・性格で書く。自分の事業の実体験・本音ベースで\n`
      + `- 炎上・下品はNG。各案140字以内\n`
      + (shuffle ? `- 前回とは全く違う切り口で新鮮な3案にする\n` : "")
      + `出力形式(厳守): 3案を「===」だけの行で区切る。各案は本文のみ。前置き・案番号・説明は書かない。`;
  }

  /* バズ投稿3案を出すボタン(シャッフル付き)。promptFn(shuffle)がプロンプトを返す。
     useSearch=true でWeb検索して内容確認(トレンド用)。 */
  function buzzTransformBtn(card, label, promptFn, useSearch, trendWord) {
    const btn = document.createElement("button"); btn.className = "mini cyan"; btn.textContent = label;
    const out = document.createElement("div");
    const run = async (shuffle) => {
      btn.disabled = true; btn.textContent = shuffle ? "作り直し中…" : (useSearch ? "ニュースと照合中…" : "生成中…"); out.innerHTML = "";
      try {
        if (!(useSearch && trendWord)) {
          /* トレンド以外(型まね等)は従来通り */
          const r0 = await callAI(promptFn(shuffle), false, "haiku", false);
          const text0 = (typeof r0 === "string") ? r0 : r0.text;
          let cands0 = text0.split(/\n?===+\n?/).map(s=>s.trim())
            .map(s=> s.replace(/^(以下|こちら|では|それでは).*?[:：]\s*/,"").trim())
            .filter(s=>s.length>5 && !/^(承知|了解|分かりました)/i.test(s));
          renderCands(cands0);
          btn.disabled=false; btn.textContent=label; return;
        }
        /* トレンド: Yahoo!ニュースを取得して関連ニュースを探す */
        let newsList = [];
        try { const nr = await fetchYahoo("news"); newsList = (nr && nr.news) ? nr.news : []; } catch(e) {}
        if (!newsList.length) {
          out.innerHTML = '<div class="muted" style="padding:8px;font-size:12.5px">⚠️ 今ニュースが取得できんかった。少し待ってもう一回試して。</div>';
          btn.disabled=false; btn.textContent=label; return;
        }
        /* ワードに関連するニュースを絞る */
        const wordKey = trendWord.replace(/\s+/g,"");
        let related = newsList.filter(n => n.title.replace(/\s+/g,"").includes(wordKey));
        if (!related.length && trendWord.length >= 2) {
          related = newsList.filter(n => [...trendWord].filter(ch => /[一-龠ァ-ヶ]/.test(ch) && n.title.includes(ch)).length >= Math.min(2, trendWord.length));
        }
        /* 関連ニュースが無ければ、想像で書かず正直に「該当なし」を出す */
        if (!related.length) {
          out.innerHTML = '<div class="muted" style="padding:8px;font-size:12.5px">⚠️「'+esc(trendWord)+'」に関するニュースが今のYahoo!ニュースに見つからんかった。<br>世間でニュースになってない話題かも。別のワード(ニュース性のあるやつ)で試すのがおすすめ。</div>';
          btn.disabled=false; btn.textContent=label; return;
        }
        const useList = related.slice(0, 12);
        const newsText = useList.map((n,i)=>`${i+1}. ${n.title}\n   ${n.url}`).join("\n");
        const r = await callAI(buzzPromptForTrendWithNews(trendWord, newsText, shuffle), false, "sonnet", false);
        const text = (typeof r === "string") ? r : r.text;
        /* AIが「該当なし」と判断したら正直に伝える */
        if (/^\s*該当なし/.test(text.trim())) {
          out.innerHTML = '<div class="muted" style="padding:8px;font-size:12.5px">⚠️「'+esc(trendWord)+'」に合うニュースが無かった。世間で話題になってない可能性が高い。別のワードで試して。</div>';
          btn.disabled=false; btn.textContent=label; return;
        }
        let body = text.replace(/^.*?(します|作ります|を作成|3案[:：]|案です)[。:：]?\s*\n/m, "");
        let cands = body.split(/\n?===+\n?/).map(s=>s.trim())
          .map(s=> s.replace(/^(以下|こちら|では|それでは).*?[:：]\s*/,"").trim())
          .filter(s=>s.length>5 && !/^(承知|了解|分かりました|該当)/i.test(s));
        renderCands(cands);
      } catch(e) { out.innerHTML = '<div class="err">'+e.message+'</div>'; }
      btn.disabled = false; btn.textContent = label;
    };
    /* 候補を描画する共通処理 */
    function renderCands(cands) {
      if (!cands || !cands.length) { out.innerHTML = '<div class="muted" style="padding:6px">うまく作れんかった。もう一回試して。</div>'; return; }
      /* 本文先頭に紛れ込む「【案N】」「案N:」などの見出しを除去 */
      cands = cands.map(c => c.replace(/^【?案\s*\d+】?[:：]?\s*\n?/,"").trim()).filter(Boolean);
      out.innerHTML = "";
      const shufRow = document.createElement("div"); shufRow.style.cssText="margin:6px 0";
      const shuf = document.createElement("button"); shuf.className="mini"; shuf.textContent="🔀 3案ぜんぶ作り直す";
      shuf.onclick = () => run(true);
      shufRow.appendChild(shuf); out.appendChild(shufRow);
      cands.slice(0,3).forEach((c,i)=> renderTrendCard(out, c, "案"+(i+1)));
    }
    btn.onclick = () => run(false);
    card.appendChild(btn); card.appendChild(out);
    return btn;
  }

  /* Yahoo!ニュース照合版プロンプト: 実在ニュースの見出し+URLから選んで投稿 */
  function buzzPromptForTrendWithNews(tw, newsText, shuffle) {
    return `今Xでトレンドの「${tw}」について、X投稿を3案作る。\n`
      + `\n下は今のYahoo!ニュースの見出しとURLの一覧:\n${newsText}\n`
      + `\n【手順】\n`
      + `1. 上の一覧から「${tw}」に直接関連する"直近の"ニュースを1つ選ぶ\n`
      + `2. そのニュースに対する自分のリアルな感想・本音だけを書く\n`
      + `3. 各案の本文の最後に、選んだニュースのURLを改行して載せる(一覧の正確なURLをコピー。創作しない)\n`
      + `※「${tw}」に直接関連するニュースが一覧に無ければ、最初の行に「該当なし」とだけ書く(無理に関連付けない)\n`
      + personaClause()
      + `\n【最重要・AIっぽさを消す】\n`
      + `- 「〜になってるのは〜だからっしょ」のような"トレンド理由の説明"から入らない。理由説明は不要\n`
      + `- 作品やニュースのあらすじ・概要を説明しない(例「○○が△△をやっつける王道展開」みたいなWiki的説明は禁止)\n`
      + `- 友達にLINEで送るみたいな、リアルで具体的な一言の感想にする。例:「これ見ると毎年冬きたなって感じるわ」「結局これ何回見ても面白い」みたいな体温のある言葉\n`
      + `- きれいにまとめようとしない。ちょっと言い切ったり、素の感情を出す\n`
      + `\n【その他のNG】\n`
      + `- 推測・知ったかぶり(一覧のニュースに無いことを書かない)\n`
      + `- 「9割の人が〜」「実は〜なの」みたいな空っぽの煽り/誹謗中傷/決めつけ\n`
      + `- 事件・事故・訃報は茶化さず誠実に。芸能・スポーツ・エンタメは共感・ツッコミOK\n`
      + `\n本文は140字以内(URLは別・23字換算)。設定の文体・性格そのまま。\n`
      + (shuffle ? `前回と全く違う角度・感情で新鮮に。\n` : "")
      + `\n出力形式(厳守): 前置きなし。3案を「===」だけの行で区切り、各案は「本文(改行)URL」の形。`;
  }

  /* 項目カードに「事業に絡める」ボタンを付ける共通ヘルパー。
     genFn() は AIを呼んで「===」区切りの3案テキストを返す。 */
  function transformBtn(card, label, genFn) {
    const btn = document.createElement("button"); btn.className = "mini cyan"; btn.textContent = label;
    const out = document.createElement("div");
    btn.onclick = async () => {
      btn.disabled = true; btn.textContent = "生成中…"; out.innerHTML = "";
      try {
        const text = await genFn();
        const cands = text.split(/\n?===+\n?/).map(s=>s.trim()).filter(s=>s.length>5);
        if (!cands.length) { out.innerHTML = '<div class="muted" style="padding:6px">うまく作れんかった。もう一回試して。</div>'; }
        else cands.slice(0,3).forEach((c,i)=> renderTrendCard(out, c, "案"+(i+1)));
      } catch(e) { out.innerHTML = '<div class="err">'+e.message+'</div>'; }
      btn.disabled = false; btn.textContent = label;
    };
    card.appendChild(btn); card.appendChild(out);
    return btn;
  }

  /* ② Xの人気ポスト: まず一覧を見る → 気に入ったポストを事業に絡める */
  btnPop.onclick = async () => {
    btnPop.disabled = true; btnPop.textContent = "人気ポスト取得中…"; trOut.innerHTML = "";
    if (acct.value) await loadCfgFor(acct.value); else await loadCfgFor("_default_");
    try {
      /* 業種キーワードでtwitterapi.io検索(無ければYahooにフォールバックでなくYahooも使う) */

      /* いいね順 */

        const card = document.createElement("div");

        card.innerHTML = '<div style="font-size:11px;color:var(--accent2);margin-bottom:4px">'+(p.author?'@'+esc(p.author)+' · ':'')+'❤️ '+(p.likes||0).toLocaleString()+(p.retweets?' 🔁'+p.retweets:'')+(p.createdAt?' · '+timeAgo(p.createdAt):'')+'</div>'
          + '<div style="font-size:13px;line-height:1.5;margin-bottom:4px;white-space:pre-wrap">'+esc(p.text.slice(0,140))+(p.text.length>140?'…':'')+'</div>';

  /* ③ 人気ポストを引用して作る — 人気ポスト5件、各々にバズりそうな引用コメント+シャッフル */
  btnQuote.onclick = async () => {
    btnQuote.disabled = true; btnQuote.textContent = "人気ポスト取得中…"; trOut.innerHTML = "";
    if (acct.value) await loadCfgFor(acct.value); else await loadCfgFor("_default_");
    try {
      const j = await fetchYahoo("popular");
      const posts = (j && j.posts) ? j.posts : [];
      if (!posts.length) { trOut.innerHTML = '<div class="err">人気ポスト取得失敗。少し待って再挑戦して。</div>'; return; }
      trOut.innerHTML = '<div class="desc" style="margin:6px 0">引用したいポストを選ぶ(バズりそうな引用コメントをAIが作る・🔀で作り直し):</div>';
      const bizWord = (CFG.bizType && CFG.bizType.trim()) ? CFG.bizType.trim() : "この事業";

      /* バズる引用コメントを生成する共通関数(shuffleで毎回違う角度に) */
      async function genQuoteComment(srcText, shuffle) {
        const variant = shuffle ? "\n※前回と全く違う切り口・フックで、新鮮な別パターンにすること。" : "";
        const prompt =
          `次の人気ポストを引用リポストして【バズを狙う】。引用コメント(自分の一言)を作る。\n\n` +
          `引用元ポスト: 「${srcText.slice(0,200)}」\n` +
          personaClause() +
          `\nバズらせるコツ:\n- 引用元に「乗っかる/ツッコむ/共感する/逆を言う」など反応として面白くする\n- この人の素の文体・性格で書く。業種の宣伝に無理に着地させない\n- 強い一言・問いかけ・あるあるネタなど、リポストやいいねされやすい形\n- 炎上狙い・下品はNG\n` +
          `- 引用元URLは含めない(Xが自動で付ける)。コメント本文のみ\n- 100字以内\n前置き不要・コメント本文のみ出力。${variant}`;
        return (await callAI(prompt, false, "haiku")).trim();
      }

      posts.slice(0,5).forEach((p) => {
        const card = document.createElement("div");
        card.style.cssText = "background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;margin-top:8px";
        card.innerHTML = '<div style="font-size:12px;color:var(--muted);margin-bottom:6px">❤️ '+p.likes.toLocaleString()+'<br>'+esc(p.text.slice(0,90))+(p.text.length>90?'…':'')+'</div>';
        const useBtn = document.createElement("button"); useBtn.className="mini cyan"; useBtn.textContent="この投稿を引用する";
        const result = document.createElement("div");
        useBtn.onclick = async () => {
          useBtn.disabled = true; useBtn.textContent = "引用コメント生成中…";
          try {
            const comment = await genQuoteComment(p.text, false);
            result.innerHTML = "";
            const fullText = comment + "\n" + p.url;
            /* 編集可能カード + シャッフルボタン */
            const wrap = document.createElement("div");
            wrap.style.cssText = "border-top:1px solid var(--border);margin-top:8px;padding-top:8px";
            const tag = document.createElement("div"); tag.style.cssText="font-size:11px;color:var(--accent);margin-bottom:4px"; tag.textContent="💬 バズ狙いの引用コメント(末尾に引用元URL)";
            wrap.appendChild(tag);
            const box = document.createElement("textarea"); box.rows=5; box.value=fullText;
            box.style.cssText="width:100%;font-size:13px;line-height:1.6"; wrap.appendChild(box);
            const cnt = document.createElement("p"); cnt.className="desc"; cnt.style.margin="3px 0 6px";
            const upd=()=>{ cnt.textContent=box.value.length+"字"+(box.value.length>140?" ⚠140字超(送信時に自動スレッド)":""); }; box.oninput=upd; upd(); wrap.appendChild(cnt);
            const acts = document.createElement("div"); acts.className="acts"; wrap.appendChild(acts);
            /* シャッフル: 引用コメントだけ作り直す(URLは保持) */
            const shuf = document.createElement("button"); shuf.className="mini"; shuf.textContent="🔀 引用を作り直す";
            shuf.onclick = async () => {
              shuf.disabled=true; shuf.textContent="生成中…";
              try { const c2 = await genQuoteComment(p.text, true); box.value = c2 + "\n" + p.url; upd(); } catch(e){ alert(e.message); }
              shuf.disabled=false; shuf.textContent="🔀 引用を作り直す";
            };
            acts.appendChild(shuf);
            const send = document.createElement("button"); send.className="mini primary"; send.textContent="予約管理に送る";
            send.onclick = async () => {
              if (!acct.value) { alert("クライアント未登録"); return; }
              send.disabled=true;
              let when;
              if (trDate.value) { const [dp,tp]=trDate.value.split("T"); const [y,mo,da]=dp.split("-").map(Number); const [h,mi]=tp.split(":").map(Number); when=new Date(y,mo-1,da,h,mi,0,0); }
              else { when = new Date(Date.now()+10*60000); }
              const { error } = await saveScheduledPost({ screen_name: acct.value, text: box.value.trim(), scheduled_at: when.toISOString(), status: "draft" });
              if (error) { send.disabled=false; alert(error.message); return; }
              send.textContent="送った✓";
            };
            acts.appendChild(send);
            result.appendChild(wrap);
          } catch(e){ alert(e.message); }
          useBtn.disabled=false; useBtn.textContent="この投稿を引用する";
        };
        card.appendChild(useBtn); card.appendChild(result);
        trOut.appendChild(card);
      });
    } catch (e) { trOut.innerHTML = '<div class="err">'+e.message+'</div>'; }
    btnQuote.disabled = false; btnQuote.textContent = "💬 人気ポストを引用して作る";
  };

  addBtn.onclick = async () => {
    if (!addDay.value) { return; }
    addBtn.disabled = true; addBtn.textContent = "生成中…";
    if (acct.value) await loadCfgFor(acct.value); else await loadCfgFor("_default_");
    /* 入力値(datetime-local: "YYYY-MM-DDTHH:MM")から、秒を含めず正確な時刻を組み立てる */
    const [datePart, timePart] = addDay.value.split("T");
    const [yy, mo, da] = datePart.split("-").map(Number);
    const [hh0, mm0] = (timePart || "21:00").split(":").map(Number);
    const dt = new Date(yy, mo-1, da, hh0, mm0, 0, 0); /* 秒・ミリ秒を0に固定 */
    const fixedH = String(hh0).padStart(2,"0") + ":" + String(mm0).padStart(2,"0");
    const WD = ["日","月","火","水","木","金","土"];
    const p = {
      d: mo + "/" + da, w: WD[dt.getDay()],
      h: fixedH,
      _lockTime: true, /* 時刻を固定(genOneに上書きさせない) */
      g: "", t: addTheme.value || "おまかせ", y: "単発",
    };
    try {
      await genOne(p);
      addOut.innerHTML = "";
      /* 1本目本文(編集可) */
      const box = document.createElement("textarea");
      box.rows = 7; box.value = p._text;
      box.style.cssText = "width:100%;font-size:13.5px;line-height:1.7;margin-top:10px";
      addOut.appendChild(box);
      const cnt = document.createElement("p"); cnt.className = "desc"; cnt.style.margin = "4px 0 6px";
      const updCnt = () => { cnt.textContent = "1本目 "+box.value.length + "字" + (S.sns==="X" && box.value.length>140 ? " ⚠140字超(スレッドに分けて)" : ""); };
      box.oninput = updCnt; updCnt();
      addOut.appendChild(cnt);
      /* スレッド2本目以降(p._threadがあれば編集欄を出す) */
      let threadAreas = [];
      const threadWrap = document.createElement("div"); addOut.appendChild(threadWrap);
      function drawThreadAreas() {
        threadWrap.innerHTML = ""; threadAreas = [];
        const rest = (p._thread && p._thread.length > 1) ? p._thread.slice(1) : [];
        rest.forEach((t2, i) => {
          const lbl = document.createElement("p"); lbl.className="desc"; lbl.style.margin="6px 0 2px"; lbl.textContent = "🧵 "+(i+2)+"本目(リプ)";
          threadWrap.appendChild(lbl);
          const ta2 = document.createElement("textarea"); ta2.rows = 5; ta2.value = t2;
          ta2.style.cssText = "width:100%;font-size:13px;line-height:1.6";
          threadWrap.appendChild(ta2); threadAreas.push(ta2);
        });
      }
      drawThreadAreas();
      const acts = document.createElement("div"); acts.className = "acts"; addOut.appendChild(acts);
      const re = document.createElement("button"); re.className = "mini"; re.textContent = "🔀 作り直し";
      re.onclick = async () => { re.disabled = true; re.textContent = "生成中…"; await genOne(p, true); box.value = p._text; updCnt(); drawThreadAreas(); re.disabled = false; re.textContent = "🔀 作り直し"; };
      acts.appendChild(re);
      const send = document.createElement("button"); send.className = "mini primary"; send.textContent = "予約管理に送る";
      send.onclick = async () => {
        if (!acct.value) { addOut.innerHTML += '<div class="err">クライアント未登録</div>'; return; }
        send.disabled = true;
        const threadVals = threadAreas.map(t=>t.value.trim()).filter(Boolean);
        const { error } = await saveScheduledPost({
          screen_name: acct.value, text: box.value.trim(), scheduled_at: dt.toISOString(), status: "draft",
          thread: threadVals.length ? threadVals : null,
        });
        if (error) { send.disabled = false; addOut.innerHTML += '<div class="err">'+error.message+'</div>'; return; }
        send.textContent = threadVals.length ? "送った✓(🧵"+(threadVals.length+1)+"連投)" : "送った✓";
      };
      acts.appendChild(send);
    } catch (e) { addOut.innerHTML = '<div class="err">'+e.message+'</div>'; }
    addBtn.disabled = false; addBtn.textContent = "この日の投稿を1本作る";
  };

  const listEl = document.createElement("div"); el.appendChild(listEl);
  let lastPlan = null;

  function parseJSONArr(text) {
    let t = text.replace(/```json|```/g, "").trim();
    t = t.slice(t.indexOf("["));
    try { return JSON.parse(t); }
    catch (e) { const cut = t.lastIndexOf("}"); if (cut > 0) return JSON.parse(t.slice(0, cut + 1) + "]"); throw e; }
  }

  gen.onclick = async () => {
    out.clear(); out.err(""); listEl.innerHTML = "";
    gen.disabled = true; gen.textContent = "生成中…";
    /* 送信先アカウント専用の生成設定を適用(なければ共通) */
    if (acct.value) await loadCfgFor(acct.value); else await loadCfgFor("_default_");
    const today = new Date();
    const days = span.value === "週間" ? 7 : span.value === "15日" ? 15 : 30;
    const fmt = S.sns === "X" ? "140字以内" : "キャプション形式・ハッシュタグ5個";
    const timeRule = S.sns === "X"
      ? "Xの伸びやすい時間帯(通勤7-8時/昼12時/夜21-23時/深夜0-1時)を踏まえ、内容と客層に合う時間。夜営業の店の告知は夜〜深夜が強い"
      : "Instagramの伸びやすい時間帯(昼12時前後/夜20-22時)を踏まえる";
    /* 生成期間に該当する日本のイベントを集める(重複除外) */
    const evSet = {};
    for (let k = 1; k <= days; k++) {
      const dd = new Date(today); dd.setDate(dd.getDate() + k);
      const dstr = dd.getFullYear()+"-"+String(dd.getMonth()+1).padStart(2,"0")+"-"+String(dd.getDate()).padStart(2,"0");
      const e = pickJpEvent(dstr);
      if (e) evSet[e.name] = e.hint;
    }
    const evNames = Object.keys(evSet);
    const evClause = evNames.length
      ? `\n\n【時季のイベント】この期間は次の時季に当たる: ${evNames.map(n=>n+"("+evSet[n]+")").join(" / ")}。\nこれらを"一部の日だけ"自然に絡めてよい(毎日イベントネタにしない。全体の3〜4割程度に留め、露骨な宣伝にしない)。絡める場合も必ずこのアカウントの業種・事業の範囲内で扱い、業種外の話題は持ち込まない。絡めない日は通常の話題でよい。`
      : "";
    try {
      const text = await callAI(
        `今日は${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日。${S.sns}アカウント用に、明日から${days}日分の投稿計画を作れ。1日1投稿。` +
        (CFG.closedDays && CFG.closedDays.length ? `\n\n【定休日】${CFG.closedDays.join("・")}曜は定休日。その曜日には来店を促す営業告知を入れず、休業のお知らせや「明日から営業」等の定休日に合った内容にする。` : "") +
        `\n\n話題は事業内容(業種・店舗情報)に沿って自然に散らす。告知・豆知識・体験談・共感ネタなどをバランス良く配分し、店舗系の告知は週末に厚く。\n\n入れたいネタ・予定:\n${events.value||"特になし(業種に合うおまかせで)"}\n\nバズ狙いと告知をバランス良く。投稿時間は${timeRule}。` +
        evClause + `\n\n` +
        (span.value === "週間"
          ? `JSON配列のみ出力(マークダウン記法・前置き禁止): [{"d":"6/13","w":"土","g":"話題カテゴリ","h":"21:00","t":"テーマ","y":"投稿の型","x":"完成した投稿文(${fmt})"}] 7要素。${sc()}`
          : `JSON配列のみ出力(マークダウン記法・前置き禁止): [{"d":"6/13","w":"土","g":"話題カテゴリ","h":"21:00","t":"テーマ(15字以内)","y":"型(6字以内)"}] ${days}要素。完成文は不要。`)
      );
      const parsed = parseJSONArr(text);
      const filtered = parsed;
      /* 時刻(h)が空の日を補完。曜日や順番で散らす */
      const defaultTimes = S.sns === "X" ? ["21:00","22:00","12:00","20:00","23:00","19:00","21:30"] : ["20:00","21:00","12:00","19:00"];
      filtered.forEach((p, i) => {
        /* 全角コロン・空白を正規化 */
        if (p.h) p.h = String(p.h).replace(/：/g, ":").replace(/\s/g, "").trim();
        if (!p.h || !/^\d{1,2}:\d{2}$/.test(p.h)) { p.h = defaultTimes[i % defaultTimes.length]; }
      });
      /* 週間は完成文(x)をそのまま反映 */
      filtered.forEach((p) => { if (p.x) p._text = p.x; });

      /* 噂のシーシャBar: 週間の場合、頻度に応じて何本かをミックス紹介に差し替え */
      if (span.value === "週間" && isUwasaShisha(acct.value, CFG.bizName) && CFG.mixOn && (CFG.mixFreq||0) > 0) {
        const want = Math.round(filtered.length * (CFG.mixFreq/100));
        if (want > 0) {
          /* ランダムな位置をwant個選んでミックス投稿に差し替え */
          const idxs = filtered.map((_,i)=>i).sort(()=>Math.random()-0.5).slice(0, want);
          gen.textContent = "ミックス生成中…";
          for (const ix of idxs) {
            /* この投稿の日付を渡してシーンを噛み合わせる */
            const pd = planDate(filtered[ix]);
            const ds = pd.getFullYear()+"-"+String(pd.getMonth()+1).padStart(2,"0")+"-"+String(pd.getDate()).padStart(2,"0");
            const sc2 = shPickScene(null, ds);
            const r = await shMixPostText(null, sc2);
            if (r && r.thread) {
              filtered[ix]._text = r.thread[0];
              filtered[ix]._thread = r.thread; /* スレッド全体を保持 */
              filtered[ix].t = "ミックス("+(sc2?sc2.scene:"おすすめ")+")"+(r.thread.length>1?" 🧵":""); filtered[ix].y = "ミックス"; filtered[ix].g = "シーシャミックス";
              if (!filtered[ix].h || !/^\d{1,2}:\d{2}$/.test(filtered[ix].h)) filtered[ix].h = "21:00";
            }
          }
        }
      }
      renderPlan(filtered);

      /* 週間以外(15日・月間)は枠だけ来てるので、続けて全日分の本文を自動生成 */
      if (span.value !== "週間") {
        /* 噂のシーシャBar: 頻度ぶんの日を先に「ミックス日」として確定 */
        let mixDays = new Set();
        if (isUwasaShisha(acct.value, CFG.bizName) && CFG.mixOn && (CFG.mixFreq||0) > 0) {
          const want = Math.round(filtered.length * (CFG.mixFreq/100));
          const idxs = filtered.map((_,i)=>i).sort(()=>Math.random()-0.5).slice(0, want);
          mixDays = new Set(idxs);
        }
        gen.textContent = "本文を生成中… 0/" + filtered.length;
        for (let i = 0; i < filtered.length; i++) {
          await genOne(filtered[i], false, mixDays.has(i));
          gen.textContent = "本文を生成中… " + (i+1) + "/" + filtered.length;
          renderPlan(filtered);
        }
      }
    } catch (e) { out.err("生成に失敗。もう一度押して。(" + e.message.slice(0, 80) + ")"); }
    gen.disabled = false; gen.textContent = "カレンダーを生成する";
  };

  function planDate(p) {
    const [m, d] = p.d.split("/").map(Number);
    const [hh, mm] = (p.h || "21:00").split(":").map(Number);
    const now = new Date();
    let y = now.getFullYear();
    if (m < now.getMonth() + 1 - 1) y += 1; // 年またぎ対策
    return new Date(y, m - 1, d, hh, mm || 0);
  }

  function renderPlan(plan) {
    lastPlan = plan;
    listEl.innerHTML = "";
    if (S.sns === "X") {
      const bulk = document.createElement("button");
      bulk.className = "btn"; bulk.textContent = "完成してる分を全部 予約管理に送る";
      bulk.onclick = async () => {
        if (!acct.value) { out.err("クライアント未登録。先に認証リンクから登録して。"); return; }
        const targets = plan.filter((p) => p._text);
        if (!targets.length) { out.err("完成した投稿文がまだない。"); return; }
        bulk.disabled = true; bulk.textContent = "送信中…";
        let okCount = 0, errMsg = "";
        for (const p of targets) {
          const { error } = await saveScheduledPost({
            screen_name: acct.value, text: p._text, scheduled_at: planDate(p).toISOString(), status: "draft",
            thread: (p._thread && p._thread.length > 1) ? p._thread.slice(1) : null,
          });
          if (error) { errMsg = error.message; } else { okCount++; }
        }
        if (errMsg && okCount === 0) { out.err("送信エラー: " + errMsg); bulk.disabled = false; bulk.textContent = "完成してる分を全部 予約管理に送る"; return; }

    plan.forEach((p, i) => {
      const div = document.createElement("div"); div.className = "row";
      const meta = document.createElement("div"); meta.className = "meta";
      meta.innerHTML = '<span class="pill time">' + esc(p.d) + "(" + esc(p.w||"") + ")</span>" +
        (p.g ? '<span class="pill genre">' + esc(p.g) + "</span>" : "") +
        '<span class="pill type">' + esc(p.y||"") + "</span>";
      div.appendChild(meta);

      /* 時刻編集(送る前にカーソルで) */

      const clock = document.createElement("span"); clock.textContent = "⏰"; timeRow.appendChild(clock);
      const tIn = document.createElement("input"); tIn.type = "time"; tIn.value = (p.h||"21:00");
      tIn.style.cssText = "flex:0 0 auto;width:auto;padding:6px 10px;font-family:var(--mono)";
      tIn.onchange = () => { p.h = tIn.value; };
      timeRow.appendChild(tIn);
      div.appendChild(timeRow);

      const theme = document.createElement("div"); theme.style.cssText = "font-weight:700;margin-bottom:6px"; theme.textContent = p.t||"";
      div.appendChild(theme);

      const body = document.createElement("div"); div.appendChild(body);
      listEl.appendChild(div);

      const renderBody = () => {
        body.innerHTML = "";
        if (p._text) { drawText(body, p, p._text); }
        else {
          const hint = document.createElement("div"); hint.className = "muted"; hint.style.fontSize = "12.5px";
          hint.textContent = "(本文は生成中…/シャッフルで作り直せる)";

        }
      };

      /* p.h / p.t が変わった時に時刻欄・テーマ表示を同期 */
      const syncMeta = () => {
        tIn.value = p.h || "21:00";
        theme.textContent = p.t || "";
      };

      /* この日専用ツール: シャッフル(生成/作り直し) / 無料予想(競艇のみ) */
      const tools = document.createElement("div"); tools.className = "acts"; tools.style.marginTop = "8px";
      const shuf = document.createElement("button"); shuf.className = "mini cyan";
      shuf.textContent = p._text ? "🔀 シャッフル(作り直し)" : "✍ 投稿文を作る";
      shuf.onclick = async () => { shuf.disabled = true; shuf.textContent = "生成中…"; await genOne(p, !!p._text); shuf.disabled = false; shuf.textContent = "🔀 シャッフル(作り直し)"; syncMeta(); renderBody(); };
      tools.appendChild(shuf);
      /* 生成設定の「業種」に競艇/ボートが入ってる時だけ無料予想ボタンを出す */

        yosou.onclick = async () => { yosou.disabled = true; yosou.textContent = "予想生成中…"; await genYosou(p); yosou.disabled = false; yosou.textContent = "🚤 無料予想"; syncMeta(); renderBody(); };

      renderBody();
