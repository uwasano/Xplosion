    "選んだアカウントの業種・性格に沿った投稿計画+バズりやすい推奨時間付き。完成文はそのまま予約に送れる。",
    ["送信先アカウントと期間を選ぶ","入れたいネタがあれば書く(任意)","生成→「予約管理に送る」→GOで自動投稿確定"]);

  fld(el, "期間");
  const span = chipsSingle(el, ["週間","15日","月間"], "週間");
  fld(el, "予約送信先アカウント(Xのみ)");
  const acct = document.createElement("select"); el.appendChild(acct);
  S.clients.filter((c)=>c.status==="active").forEach((c)=>{ const o=document.createElement("option"); o.value=c.screen_name; o.textContent="@"+c.screen_name; acct.appendChild(o); });
  if (!acct.options.length) { const o=document.createElement("option"); o.textContent="(クライアント未登録)"; o.value=""; acct.appendChild(o); }
  acct.value = S.activeAccount;
  acct.onchange = async () => {
    /* まずキャッシュから即座に切替→ボタン表示を即更新 */
    const hit = loadCfgSync(acct.value || "_default_");
    updateYosouVisibility();
    if (!hit) { await loadCfgFor(acct.value || "_default_"); updateYosouVisibility(); }
    if (lastPlan) renderPlan(lastPlan);
  };
  const acctHint = document.createElement("p"); acctHint.className = "desc"; acctHint.style.margin = "6px 0 0";
  acctHint.textContent = "選んだアカウントの「生成設定」(性格・絵文字・無料予想の有無など)で文章が作られる。";
  el.appendChild(acctHint);
  fld(el, "店・事業の予定やネタ(任意)");

  const gen = runBtn(el, "カレンダーを生成する");
  const out = outArea(el);

  /* 今日/明日の無料予想ボタン(業種が競艇/ボートのアカウントの時だけ表示) */
  const yosouFld = document.createElement("div");
  yosouFld.style.cssText = "margin-top:12px";
  yosouFld.style.display = "none"; // 既定は非表示。判定で出す
  const btnRow = document.createElement("div"); btnRow.style.cssText = "display:flex;flex-direction:column;gap:8px"; yosouFld.appendChild(btnRow);
  const todayBtn = document.createElement("button"); todayBtn.className = "btn"; todayBtn.style.cssText = "margin:0"; todayBtn.textContent = "🚤 人気順で今日の予想";
  btnRow.appendChild(todayBtn);
  const scoreBtn = document.createElement("button"); scoreBtn.className = "btn"; scoreBtn.style.cssText = "margin:0;background:linear-gradient(135deg,#00e5ff,#22c55e)"; scoreBtn.textContent = "🎯 直前スコアで今日の予想";
  btnRow.appendChild(scoreBtn);
  const statsBtn = document.createElement("button"); statsBtn.className = "mini"; statsBtn.textContent = "📊 ロジック的中率を比較する";
  btnRow.appendChild(statsBtn);
  const yosouOut = document.createElement("div"); yosouFld.appendChild(yosouOut);
  el.appendChild(yosouFld);

  statsBtn.onclick = async () => {
    yosouOut.innerHTML = "";
    /* 期間切り替えタブ */
    const tabRow = document.createElement("div"); tabRow.style.cssText = "display:flex;gap:8px;margin-top:10px";
    const periods = [["週間",7],["月間",30]];
    let curDays = 7;
    const tabBtns = [];
    const statBox = document.createElement("div"); 
    periods.forEach(([lbl,dys]) => {
      const b = document.createElement("button"); b.className = "mini";
      const paint = () => { b.style.cssText = "flex:1;padding:8px;border-radius:8px;font-weight:700;" + (curDays===dys?"background:rgba(0,229,255,.18);color:var(--accent2);border:1px solid var(--accent2)":"background:transparent;color:var(--muted);border:1px solid var(--border)"); };
      b.textContent = lbl + "(" + (dys===7?"7日":"30日") + ")"; paint();
      b.onclick = () => { curDays = dys; tabBtns.forEach(x=>x.paint()); renderStats(dys); };
      tabBtns.push({b,paint}); tabRow.appendChild(b);
    });
    yosouOut.appendChild(tabRow);
    yosouOut.appendChild(statBox);

    async function renderStats(days) {
      statBox.innerHTML = '<div class="muted" style="padding:10px">集計中…</div>';
      try {
        const acc = acct.value || null;
        const j = await gasFetch_("predStats", { screen_name: acc || undefined, days });
        const stats = (j && j.stats) ? j.stats : [];
        const NAME = { popular:"人気順シンプル", score:"直前スコア厳選" };
        const periodLabel = days===7 ? "週間(7日)" : "月間(30日)";
        const fmt = (iso) => { if(!iso) return "—"; const d=new Date(iso); return (d.getMonth()+1)+"/"+d.getDate()+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); };
        if (!stats.length) {
          statBox.innerHTML = '<div class="card" style="padding:12px;font-size:12.5px;line-height:1.7;margin-top:8px">'+periodLabel+'はまだ確定した予想結果がない。<br>'
            + '結果待ち(未確定): <b>'+(j.pending||0)+'件</b><br>'
            + '🔍 結果確認の最終実行: <b>'+fmt(j.lastCheck)+'</b><br><br>'
            + '予想を投稿してレース結果が出た後、1日6回(13〜0時)自動で的中をチェックする。人気順・直前スコアの両オートをONにすると比較データが貯まる。</div>';
          return;
        }
        let h = '<div class="card" style="padding:12px;margin-top:8px"><div style="font-weight:700;margin-bottom:8px">📊 '+periodLabel+'のロジック成績</div>';
        stats.forEach(s => {
          h += '<div style="border-top:1px solid var(--border);padding:8px 0"><div style="font-weight:700;color:var(--accent2)">'+(NAME[s.logic]||s.logic)+'</div>'
            + '<div style="font-size:13px;margin-top:2px">的中率 <b>'+s.hitRate+'%</b>　回収率 <b style="color:'+(s.roi>=100?"#33cc88":"#ff8866")+'">'+s.roi+'%</b>　<span class="muted">('+s.hits+'/'+s.races+'レース)</span></div></div>';
        });
        h += '<div style="border-top:1px solid var(--border);margin-top:6px;padding-top:8px;font-size:11.5px" class="muted">'
          + '🔍 結果確認の最終実行: <b style="color:var(--ink)">'+fmt(j.lastCheck)+'</b><br>'
          + '結果待ち(未確定): '+(j.pending||0)+'件'+((j.gaveUp||0)?' / 確認できず打ち切り: '+j.gaveUp+'件':'')+'<br>'
          + '※結果は1日6回(13〜0時)自動で確認・監視。</div>';
        h += '<div class="desc" style="margin-top:8px;font-size:11px">回収率100%超えが勝ち。レース数が増えるほど信頼できる。100〜300レース貯まったら勝ってる方をデフォルトに。</div></div>';
        statBox.innerHTML = h;
      } catch(e){ statBox.innerHTML = '<div class="err">'+esc(e.message)+'</div>'; }
    }
    renderStats(7);
  };

  /* 競艇/ボート業種の時だけ無料予想を表示。アカウント切替のたびに呼ぶ */
  function updateYosouVisibility() {
    const isBoat = /競艇|ボートレース|ボート/.test(CFG.bizType || "");
    yosouFld.style.display = isBoat ? "block" : "none";
    if (!isBoat) yosouOut.innerHTML = ""; // 非競艇に切り替えたら結果も消す
  }
  /* 初期表示: キャッシュがあれば即判定、なければ通信 */
  (async () => {
    const hit = loadCfgSync(acct.value || "_default_");
    updateYosouVisibility();
    if (!hit) { await loadCfgFor(acct.value || "_default_"); updateYosouVisibility(); }
  })();

  {
    const runYosou = async (btn, label, logic) => {
      btn.disabled = true; const orig = btn.textContent; btn.textContent = "生成中…(検索)";
      if (acct.value) await loadCfgFor(acct.value); else await loadCfgFor("_default_");
      /* 念のため再判定: 競艇業種でなければ中止 */
      if (!/競艇|ボートレース|ボート/.test(CFG.bizType || "")) { updateYosouVisibility(); btn.disabled = false; btn.textContent = orig; return; }
      const base = new Date();
      if (label === "明日") base.setDate(base.getDate() + 1);
      const WD = ["日","月","火","水","木","金","土"];
      const p = {
        d: (base.getMonth()+1) + "/" + base.getDate(), w: WD[base.getDay()],
        h: "11:00", g: "", t: label + "の無料予想", y: "予想",
        _logicReq: logic || "popular",
      };
      try {
        await genYosou(p, label);
        /* 明日の予想は今日の夜に告知投稿する(投稿日を今日に) */
        if (p._postToday) {
          const t = new Date();
          const WD = ["日","月","火","水","木","金","土"];
          p.d = (t.getMonth()+1) + "/" + t.getDate(); p.w = WD[t.getDay()];
        }
        yosouOut.innerHTML = "";
        /* GASでレース取得に失敗した場合はエラーコードを出して終了 */
        if (p._raceErr) {
          const ebox = document.createElement("div");
          ebox.style.cssText = "font-size:13px;line-height:1.7;white-space:pre-wrap;background:rgba(255,77,109,.08);border:1px solid var(--bad);border-radius:10px;padding:10px 12px;margin-top:10px;color:var(--bad)";
          ebox.textContent = "⚠ " + p._raceErr + "\n\n(GASを最新コードで再デプロイしたか確認。それでも出る場合はこのコードを伝えて)";
          yosouOut.appendChild(ebox);
          btn.disabled = false; btn.textContent = orig;
          return;
        }
        const LOGIC_NAME = { popular:"人気順シンプル", score:"直前スコア厳選" };
        if (p._logic && LOGIC_NAME[p._logic]) {
          const badge = document.createElement("div"); badge.style.cssText = "margin-top:10px;font-size:12px;color:var(--accent2)";
          badge.textContent = "🧠 使用ロジック: " + LOGIC_NAME[p._logic] + (((CFG.yosouLogic||"compare")==="compare") ? "(自動比較中・両方の成績を記録)" : "");
          yosouOut.appendChild(badge);
        }
        const box = document.createElement("div");
        box.style.cssText = "font-size:13.5px;line-height:1.7;white-space:pre-wrap;background:rgba(0,229,255,.04);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-top:10px";
        box.textContent = p._text; yosouOut.appendChild(box);
        const info = document.createElement("p"); info.className = "desc"; info.style.margin = "6px 0 0";
        const setInfo = () => {
          if (p._postToday) info.textContent = "明日のレース予想を今夜 " + (p.h||"21:00") + " に告知投稿(締切" + (p._deadline||"要確認") + ")。";
          else if (p._deadline) info.textContent = "投稿時刻は締切" + p._deadline + "の15分前(" + (p.h||"?") + ")に自動設定。";
          else info.textContent = "⚠ 締切時刻が取れなかった。下の欄に正しい締切を入れて(15分前に自動設定)。";
        };
        setInfo();
        if (!p._deadlineUnknown && !p._postToday) info.style.color = "var(--muted)";
        else if (p._deadlineUnknown && !p._postToday) info.style.color = "var(--bad)";
        yosouOut.appendChild(info);

        /* 締切時刻の手入力(検索が外れた時の修正用) */
        const dlRow = document.createElement("div"); dlRow.style.cssText = "display:flex;align-items:center;gap:8px;margin-top:8px";
        const dlLbl = document.createElement("span"); dlLbl.className = "desc"; dlLbl.textContent = "締切を直す:"; dlRow.appendChild(dlLbl);
        const dlIn = document.createElement("input"); dlIn.type = "time"; dlIn.value = p._deadline || "";
        dlIn.style.cssText = "flex:0 0 auto;width:auto;padding:6px 10px;font-family:var(--mono)";
        dlIn.onchange = () => {
          if (!/^\d{1,2}:\d{2}$/.test(dlIn.value)) return;
          p._deadline = dlIn.value; p._deadlineUnknown = false;
          if (!p._postToday) {
            const [hh, mm] = dlIn.value.split(":").map(Number);
            let total = hh*60+mm-15; if (total<0) total = hh*60+mm;
            p.h = String(Math.floor(total/60)).padStart(2,"0")+":"+String(total%60).padStart(2,"0");
          }
          info.style.color = "var(--muted)"; setInfo();
        };
        dlRow.appendChild(dlIn);
        yosouOut.appendChild(dlRow);

        const acts = document.createElement("div"); acts.className = "acts"; yosouOut.appendChild(acts);
        const re = document.createElement("button"); re.className = "mini"; re.textContent = "🔀 作り直し";
        re.onclick = async () => { re.disabled = true; await genYosou(p, label); if (p._postToday) { const t=new Date(); const WD=["日","月","火","水","木","金","土"]; p.d=(t.getMonth()+1)+"/"+t.getDate(); p.w=WD[t.getDay()]; } box.textContent = p._text; dlIn.value = p._deadline || ""; info.style.color = p._deadlineUnknown && !p._postToday ? "var(--bad)" : "var(--muted)"; setInfo(); re.disabled = false; };
        acts.appendChild(re);
        const send = document.createElement("button"); send.className = "mini primary"; send.textContent = "予約管理に送る";
        send.onclick = async () => {
          if (!acct.value) { yosouOut.innerHTML += '<div class="err">クライアント未登録</div>'; return; }
          send.disabled = true;
          const dt = planDate(p);
          const { error } = await saveScheduledPost({
            screen_name: acct.value, text: p._text, scheduled_at: dt.toISOString(), status: "draft",
          });
          if (error) { send.disabled = false; yosouOut.innerHTML += '<div class="err">'+error.message+'</div>'; return; }
          send.textContent = "送った✓";
        };
        acts.appendChild(send);
      } catch (e) { yosouOut.innerHTML = '<div class="err">'+e.message+'</div>'; }
      btn.disabled = false; btn.textContent = orig;
    };
    todayBtn.onclick = () => runYosou(todayBtn, "本日", "popular");
    scoreBtn.onclick = () => runYosou(scoreBtn, "本日", "score");
  }

  /* 特定日に1本だけ追加(空いた日の穴埋め用) */

  trBtnRow.appendChild(btnTrend); trBtnRow.appendChild(btnPop); trBtnRow.appendChild(btnQuote); trBtnRow.appendChild(btnEnjou);

  /* GAS経由でYahooデータ取得 */
  async function fetchYahoo(action) {
    const { data: sess } = await sb.auth.getSession();
    if (!sess.session) throw new Error("ログインが切れた。リロードして。");
    const res = await fetch(GAS_URL, {
      method: "POST", headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ auth: sess.session.access_token, action }),
    });
    return await res.json();
  }

  /* 生成結果を1件、編集+送信できるカードにして返す */
  function renderTrendCard(host, initialText, label, regenFn) {
    const wrap = document.createElement("div");
    wrap.style.cssText = "background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;margin-top:8px";
    if (label) { const tag = document.createElement("div"); tag.style.cssText="font-size:11px;color:var(--accent);margin-bottom:4px"; tag.textContent=label; wrap.appendChild(tag); }
    const box = document.createElement("textarea"); box.rows = 5; box.value = initialText;
    box.style.cssText = "width:100%;font-size:13px;line-height:1.6"; wrap.appendChild(box);
    const cnt = document.createElement("p"); cnt.className="desc"; cnt.style.margin="3px 0 6px";
    /* Xの字数: URLは何文字でも23字換算。実効字数で判定 */
    const xLen = (s) => {
      let t = s, used = 0;
      t = t.replace(/https?:\/\/[^\s]+/g, () => { used += 23; return ""; });
      return t.length + used;
    };
    const upd = () => { const n = xLen(box.value); cnt.textContent = n+"字"+(n>140?" ⚠140字超。短くするのがおすすめ(URLは23字換算)":" (URLは23字換算)"); };
    box.oninput = upd; upd(); wrap.appendChild(cnt);
    /* URLが含まれる時だけ「URLをツリー2つ目で投稿」オプションを出す */
    let urlToThread = false;
    const hasUrl = () => /https?:\/\//.test(box.value);
    const urlOptWrap = document.createElement("label");
    urlOptWrap.style.cssText = "display:flex;align-items:flex-start;gap:8px;font-size:12.5px;line-height:1.45;color:var(--muted);margin:4px 0 8px;cursor:pointer;width:100%";
    const urlChk = document.createElement("input"); urlChk.type = "checkbox";
    urlChk.style.cssText = "flex:0 0 auto;width:18px;height:18px;margin:1px 0 0;cursor:pointer";
    urlChk.onchange = () => { urlToThread = urlChk.checked; };
    const urlTxt = document.createElement("span");
    urlTxt.style.cssText = "flex:1 1 auto";
    urlTxt.textContent = "URLをツリー2つ目(リプ)で投稿する(本文を140字フル使える)";
    urlOptWrap.appendChild(urlChk);
    urlOptWrap.appendChild(urlTxt);
    const refreshUrlOpt = () => { urlOptWrap.style.display = hasUrl() ? "flex" : "none"; };
    refreshUrlOpt(); box.addEventListener("input", refreshUrlOpt);
    wrap.appendChild(urlOptWrap);
    const acts = document.createElement("div"); acts.className="acts"; wrap.appendChild(acts);
    const send = document.createElement("button"); send.className="mini primary"; send.textContent="これを予約管理に送る";
    send.onclick = async () => {
      if (!acct.value) { alert("クライアント未登録"); return; }
      send.disabled = true;
      let when;
      if (trDate.value) { const [dp,tp]=trDate.value.split("T"); const [y,mo,da]=dp.split("-").map(Number); const [h,mi]=tp.split(":").map(Number); when=new Date(y,mo-1,da,h,mi,0,0); }
      else { when = new Date(Date.now()+10*60000); }
      let mainText = box.value.trim();
      let thread = null;
      if (urlToThread && hasUrl()) {
        const m = mainText.match(/(https?:\/\/\S+)\s*$/);
        if (m) {
          const url = m[1];
          mainText = mainText.replace(/\n*\s*https?:\/\/\S+\s*$/, "").trim();
          thread = [mainText, url]; /* 1本目=本文, 2本目=URL */
        }
      }
      const rec = { screen_name: acct.value, text: mainText, scheduled_at: when.toISOString(), status: "draft" };
      if (thread) rec.thread = thread;
      const { error } = await saveScheduledPost(rec);
      if (error) { send.disabled=false; alert(error.message); return; }
      send.textContent = thread ? "送った✓(🧵URL別)" : "送った✓";
      /* 投稿した題材を記録(次回以降の被り防止)。本文先頭を題材として残す */
      try {
        const topic = mainText.replace(/\n+/g," ").replace(/https?:\/\/\S+/g,"").trim().slice(0,40);
        if (topic) await gasFetch_("logTopic", { screen_name: acct.value, kind: "manual", topic });
      } catch(e) {}
    };
    acts.appendChild(send);
    host.appendChild(wrap);
  }

  /* 🎯 リプハンターPRO: 自動監視で溜まった伸び中投稿を表示(アカウントごと) */
  let _hp = { mode: "proactive", tab: "now", items: {} };
  btnHunterPro.onclick = async () => {
    if (acct.value) await loadCfgFor(acct.value); else await loadCfgFor("_default_");
    _hp = { mode: "proactive", tab: "now", items: {} };
    await renderHunterPro();
  };

  function hpAgeMin(it) {
    const base = it.posted_at || it.created_at;
    if (!base) return 99999;
    return Math.max(0, Math.round((Date.now() - new Date(base).getTime()) / 60000));
  }
  function hpClassify(it) {
    const st = it.status || "new";
    if (st === "replied" || st === "skip") return "done";
    const m = hpAgeMin(it);
    if (m <= 60) return "now";
    if (m <= 1440) return "later";
    return "expired";
  }
  async function hpFetch(mode) {
    if (_hp.items[mode]) return _hp.items[mode];
    const action = mode === "proactive" ? "proactiveList" : "hunterList";
    const j = await gasFetch_(action, acct.value ? { screenName: acct.value } : {});
    _hp.items[mode] = (j && j.items) ? j.items : [];
    return _hp.items[mode];
  }
  async function hpMark(it, status) {
    try { await gasFetch_("hunterMark", { id: it.id, status: status }); it.status = status; } catch (e) {}
  }
  async function renderHunterPro() {
    trOut.innerHTML = '<div class="muted" style="padding:8px">読み込み中…</div>';
    let items;
    try { items = await hpFetch(_hp.mode); }
    catch (e) { trOut.innerHTML = '<div class="err">' + e.message + '</div>'; return; }
    trOut.innerHTML = "";

    /* モード切替 */
    const modeRow = document.createElement("div"); modeRow.style.cssText = "display:flex;gap:8px;margin:4px 0 10px";
    [["competitor", "🔭 競合ウォッチ"], ["proactive", "🎯 先回りリプ"]].forEach(([mv, lb]) => {
      const b = document.createElement("button"); b.className = "mini" + (_hp.mode === mv ? " cyan" : "");
      b.textContent = lb; b.style.cssText = "flex:1;padding:9px;border-radius:10px;font-weight:700";
      b.onclick = async () => { _hp.mode = mv; _hp.tab = "now"; await renderHunterPro(); };
      modeRow.appendChild(b);
    });
    trOut.appendChild(modeRow);

    const desc = document.createElement("p"); desc.className = "desc"; desc.style.margin = "0 0 8px";
    desc.textContent = _hp.mode === "proactive"
      ? "自分の客層が見てる『今伸び始めた投稿』に早く自然に絡む。初回は営業せず、まず存在を知ってもらうのが狙い。"
      : "登録した競合の『普段より伸びてる投稿』を多角的に判定して表示。会話に乗って自分を見てもらう。";
    trOut.appendChild(desc);

    /* タブ分け */
    const groups = { now: [], later: [], done: [] };
    items.forEach(it => { const c = hpClassify(it); if (groups[c]) groups[c].push(it); });
    groups.now.sort((a, b) => (b.chance_score || 0) - (a.chance_score || 0));
    groups.later.sort((a, b) => (b.chance_score || 0) - (a.chance_score || 0));

    const tabRow = document.createElement("div"); tabRow.style.cssText = "display:flex;gap:6px;margin-bottom:10px";
    [["now", "🔥 今すぐ", groups.now.length], ["later", "📥 あとで見る", groups.later.length], ["done", "✅ 対応済み", groups.done.length]].forEach(([tv, lb, n]) => {
      const b = document.createElement("button"); b.className = "mini" + (_hp.tab === tv ? " cyan" : "");
      b.textContent = lb + " " + n; b.style.cssText = "flex:1;padding:7px;border-radius:9px;font-size:12px";
      b.onclick = () => { _hp.tab = tv; renderHunterPro(); };
      tabRow.appendChild(b);
    });
    trOut.appendChild(tabRow);

    const list = groups[_hp.tab] || [];
    if (!list.length) {
      const freqMsg = _hp.mode === "proactive"
        ? "「設定 → 先回りリプ 自動チェック頻度」をONにして、業種・地域も入れると溜まる。"
        : "「設定 → 競合アカウント登録 ＋ 競合ウォッチ 監視回数」を設定すると溜まる。";
      const tabMsg = _hp.tab === "now" ? "60分以内の鮮度が高い候補がここに出る。" : (_hp.tab === "later" ? "60分を過ぎたけど引用や自社投稿のネタに使える候補がここに。" : "Xで返信／見送りした投稿がここに残る。");
      const note = document.createElement("div"); note.className = "muted"; note.style.cssText = "padding:10px;font-size:12.5px;line-height:1.6";
      note.innerHTML = "このタブは今カラ。<br>" + tabMsg + (_hp.tab !== "done" ? "<br>" + freqMsg : "");
      trOut.appendChild(note); return;
    }
    list.forEach(it => trOut.appendChild(hpCard(it)));
  }

  function hpCard(it) {
    const mode = _hp.mode;
    const m = hpAgeMin(it);
    const card = document.createElement("div");
    card.style.cssText = "background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px;margin-top:10px";
    const score = it.chance_score || 0;
    const scoreColor = score >= 70 ? "#3DFFA8" : (score >= 50 ? "#eab308" : "#7E8BA8");
    const scoreLabel = mode === "proactive" ? "先回りチャンス" : "伸び";
    let head = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">';
    head += '<span style="font-weight:800;font-size:15px;color:' + scoreColor + '">' + scoreLabel + ' ' + score + '%</span>';
    if (it.category) head += '<span style="font-size:11px;background:rgba(0,229,255,.12);color:var(--accent2);padding:2px 8px;border-radius:10px">' + esc(it.category) + '</span>';
    head += '<span style="font-size:11px;color:var(--muted);margin-left:auto">投稿後' + (m < 99999 ? m + "分" : "—") + '</span></div>';
    let stat = '<div style="font-size:11.5px;color:var(--accent2);margin-bottom:6px">@' + esc(it.competitor || "") + ' · ❤' + (it.likes || 0) + ' · 💬' + (it.replies || 0);
    if (mode === "competitor" && it.velocity) stat += ' · 🔥' + it.velocity + '/h';
    stat += '</div>';
    const body = '<div style="font-size:13px;line-height:1.55;margin-bottom:6px;white-space:pre-wrap">' + esc((it.tweet_text || "").length > 200 ? (it.tweet_text.slice(0, 200) + "…") : (it.tweet_text || "")) + '</div>';
    const reason = it.reason ? '<div style="font-size:11.5px;color:var(--muted);background:var(--bg);border-radius:8px;padding:6px 8px;margin-bottom:8px">💡 ' + esc(it.reason) + '</div>' : '';
    card.innerHTML = head + stat + body + reason;

    let ideas = it.reply_ideas;
    if (typeof ideas === "string") { try { ideas = JSON.parse(ideas); } catch (e) { ideas = []; } }
    if (!Array.isArray(ideas)) ideas = [];
    const labels = ["共感", "情報", "質問"];
    if (ideas.length) {
      ideas.slice(0, 3).forEach((rep, i) => {
        const w = document.createElement("div"); w.style.cssText = "background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px;margin-top:6px";
        w.innerHTML = '<div style="font-size:10.5px;color:var(--accent2);margin-bottom:3px">' + (labels[i] || ("案" + (i + 1))) + '</div><div style="font-size:13px;line-height:1.5;white-space:pre-wrap">' + esc(rep) + '</div>';
        const cp = document.createElement("button"); cp.className = "mini"; cp.textContent = "📋 コピー"; cp.style.marginTop = "6px";
        cp.onclick = () => { navigator.clipboard.writeText(rep); cp.textContent = "✓ コピーした"; setTimeout(() => cp.textContent = "📋 コピー", 1200); };
        w.appendChild(cp); card.appendChild(w);
      });
    } else {
      const repBox = document.createElement("div"); card.appendChild(repBox);
      makeHunterReplies(repBox, { text: it.tweet_text || "", url: it.tweet_url || "", _author: it.competitor || "", _qid: it.id });
    }

    const st = it.status || "new";
    if (st !== "replied" && st !== "skip") {
      const acts = document.createElement("div"); acts.style.cssText = "display:flex;gap:8px;margin-top:10px";
      const go = document.createElement("a"); go.className = "mini cyan"; go.textContent = "↗ Xで返信"; go.href = it.tweet_url || ("https://x.com/" + (it.competitor || "")); go.target = "_blank";
      go.style.cssText = "flex:1;text-align:center;text-decoration:none;padding:9px;border-radius:9px;font-weight:700";
      go.onclick = async () => { await hpMark(it, "replied"); setTimeout(() => renderHunterPro(), 500); };
      const skip = document.createElement("button"); skip.className = "mini"; skip.textContent = "見送り"; skip.style.cssText = "padding:9px 14px;border-radius:9px";
      skip.onclick = async () => { await hpMark(it, "skip"); renderHunterPro(); };
      acts.appendChild(go); acts.appendChild(skip); card.appendChild(acts);
    } else {
      const done = document.createElement("div"); done.style.cssText = "font-size:11px;color:var(--muted);margin-top:8px";
      done.textContent = st === "replied" ? "✅ Xで返信済み" : "➖ 見送り済み";
      card.appendChild(done);
    }
    return card;
  }

  async function makeHunterReplies(host, p) {
    const hbtn = document.createElement("button"); hbtn.className="mini cyan"; hbtn.textContent="この投稿にリプ(3案)";
    const hOut = document.createElement("div");
    let curTone = "丁寧";
    const run = async (shuffle) => {
      hbtn.disabled = true; hbtn.textContent = shuffle ? "作り直し中…" : "リプ生成中…"; hOut.innerHTML = "";
      try {
        const r = await callAI(hunterReplyPrompt(p.text, shuffle, curTone), false, "haiku", false);
        const text = (typeof r === "string") ? r : r.text;
        let reps = text.split(/\n?===+\n?/).map(s=>s.trim()).filter(s=>s.length>2 && !/^(承知|了解)/.test(s));
        if (!reps.length) { hOut.innerHTML='<div class="muted" style="padding:6px">作れんかった。もう一回。</div>'; }
        else {
          hOut.innerHTML = "";

            c.style.cssText = "padding:5px 10px;border-radius:14px;font-size:12px;"+(curTone===tn?"background:rgba(0,229,255,.18);color:var(--accent2);border:1px solid var(--accent2)":"background:transparent;border:1px solid var(--border)");
            c.onclick=()=>{ curTone=tn; run(false); };
            toneRow.appendChild(c);
          });
          hOut.appendChild(toneRow);
          const sh=document.createElement("button"); sh.className="mini"; sh.textContent="🔀 同じトーンで作り直す"; sh.style.cssText="margin:4px 0"; sh.onclick=()=>run(true); hOut.appendChild(sh);
          reps.slice(0,3).forEach(rep => {
            const w=document.createElement("div"); w.style.cssText="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px;margin-top:6px";
            const tx=document.createElement("div"); tx.style.cssText="font-size:13px;line-height:1.5;white-space:pre-wrap"; tx.textContent=rep; w.appendChild(tx);
            const acts=document.createElement("div"); acts.style.cssText="display:flex;gap:6px;margin-top:6px";
            const cp=document.createElement("button"); cp.className="mini"; cp.textContent="📋コピー"; cp.onclick=()=>{navigator.clipboard.writeText(rep); cp.textContent="✓"; setTimeout(()=>cp.textContent="📋コピー",1200);};
            const go=document.createElement("a"); go.className="mini cyan"; go.textContent="↗ポストに飛ぶ"; go.href=p.url||("https://x.com/"+p._author); go.target="_blank"; go.style.cssText="text-decoration:none;padding:6px 10px;border-radius:8px";
            acts.appendChild(cp); acts.appendChild(go); w.appendChild(acts); hOut.appendChild(w);
          });
        }
      } catch(e) { hOut.innerHTML='<div class="err">'+e.message+'</div>'; }
      hbtn.disabled=false; hbtn.textContent="この投稿にリプ(3案)";
    };
    hbtn.onclick=()=>run(false);
    host.appendChild(hbtn); host.appendChild(hOut);
  }

  function hunterReplyPrompt(postText, shuffle, tone) {
    const TONE_RULE = {
      "丁寧": "敬語で丁寧に。落ち着いた大人の言葉づかい。馴れ馴れしくしない。",
      "共感": "相手の気持ちに寄り添い、共感を示す。優しく柔らかい言葉。",
      "タメ口": "フランクなタメ口。ただし失礼・馴れ馴れしすぎはNG。親しみやすく。",
      "ツッコミ": "軽妙なツッコミ・ユーモアを一言。相手を不快にさせない範囲で、クスッとさせる。",
    };
    const rule = TONE_RULE[tone] || TONE_RULE["丁寧"];
    return `次のXのポストに対する「リプライ」を3案作る。これは投稿を見てる人の目に留まって、自分に興味を持ってもらうのが狙い。\n`
      + `\n【相手のポスト】\n${postText}\n`
      + `\n【トーン:「${tone||"丁寧"}」】${rule}\n`
      + `\n【絶対ルール・文体の統一】\n`
      + `- 1つのリプの中で敬語とタメ口を混ぜない。指定トーンで最初から最後まで統一する\n`
      + `- 「フォローしとくと損ないよ」「フォローしてね」等の“自分をフォローさせる誘導”は絶対NG。押し付けがましく嫌われる\n`
      + `- 宣伝・売り込み・リンク・自分語りのオチは禁止。あくまで相手の投稿への自然な反応\n`
      + `\n【書き方】\n`
      + `- まず相手の投稿内容にちゃんと反応する(相手への配慮が最優先)。いきなり自分の話をしない\n`
      + `- そのポストを見てる人に「お、この人いいこと言うな」と思わせる、中身のある一言\n`
      + `- テンプレ褒め(「素敵です!」だけ等)や、無関係な持論はNG\n`
      + `- 設定された性格は活かしつつ、上の指定トーンを最優先。1案40〜80字、絵文字は0〜1個\n`
      + (shuffle ? `- 前回と違う角度で\n` : "")
      + `\n出力形式(厳守): 前置きなし。3案を「===」だけの行で区切って本文のみ。`;
  }

  /* 炎上コメントボタン: 記事本文を取得 → その内容を踏まえてコメント3案 */
  function makeEnjouBtn(card, title, url) {
    const btn = document.createElement("button"); btn.className = "mini cyan"; btn.textContent = "この炎上にコメント(3案)";
    const out = document.createElement("div");
    const run = async (shuffle) => {
      btn.disabled = true; btn.textContent = shuffle ? "作り直し中…" : "記事を読んで生成中…"; out.innerHTML = "";
      try {
        /* まず記事本文を取得(中身を読んでから書く=事実誤認を防ぐ) */
        let bodyText = "";
        try { const br = await fetchYahooArg("articleBody", { url }); bodyText = (br && br.body) ? br.body : ""; } catch(e) {}
        const prompt = buzzPromptForEnjou(title, url, bodyText, shuffle);
        const r = await callAI(prompt, false, "sonnet", false);
        const text = (typeof r === "string") ? r : r.text;
        let cands = text.split(/\n?===+\n?/).map(s=>s.trim())
          .map(s=> s.replace(/^(以下|こちら|では|それでは).*?[:：]\s*/,"").trim())
          .filter(s=>s.length>5 && !/^(承知|了解|分かりました)/i.test(s));
        if (!cands.length) { out.innerHTML = '<div class="muted" style="padding:6px">うまく作れんかった。もう一回試して。</div>'; }
        else {
          out.innerHTML = "";
          const shufRow = document.createElement("div"); shufRow.style.cssText="margin:6px 0";
          const shuf = document.createElement("button"); shuf.className="mini"; shuf.textContent="🔀 3案ぜんぶ作り直す";
          shuf.onclick = () => run(true); shufRow.appendChild(shuf); out.appendChild(shufRow);
          cands.slice(0,3).forEach((c,i)=> renderTrendCard(out, c, "案"+(i+1)));
        }
      } catch(e) { out.innerHTML = '<div class="err">'+e.message+'</div>'; }
      btn.disabled = false; btn.textContent = "この炎上にコメント(3案)";
    };
    btn.onclick = () => run(false);
    card.appendChild(btn); card.appendChild(out);
  }

  /* GAS呼び出し(引数付き) */
  async function fetchYahooArg(action, extra) {
    const { data: sess } = await sb.auth.getSession();
    if (!sess.session) throw new Error("ログインが切れた。リロードして。");
    const res = await fetch(GAS_URL, {
      method: "POST", headers: { "Content-Type": "text/plain" },
      body: JSON.stringify(Object.assign({ auth: sess.session.access_token, action }, extra || {})),
    });
    return await res.json();
  }

  /* 炎上ニュース個別 → コメント投稿3案プロンプト(記事本文を踏まえる) */
  function buzzPromptForEnjou(title, url, bodyText, shuffle) {
    return `次の炎上系ニュースについて、X投稿を3案作る。\n`
      + `ニュース見出し:「${title}」\n`
      + (bodyText ? `\n【記事の本文(必ずこれを読んで事実を正確に把握してから書く)】\n${bodyText}\n` : "")
      + `\nニュースURL: ${url}\n`
      + personaClause()
      + `\n【最重要・記事の内容にそのまま沿う】\n`
      + `- 上の記事本文に書いてあることだけを踏まえてコメントする\n`
      + `- 自分の知識・記憶・想像を足さない(誰が誰で、どこ出身で、過去がどう…等を勝手に補わない)\n`
      + `- 記事に書いてないことは一切書かない。書いてある事実にだけ反応する\n`
      + `\n【書き方】\n`
      + `- この件への自分のリアルな本音・意見を書く(友達に話すような体温のある言葉)\n`
      + `- 【検索に乗せる】記事に出てくる固有名詞(人名・大会名・作品名・番組名など)を最低1つ本文に入れる。無いと検索に乗らずインプレが伸びない\n`
      + `- あらすじ・概要の説明から入らない。説明口調・要約は禁止\n`
      + `- 誹謗中傷・特定個人への過度な攻撃・決めつけはNG。冷静で「たしかに」と思わせる視点にする\n`
      + `- 「9割の人が〜」「実は〜なの」みたいな空っぽの煽りは禁止\n`
      + `- 各案の本文の最後に、上記のニュースURLを改行して載せる(そのままコピー・創作しない)\n`
      + `- 本文140字以内(URLは別・23字換算)。設定の文体・性格そのまま\n`
      + (shuffle ? `- 前回と全く違う角度・感情で新鮮に\n` : "")
      + `\n出力形式(厳守): 前置きなし。3案を「===」だけの行で区切り、各案は「本文(改行)URL」の形。`;

  /* 設定済みの文体・性格を文章化(プロンプトに差し込む) */
  function personaClause() {
    if (CFG.origProfile && CFG.origProfile.trim()) {
      return "\n【このアカウントの文体・性格(必ず再現)】\n" + CFG.origProfile.trim() + "\n";

    const toneMap = { "カジュアル":"フランクでフレンドリー", "丁寧":"丁寧で落ち着いた", "ノリ重視":"テンション高めでノリのいい", "クール":"クールで大人っぽい" };
    return "\n口調: " + (toneMap[CFG.tone] || "自然体な") + "感じ。絵文字は" + (CFG.emoji||"少なめ") + "。\n";
  }

  /* トレンドワード → まず検索で内容を確認し、その話題に対する"自分の感想・意見"を投稿3案。
     ニュース説明・読み上げは禁止。前置きも書かせない。 */
  function buzzPromptForTrend(tw, shuffle) {
    return `「${tw}」は今まさにXでトレンドになっているワード。\n`
      + `【最初に必ずやること】Web検索して、「${tw}」が"今日・直近"何の話題でトレンドになっているのか、正確な事実を確認する。複数の検索結果で内容を裏取りする。\n`
      + `古い情報や別の同名トピックと混同しないこと。あくまで"今トレンドになっている理由"を掴む。\n`
      + `そのうえで、その話題に【自分の感想・意見・気持ち】を乗せたX投稿を3案作る。\n`
      + personaClause()
      + `\n【本文に必ず入れる3要素】\n`
      + `1. トレンドワード「${tw}」(固有名詞そのもの)\n`
      + `2. 今回実際に起きたこと(検索で確認した"直近の事実"だけ。推測・想像・古い話は禁止)\n`
      + `3. 自分の感想・本音・ツッコミ(メイン)\n`
      + `この3つを説明口調にならないよう1つの自然なつぶやきに溶け込ませる。\n`
      + `\n【お手本の形】「○○(固有名詞)が△△(出来事)って時点でめっちゃ熱い🔥 □□(感想)」\n`
      + `\n【絶対NG】\n`
      + `- 検索で確認できていない内容を書く(例: 番組名・金額・人物などを推測で書く)。確信が持てない事実は書かない\n`
      + `- 事実報告だけで感想が無い / 「正直この人見てると〜」のように何の話か分からない\n`
      + `- 「9割の人が〜」「実は〜なの」みたいな空っぽの煽り / 知ったかぶり / 誹謗中傷・決めつけ\n`
      + `\n【話題に応じたトーン】\n`
      + `・事件/事故/訃報/社会問題 → 茶化し・煽りNG。誠実で人に「たしかに」と思わせる本音や視点\n`
      + `・芸能/スポーツ/エンタメ → 共感・ツッコミ・素直な気持ちでOK\n`
      + `\n設定された文体・性格そのまま。業種の宣伝に着地させない。\n`
      + `【絵文字・誤字】話題に合う絵文字だけ使う。話題と無関係な事業固有の絵文字(競艇の🚤など)を付けない。意味不明な文字・誤字(例「やっぽ」)を混ぜない。日本語として自然な文だけ出力。\n`
      + `【字数】各案140字以内。\n`
      + `【URL】本文にURLは書かない(URLはシステムが検索結果から自動で付ける)。本文は感想だけにする。\n`
      + (shuffle ? `前回とは全く違う角度・感情で新鮮な3案にする。\n` : "")
      + `\n出力形式(厳守): 前置き・説明は一切なし。3案を「===」だけの行で区切って本文のみ出力。`;
  }

  /* 人気ポスト → その型を真似た文体そのままのバズ投稿3案プロンプト */
  function buzzPromptForPost(srcText, shuffle, history) {

      : "";

      + `\n【元のバズ投稿】\n「${srcText.slice(0,220)}」\n`
      + avoid
      + personaClause()
      + `\n【やること】\n`
      + `- 元の投稿が言っている内容・話題・主張をそのまま活かして、表現と言い回しだけ自分の文体に変える\n`
      + `- 同じことを言ってる別の言い方の3パターンを作るイメージ\n`
      + `\n【絶対禁止・最重要】\n`
      + `- 元の投稿に書いてない事実・出来事・ニュースを勝手に作らない(捏造厳禁)。元が言ってないことは書かない\n`
      + `- 別の話題にすり替えない。元の投稿のテーマから外れない\n`
      + `- 「情報ソース貼っときました」「詳細はリンクをチェック」「詳しくはこちら👇」のような、リンクへの薄い誘導の“文章”は入れない(URLそのものは載せてOK。でも誘導の説明文は不要)\n`
      + `- 「ここ大事」「ブックマークしとくといいよ」「テストに出る」「実は〇〇が大事」「9割の人が」「要注目」のような空っぽの煽り・もったいぶり・薄い誘導は禁止\n`
      + `- 中身のない締めの一文(「詳しくは〜」「チェックしてね」だけ)で字数を埋めない。本文そのものに中身を持たせる\n`
      + `\n【書き方】\n`
      + `- 元の投稿のフックの強さ・話の運びは活かしつつ、自分の素の文体・性格で自然に\n`
      + `- 元の投稿にURLがあれば、そのURLは残してよい(ただし「リンク見てね」的な誘導文は付けない)\n`
      + `- 炎上・下品はNG。各案140字以内\n`
      + (shuffle ? `- 前回とは違う言い回しで新鮮な3案にする(内容・話題は元のまま)\n` : "")
      + `- 3案は互いに書き出し・言い回し・締め方を変える。同じパターンを3つ並べない\n`
      + `\n出力形式(厳守): 3案を「===」だけの行で区切る。各案は本文のみ。前置き・案番号・説明は書かない。`;
  }

  /* バズ投稿3案を出すボタン(シャッフル付き)。promptFn(shuffle)がプロンプトを返す。
     useSearch=true でWeb検索して内容確認(トレンド用)。 */
  function buzzTransformBtn(card, label, promptFn, useSearch, trendWord, initialHistory) {
    const btn = document.createElement("button"); btn.className = "mini cyan"; btn.textContent = label;
    const out = document.createElement("div");
    let history = (initialHistory && initialHistory.length) ? initialHistory.slice(-60) : [];
    const run = async (shuffle) => {
      btn.disabled = true; btn.textContent = shuffle ? "作り直し中…" : (useSearch ? "ニュースと照合中…" : "生成中…"); out.innerHTML = "";
      try {
        if (!(useSearch && trendWord)) {
          /* トレンド以外(型まね等)は従来通り。過去候補を渡して被らせない */
          const r0 = await callAI(promptFn(shuffle, history), false, "haiku", false);
          const text0 = (typeof r0 === "string") ? r0 : r0.text;
          let cands0 = text0.split(/\n?===+\n?/).map(s=>s.trim())
            .map(s=> s.replace(/^(以下|こちら|では|それでは).*?[:：]\s*/,"").trim())
            .filter(s=>s.length>5 && !/^(承知|了解|分かりました)/i.test(s));
          history = history.concat(cands0).slice(-12); /* 直近12件を記憶 */
          renderCands(cands0, true);
          btn.disabled=false; btn.textContent=label; return;
        }
        /* トレンド: Yahoo!ニュースを取得して関連ニュースを探す */
        let newsList = [];
        try { const nr = await fetchYahoo("news"); newsList = (nr && nr.news) ? nr.news : []; } catch(e) {}
        if (!newsList.length) {
          out.innerHTML = '<div class="muted" style="padding:8px;font-size:12.5px">⚠️ 今ニュースが取得できんかった。少し待ってもう一回試して。</div>';
          btn.disabled=false; btn.textContent=label; return;
        }
        /* ワードに関連するニュースを絞る */
        const wordKey = trendWord.replace(/\s+/g,"");
        let related = newsList.filter(n => n.title.replace(/\s+/g,"").includes(wordKey));
        if (!related.length && trendWord.length >= 2) {
          related = newsList.filter(n => [...trendWord].filter(ch => /[一-龠ァ-ヶ]/.test(ch) && n.title.includes(ch)).length >= Math.min(2, trendWord.length));
        }
        /* 関連ニュースが無ければ、想像で書かず正直に「該当なし」を出す */
        if (!related.length) {
          out.innerHTML = '<div class="muted" style="padding:8px;font-size:12.5px">⚠️「'+esc(trendWord)+'」に関するニュースが今のYahoo!ニュースに見つからんかった。<br>世間でニュースになってない話題かも。別のワード(ニュース性のあるやつ)で試すのがおすすめ。</div>';
          btn.disabled=false; btn.textContent=label; return;
        }
        const useList = related.slice(0, 12);
        const newsText = useList.map((n,i)=>`${i+1}. ${n.title}\n   ${n.url}`).join("\n");
        const r = await callAI(buzzPromptForTrendWithNews(trendWord, newsText, shuffle), false, "sonnet", false);
        const text = (typeof r === "string") ? r : r.text;
        /* AIが「該当なし」と判断したら正直に伝える */
        if (/^\s*該当なし/.test(text.trim())) {
          out.innerHTML = '<div class="muted" style="padding:8px;font-size:12.5px">⚠️「'+esc(trendWord)+'」に合うニュースが無かった。世間で話題になってない可能性が高い。別のワードで試して。</div>';
          btn.disabled=false; btn.textContent=label; return;
        }
        let body = text.replace(/^.*?(します|作ります|を作成|3案[:：]|案です)[。:：]?\s*\n/m, "");
        let cands = body.split(/\n?===+\n?/).map(s=>s.trim())
          .map(s=> s.replace(/^(以下|こちら|では|それでは).*?[:：]\s*/,"").trim())
          .filter(s=>s.length>5 && !/^(承知|了解|分かりました|該当)/i.test(s));
        renderCands(cands);
      } catch(e) { out.innerHTML = '<div class="err">'+e.message+'</div>'; }
      btn.disabled = false; btn.textContent = label;
    };
    /* 候補を描画する共通処理 */
    function renderCands(cands, stripUrls) {
      if (!cands || !cands.length) { out.innerHTML = '<div class="muted" style="padding:6px">うまく作れんかった。もう一回試して。</div>'; return; }
      /* 本文先頭の「【案N】」見出し除去。stripUrls=true(バズミラー等)ならURL/リンク誘導文も除去 */
      cands = cands.map(c => {
        let t = c.replace(/^【?案\s*\d+】?[:：]?\s*\n?/,"").trim();
        if (stripUrls) {
          /* URLは残す。「情報ソース貼っときました」等の薄い誘導文だけ消す */
          t = t.split("\n").filter(line => {
            const l = line.trim();
            if (/情報ソース.*(貼|はり)/.test(l)) return false;
            if (/^[👇👉⬇️🔗]*\s*詳しくは(こちら|リンク|下)[👇👉⬇️🔗\s]*$/.test(l)) return false;
            if (/^[👇👉⬇️🔗]*\s*詳細は(リンク|こちら).*(チェック|みて|見て)[👇👉⬇️🔗\s]*$/.test(l)) return false;
            if (/^(ソース|出典)は?(こちら|下|リンク)[👇👉⬇️🔗\s]*$/.test(l)) return false;
            return true;
          }).join("\n").replace(/\n{3,}/g,"\n\n").trim();
        }
        return t;
      }).filter(Boolean);
      out.innerHTML = "";
      const shufRow = document.createElement("div"); shufRow.style.cssText="margin:6px 0";
      const shuf = document.createElement("button"); shuf.className="mini"; shuf.textContent="🔀 3案ぜんぶ作り直す";
      shuf.onclick = () => run(true);
      shufRow.appendChild(shuf); out.appendChild(shufRow);
      cands.slice(0,3).forEach((c,i)=> renderTrendCard(out, c, "案"+(i+1)));
    }
    btn.onclick = () => run(false);
    card.appendChild(btn); card.appendChild(out);
    return btn;
  }

  /* Yahoo!ニュース照合版プロンプト: 実在ニュースの見出し+URLから選んで投稿 */
  function buzzPromptForTrendWithNews(tw, newsText, shuffle) {
    return `今Xでトレンドの「${tw}」について、X投稿を3案作る。\n`
      + `\n下は今のYahoo!ニュースの見出しとURLの一覧:\n${newsText}\n`
      + `\n【手順】\n`
      + `1. 上の一覧から「${tw}」に直接関連する"直近の"ニュースを1つ選ぶ\n`
      + `2. そのニュースに対する自分のリアルな感想・本音だけを書く\n`
      + `3. 各案の本文の最後に、選んだニュースのURLを改行して載せる(一覧の正確なURLをコピー。創作しない)\n`
      + `※「${tw}」に直接関連するニュースが一覧に無ければ、最初の行に「該当なし」とだけ書く(無理に関連付けない)\n`
      + personaClause()
      + `\n【最重要・AIっぽさを消す】\n`
      + `- 「〜になってるのは〜だからっしょ」のような"トレンド理由の説明"から入らない。理由説明は不要\n`
      + `- 作品やニュースのあらすじ・概要を説明しない(例「○○が△△をやっつける王道展開」みたいなWiki的説明は禁止)\n`
      + `- 友達にLINEで送るみたいな、リアルで具体的な一言の感想にする。例:「これ見ると毎年冬きたなって感じるわ」「結局これ何回見ても面白い」みたいな体温のある言葉\n`
      + `- きれいにまとめようとしない。ちょっと言い切ったり、素の感情を出す\n`
      + `\n【その他のNG】\n`
      + `- 推測・知ったかぶり(一覧のニュースに無いことを書かない)\n`
      + `- 「9割の人が〜」「実は〜なの」みたいな空っぽの煽り/誹謗中傷/決めつけ\n`
      + `- 事件・事故・訃報は茶化さず誠実に。芸能・スポーツ・エンタメは共感・ツッコミOK\n`

  function transformBtn(card, label, genFn) {
    const btn = document.createElement("button"); btn.className = "mini cyan"; btn.textContent = label;
    const out = document.createElement("div");
    btn.onclick = async () => {
      btn.disabled = true; btn.textContent = "生成中…"; out.innerHTML = "";
      try {
        const text = await genFn();
        const cands = text.split(/\n?===+\n?/).map(s=>s.trim()).filter(s=>s.length>5);
        if (!cands.length) { out.innerHTML = '<div class="muted" style="padding:6px">うまく作れんかった。もう一回試して。</div>'; }
        else cands.slice(0,3).forEach((c,i)=> renderTrendCard(out, c, "案"+(i+1)));
      } catch(e) { out.innerHTML = '<div class="err">'+e.message+'</div>'; }
      btn.disabled = false; btn.textContent = label;
    };
    card.appendChild(btn); card.appendChild(out);

    let t = text.replace(/```json|```/g, "").trim();
    t = t.slice(t.indexOf("["));
    try { return JSON.parse(t); }
    catch (e) { const cut = t.lastIndexOf("}"); if (cut > 0) return JSON.parse(t.slice(0, cut + 1) + "]"); throw e; }
  }

    try {

        (CFG.closedDays && CFG.closedDays.length ? `\n\n【定休日】${CFG.closedDays.join("・")}曜は定休日。その曜日には来店を促す営業告知を入れず、休業のお知らせや「明日から営業」等の定休日に合った内容にする。` : "") +

        }
        gen.textContent = "本文を生成中… 0/" + filtered.length;
        for (let i = 0; i < filtered.length; i++) {
          await genOne(filtered[i], false, mixDays.has(i));
          gen.textContent = "本文を生成中… " + (i+1) + "/" + filtered.length;
          renderPlan(filtered);
        }
      }
    } catch (e) { out.err("生成に失敗。もう一度押して。(" + e.message.slice(0, 80) + ")"); }
    gen.disabled = false; gen.textContent = "カレンダーを生成する";
  };

  function planDate(p) {
    const [m, d] = p.d.split("/").map(Number);
    const [hh, mm] = (p.h || "21:00").split(":").map(Number);
    const now = new Date();
    let y = now.getFullYear();
    if (m < now.getMonth() + 1 - 1) y += 1; // 年またぎ対策
    return new Date(y, m - 1, d, hh, mm || 0);
  }

  /* 通常の1投稿生成(shuffle=trueで毎回違う角度に。forceMix=trueでミックス確定) */
  async function genOne(p, shuffle, forceMix) {
    try {
      /* 噂のシーシャBar: forceMix指定時、または(指定なしで)頻度に当たればミックス紹介に */
      const shishaOn = isUwasaShisha(acct.value, CFG.bizName) && CFG.mixOn;
      const doMix = shishaOn && (forceMix === true || (forceMix === undefined && Math.random()*100 < (CFG.mixFreq||0)));
      if (doMix) {
        const pd = planDate(p);
        const ds = pd.getFullYear()+"-"+String(pd.getMonth()+1).padStart(2,"0")+"-"+String(pd.getDate()).padStart(2,"0");
        const sc2 = shPickScene(null, ds);
        const r = await shMixPostText(null, sc2);
        if (r && r.thread) {
          p._text = r.thread[0]; p._thread = r.thread;
          p.t = "ミックス("+(sc2?sc2.scene:"おすすめ")+")"+(r.thread.length>1?" 🧵":""); p.y = "ミックス"; p.g = "シーシャミックス";
          if (!p._lockTime && (!p.h || !/^\d{1,2}:\d{2}$/.test(p.h))) p.h = "21:00";
          return;
        }
      }
      const variant = shuffle ? "\n※前回と違う切り口・フック・語り口で、新鮮な別パターンにすること。" : "";
      /* 噂のシーシャBarの時、AIが勝手にフレーバー配合・おすすめミックス紹介を書くのを禁止
         (ミックス紹介は専用エンジンが星評価付きで担当するため) */
      const noMix = shishaOn
        ? "\n【禁止】具体的なフレーバーの配合比やおすすめミックスの紹介は書かない(別機能が担当)。代わりに店の雰囲気・豆知識・季節・営業案内・共感ネタなどで書く。"
        : "";
      /* 日本のイベントが近い日は、一部の投稿(約45%)にだけイベント要素を混ぜる(毎日同じネタにならないよう確率的) */
      let evHint = "";
      const pd2 = planDate(p);
      const ds2 = pd2.getFullYear()+"-"+String(pd2.getMonth()+1).padStart(2,"0")+"-"+String(pd2.getDate()).padStart(2,"0");
      const ev = pickJpEvent(ds2);
      if (ev && Math.random() < 0.45) {
        evHint = "\n【時季のヒント】今は「"+ev.name+"」の時季。"+ev.hint+"。ただし必ずこのアカウントの業種・事業の範囲内で絡めること(業種外の話題は持ち込まない)。自然に絡められそうなら投稿に織り込む(無理なら無視してよい。露骨な宣伝にしない)。";
      }
      const text = await callAI(`${S.sns}投稿を1本書け。\n日付: ${p.d}(${p.w}) ${p.h||""}投稿予定 / ジャンル: ${p.g||""} / テーマ: ${p.t} / 型: ${p.y}\n${S.sns==="X"?"140字以内。":"キャプション形式・ハッシュタグ5個。"}投稿文のみ出力。前置き禁止。${variant}${noMix}${evHint}${sc()}`);
      p._text = text.trim();
    } catch (e) { out.err(e.message); }
  }

  /* 無料予想生成: GASで実レース取得→Claudeで予想本文化 */
  async function genYosou(p, whenLabel) {
    const label = whenLabel || "本日";
    const dateWord = label === "明日" ? "明日" : "本日";
    try {
      const { data: sess } = await sb.auth.getSession();
      if (!sess.session) throw new Error("ログインが切れた。リロードして。");
      const yyyymmdd = (() => {
        const base = new Date();
        if (label === "明日") base.setDate(base.getDate() + 1);
        return "" + base.getFullYear() + String(base.getMonth()+1).padStart(2,"0") + String(base.getDate()).padStart(2,"0");
      })();

      /* 設定中のロジック(compareなら表示はscore)。CFGは呼び出し前にloadCfgForで読まれている */
      const acctCfg = JSON.parse(JSON.stringify(CFG || {}));

      const callGen = async () => {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 90000);
        try {
          const r = await fetch(GAS_URL, {
            method: "POST", headers: { "Content-Type": "text/plain" }, signal: ctrl.signal,
            body: JSON.stringify({
              auth: sess.session.access_token, action: "yosouGen",
              hd: yyyymmdd,
              minMinutes: label === "明日" ? -100000 : 15,
              maxMinutes: label === "明日" ? 100000 : 600,
              exclude: (window._recentRaces || []),
              acctCfg: acctCfg,
              logic: p._logicReq || "popular",
            }),
          });
          return await r.json();
        } finally { clearTimeout(timer); }
      };
      let race;
      try { race = await callGen(); }
      catch (e1) {
        await new Promise(r => setTimeout(r, 1500));
        try { race = await callGen(); }
        catch (e2) { p._text=""; p._deadline=""; p._deadlineUnknown=true; p._raceErr="通信失敗(Load failed)。電波を確認してもう一度押して。"; p.t=label+"の無料予想(通信失敗)"; return; }
      }
      if (race.error) {
        p._text = ""; p._deadline = ""; p._deadlineUnknown = true;
        p._raceErr = "レース取得失敗: " + race.error + (race.detail?" / "+race.detail:"");
        p.t = label + "の無料予想(取得失敗)";
        return;
      }
      /* 使ったレースを記録(次回除外) */
      window._recentRaces = window._recentRaces || [];
      window._recentRaces.push(race.jcd + "-" + race.rno);
      if (window._recentRaces.length > 5) window._recentRaces.shift();

      let text = (race.text || "").trim();
      /* 1行目を「本日/明日の無料予想を1レース公開」に正規化 */
      text = text.replace(/^.*無料予想.*公開.*$/m, dateWord + "の無料予想を1レース公開");
      p._text = text;
      p._venue = race.venue + race.rno + "R";
      p._logic = race.logic || "";
      p._deadline = race.deadline || "";
      p._deadlineUnknown = !(race.deadline && /^\d{1,2}:\d{2}$/.test(race.deadline));
      p._raceErr = "";

      if (label === "明日") { p.h = "21:00"; p._postToday = true; }
      else if (!p._deadlineUnknown) {
        const [hh, mm] = race.deadline.split(":").map(Number);
        let total = hh * 60 + mm - 15; if (total < 0) total = hh * 60 + mm;
        p.h = String(Math.floor(total/60)).padStart(2,"0") + ":" + String(total%60).padStart(2,"0");
      }
      p.t = label + "の無料予想" + (p._deadline ? "(締切" + p._deadline + ")" : "");
    } catch (e) { p._raceErr = String(e.message||e); out.err(e.message); }
  }

  function drawText(body, p, text) {
    p._text = text;
    const box = document.createElement("textarea");
    box.rows = 6;
    box.style.cssText = "width:100%;font-size:13.5px;line-height:1.7";
    box.value = text; body.appendChild(box);
    /* 編集したらp._textに反映(送信・コピーに使う) */
    box.oninput = () => { p._text = box.value; };
    /* スレッド2本目以降(あれば編集欄を出す) */
    const threadAreas = [];
    if (p._thread && p._thread.length > 1) {
      p._thread.slice(1).forEach((t2, i) => {
        const lbl = document.createElement("p"); lbl.className="desc"; lbl.style.margin="6px 0 2px"; lbl.textContent = "🧵 "+(i+2)+"本目(リプ)";
        body.appendChild(lbl);
        const ta2 = document.createElement("textarea"); ta2.rows = 5; ta2.value = t2;
        ta2.style.cssText = "width:100%;font-size:13px;line-height:1.6";
        body.appendChild(ta2); threadAreas.push(ta2);
      });
    }
    const acts = document.createElement("div"); acts.className = "acts"; body.appendChild(acts);
    const cp = document.createElement("button"); cp.className = "mini"; cp.textContent = "コピー";
    cp.onclick = () => { navigator.clipboard.writeText(p._text); cp.textContent = "コピー済"; setTimeout(()=>cp.textContent="コピー",1500); };
    acts.appendChild(cp);
    if (S.sns === "X") {
      const sd = document.createElement("button"); sd.className = "mini primary"; sd.textContent = "予約管理に送る";
      sd.onclick = async () => {
        if (!acct.value) { out.err("クライアント未登録。先に認証リンクから登録して。"); return; }
        sd.disabled = true;
        const threadVals = threadAreas.map(t=>t.value.trim()).filter(Boolean);
        const { error } = await saveScheduledPost({
          screen_name: acct.value, text: p._text, scheduled_at: planDate(p).toISOString(), status: "draft",
          thread: threadVals.length ? threadVals : null,
        });
        if (error) { out.err("送信エラー: " + error.message); sd.disabled = false; return; }
        sd.textContent = threadVals.length ? "送った✓(🧵"+(threadVals.length+1)+")" : "送った✓";
      };
      acts.appendChild(sd);
      const a = document.createElement("a"); a.className = "mini"; a.textContent = "Xで投稿→";
      a.href = "https://twitter.com/intent/tweet?text=" + encodeURIComponent(p._text); a.target = "_blank";
      a.onclick = () => { a.href = "https://twitter.com/intent/tweet?text=" + encodeURIComponent(p._text); };
      acts.appendChild(a);
    }
  }
};

  function fSeries() { return records.filter((r) => r.platform === key("フォロワー")).sort((a, b) => a.date.localeCompare(b.date)); }
  function drawAll() { drawStats(); drawGoal(); drawChart(); drawAI(); drawHist(); }

  function calcStats() {
    const fs = fSeries(); if (!fs.length) return null;
    const last = fs[fs.length - 1];
    const prev = fs.length > 1 ? fs[fs.length - 2] : null;
    const since = (days) => {
      const cutoff = new Date(Date.now() - days * 86400000).toISOString().slice(0, 10);
      const base = fs.filter((r) => r.date <= cutoff).pop() || fs[0];
      if (base.date === last.date) return null;
      const dd = Math.max(1, Math.round((new Date(last.date) - new Date(base.date)) / 86400000));
      return { diff: last.count - base.count, perDay: (last.count - base.count) / dd };
    };
    return { last, prevDiff: prev ? last.count - prev.count : null, w: since(7), m: since(30) };
  }
  const sign = (n) => (n >= 0 ? "+" : "") + Math.round(n).toLocaleString();
  const dc = (n) => n >= 0 ? "var(--ok)" : "var(--bad)";

  function drawStats() {
    const st = calcStats(); statsEl.innerHTML = "";
    if (!st) return;
    const w = document.createElement("div"); w.style.cssText = "display:flex;gap:8px;margin-top:18px"; statsEl.appendChild(w);
    [["NOW", st.last.count.toLocaleString(), st.prevDiff !== null ? "前回 " + sign(st.prevDiff) : "", st.prevDiff !== null ? dc(st.prevDiff) : ""],
     ["7 DAYS", st.w ? sign(st.w.diff) : "—", st.w ? (st.w.perDay >= 0 ? "+" : "") + st.w.perDay.toFixed(1) + "/日" : "記録待ち", st.w ? dc(st.w.diff) : ""],
     ["30 DAYS", st.m ? sign(st.m.diff) : "—", st.m ? (st.m.perDay >= 0 ? "+" : "") + st.m.perDay.toFixed(1) + "/日" : "記録待ち", st.m ? dc(st.m.diff) : ""]
    ].forEach(([l, v, s, c]) => {
      const d = document.createElement("div"); d.className = "stat";
      d.innerHTML = '<div class="l">' + l + '</div><div class="v">' + esc(v) + '</div>' + (s ? '<div class="s" style="color:' + (c || "var(--muted)") + '">' + esc(s) + "</div>" : "");
      w.appendChild(d);
    });
  }

  function drawGoal() {
    goalEl.innerHTML = "";
    fld(goalEl, "目標フォロワー数");
    const goal = goals[S.sns];
    const st = calcStats();
    if (goal) {
      let fc = null;
      if (st && st.w && st.w.perDay > 0) {
        const remain = goal - st.last.count;
        if (remain <= 0) fc = { done: true };
        else { const days = Math.ceil(remain / st.w.perDay); const d = new Date(Date.now() + days * 86400000); fc = { days, date: (d.getMonth() + 1) + "/" + d.getDate(), remain }; }
      }
      const d = document.createElement("div"); d.className = "row"; d.style.borderLeft = "3px solid var(--ok)";
      d.innerHTML = '<b style="color:var(--ok);font-family:var(--mono)">' + goal.toLocaleString() + "</b> " +
        (fc ? (fc.done ? "— 達成済み🎉" : "まで残り <b>" + fc.remain.toLocaleString() + "</b>。今のペースなら <b style='color:var(--accent2)'>約" + fc.days + "日後(" + fc.date + ")</b> に到達") : "— 7日分くらい記録が貯まると予測が出る") +
        ' <button class="mini" style="float:right;flex:none;padding:4px 8px;font-size:11px">変更</button>';
      d.querySelector("button").onclick = async () => { delete goals[S.sns]; await kvSet(goalKey(), goals); drawGoal(); drawChart(); };
      goalEl.appendChild(d);
    } else {
      const w = document.createElement("div"); w.style.cssText = "display:flex;gap:10px"; goalEl.appendChild(w);
      const gi = document.createElement("input"); gi.type = "number"; gi.placeholder = "例: 1000"; w.appendChild(gi);
      const gb = document.createElement("button"); gb.className = "mini cyan"; gb.style.flex = "0 0 80px"; gb.textContent = "設定"; w.appendChild(gb);
      gb.onclick = async () => { const n = parseInt(gi.value); if (!n) return; goals[S.sns] = n; await kvSet(goalKey(), goals); drawGoal(); drawChart(); };
    }
  }

  function drawChart() {
    chartEl.innerHTML = "";
    const pts = fSeries(); if (pts.length < 2) return;
    const W = 340, H = 190, PL = 46, PR = 12, PT = 14, PB = 26;
    const goal = goals[S.sns];
    const mn = Math.min(...pts.map((r) => r.count)), mx = Math.max(...pts.map((r) => r.count));
    const pad = Math.max(1, Math.round((mx - mn) * .1));
    const lo = mn - pad, hi = mx + pad, sp = hi - lo || 1;
    const x = (i) => PL + (i / (pts.length - 1)) * (W - PL - PR);
    const y = (c) => PT + (1 - (c - lo) / sp) * (H - PT - PB);
    const fmtV = (v) => v >= 10000 ? (v / 10000).toFixed(1) + "万" : v.toLocaleString();
    let svg = '<div class="fld" style="font-size:10px;font-weight:800;letter-spacing:.2em;color:var(--accent2);font-family:var(--mono);margin:16px 0 8px">FOLLOWER GRAPH</div>' +
      '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;background:var(--surface2);border-radius:12px;border:1px solid var(--border)">';
    [lo, lo + sp / 2, hi].map(Math.round).forEach((v) => {
      svg += '<line x1="' + PL + '" x2="' + (W - PR) + '" y1="' + y(v) + '" y2="' + y(v) + '" stroke="#1D2A47" stroke-dasharray="3 4"/>' +
        '<text x="' + (PL - 6) + '" y="' + (y(v) + 3.5) + '" text-anchor="end" font-size="9.5" fill="#7E8BA8" font-family="Menlo">' + fmtV(v) + "</text>";
    });
    if (goal && goal >= lo && goal <= hi) {
      svg += '<line x1="' + PL + '" x2="' + (W - PR) + '" y1="' + y(goal) + '" y2="' + y(goal) + '" stroke="#3DFFA8" stroke-width="1.5" stroke-dasharray="5 4"/>' +
        '<text x="' + (W - PR) + '" y="' + (y(goal) - 4) + '" text-anchor="end" font-size="9.5" fill="#3DFFA8" font-weight="700">目標 ' + goal.toLocaleString() + "</text>";
    }
    const line = pts.map((r, i) => (i ? "L" : "M") + x(i) + "," + y(r.count)).join(" ");
    svg += '<path d="' + line + ' L' + x(pts.length - 1) + ',' + (H - PB) + ' L' + PL + ',' + (H - PB) + ' Z" fill="rgba(255,46,126,.1)"/>' +
      '<path d="' + line + '" fill="none" stroke="#FF2E7E" stroke-width="2.5" stroke-linejoin="round"/>';
    const step = Math.max(1, Math.ceil(pts.length / 5));
    pts.forEach((r, i) => {
      svg += '<circle cx="' + x(i) + '" cy="' + y(r.count) + '" r="3.5" fill="#04060C" stroke="#FF2E7E" stroke-width="2"/>';
      if (i % step === 0 || i === pts.length - 1)
        svg += '<text x="' + x(i) + '" y="' + (H - 8) + '" text-anchor="middle" font-size="9.5" fill="#7E8BA8" font-family="Menlo">' + fmtJP(r.date) + "</text>";
    });
    chartEl.innerHTML = svg + "</svg>";
  }

  function drawAI() {
    aiEl.innerHTML = "";
    const fs = fSeries(); if (fs.length < 3) return;
    const b = document.createElement("button"); b.className = "btn btn-ghost"; b.textContent = "AIに推移を分析させる"; aiEl.appendChild(b);
    const out = outArea(aiEl);
    b.onclick = () => runAI(b, out, () =>
      `${S.sns}アカウントのフォロワー推移:\n${fs.map((r) => r.date + ": " + r.count).join("\n")}\n目標: ${goals[S.sns] || "未設定"}\n\nこのデータから日本語で簡潔に:\n■伸びの評価(加速中/横ばい/鈍化+理由)\n■原因の仮説2つ\n■今週の打ち手3つ(${S.sns}の機能を使った具体策)\n前置き不要。`);
  }

  function drawHist() {
    histEl.innerHTML = "";
    const sr = records.filter((r) => r.platform.startsWith(S.sns + ":"));
    if (!sr.length) { histEl.innerHTML = '<div class="muted" style="text-align:center;margin-top:20px">まだ記録なし。アカウントを入れて「📡 記録」を押してみて。</div>'; return; }
    fld(histEl, "記録履歴(最新10件)");
    sr.slice().sort((a, b) => b.date.localeCompare(a.date)).slice(0, 10).forEach((r) => {
      const d = document.createElement("div");
      d.style.cssText = "display:flex;align-items:center;justify-content:space-between;padding:9px 4px;border-bottom:1px solid var(--border);font-size:13.5px";
      d.innerHTML = '<span class="muted" style="width:48px;font-family:var(--mono)">' + fmtJP(r.date) + "</span>" +
        '<span class="muted" style="flex:1">' + esc(r.platform.split(":")[1]) + "</span>" +
        '<b style="margin-right:12px;font-family:var(--mono)">' + r.count.toLocaleString() + "</b>" +
        '<button style="background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer">×</button>';
      d.querySelector("button").onclick = async () => {
        records = records.filter((x) => !(x.date === r.date && x.platform === r.platform));
        await kvSet(recKey(), records); drawAll();
      };
      histEl.appendChild(d);
    });
  }

  function diff7(recs) {
    const fs = (recs || []).filter((r) => r.platform === key("フォロワー")).sort((a, b) => a.date.localeCompare(b.date));
    if (!fs.length) return null;
    const last = fs[fs.length - 1];
    const cutoff = new Date(Date.now() - 7 * 86400000).toISOString().slice(0, 10);
    const base = fs.filter((r) => r.date <= cutoff).pop() || fs[0];
    return { now: last.count, diff: base.date === last.date ? null : last.count - base.count };
  }

  async function drawCompare() {
    compEl.innerHTML = "";
    const tname = target();
    if (!tname) return;
    const cfg = await kvGet("gen_config:" + tname, null);
    const comps = cfg && cfg.competitors ? String(cfg.competitors).split(/[,、\n\s]+/).map((s) => s.replace(/^@/, "").trim()).filter(Boolean) : [];
    if (!comps.length) return;
    const meRecs = await kvGet("followers:" + tname, []);
    const rows = [["@" + tname + "(自分)", diff7(meRecs), true]];
    for (const c of comps) { rows.push(["@" + c, diff7(await kvGet("followers:" + c, [])), false]); }
    fld(compEl, "競合との比較(直近7日のフォロワー増減)");
    const tbl = document.createElement("div"); tbl.style.cssText = "display:flex;flex-direction:column;gap:8px";
    const maxNow = Math.max(1, ...rows.map(([, d]) => (d && d.now != null ? d.now : 0)));
    rows.forEach(([name, d, me]) => {
      const nowN = d && d.now != null ? d.now : null;
      const pct = nowN != null ? Math.max(3, Math.round(nowN / maxNow * 100)) : 0;
      const now = nowN != null ? nowN.toLocaleString() : "—";
      const dd = d && d.diff != null ? ((d.diff >= 0 ? "+" : "") + d.diff.toLocaleString()) : "記録待ち";
      const dcol = d && d.diff != null ? (d.diff >= 0 ? "var(--ok)" : "var(--bad)") : "var(--muted)";
      const row = document.createElement("div");
      row.style.cssText = "padding:9px 11px;border-radius:9px;background:" + (me ? "rgba(255,46,126,.08)" : "var(--surface2)") + ";border:1px solid var(--border)";
      row.innerHTML =
        '<div style="display:flex;align-items:center;justify-content:space-between;font-size:13px;margin-bottom:7px">' +
        '<span style="font-weight:' + (me ? "800" : "600") + '">' + esc(name) + '</span>' +
        '<span style="display:flex;gap:10px;align-items:center"><b style="font-family:var(--mono)">' + now + '</b>' +
        '<span style="font-family:var(--mono);color:' + dcol + ';min-width:66px;text-align:right;font-size:12px">' + dd + '/7日</span></span></div>' +
        '<div style="height:6px;border-radius:4px;background:var(--border);overflow:hidden"><div style="height:100%;width:' + pct + '%;background:' + (me ? "var(--accent)" : "#5b6bb0") + ';border-radius:4px"></div></div>';
      tbl.appendChild(row);
    });
    compEl.appendChild(tbl);
    const cnote = document.createElement("p"); cnote.className = "desc"; cnote.style.cssText = "margin:6px 0 0;font-size:11px";
    cnote.textContent = "競合のデータは「📡 記録」or 毎日5時の自動記録で溜まる。記録が増えるほど比較が正確になる。";
    compEl.appendChild(cnote);
  }
};
