function diagnoseErr(msg) {
  const m = String(msg || "");
  /* 今回ハマったやつ: X API公式の投稿クレジット切れ(402) */
  if (/402|CreditsDepleted|credits to fulfill|PaymentRequired/i.test(m))
    return { icon: "💳", cause: "X APIの投稿クレジットが切れてる", fix: "console.x.com → Billing でクレジットをチャージ。オートチャージをONにすれば再発を防げる(普通の投稿は約2.3円/件、リンク入りは約30円/件)" };
  /* X連携トークンが失効 */
  if (/\b401\b|invalid or expired token|could not authenticate|unable to verify credentials/i.test(m))
    return { icon: "🔑", cause: "Xとの連携が切れてる(トークン失効)", fix: "設定からこのアカウントを再連携してください" };
  /* 重複投稿ガード(これは異常やない) */
  if (/重複|duplicate/i.test(m))
    return { icon: "♻️", cause: "同じ本文を最近投稿済み(重複ガードでスキップ)", fix: "本文を変えれば投稿できます。意図通りなら無視でOK" };
  /* 文字数オーバー */
  if (/\b403\b/.test(m) && /(280|文字|too long|length)/i.test(m))
    return { icon: "✂️", cause: "本文が長すぎる(280字オーバー)", fix: "本文を短くしてください" };
  /* 403 その他(規約/権限) */
  if (/\b403\b|forbidden/i.test(m))
    return { icon: "🚫", cause: "Xに投稿を拒否された(規約違反か権限不足の可能性)", fix: "本文の内容、またはアプリの読み書き権限を確認してください" };
  /* レート制限 */

    return { icon: "📡", cause: "通信エラー(一時的)", fix: "自動で再試行されます" };

  return { icon: "❓", cause: "原因不明のエラー", fix: "下の元メッセージを確認してください" };
}

/* 投稿日時を「○分前/○時間前/○日前/M月D日」に整形 */
function timeAgo(createdAt) {
  if (!createdAt) return "";
  const d = new Date(createdAt);
  if (isNaN(d.getTime())) return "";
  const diffMs = Date.now() - d.getTime();
  const min = Math.floor(diffMs / 60000);
  if (min < 1) return "たった今";
  if (min < 60) return min + "分前";
  const hr = Math.floor(min / 60);
  if (hr < 24) return hr + "時間前";
  const day = Math.floor(hr / 24);
  if (day < 7) return day + "日前";
  return (d.getMonth() + 1) + "月" + d.getDate() + "日";
}

/* 現在のミックスDB(CFG.mixDBがあればそれ、無ければデフォルト) */
function shishaDB(){ return (CFG && CFG.mixDB) ? CFG.mixDB : SHISHA_DEFAULT_DB; }
function shAllItems(){const DB=shishaDB();const o=[];for(const b in DB)for(const n in DB[b])o.push({name:n,brand:b,v:DB[b][n]});return o;}
function shVget(name){const DB=shishaDB();for(const b in DB)if(DB[b][name])return DB[b][name];return[0,0,0,0,0,0];}
function shIsBanned(names){
  for(let i=0;i<names.length;i++)for(let j=i+1;j<names.length;j++){
    if(SHISHA_BANNED_SET.has([names[i],names[j]].sort().join("|"))) return true;
  }
  for(const s of SHISHA_DYN_CITRUS_BAN) if(names.includes(s)) for(const x of names) if(SHISHA_CITRUS.has(x)) return true;
  return false;
}
function shScoreCombo(combo){
  const names = combo.map(c=>c.name);
  if(new Set(names).size!==names.length) return {sc:-999};
  if(shIsBanned(names)) return {sc:-999};
  if(names.filter(n=>SHISHA_CITRUS.has(n)).length>=3) return {sc:-999};
  const acc = combo.filter(c=>SHISHA_ACCENT.has(c.name));
  if(acc.length>=2) return {sc:-999};
  if(combo.some(c=>SHISHA_ACCENT.has(c.name)&&c.ratio>=2)) return {sc:-999};
  const leadByRatio = combo.slice().sort((a,b)=>b.ratio-a.ratio)[0];
  if(shVget(leadByRatio.name)[5] < 7) return {sc:-999};
  let sc=70, ss=0, s=0, a=0;
  for(let i=0;i<names.length;i++)for(let j=i+1;j<names.length;j++){
    const r=shPairRank(names[i],names[j]);
    if(r==="SS"){sc+=9;ss++;} else if(r==="S"){sc+=6;s++;} else if(r==="A"){sc+=4;a++;}
  }
  if(ss>=2) sc=Math.max(sc,90);
  const vs=names.map(shVget);
  if(vs.filter(v=>v[0]>=8).length>=3) sc-=8;
  if(vs.filter(v=>v[3]>=7).length>=3) sc-=8;
  if(names.filter(n=>SHISHA_CITRUS.has(n)).length>=2) sc-=3;
  if(acc.length===1) sc+=3;
  sc=Math.min(sc,99);
  const rank = ss>=2?"SS":(ss+s>=1?"S":(a>=1?"A":""));
  return {sc, ss, s, a, rank, info:`SS${ss}/S${s}/A${a}`};
}
const shRatioFor = k => k===2?[6,4] : k===3?[6,3,1] : [5,2,2,1];
function shGenerate(audience, count){
  const items = shAllItems();
  const conf = SHISHA_AUD[audience]||SHISHA_AUD["おまかせ"];
  const banSet = conf.ban;
  let leads = items.filter(it=>it.v[5]>=7 && !SHISHA_ACCENT.has(it.name) && !SHISHA_CITRUS.has(it.name) && !banSet.has(it.name));
  if(conf.lead) leads = leads.filter(it=>conf.lead.includes(it.name)||conf.lead.includes(shNm(it.name)));
  if(leads.length===0) leads = items.filter(it=>it.v[5]>=7 && !SHISHA_ACCENT.has(it.name) && !SHISHA_CITRUS.has(it.name));
  const results=[], seen=new Set(); let tries=0;
  while(results.length<count && tries<4000){
    tries++;
    if(leads.length===0) break;
    const lead = leads[(Math.random()*leads.length)|0];
    const ln = lead.name;
    let mates = items.filter(it=>shPairRank(ln,it.name) && it.name!==ln && !banSet.has(it.name));
    if(mates.length===0) continue;
    const helper = mates[(Math.random()*mates.length)|0].name;
    let outlineCand = items.filter(it=>(shPairRank(ln,it.name)||SHISHA_CITRUS.has(it.name)) && ![ln,helper].includes(it.name) && !banSet.has(it.name));
    const useOutline = outlineCand.length>0 && Math.random()<0.85;
    const outline = useOutline ? outlineCand[(Math.random()*outlineCand.length)|0].name : null;
    const accChoices = ["ミント","ミント","ミント","アイス","アブソリュートゼロ"].filter(x=>!banSet.has(x));
    const acc = accChoices[(Math.random()*accChoices.length)|0];
    let parts=[ln,helper]; if(outline)parts.push(outline); parts.push(acc);
    parts=[...new Set(parts)];
    if(parts.length<2) continue;
    const ratios = shRatioFor(parts.length);
    const combo = parts.map((n,i)=>({name:n, ratio:ratios[i]||1}));
    const res = shScoreCombo(combo);
    if(res.sc>=80){
      const key=parts.slice().sort().join("|");
      if(seen.has(key)) continue;
      seen.add(key);
      results.push({combo, ...res});
    }
  }
  results.sort((a,b)=>b.sc-a.sc);
  return results;
}

/* 予約投稿をDBに保存する共通関数。textが140字超なら自動でスレッド分割。
   既にthread指定がある場合(ミックス等)はそれを優先しつつ、1本目が長ければさらに分割。 */
async function saveScheduledPost(rec) {
  /* rec: { screen_name, text, scheduled_at, status, media_url?, thread? } */
  const existingThread = Array.isArray(rec.thread) ? rec.thread.slice() : [];
  const split = autoSplitThread(rec.text, 140);
  let finalText = split.text;
  let finalThread = [];
  if (split.thread) finalThread = finalThread.concat(split.thread);
  /* 既存のthread(2本目以降)も、それぞれ140字超なら分割して足す */
  existingThread.forEach((t) => {
    const s2 = autoSplitThread(t, 140);
    finalThread.push(s2.text);
    if (s2.thread) finalThread = finalThread.concat(s2.thread);
  });
  const payload = {
    screen_name: rec.screen_name,
    text: finalText,
    scheduled_at: rec.scheduled_at,
    status: rec.status || "draft",
    media_url: rec.media_url || null,
    thread: finalThread.length ? finalThread : null,
  };
  return await sb.from("scheduled_posts").insert(payload);
}

function shMixName(combo){ const s=combo.slice().sort((a,b)=>b.ratio-a.ratio); return (s[0]?s[0].name:"")+(s[1]?"×"+s[1].name:""); }

/* 長文を140字以内のツイート配列に自動分割する(スレッド用)。
   返り値 { text, thread } : text=1本目, thread=2本目以降(無ければnull)。
   段落(空行)→文(句点)→読点や区切り の順で、できるだけ文の意味が途切れない位置で割る。 */
function autoSplitThread(full, limit) {
  limit = limit || 140;
  const src = String(full || "").trim();
  if (src.length <= limit) return { text: src, thread: null };

  /* テキストを「これ以上分けたくない最小単位」に砕く。
     優先: 段落(空行) > 文末(。！？と改行) > 読点・中黒・スラッシュ > それでも長ければ単語境界 */
  function tokenize(text) {
    /* まず段落 */
    return text.split(/\n\s*\n/).map(s => s.trim()).filter(Boolean);
  }
  /* 1ピースが長すぎる時、自然な区切りでさらに砕く(文の途中で切らない) */
  function breakPiece(piece) {
    if (piece.length <= limit) return [piece];
    /* 文末(。！？)や改行で割る。区切り文字は前の文にくっつける */
    let parts = piece.split(/(?<=[。！？\n])/).map(s => s).filter(s => s.length);
    /* まだlimit超の塊があれば、読点・中黒・スラッシュ・空白で割る */
    const refined = [];
    parts.forEach(pt => {
      if (pt.length <= limit) { refined.push(pt); return; }
      let sub = pt.split(/(?<=[、，・/／\s])/).filter(s => s.length);
      let buf = "";
      sub.forEach(token => {
        if (token.length > limit) {
          /* 1トークンが長すぎる(URLや長い単語)→最終手段で機械的に割るが、できるだけ境界で */
          if (buf) { refined.push(buf); buf = ""; }
          for (let i = 0; i < token.length; i += limit) refined.push(token.slice(i, i + limit));
        } else if ((buf + token).length > limit) {
          if (buf) refined.push(buf);
          buf = token;
        } else {
          buf += token;
        }
      });
      if (buf) refined.push(buf);
    });
    return refined;
  }

  /* 段落を取り、各段落を必要なら砕いて、limit以内に詰め込む */
  const pieces = [];
  tokenize(src).forEach(block => { breakPiece(block).forEach(p => pieces.push(p)); });

  /* ピースを順に詰めてツイートを作る(境界をまたいで文を切らない) */
  const tweets = [];
  let cur = "";
  pieces.forEach(piece => {
    const sep = cur ? (cur.endsWith("\n") ? "" : "\n") : "";
    if ((cur + sep + piece).length > limit) {
      if (cur.trim()) tweets.push(cur.trim());
      cur = piece;
    } else {
      cur += sep + piece;
    }
  });
  if (cur.trim()) tweets.push(cur.trim());

  if (!tweets.length) return { text: src.slice(0, limit), thread: null };
  return { text: tweets[0], thread: tweets.length > 1 ? tweets.slice(1) : null };
}

const SHISHA_SCENE_AUD = {
  "仕事":"重め","休日":"フルーツ系","深夜":"紅茶系","ご褒美":"スイーツ系","友達":"フルーツ系",
  "男性ウケ":"男性人気","女性ウケ":"女性人気","エモ":"紅茶系","旅行":"初心者","出張":"重め","金沢":"おまかせ","一人旅":"紅茶系",
};
/* ランダムにシーンを1つ選ぶ。dateStr(YYYY-MM-DD)を渡すと、その日に矛盾しない
   シチュエーションだけから選ぶ(給料日は25日前後だけ、等) */
function shPickScene(category, dateStr){
  /* 日付依存シーンの判定。dがその投稿日のDateで、trueなら使える */
  const d = dateStr ? new Date(dateStr+"T12:00:00") : new Date();
  const dom = d.getDate();         // 日(1-31)
  const dow = d.getDay();          // 0=日…6=土
  const lastDay = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
  /* 日付依存シーン → その日に合うかの判定 */
  const DATE_RULES = {
    "給料日":          () => dom>=24 && dom<=27,        // 25日前後
    "ボーナスが入った": () => (d.getMonth()===5||d.getMonth()===11) && dom>=8 && dom<=20, // 6月/12月中旬
    "有給の前日":      () => dow===4 || dow===5,        // 週後半に寄せる
    "給料日前なのに来てしまった": () => dom>=18 && dom<=24, // 給料日直前
    "出張最終日":      () => dow===4 || dow===5,        // 週後半
    "明日帰る":        () => dow===5 || dow===6 || dow===0, // 週末に寄せる
    "明日の仕事を忘れたい": () => dow===5 || dow===6,    // 金土の夜
    "金沢最後の夜":    () => dow===5 || dow===6 || dow===0,
    "記念日":          () => false, // 任意日には出さない(店が把握できないので自動からは除外)
    "誕生日":          () => false, // 同上
  };
  /* 候補シーンを集める(日付依存はルールに合う時だけ採用) */
  const cats = category ? [category] : Object.keys(SHISHA_SCENES);
  const pool = [];
  cats.forEach((cat) => {
    SHISHA_SCENES[cat].forEach((scene) => {
      const rule = DATE_RULES[scene];
      if (rule && !rule()) return; // 日付に合わないシーンは除外
      pool.push({ category: cat, scene, aud: SHISHA_SCENE_AUD[cat]||"おまかせ" });
    });
  });
  if (!pool.length) return null;
  return pool[Math.floor(Math.random()*pool.length)];
}

/* ============================================================
 * 日本のイベントカレンダー(全アカウント共通)
 * 投稿日がイベント期間(事前告知〜当日〜期間中)に入っていれば、
 * そのイベントを話題ヒントとして返す。強制ではなく、呼び出し側で
 * 確率的に一部の投稿にだけ混ぜる。
 * ============================================================ */
const JP_EVENTS = [

  { name: "梅雨", hint: "じめじめした雨の季節。雨の日の過ごし方・室内で楽しむ話題", match: (m,d)=> (m===6&&d>=10)||(m===7&&d<=20) },

  { name: "お盆", hint: "お盆・夏季休暇。帰省・連休中の営業/休業、夏の夜の過ごし方", match: (m,d)=> m===8&&d>=10&&d<=16 },
  { name: "夏休み・真夏", hint: "真夏・夏休みシーズン。暑い夜・夏らしい爽やかな話題", match: (m,d)=> (m===7&&d>=21)||(m===8&&d>=1&&d<=31) },
  { name: "ハロウィン", hint: "10月31日。仮装・イベント・パーティーの夜", match: (m,d)=> m===10&&d>=25&&d<=31 },
  { name: "クリスマス", hint: "12月24〜25日。クリスマス・聖夜の特別な夜、デート・パーティー", match: (m,d)=> m===12&&d>=18&&d<=25 },
  { name: "年末", hint: "年末・仕事納め。今年お疲れ様・年末の営業案内", match: (m,d)=> m===12&&d>=26&&d<=31 },
  { name: "年始・お正月", hint: "お正月・新年。あけましておめでとう・新年の営業開始", match: (m,d)=> m===1&&d>=1&&d<=7 },
  { name: "成人の日", hint: "1月第2月曜。成人式・新成人をお祝い", match: (m,d,dow,wk)=> m===1&&wk===2&&dow===1 || (m===1&&d>=8&&d<=14) },
  { name: "バレンタイン", hint: "2月14日。チョコ・甘い・恋愛・特別な夜", match: (m,d)=> m===2&&d>=8&&d<=14 },
  { name: "ホワイトデー", hint: "3月14日。お返し・甘い・感謝", match: (m,d)=> m===3&&d>=10&&d<=14 },
  { name: "春・桜シーズン", hint: "桜・お花見・新生活シーズン。春の夜・新しい出会い", match: (m,d)=> (m===3&&d>=20)||(m===4&&d<=10) },
  { name: "ハッピーニューイヤー前夜", hint: "大晦日・カウントダウン。年越しの夜", match: (m,d)=> m===12&&d>=30 },
];
/* 投稿日(dateStr=YYYY-MM-DD)に当てはまるイベントを返す。なければnull */
function pickJpEvent(dateStr){
  const d = dateStr ? new Date(dateStr+"T12:00:00") : new Date();
  const m = d.getMonth()+1, day = d.getDate(), dow = d.getDay();
  const wk = Math.floor((day-1)/7)+1; /* 第何週か */
  const hits = JP_EVENTS.filter(e => { try { return e.match(m, day, dow, wk); } catch(_){ return false; } });
  if (!hits.length) return null;
  return hits[Math.floor(Math.random()*hits.length)];
}


/* おすすめミックスを投稿文にする(噂のシーシャBar用)
   scene指定があればそのシチュエーションに寄せる。Haikuで高速生成・性格はCFGから */
async function shMixPostText(audience, sceneObj){
  const aud = sceneObj ? sceneObj.aud : (audience||"おまかせ");
  const picks = shGenerate(aud, 1);
  if (!picks.length) return null;
  const m = picks[0];
  const haigou = m.combo.map(c=>c.name+"("+shBrandOf(c.name)+") "+c.ratio).join(" / ");
  const sweet=Math.round(shAvg(m.combo,0)), sour=Math.round(shAvg(m.combo,1)), cool=Math.round(shAvg(m.combo,2)), heavy=Math.round(shAvg(m.combo,3));
  const star = (v) => { const f=Math.max(1,Math.min(6,Math.round(v*6/10))); return "★".repeat(f)+"☆".repeat(6-f); };
  const osusume = m.sc>=90?6:(m.sc>=85?5:4);
  const gekioshi = m.ss>=3?6:(m.ss>=2?5:(m.ss>=1?4:3));
  /* 性格・文体をCFGから引っ張る */
  let persona = "";
  if (CFG.origProfile && CFG.origProfile.trim()) {
    persona = "\n【この店長の文体・性格(必ず再現)】\n" + CFG.origProfile + "\n";
  } else {
    const toneMap = { "カジュアル":"フランクでフレンドリー", "丁寧":"丁寧で落ち着いた", "ノリ重視":"テンション高めでノリのいい", "クール":"クールで大人っぽい" };
    persona = "\n口調: " + (toneMap[CFG.tone] || "自然体な") + "感じ。絵文字は" + (CFG.emoji||"少なめ") + "。\n";
  }
  /* 星評価ブロック(固定で付ける) */
  const starBlock =
    (sceneObj ? "マスターのオススメ度 "+star(8)+"\n" : "マスターのオススメ度 "+star(osusume*10/6)+"\n") +
    "激推し度 "+star(gekioshi*10/6)+"\n" +
    "甘さ "+star(sweet)+" / 酸味 "+star(sour)+"\n清涼感 "+star(cool)+" / 吸いごたえ "+star(heavy);
  const prompt =
    `金沢・片町のシーシャ店の店長として、おすすめミックスを紹介する短いX投稿の「本文だけ」を書く。\n` +
    persona +
    (sceneObj ? `\nこの投稿の切り口:「${sceneObj.scene}」という気分・状況の人に語りかける。この言葉を不自然に名詞化・言い換えせず、共感する一言から自然に始める。\n` : "") +
    `\nミックス: ${shMixName(m.combo)}\n配合: ${haigou}\n味: 甘さ${sweet}/酸味${sour}/清涼${cool}/吸いごたえ${heavy}(10段階)\n` +
    `\n書き方の注意(重要):\n` +
    `- AIっぽい・広告っぽい文章にしない。店長が実際にXでつぶやくようなリアルなノリでOK\n` +
    `- 「〜な夜に寄り添う」「登場」みたいなテンプレ広告表現は使わない\n` +
    `- 自然な日本語で書く。「〜した時間」「〜したい時」など、文法的に正しく自然な言い回しにする(不自然な体言止めや誤用をしない)\n` +
    `- フレーバー名は正式名称で正確に(略さない)。配合(銘柄と比率)は本文に1行入れる\n` +
    `- 「飲みごたえ」は誤り。シーシャなので「吸いごたえ」「煙」「キック」を使う\n` +
    `- 100〜130字程度。ハッシュタグは付けても1個\n` +
    `- 星評価は書かなくていい(こちらで後ろに付ける)\n` +
    `本文のみ出力・前置き禁止。`;
  /* Haikuで高速生成 */
  const text = await callAI(prompt, false, "haiku");
  if (!text || !text.trim()) return null;
  const body = text.trim();
  /* 味の補足説明(2本目に入れる) */
  const flavorNote = "🌿味の詳細\n" + shMixName(m.combo) + "\n" + haigou;
  const second = flavorNote + "\n\n" + starBlock;
  /* 1本目+2本目を結合した時に140字以内なら1本、超えるならスレッド */
  const combined = body + "\n\n" + starBlock;
  if (combined.length <= 140) {
    return { thread: [combined] };
  }
  return { thread: [body, second] };
}

/* ============ Supabase KV(設定保存) ============ */
async function kvGet(key, fallback) {
  const { data } = await sb.from("kv_store").select("value").eq("key", key).maybeSingle();
  return data && data.value !== null && data.value !== undefined ? data.value : fallback;
}
async function kvSet(key, value) {
  await sb.from("kv_store").upsert({ key, value, updated_at: new Date().toISOString() });
}

/* ============ AI呼び出し(GAS中継) ============ */
/* グローバル: GASにアクション+引数を送る(各タブから使える) */
async function gasFetch_(action, extra) {
  const { data } = await sb.auth.getSession();
  if (!data.session) throw new Error("ログインが切れた。リロードして。");
  const res = await fetch(GAS_URL, {
    method: "POST", headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(Object.assign({ auth: data.session.access_token, action }, extra || {})),
  });
  return await res.json();
}

async function callAI(prompt, useSearch, model, wantUrls) {
  const { data } = await sb.auth.getSession();
  if (!data.session) throw new Error("ログインが切れた。リロードして。");
  let lastUrls = [];
  const doFetch = async (p) => {
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ auth: data.session.access_token, prompt: p, useSearch: !!useSearch, model: model || null }),
    });
    const j = await res.json();
    if (j.error) throw new Error(j.error);
    lastUrls = j.urls || [];
    return j.text;
  };

  let text = await doFetch(prompt);

  /* 業種外題材の混入チェック。検索系(無料予想など)は対象外 */
  if (!useSearch && CFG.bizType && CFG.bizType.trim()) {
    const banned = bannedTopicsFor(CFG.bizType.trim());
    const hit = banned.find((w) => text.includes(w));
    if (hit) {
      /* 1回だけ、禁止題材を明示して作り直し */
      const retryPrompt = prompt +
        "\n\n【厳重注意・再生成】前回の生成は「" + hit + "」など『" + CFG.bizType.trim() +
        "』と無関係な題材を含んでいた。今回は絶対にそれらの題材・単語を一切使わず、『" +
        CFG.bizType.trim() + "』だけの内容で書き直せ。";
      const retry = await doFetch(retryPrompt);
      if (!banned.find((w) => retry.includes(w))) text = retry;
      else text = retry; // 2回目もダメなら諦めて返す(無限ループ防止)
    }
  }
  return wantUrls ? { text, urls: lastUrls } : text;
}

/* 業種ごとの「混ざってはいけない題材ワード」 */
/* 競合欄の入力(URL/@/素の名前が混在)を、1行1ユーザー名に整形する */
function normalizeCompetitors_(raw) {
  if (!raw) return "";
  /* 改行・カンマ・全角カンマ・スペースで区切る */
  const parts = String(raw).split(/[\n,、\s]+/).map(s=>s.trim()).filter(Boolean);
  const reserved = new Set(["home","explore","search","notifications","messages","settings","compose","intent","share","i","hashtag","tos","privacy","login","signup"]);
  const out = [];
  const seen = {};
  parts.forEach(p => {
    let name = "";
    /* @username or 素のusername */
    const direct = p.replace(/^@/, "");
    if (/^[A-Za-z0-9_]{1,15}$/.test(direct)) {
      name = direct;
    } else {
      /* URLとして解釈してみる(先頭@を剥がしたdirectを使う。@https://… でも壊れないように) */
      let s = direct;
      if (!/^https?:\/\//i.test(s)) s = "https://" + s;
      try {
        const u = new URL(s);
        const host = u.hostname.toLowerCase().replace(/^www\./,"").replace(/^mobile\./,"");
        if (host === "x.com" || host === "twitter.com") {
          const seg = u.pathname.split("/").filter(Boolean);
          if (seg.length) {
            const cand = seg[0].replace(/^@/, "");
            if (/^[A-Za-z0-9_]{1,15}$/.test(cand) && !reserved.has(cand.toLowerCase())) name = cand;
          }
        }
      } catch(e) { /* URLとして無効なら捨てる */ }
    }
    if (name && !reserved.has(name.toLowerCase())) {
      const low = name.toLowerCase();
      if (!seen[low]) { seen[low] = true; out.push(name); }
    }
  });
  return out.join("\n");
}

function bannedTopicsFor(bizType) {
  const b = bizType;
  const isBoat = /競艇|ボート|レース|公営競技|舟券/.test(b);
  const isShisha = /シーシャ|シーシャ|水たばこ|水タバコ|フーカー|hookah|shisha/i.test(b);
  const LISTS = {
    boat: ["万舟","舟券","競艇","ボートレース","回収率","本命","穴狙い","3連単","レース","出走","選手","モーター","予想"],
    shisha: ["シーシャ","水たばこ","水タバコ","フレーバー","フーカー","ミックス","チャコール","ボウル","煙"],
  };
  let banned = [];
  /* 競艇系アカウントでなければ競艇ワードを禁止 */
  if (!isBoat) banned = banned.concat(LISTS.boat);
  /* シーシャ系アカウントでなければシーシャワードを禁止 */
  if (!isShisha) banned = banned.concat(LISTS.shisha);
  return banned;
}

function fld(el, label) {

function ta(el, rows, ph) {
  const t = document.createElement("textarea"); t.rows = rows; t.placeholder = ph || ""; el.appendChild(t); return t;
}
function inp(el, ph, type) {
  const t = document.createElement("input"); t.type = type || "text"; t.placeholder = ph || ""; el.appendChild(t); return t;

function chipsSingle(el, options, initial, cyan, onChange) {
  const w = document.createElement("div"); w.className = "chips"; el.appendChild(w);
  const state = { value: initial };
  function draw() {
    w.innerHTML = "";
    options.forEach((o) => {
      const c = document.createElement("button");
      c.className = "chip" + (state.value === o ? (cyan ? " on cyan" : " on") : "");
      c.textContent = o;
      c.onclick = () => { state.value = o; draw(); if (onChange) onChange(o); };
      w.appendChild(c);
    });
  }
  draw(); return state;
}
function chipsMulti(el, options, initial) {
  const w = document.createElement("div"); w.className = "chips"; el.appendChild(w);
  const state = { values: initial.slice() };
  function draw() {
    w.innerHTML = "";
    options.forEach((o) => {
      const c = document.createElement("button");
      c.className = "chip" + (state.values.includes(o) ? " on cyan" : "");
      c.textContent = o;
      c.onclick = () => {
        state.values = state.values.includes(o) ? state.values.filter((x) => x !== o) : [...state.values, o];
        draw();
      };
      w.appendChild(c);
    });
  }
  draw(); return state;
}
function runBtn(el, label) {
  const b = document.createElement("button"); b.className = "btn"; b.textContent = label; el.appendChild(b); return b;
}
function outArea(el) {

    box: e,
    err(m) { e.innerHTML = m ? '<div class="err">⚠ ' + esc(m) + "</div>" : ""; },
    show(text) {
      e.innerHTML = '<div class="out"><button class="copybtn">コピー</button><pre></pre></div>';

      cb.onclick = () => { navigator.clipboard.writeText(text); cb.textContent = "コピー済"; setTimeout(()=>cb.textContent="コピー",1500); };
    },
    clear() { e.innerHTML = ""; },
  };
}
async function runAI(btn, out, promptFn, useSearch) {
  out.clear(); out.err("");
  btn.disabled = true; const orig = btn.textContent; btn.textContent = "処理中…";
  try { out.show(await callAI(promptFn(), useSearch)); }
  catch (e) { out.err(e.message); }
  btn.disabled = false; btn.textContent = orig;
}

function aiTab(el, cfg) {
  head(el, cfg.title, cfg.desc, cfg.steps);

  /* 対象アカウント選択(そのアカウントの設定で生成) */
  let acctVal = S.activeAccount;
  const actives = S.clients.filter((c)=>c.status==="active");
  if (actives.length) {
    fld(el, "対象アカウント");
    const asel = document.createElement("select");
    const od = document.createElement("option"); od.value = "_default_"; od.textContent = "共通設定(既定)"; asel.appendChild(od);
    actives.forEach((c)=>{ const o=document.createElement("option"); o.value=c.screen_name; o.textContent="@"+c.screen_name; asel.appendChild(o); });
    asel.value = S.activeAccount;
    asel.onchange = () => { acctVal = asel.value; };
    el.appendChild(asel);
    const note = document.createElement("p"); note.className = "desc"; note.style.margin = "6px 0 0";
    note.textContent = "選んだアカウントの業種・性格・文体に合わせて分析・生成する。";
    el.appendChild(note);
  }

  const refs = {};
  cfg.fields.forEach((f) => {
    fld(el, f.label);
    if (f.type === "ta") refs[f.key] = ta(el, f.rows, f.ph);
    else if (f.type === "in") {
      refs[f.key] = inp(el, f.ph);
      if (f.normalizeUser) {
        const _i = refs[f.key];
        _i.addEventListener("change", () => {
          const raw = (_i.value || "").trim();
          if (!raw) return;
          const nv = normalizeCompetitors_(raw);
          const first = Array.isArray(nv) ? nv[0] : String(nv).split(/[\n,、\s]+/).filter(Boolean)[0];
          if (first) _i.value = "@" + first;
        });
      }
    }
    else if (f.type === "chips") refs[f.key] = chipsSingle(el, f.options, f.options[0]);
    else if (f.type === "multi") refs[f.key] = chipsMulti(el, f.options, f.initial || []);
  });
  const btn = runBtn(el, cfg.btn);
  const out = outArea(el);
  btn.onclick = async () => {
    const v = {};
    for (const k in refs) v[k] = refs[k].value !== undefined ? refs[k].value : (refs[k].values || refs[k].value);
    cfg.fields.forEach((f) => { if (f.type === "ta" || f.type === "in") v[f.key] = refs[f.key].value; });
    if (!cfg.validate(v)) { out.err("入力が足りん。"); return; }
    await loadCfgFor(acctVal || "_default_"); // 選んだアカウントの設定を適用
    runAI(btn, out, () => cfg.prompt(v), cfg.useSearch);
  };
}

      /* 「(対象レースなし)」等のカッコ始まりは正常スキップなので除外。本物のエラーだけ出す */
      const errs = (aq || []).filter((e) => !String(e.error_msg || "").startsWith("(対象レース"));
      if (errs.length) {
        const kindJP = { trend: "トレンド", enjou: "炎上ニュース", normal: "通常投稿", flavor: "フレーバー", yosou: "予想(人気順)", yosou_score: "予想(スコア)", yokoku: "レース予告" };

        html += '<div style="font-weight:700;color:var(--bad);margin-bottom:4px">⚠️ オート投稿でエラー ' + errs.length + '件</div>';
        html += '<div style="font-size:11px;color:var(--muted);margin-bottom:6px">下の原因を直すか、生成設定を見直してな。直ったら次回から自動で復帰する。</div>';
        errs.forEach((er) => {
          const tm = String(er.scheduled_at || "").slice(11, 16);
          html += '<div style="font-size:12px;line-height:1.55;margin-top:7px;padding-top:7px;border-top:1px solid var(--border)">・<b>' + esc(kindJP[er.kind] || er.kind || "") + '</b> <span style="color:var(--muted)">@' + esc(er.screen_name || "") + (tm ? " " + tm : "") + '</span><br><span style="color:var(--bad)">' + esc(er.error_msg || "原因不明") + '</span></div>';
        });
        html += '</div>';
        autoErrBox.innerHTML = html; autoErrBox.style.display = "block";
      }
    } catch (e) {}
    if (acctName) {
      try {
        const recs = await kvGet("followers:" + acctName, []);
        const fs = (recs || []).filter((r) => r.platform === "X:フォロワー").sort((a, b) => a.date.localeCompare(b.date));
        if (fs.length) {
          const now = fs[fs.length - 1].count;
          cFoll.val.textContent = now.toLocaleString();
          if (fs.length > 1) {
            const diff = now - fs[fs.length - 2].count;
            const arrow = diff > 0 ? "▲" : (diff < 0 ? "▼" : "→");
            const col = diff > 0 ? "var(--ok)" : (diff < 0 ? "var(--bad)" : "var(--muted)");
            cFoll.sub.innerHTML = '<span style="color:var(--muted)">@' + acctName + '</span>　<b style="color:' + col + '">前日比 ' + arrow + (diff > 0 ? "+" : "") + diff.toLocaleString() + '</b>';
          } else {
            cFoll.sub.textContent = "@" + acctName + "  前日比は記録2日分で表示";
          }
        } else { cFoll.val.textContent = "—"; cFoll.sub.textContent = "推移記録で取得"; }
      } catch (e) { cFoll.val.textContent = "—"; }
    } else { cFoll.val.textContent = "—"; }
  })();
};

          CFG.origProfile = prof.trim(); await save(); drawOrig();

    }
  }
  drawOrig();

  /* === 噂のシーシャBar専用: おすすめミックスブロック === */
  const mixBox = document.createElement("div"); el.appendChild(mixBox);
  function drawMix() {

    tg.style.cssText = "display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:10px";

    mixBox.appendChild(tg);
    if (!CFG.mixOn) return; /* OFFなら以下は出さない */

    const fwrap = document.createElement("div"); fwrap.style.cssText = "margin-top:12px";

    fwrap.appendChild(flbl);
    const sl = document.createElement("input"); sl.type="range"; sl.min=0; sl.max=100; sl.step=5; sl.value=CFG.mixFreq;
    sl.style.cssText = "width:100%";
    const fhint = document.createElement("div"); fhint.style.cssText="font-size:11px;color:var(--muted);margin-top:4px";

    mixBox.appendChild(fwrap);

    /* 客層選択 */
    fld(mixBox, "客層を選んで生成");

      audWrap.appendChild(c);
    });
    mixBox.appendChild(audWrap);

    /* 生成ボタン+在庫情報 */
    const genRow = document.createElement("div"); genRow.style.cssText="display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap";
    const genB = document.createElement("button"); genB.className="mini cyan"; genB.textContent="この客層で生成";
    genRow.appendChild(genB);
    const editB = document.createElement("button"); editB.className="mini"; editB.textContent="📦 在庫を編集";
    genRow.appendChild(editB);
    const DB = shishaDB();

    /* 在庫編集パネル */
    const editPanel = document.createElement("div"); editPanel.style.display = "none"; mixBox.appendChild(editPanel);

      if (editPanel.style.display === "none") { editPanel.style.display = "block"; editB.textContent = "📦 在庫編集を閉じる"; drawInventory(); }

    function drawInventory() {
      const db = shishaDB();
      editPanel.innerHTML = "";
      const note = document.createElement("p"); note.className="desc"; note.style.margin="8px 0";
      note.textContent = "実際の在庫に合わせて編集。削除したフレーバーはミックス生成に使われなくなる。新規追加は数値を後で調整推奨。";

        const delBrand = document.createElement("button"); delBrand.className="mini"; delBrand.style.cssText="padding:2px 8px;font-size:11px"; delBrand.textContent="ブランド削除";
        delBrand.onclick = async () => {
          if (!confirm(brand+" を丸ごと削除する?")) return;
          const ndb = JSON.parse(JSON.stringify(shishaDB())); delete ndb[brand]; CFG.mixDB = ndb; await save(); drawInventory(); drawMix();
        };
        bh.appendChild(delBrand); bcard.appendChild(bh);
        /* フレーバーチップ */
        const chips = document.createElement("div"); chips.style.cssText="display:flex;flex-wrap:wrap;gap:5px";
        Object.keys(db[brand]).forEach((fl) => {
          const chip = document.createElement("span");
          chip.style.cssText = "display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:14px;padding:3px 6px 3px 10px;font-size:12px";
          chip.textContent = fl;
          const x = document.createElement("button"); x.textContent="×"; x.style.cssText="border:none;background:none;color:var(--bad);cursor:pointer;font-size:14px;padding:0 2px;line-height:1";
          x.onclick = async () => {
            const ndb = JSON.parse(JSON.stringify(shishaDB())); delete ndb[brand][fl];
            if (Object.keys(ndb[brand]).length===0) delete ndb[brand];
            CFG.mixDB = ndb; await save(); drawInventory(); drawMix();
          };
          chip.appendChild(x); chips.appendChild(chip);
        });
        bcard.appendChild(chips);
        /* フレーバー追加 */
        const addRow = document.createElement("div"); addRow.style.cssText="display:flex;gap:5px;margin-top:6px";
        const addIn = document.createElement("input"); addIn.placeholder="フレーバー名を追加"; addIn.style.cssText="font-size:12px;padding:5px 8px";
        const addBtn = document.createElement("button"); addBtn.className="mini cyan"; addBtn.style.cssText="padding:4px 10px;font-size:12px;flex:0 0 auto"; addBtn.textContent="追加";
        addBtn.onclick = async () => {
          const name = addIn.value.trim(); if (!name) return;
          const ndb = JSON.parse(JSON.stringify(shishaDB()));
          ndb[brand][name] = [5,2,0,3,8,5]; /* 仕様書のデフォルト数値 */
          CFG.mixDB = ndb; await save(); drawInventory(); drawMix();
        };
        addRow.appendChild(addIn); addRow.appendChild(addBtn); bcard.appendChild(addRow);
        editPanel.appendChild(bcard);
      });
      /* ブランド追加 */
      const newBrandRow = document.createElement("div"); newBrandRow.style.cssText="display:flex;gap:5px;margin-top:8px";
      const nbIn = document.createElement("input"); nbIn.placeholder="新ブランド名"; nbIn.style.cssText="font-size:12px;padding:6px 8px";
      const nbBtn = document.createElement("button"); nbBtn.className="mini cyan"; nbBtn.style.cssText="flex:0 0 auto"; nbBtn.textContent="ブランド追加";
      nbBtn.onclick = async () => {
        const b = nbIn.value.trim(); if (!b) return;
        const ndb = JSON.parse(JSON.stringify(shishaDB())); if (!ndb[b]) ndb[b] = {}; CFG.mixDB = ndb; await save(); drawInventory(); drawMix();
      };
      newBrandRow.appendChild(nbIn); newBrandRow.appendChild(nbBtn); editPanel.appendChild(newBrandRow);
    }

    const mixOut = document.createElement("div"); mixBox.appendChild(mixOut);
    genB.onclick = () => {
      genB.disabled = true; genB.textContent = "生成中…";
      setTimeout(() => { /* 計算は同期だが体感のため */
        const picks = shGenerate(selAud, 3);
        mixOut.innerHTML = "";
        if (!picks.length) { mixOut.innerHTML = '<div class="err">条件に合うミックスが見つからん。在庫を増やすか客層を変えて。</div>'; genB.disabled=false; genB.textContent="この客層で生成"; return; }
        picks.forEach((p)=> mixOut.appendChild(renderMixCard(p, selAud)));
        genB.disabled = false; genB.textContent = "この客層で生成";
      }, 50);
    };
  }
  drawMix();
  /* 店名変更で判定が変わるので、bizName入力を監視して再描画 */
  window._redrawMix = drawMix;

  const done = runBtn(el, "保存して全機能に反映");
  const okm = document.createElement("div"); okm.className = "okmsg"; el.appendChild(okm);
  done.onclick = async () => { await save(); okm.textContent = "保存した。全AI機能に反映される。"; setTimeout(()=>okm.textContent="",2500); drawMix(); };
};

/* ミックス結果カードを描画 */
function renderMixCard(p, audience) {
  const card = document.createElement("div");
  card.style.cssText = "background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-top:10px";
  const sweet=shAvg(p.combo,0), sour=shAvg(p.combo,1), cool=shAvg(p.combo,2), heavy=shAvg(p.combo,3);
  const lead = p.combo.slice().sort((a,b)=>b.ratio-a.ratio)[0];
  const label = shLabel(p.sc);
  const labelColor = p.sc>=90?"#10b981":(p.sc>=85?"var(--accent)":"var(--muted)");
  let h = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
  h += '<span style="font-weight:800;font-size:15px">'+esc(shMixName(p.combo))+'</span>';
  h += '<span style="font-size:13px;font-weight:800;color:'+labelColor+'">'+p.sc+'点 '+label+'</span></div>';
  /* こんなあなたにおすすめ(客層訴求) */
  const pitch = {
    "初心者":"シーシャ初めての人・吸いやすさ重視","女性人気":"女性・甘い系や華やかな香り好き",
    "男性人気":"男性・しっかり吸いごたえ重視","フルーツ系":"フルーツの爽やかさが好きな人",
    "紅茶系":"紅茶・茶葉の香り好き","スイーツ系":"甘いデザート系・スイーツ好き","重め":"濃厚で重ため・吸い応え重視",
  }[audience];
  if (pitch) h += '<div style="font-size:11.5px;color:var(--accent);background:rgba(255,45,149,.08);border-radius:6px;padding:4px 8px;margin-bottom:8px">💡 こんなあなたに: '+esc(pitch)+'</div>';
  /* 配合 */
  h += '<div style="font-size:12.5px;color:var(--muted);margin-bottom:8px">';
  h += p.combo.map(c=>esc(c.name)+'<span style="opacity:.6">('+esc(shBrandOf(c.name))+')</span> '+c.ratio).join(' / ');
  h += '</div>';
  /* バー */
  const barRow = (lbl,v) => '<div style="display:flex;align-items:center;gap:8px;font-size:11px;margin:2px 0"><span style="width:42px;color:var(--muted)">'+lbl+'</span><span style="font-family:var(--mono);letter-spacing:-1px;color:var(--accent)">'+shBar(v)+'</span></div>';
  h += barRow("甘さ",sweet)+barRow("酸味",sour)+barRow("清涼",cool)+barRow("重さ",heavy);
  h += '<div style="font-size:11px;color:var(--muted);margin-top:6px">相性 '+p.info+'</div>';
  card.innerHTML = h;
  /* コピーボタン */
  const cp = document.createElement("button"); cp.className="mini"; cp.style.marginTop="8px"; cp.textContent="📋 配合をコピー";
  const txt = shMixName(p.combo)+"\n"+p.combo.map(c=>c.name+"("+shBrandOf(c.name)+") "+c.ratio).join(" / ")+"\nおすすめ度: "+p.sc+"点 "+label+(pitch?"\nこんなあなたに: "+pitch:"");
  cp.onclick = () => { navigator.clipboard.writeText(txt); cp.textContent="✓ コピーした"; setTimeout(()=>cp.textContent="📋 配合をコピー",1500); };
  card.appendChild(cp);
  return card;
}

/* スライダー付きフィールド(5%〜100%) */
function sliderField(el, label, key, onChange) {
  fld(el, label);
  const wrap = document.createElement("div");
  wrap.style.cssText = "display:flex;align-items:center;gap:12px";
  const range = document.createElement("input");
  range.type = "range"; range.min = "5"; range.max = "100"; range.step = "5"; range.value = CFG[key];
  range.style.cssText = "flex:1;accent-color:var(--accent)";
  const val = document.createElement("span");
  val.style.cssText = "font-family:var(--mono);font-weight:800;color:var(--accent2);min-width:46px;text-align:right";
  val.textContent = CFG[key] + "%";
  range.oninput = () => { CFG[key] = parseInt(range.value); val.textContent = CFG[key] + "%"; onChange(); };
  wrap.appendChild(range); wrap.appendChild(val); el.appendChild(wrap);
}

/* 単一選択チップを指定要素に描画(コールバック付き) */
function chipsSingleInto(host, options, initial, onChange) {
  const w = document.createElement("div"); w.className = "chips"; host.appendChild(w);
  let cur = initial;
  function draw() {
    w.innerHTML = "";
    options.forEach((o) => {
      const c = document.createElement("button");
      c.className = "chip" + (cur === o ? " on" : "");
      c.textContent = o;
      c.onclick = () => { cur = o; onChange(o); draw(); };
      w.appendChild(c);
    });
  }
  draw();
}

/* 業種ごとの欲望テンプレ(ONになりやすい初期候補。AIでも追加生成できる) */
const RADAR_DESIRES = {
  shisha: ["暇つぶししたい","癒されたい","オシャレな場所に行きたい","誰かと話したい","デート成功したい","非日常を味わいたい","二軒目を探してる","まだ帰りたくない"],
  kyotei: ["買い目を決めたい","点数を絞りたい","展示の見方を知りたい","予想を参考にしたい","今日のレースを楽しみたい","初心者でも分かる情報がほしい"],
  generic: ["今すぐ解決したい","おすすめを知りたい","近くで探してる","誰かに相談したい","失敗したくない","お得に済ませたい"],
};
/* 除外フィルター(人物タイプ。AI判定で弾く) */
const RADAR_EXCLUDES = ["同業者","オーナー・経営者","店員・スタッフ","求人・求職","業者・卸","インフルエンサー","Bot・自動投稿","ニュースアカウント","懸賞・副業垢","アダルト垢"];

function radarDesirePresetFor(biz) {
  const b = (biz || "");
  if (/シーシャ|shisha|水たばこ|フーカー/i.test(b)) return RADAR_DESIRES.shisha;
  if (/競艇|ボート|kyotei/i.test(b)) return RADAR_DESIRES.kyotei;
  return RADAR_DESIRES.generic;
}

  /* CFG.competitors → ユーザー名配列。URL/＠/素の名前/?param付きどれでも@名に正規化(normalizeCompetitors_流用) */
  function parseCompetitors_(raw) {
    return normalizeCompetitors_(raw).split(/\n+/).map(s=>s.trim()).filter(Boolean);
  }

  async function runCompetitorRadar() {
    if (!acct.value) { alert("対象アカウントを選んでな"); return; }
    await loadCfgFor(acct.value);
    const biz = (CFG.bizType||"").trim();
    if (!biz) { alert("先に⚙生成設定で業種を入れてな(例: 競艇予想 / 金沢のシーシャバー)"); return; }
    const area = (CFG.bizArea||"").trim();
    const competitors = parseCompetitors_(CFG.competitors);
    /* 競合欄がURLや?param付きのままなら@名に正規化して保存(次回から綺麗に・自己修復) */
    const cleaned = competitors.join("\n");
    if (competitors.length && cleaned !== String(CFG.competitors||"").trim()) {
      CFG.competitors = cleaned; try { await saveCfg(); } catch(_){}
    }
    if (!competitors.length) {
      out.innerHTML = '<div class="card" style="padding:14px;font-size:13px;line-height:1.8">'
        + '👥 競合がまだ登録されてへん。<br><br>'
        + '<b>⚙生成設定</b>の「競合アカウント」欄に、ライバルのXアカウントを入れてな。<br>'
        + 'URLを貼り付けてもOK(入力欄の外をタップで自動整形され、@名だけ残る)。<br><br>'
        + 'ここに登録した競合に<b>実際に絡んでる客</b>を、絡んだ回数の多い順に拾って見込み度を判定するで。'
        + '</div>';
      return;
    }
    const selected = competitors.filter(c => rivalOn[c.toLowerCase()] !== false);
    if (!selected.length) { alert("競合を1つ以上ONにしてな(タップで切り替えられる)"); return; }
    const excludes = RADAR_EXCLUDES.filter(x=>excludeSel[x]);
    out.innerHTML = '<div class="muted" style="padding:10px;line-height:1.7">👥 競合に絡んでる客を集めてAI判定中…(30秒〜1分)<br>対象競合: ' + selected.map(c=>"@"+esc(c)).join(" / ") + '</div>';
    try {
      const sr = await gasFetch_("radarCompetitorScan", { competitors: selected, industry: biz, area, service: biz, excludes, limit, minScore: 30, screen_name: acct.value });
      const items = (sr && sr.items) ? sr.items : [];
      if (!items.length) {
        const dbg = (sr && sr.debug) ? sr.debug : {};
        const perComp = (sr && sr.perComp) ? sr.perComp : [];
        let lines = "条件を満たす見込み客が見つからんかった。<br><br>";
        lines += '<div style="font-size:12px;line-height:1.8;font-family:monospace">'
          + '競合数: ' + (dbg.competitors||0) + '<br>'
          + '取得した絡み: ' + (dbg.fetched||0) + '件<br>'
          + 'ユニーク客: ' + (dbg.uniqueUsers||0) + '人<br>'
          + 'AI判定: ' + (dbg.judged||0) + '人<br>'
          + '通過(30点以上): ' + (dbg.passed||0) + '人'
          + '</div><br>';
        if (sr && sr.error==="NO_COMPETITORS") lines += '👉 競合が空。⚙生成設定で登録してな。';
        else if (!dbg.fetched) lines += '👉 競合への絡みが0件。リプの少ないアカウントやと取れん。<b>もっと絡みの多い競合</b>を足すか、別の競合で試して。';
        else if (!dbg.judged) lines += '👉 客は取れたけどAI判定が空。もう一回試すか件数を変えてみて。';
        else lines += '👉 候補はあったけど30点未満やった。別の競合を足すと精度上がる。';
        if (perComp.length) {
          lines += '<br><br><span class="muted" style="font-size:11px">競合別の絡みヒット数:<br>'
            + perComp.map(p=>"@"+esc(p.competitor)+" → "+p.hits+"件").join("<br>") + '</span>';
        }
        out.innerHTML = '<div class="card" style="padding:12px;font-size:12.5px;line-height:1.7">'+lines+'</div>';
        return;
      }
      renderCompetitorResults(items, sr.debug, sr.perComp, selected);
    } catch(e) { out.innerHTML = '<div class="err">'+esc(e.message)+'</div>'; }
  }

  function renderCompetitorResults(items, dbg, perComp, competitors) {
    out.innerHTML = "";
    const head2 = document.createElement("div"); head2.className = "desc"; head2.style.margin = "6px 0";
    let summary = '👥 競合: ' + competitors.map(c=>"@"+esc(c)).join(" / ");
    if (perComp && perComp.length) summary += '<br><span style="font-size:11px;color:var(--muted)">絡みヒット: ' + perComp.map(p=>"@"+esc(p.competitor)+" "+p.hits+"件").join(" / ") + '</span>';
    if (dbg) summary += '<br><span style="font-size:11px;color:var(--muted)">絡み'+(dbg.fetched||0)+'→客'+(dbg.uniqueUsers||0)+'人→判定'+(dbg.judged||0)+'→表示'+(dbg.passed||0)+'</span>';
    summary += '<br>絡み回数×見込み度の高い順。リプ案をコピーしてXで送る(送信は手動):';
    head2.innerHTML = summary;
    out.appendChild(head2);
    items.forEach(it => out.appendChild(radarCard(it)));
  }

  function radarChoice(label, opts, cur, onPick) {
    const wrap = document.createElement("div");
    const lab = document.createElement("div"); lab.className = "desc"; lab.style.marginBottom = "4px"; lab.textContent = label; wrap.appendChild(lab);
    const row = document.createElement("div"); row.className = "chips"; wrap.appendChild(row);
    const btns = [];
    opts.forEach(([txt,val]) => {
      const b = document.createElement("button"); b.className = "chip" + (cur===val?" on":""); b.textContent = txt;
      b.onclick = ()=>{ onPick(val); btns.forEach(x=>x.b.className="chip"+(x.val===val?" on":"")); };
      btns.push({b,val}); row.appendChild(b);
    });
    return wrap;
  }

  async function runRadar() {
    if (!acct.value) { alert("対象アカウントを選んでな"); return; }
    await loadCfgFor(acct.value);
    const biz = (CFG.bizType||"").trim();
    if (!biz) { alert("先に⚙生成設定で業種を入れてな(例: 金沢のシーシャバー)"); return; }
    const area = (CFG.bizArea||"").trim();
    const desires = Object.keys(desireSel).filter(k=>desireSel[k]);
    const excludes = RADAR_EXCLUDES.filter(x=>excludeSel[x]);

    out.innerHTML = '<div class="muted" style="padding:10px">① AIが検索ワードを考え中…</div>';
    try {
      /* ① クエリ生成 */
      const qr = await gasFetch_("radarQueries", { industry: biz, area, desires, strength, period });
      lastQueries = (qr && qr.queries) ? qr.queries : [];
      if (!lastQueries.length) {
        /* 原因切り分け用: GASが実際に返した中身をそのまま見せる */
        let dump = '';
        try { dump = JSON.stringify(qr); } catch(_) { dump = String(qr); }
        out.innerHTML = '<div class="err" style="padding:12px;font-size:12px;line-height:1.7">'
          + '検索ワードが作れんかった。<br><br>'
          + '<b>送信した業種:</b> ' + esc(biz || '(空)') + '<br>'
          + '<b>送信した欲望:</b> ' + esc(desires.join(' / ') || '(空)') + '<br>'
          + '<b>GASからの返り:</b><br><span style="font-family:monospace;word-break:break-all">' + esc(dump.slice(0,800)) + '</span>'
          + '</div>';
        return;
      }
      out.innerHTML = '<div class="card" style="padding:10px;margin-bottom:10px;font-size:12.5px">🔍 検索ワード: ' + lastQueries.map(q=>esc(q)).join(" / ") + '</div><div class="muted" style="padding:10px">② Xを検索して見込み客をAI判定中…(30秒ほど)</div>';

      /* ② 検索+判定 */
      const sr = await gasFetch_("radarSearch", { industry: biz, area, service: biz, queries: lastQueries, excludes, period, limit, screen_name: acct.value, minScore: 30 });
      const items = (sr && sr.items) ? sr.items : [];
      if (!items.length) {
        const dbg = (sr && sr.debug) ? sr.debug : {};
        let lines = "今回は表示条件を満たす見込み客が見つからんかった。<br><br>";
        lines += '<div style="font-size:12px;line-height:1.8;font-family:monospace">'
          + '生成クエリ: ' + (dbg.generated||0) + '件<br>'
          + 'X取得: ' + (dbg.fetched||0) + '件<br>'
          + '重複除外後: ' + (dbg.deduped||0) + '件<br>'
          + '期間内: ' + (dbg.inPeriod||0) + '件<br>'
          + '一次除外後: ' + (dbg.afterSpam||0) + '件<br>'
          + 'AI判定対象: ' + (dbg.judgeTarget||0) + '件<br>'
          + 'AI判定通過: ' + (dbg.judged||0) + '件<br>'
          + '30点以上: ' + (dbg.shown||0) + '件'
          + '</div><br>';
        /* どこで消えたかで対策を出し分け */
        if (!dbg.fetched) lines += '👉 X検索が0件。<b>期間を3日/7日に広げる</b>か、狙う欲望を増やして再挑戦してな。クエリが特殊すぎる可能性も。';
        else if (!dbg.afterSpam) lines += '👉 取れたけど一次除外で全部消えた。業者・愚痴・攻撃的投稿ばかりやったかも。欲望や客層を変えてみて。';
        else if (!dbg.judged) lines += '👉 投稿は取れたけどAIが見込み客と判定せんかった。別の欲望・客層を足すと精度上がる。';
        else lines += '👉 候補はあったけど30点未満やった。欲望や客層を見直して再挑戦してな。';
        /* 各クエリのヒット数も出す(どのクエリが弱いか分かる) */
        if (dbg.perQuery && dbg.perQuery.length) {
          lines += '<br><br><span class="muted" style="font-size:11px">クエリ別ヒット数:<br>'
            + dbg.perQuery.map(p=>esc(p.query)+' → '+p.got+'件'+(p.err?' ('+esc(p.err)+')':'')).join('<br>')
            + '</span>';
        }
        out.innerHTML = '<div class="card" style="padding:12px;font-size:12.5px;line-height:1.7">'+lines+'</div>';
        return;
      }
      renderResults(items, sr.debug);
    } catch(e) { out.innerHTML = '<div class="err">'+esc(e.message)+'</div>'; }
  }

  function renderResults(items, dbg) {
    out.innerHTML = "";
    const head2 = document.createElement("div"); head2.className = "desc"; head2.style.margin = "6px 0";
    let summary = '🔍 ' + lastQueries.map(q=>esc(q)).join(" / ");
    if (dbg) summary += '<br><span style="font-size:11px;color:var(--muted)">取得'+(dbg.fetched||0)+'→重複除外'+(dbg.deduped||0)+'→期間内'+(dbg.inPeriod||0)+'→除外後'+(dbg.afterSpam||0)+'→判定'+(dbg.judged||0)+'→表示'+(dbg.shown||0)+'</span>';
    summary += '<br>見込み度の高い順。リプ案をコピーしてXで送る(送信は手動):';
    head2.innerHTML = summary;
    out.appendChild(head2);
    if (!items.length) { out.innerHTML += '<div class="muted" style="padding:10px">見込み客が見つからんかった。期間を広げる/欲望を増やす/強度を上げて再挑戦してな。</div>'; return; }
    items.forEach(it => out.appendChild(radarCard(it)));
  }

  function radarCard(it) {
    const card = document.createElement("div"); card.className = "card"; card.style.cssText = "padding:12px;margin-top:10px";
    const riskColor = it.risk_level==="high" ? "#ff5577" : it.risk_level==="medium" ? "#ffaa33" : "#33cc88";
    const riskLabel = it.risk_level==="high" ? "⚠️高" : it.risk_level==="medium" ? "注意" : "安全";
    const sc = Math.max(0, Math.min(100, it.score||0));
    const rk = Math.max(0, Math.min(100, (typeof it.risk_score==="number") ? it.risk_score : (it.risk_level==="high"?80:it.risk_level==="medium"?50:10)));
    /* 見込み度で色を変える: 高=シアン, 中=紫, 低=くすみ */
    const scColor = sc>=75 ? "#22e0ff" : sc>=50 ? "#a855f7" : "#7a8499";
    const scGlow = sc>=75 ? "rgba(34,224,255,.65)" : sc>=50 ? "rgba(168,85,247,.55)" : "rgba(122,132,153,.35)";
    /* 危険度: 高いほど赤く光る */
    const rkColor = rk>=65 ? "#ff4466" : rk>=35 ? "#ffaa33" : "#33cc88";
    const rkGlow = rk>=65 ? "rgba(255,68,102,.6)" : rk>=35 ? "rgba(255,170,51,.5)" : "rgba(51,204,136,.4)";
    card.innerHTML =
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
      + '<div style="font-size:12px;color:var(--accent2)">@'+esc(it.author_handle||"")+(it.posted_at?' · '+timeAgo(it.posted_at):'')+'</div>'
      + '<span style="font-size:11px;padding:2px 7px;border-radius:6px;background:'+riskColor+'22;color:'+riskColor+'">'+riskLabel+'</span>'
      + '</div>'
      /* 第2弾の絡みバッジ(engage_countがある時だけ) */
      + (it.engage_count ? '<div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">'
          + '<span style="font-size:11px;padding:3px 9px;border-radius:7px;background:rgba(34,224,255,.12);color:#22e0ff;font-weight:700">🔥 競合に絡み '+it.engage_count+'回</span>'
          + ((it.competitor_count>1) ? '<span style="font-size:11px;padding:3px 9px;border-radius:7px;background:rgba(168,85,247,.14);color:#c98bff;font-weight:700">🎯 競合'+it.competitor_count+'件に接触</span>' : '')
          + '</div>' : '')
      /* 近未来ネオンゲージ */
      + '<div style="margin-bottom:10px">'
        + '<div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:3px">'
          + '<span style="font-size:10px;letter-spacing:2px;color:'+scColor+';text-transform:uppercase;opacity:.85">見込み度</span>'
          + '<span style="font-size:22px;font-weight:900;line-height:1;color:'+scColor+';text-shadow:0 0 8px '+scGlow+'">'+sc+'<span style="font-size:12px;font-weight:700">%</span></span>'
        + '</div>'
        + '<div style="height:6px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden;position:relative">'
          + '<div style="height:100%;width:'+sc+'%;border-radius:99px;background:linear-gradient(90deg,'+scColor+'66,'+scColor+');box-shadow:0 0 10px '+scGlow+'"></div>'
        + '</div>'
      + '</div>'
      /* 危険度ゲージ */
      + '<div style="margin-bottom:10px">'
        + '<div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:3px">'
          + '<span style="font-size:10px;letter-spacing:2px;color:'+rkColor+';text-transform:uppercase;opacity:.85">危険度</span>'
          + '<span style="font-size:15px;font-weight:800;line-height:1;color:'+rkColor+';text-shadow:0 0 6px '+rkGlow+'">'+rk+'<span style="font-size:10px;font-weight:700">%</span></span>'
        + '</div>'
        + '<div style="height:4px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden">'
          + '<div style="height:100%;width:'+rk+'%;border-radius:99px;background:linear-gradient(90deg,'+rkColor+'66,'+rkColor+');box-shadow:0 0 8px '+rkGlow+'"></div>'
        + '</div>'
      + '</div>'
      + '<div style="font-size:13px;line-height:1.55;margin-bottom:6px;white-space:pre-wrap">'+esc((it.tweet_text||"").slice(0,200))+'</div>'
      + '<div style="font-size:12px;color:var(--muted);margin-bottom:8px">💡 '+esc(it.score_reason||"")+'</div>';

    /* リプ案 */
    const reps = [it.reply_1,it.reply_2,it.reply_3].filter(Boolean);
    if (reps.length) {
      const rl = document.createElement("div"); rl.className="desc"; rl.style.cssText="margin:4px 0"; rl.textContent="リプ案(タップでコピー):"; card.appendChild(rl);
      reps.forEach(r => {
        const rb = document.createElement("button"); rb.className="mini"; rb.style.cssText="display:block;width:100%;text-align:left;margin:3px 0;white-space:normal;line-height:1.4"; rb.textContent = "💬 "+r;
        rb.onclick = ()=>{ navigator.clipboard.writeText(r); rb.textContent="✓ コピーした"; setTimeout(()=>rb.textContent="💬 "+r,1200); };
        card.appendChild(rb);
      });
    }
    if (it.quote_text) {
      const qb = document.createElement("button"); qb.className="mini"; qb.style.cssText="display:block;width:100%;text-align:left;margin:3px 0;white-space:normal;line-height:1.4"; qb.textContent = "🔁 引用案: "+it.quote_text;
      qb.onclick = ()=>{ navigator.clipboard.writeText(it.quote_text); qb.textContent="✓ コピーした"; setTimeout(()=>qb.textContent="🔁 引用案: "+it.quote_text,1200); };
      card.appendChild(qb);
    }

    /* 操作ボタン */
    const btnRow = document.createElement("div"); btnRow.style.cssText="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px";
    const openB = document.createElement("button"); openB.className="mini"; openB.textContent="↗ Xで開く";
    openB.onclick = ()=>{ const link = it.tweet_url || it.profile_url; if(link) window.open(link,"_blank"); };
    const saveB = document.createElement("button"); saveB.className="mini cyan"; saveB.textContent="⭐ 見込み客リストに追加";
    saveB.onclick = async ()=>{ saveB.disabled=true; saveB.textContent="保存中…";
      try {
        const r = await gasFetch_("radarSave", { row: Object.assign({ screen_name: acct.value, status:"new" }, radarRowFor(it)) });
        if (r && r.ok) { saveB.textContent="✓ 保存した"; }
        else { saveB.textContent="⭐ 追加"; saveB.disabled=false; alert("保存できんかった: " + ((r && r.error) ? r.error : "原因不明")); }
      }
      catch(e){ saveB.textContent="⭐ 追加"; saveB.disabled=false; alert(e.message); } };
    const hideB = document.createElement("button"); hideB.className="mini"; hideB.textContent="✕ 非表示";
    hideB.onclick = ()=>{ card.style.display="none"; };
    btnRow.appendChild(openB); btnRow.appendChild(saveB); btnRow.appendChild(hideB);
    card.appendChild(btnRow);
    return card;
  }

  function radarRowFor(it) {
    return {
      tweet_id: it.tweet_id, tweet_url: it.tweet_url || it.profile_url, tweet_text: it.tweet_text,
      author_name: it.author_name, author_handle: it.author_handle,
      score: it.score, score_reason: it.score_reason, risk_level: it.risk_level,
      reply_1: it.reply_1, reply_2: it.reply_2, reply_3: it.reply_3,
      quote_text: it.quote_text,
      engage_count: it.engage_count || 0,
      competitor_count: it.competitor_count || 0,
      source: it.engage_count ? "competitor" : "search",
    };
  }

  async function showSavedList() {
    if (!acct.value) { alert("対象アカウントを選んでな"); return; }
    out.innerHTML = '<div class="muted" style="padding:10px">保存した見込み客を読み込み中…</div>';
    try {
      const j = await gasFetch_("radarList", { screen_name: acct.value });
      const items = (j && j.items) ? j.items : [];
      out.innerHTML = '<div class="desc" style="margin:6px 0">⭐ 保存した見込み客('+items.length+'件):</div>';
      if (!items.length) { out.innerHTML += '<div class="muted" style="padding:10px">まだ保存なし。検索して「⭐見込み客リストに追加」で貯める。</div>'; return; }
      items.forEach(it => out.appendChild(radarCard(it)));
    } catch(e){ out.innerHTML = '<div class="err">'+esc(e.message)+'</div>'; }
  }

  /* アカウント一覧を読み込む */
  (async ()=>{
    if (!S.clients || !S.clients.length) { try { await loadClients(); } catch(e){} }
    const accounts = (S.clients || []);
    acct.innerHTML = "";
    accounts.forEach(a=>{ const o=document.createElement("option"); o.value=a.screen_name; o.textContent="@"+a.screen_name; acct.appendChild(o); });
    if (accounts.length) { acct.value = accounts[0].screen_name; await loadCfgFor(acct.value); }
    acct.onchange = async ()=>{ await loadCfgFor(acct.value); desireSel={}; rivalOn={}; renderBody(); };
    renderBody();
  })();
};

/* ---- 📭 書き漏れチェック(全アカ横断で空き日を検出・古いdraft自動掃除) ---- */
BUILDERS.gapcheck = (el) => {
  head(el, "📭 書き漏れチェック", "全アカウントを横断して、今週7日間で投稿が入ってない日を検出。空きがあるアカだけ出す。古い下書き(7日以上前)は自動で掃除。", [
    "アプリを開くと自動でチェック",
    "空きアカ・空き日が出たら埋める",
    "古い下書きは勝手に消える",
  ]);

  const status = document.createElement("p");
  status.className = "desc"; status.textContent = "チェック中…";
  el.appendChild(status);

  const result = document.createElement("div");
  el.appendChild(result);

  const reBtn = runBtn(el, "🔄 もう一度チェック");

  async function cleanOldDrafts() {
    /* 7日以上前のdraftを削除 */
    try {
      const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 7);
      await sb.from("scheduled_posts")
        .delete()
        .eq("status", "draft")
        .lt("scheduled_at", cutoff.toISOString());
    } catch(e) { /* 失敗しても致命的でない */ }
  }

  async function run() {
    status.textContent = "チェック中…";
    result.innerHTML = "";
    await cleanOldDrafts();

    const actives = S.clients.filter((c)=>c.status==="active" && c.screen_name !== "_test_" && !/^_test/.test(c.screen_name));
    if (!actives.length) { status.textContent = "連携中のアカウントがない(テスト用は除外)。"; return; }

    /* 今日から7日間の日付 */
    const wd = ["日","月","火","水","木","金","土"];
    const days = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(); d.setDate(d.getDate() + i);
      const ds = d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
      days.push({ ds, label: wd[d.getDay()], md: (d.getMonth()+1) + "/" + d.getDate() });
    }
    const from = new Date(days[0].ds + "T00:00:00").toISOString();
    const to = new Date(days[6].ds + "T23:59:59").toISOString();

    /* 全アカの予約・下書き・投稿済みを一括取得
       (postedも「その日は書いた」とカウント。予約管理の表示では消えてても判定には使う) */
    let rows = [];
    try {
      const { data } = await sb.from("scheduled_posts")
        .select("screen_name,scheduled_at,status,posted_at")
        .in("status", ["pending","draft","posted"])
        .gte("scheduled_at", from).lte("scheduled_at", to);
      rows = data || [];
    } catch(e) {
      status.textContent = "投稿データの取得に失敗した。";
      return;
    }

    /* アカ×日付で「埋まってるか」を集計。postedは実投稿日(posted_at)も見る */
    const taken = {}; // screen_name -> {ds:true}
    const dayKey = (dt) => dt.getFullYear() + "-" + String(dt.getMonth()+1).padStart(2,"0") + "-" + String(dt.getDate()).padStart(2,"0");
    rows.forEach((r) => {
      (taken[r.screen_name] = taken[r.screen_name] || {});
      taken[r.screen_name][dayKey(new Date(r.scheduled_at))] = true;
      if (r.status === "posted" && r.posted_at) {
        taken[r.screen_name][dayKey(new Date(r.posted_at))] = true;
      }
    });

    /* 空きがあるアカだけ抽出 */
    const flagged = [];
    actives.forEach((c) => {
      const gaps = days.filter((d) => !(taken[c.screen_name] && taken[c.screen_name][d.ds]));
      if (gaps.length) flagged.push({ acc: c.screen_name, gaps });
    });

    status.textContent = "";
    if (!flagged.length) {
      result.innerHTML =
        '<div style="position:relative;overflow:hidden;background:linear-gradient(135deg,rgba(16,185,129,.18),rgba(0,229,255,.12),rgba(168,85,247,.15));border:1px solid rgba(16,185,129,.5);border-radius:18px;padding:32px 20px;text-align:center;box-shadow:0 0 40px rgba(16,185,129,.25),inset 0 0 30px rgba(16,185,129,.08)">' +
          '<div style="font-size:46px;line-height:1;margin-bottom:12px;filter:drop-shadow(0 0 12px rgba(16,185,129,.6))">🏆</div>' +
          '<div style="font-size:20px;font-weight:800;letter-spacing:.04em;background:linear-gradient(90deg,#10b981,#00e5ff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px">ALL CLEAR</div>' +
          '<div style="font-size:14px;font-weight:700;color:#e8fff5;margin-bottom:4px">全アカウント 今週ぜんぶ埋まってる</div>' +
          '<div style="font-size:12px;color:rgba(255,255,255,.6);letter-spacing:.08em">7 DAYS · NO GAPS · 書き漏れゼロ</div>' +
          '<div style="margin-top:14px;font-size:11px;color:rgba(16,185,129,.85);letter-spacing:.12em;text-transform:uppercase">Keep the streak going 🔥</div>' +
        '</div>';
      return;
    }

    const intro = document.createElement("p");
    intro.className = "desc"; intro.style.margin = "0 0 10px";
    intro.textContent = flagged.length + "アカウントに書き漏れあり。埋まってるアカは省略。";
    result.appendChild(intro);

    flagged.forEach((f) => {
      const card = document.createElement("div");
      card.style.cssText = "background:var(--card);border:1px solid var(--bad);border-radius:12px;padding:12px 14px;margin:8px 0";
      const name = document.createElement("div");
      name.style.cssText = "font-weight:700;font-size:14px;margin-bottom:8px";
      name.innerHTML = '<span style="color:var(--accent)">@'+esc(f.acc)+'</span> <span style="color:var(--bad);font-size:12px">'+f.gaps.length+'日 空き</span>';
      card.appendChild(name);
      /* 空き日ごとに「この日を生成」ボタン */
      const btnWrap = document.createElement("div");
      btnWrap.style.cssText = "display:flex;flex-wrap:wrap;gap:6px";
      f.gaps.forEach((g) => {
        const b = document.createElement("button");
        b.className = "btn"; b.style.cssText = "margin:0;padding:8px 12px;font-size:13px";
        b.textContent = "✏️ " + g.md + "(" + g.label + ")";
        b.onclick = () => genOneDay(f.acc, g, b);
        btnWrap.appendChild(b);
      });
      card.appendChild(btnWrap);
      result.appendChild(card);
    });
  }

  /* 指定アカ・指定日の投稿を1本生成して、その場で見せる(確認後に予約管理へ) */
  async function genOneDay(account, gap, btn) {
    const o = btn.textContent;
    btn.disabled = true; btn.textContent = "生成中…";
    try {
      await loadCfgFor(account);
      const isBoat = /競艇|ボートレース|ボート/.test(CFG.bizType || "");
      /* 噂のシーシャBar: 頻度に応じてミックス紹介投稿にする */
      if (isUwasaShisha(account, CFG.bizName) && CFG.mixOn && Math.random()*100 < (CFG.mixFreq||0)) {
        const sc2 = shPickScene(null, gap.ds);
        const r = await shMixPostText(null, sc2);
        if (r && r.thread) {
          btn.disabled = false; btn.textContent = o;
          showDraftPreview(account, gap, r.thread[0], "20:00", btn, r.thread.length>1?r.thread.slice(1):null);
          return;
        }
      }
      const prompt =
        `${S.sns}の投稿を1本作る。日付: ${gap.ds}(${gap.label}曜)。\n` +
        `このアカウントの業種・性格・文体設定に沿って、その日にふさわしい投稿を1本。\n` +
        `バズりやすい推奨投稿時刻(HH:MM)も決める。\n` +
        (isBoat ? "競艇アカだが、これは未来の日付の投稿で、その日のレース・出走表・モーター・展示データはまだ存在しない。\n【絶対禁止】具体的なレース場名(蒲郡・尼崎・徳山など)・レース番号・艇番・選手名・連勝率・モーター情報・展示タイム・的中実績など、データに基づく具体的な予想や数値を一切書かない(まだ確定していないデータを書くのは捏造になる)。\n代わりに、データが不要な内容にする: 競艇への向き合い方・心構え、過去の一般的な振り返り、買い方のノウハウや考え方、フォロワーへの告知・あいさつ、X運用上の小ネタ。具体的なその日の予想は別の『無料予想』機能が当日データを取得して出すので、ここでは出さない。\n" : "") +
        `出力フォーマット(厳守):\n時刻: HH:MM\n本文:\n(投稿本文)\n\n前置き不要。日本語。${sc()}`;
      const text = await callAI(prompt, false);
      if (!text || !text.trim()) throw new Error("AIが空を返した。もう一回試して。");
      let h = "12:00", bodyTxt = text.trim();
      const mt = text.match(/時刻[:：]\s*(\d{1,2}:\d{2})/);
      if (mt) h = mt[1];
      const mb = text.match(/本文[:：]\s*([\s\S]+)/);
      if (mb) bodyTxt = mb[1].trim();
      btn.disabled = false; btn.textContent = o;
      /* その場に本文を表示して、確認してから送る */
      showDraftPreview(account, gap, bodyTxt, h, btn);
    } catch (e) {
      alert("生成失敗: " + (e.message || e));
      btn.disabled = false; btn.textContent = o;
    }
  }

  /* 生成した本文をその場に出して、予約管理へ送る/作り直すを選ばせる */
  function showDraftPreview(account, gap, bodyTxt, h, srcBtn, threadRest) {
    /* 既存のプレビューがあれば消す */
    const existing = document.getElementById("gapPreview");
    if (existing) existing.remove();
    const card = document.createElement("div");
    card.id = "gapPreview";
    card.style.cssText = "background:var(--card);border:1px solid var(--accent);border-radius:12px;padding:14px;margin:12px 0;box-shadow:0 0 20px rgba(255,45,149,.15)";
    const ttl = document.createElement("div");
    ttl.style.cssText = "font-weight:700;font-size:14px;margin-bottom:8px";
    ttl.innerHTML = '<span style="color:var(--accent)">@'+esc(account)+'</span> '+gap.md+'('+gap.label+') の投稿案'+(threadRest&&threadRest.length?' 🧵スレッド':'');
    card.appendChild(ttl);
    /* 時刻 */
    const tRow = document.createElement("div");
    tRow.style.cssText = "display:flex;align-items:center;gap:8px;margin-bottom:8px";
    const tLbl = document.createElement("span"); tLbl.textContent = "⏰ 投稿時刻"; tLbl.style.fontSize = "13px";
    const tIn = document.createElement("input"); tIn.type = "time"; tIn.value = h;
    tIn.style.cssText = "padding:6px 10px;font-family:var(--mono);width:auto";
    tRow.appendChild(tLbl); tRow.appendChild(tIn);
    card.appendChild(tRow);
    /* 1本目本文(編集可) */
    const body = document.createElement("textarea");
    body.rows = 6; body.value = bodyTxt;
    body.style.cssText = "width:100%;font-size:13.5px;line-height:1.6";
    card.appendChild(body);
    const cnt = document.createElement("p"); cnt.className = "desc"; cnt.style.margin = "4px 0 8px";
    const updCnt = () => { cnt.textContent = "1本目 "+body.value.length + "字" + (S.sns==="X" && body.value.length>140 ? " ⚠140字超" : ""); };
    body.oninput = updCnt; updCnt();
    /* スレッド2本目以降(編集可) */
    const threadAreas = [];
    if (threadRest && threadRest.length) {
      threadRest.forEach((t2, i) => {
        const lbl = document.createElement("p"); lbl.className="desc"; lbl.style.margin="6px 0 2px"; lbl.textContent = "🧵 "+(i+2)+"本目(リプ)";
        card.appendChild(lbl);
        const ta2 = document.createElement("textarea"); ta2.rows = 5; ta2.value = t2;
        ta2.style.cssText = "width:100%;font-size:13px;line-height:1.6";
        card.appendChild(ta2); threadAreas.push(ta2);
      });
    }
    /* ボタン: 送る / 作り直す */
    const acts = document.createElement("div");
    acts.style.cssText = "display:flex;gap:8px;flex-wrap:wrap;margin-top:8px";
    const sendBtn = document.createElement("button");
    sendBtn.className = "btn"; sendBtn.style.cssText = "margin:0;flex:1;min-width:140px;background:linear-gradient(135deg,#10b981,#059669)";
    sendBtn.textContent = "✅ 予約管理へ送る";
    sendBtn.onclick = async () => {
      sendBtn.disabled = true; sendBtn.textContent = "送信中…";
      try {
        const threadVals = threadAreas.map(t=>t.value.trim()).filter(Boolean);
        const { error } = await saveScheduledPost({
          screen_name: account,
          text: body.value.trim(),
          scheduled_at: new Date(gap.ds + "T" + (tIn.value||"12:00") + ":00").toISOString(),
          status: "draft",
          thread: threadVals.length ? threadVals : null,
        });
        if (error) throw new Error(error.message);
        card.innerHTML = '<div style="text-align:center;color:#10b981;font-weight:700;padding:8px">✓ '+gap.md+' を予約管理に送った!'+(threadVals.length?' (🧵'+(threadVals.length+1)+'連投)':'')+'</div>';
        if (srcBtn) { srcBtn.textContent = "✓ "+gap.md+" 作成済"; srcBtn.style.background = "linear-gradient(135deg,#10b981,#059669)"; srcBtn.disabled = true; }
      } catch (e) { sendBtn.disabled = false; sendBtn.textContent = "✅ 予約管理へ送る"; alert("送信失敗: " + e.message); }
    };
    const reBtn = document.createElement("button");
    reBtn.className = "btn"; reBtn.style.cssText = "margin:0;flex:1;min-width:140px";
    reBtn.textContent = "🔀 作り直す";
    reBtn.onclick = () => { card.remove(); genOneDay(account, gap, srcBtn); };
    acts.appendChild(sendBtn); acts.appendChild(reBtn);
    card.appendChild(acts);
    /* 結果エリアの先頭に差し込む */
    result.insertBefore(card, result.firstChild);
    card.scrollIntoView({ behavior: "smooth", block: "center" });
  }

  reBtn.onclick = run;
  run();
};

  const goBtn = document.createElement("button"); goBtn.className = "mini primary"; goBtn.textContent = "🧹 非フォローバックを抽出";
  goBtn.style.cssText = "width:100%"; el.appendChild(goBtn);
  const statusEl = document.createElement("div"); statusEl.style.cssText="margin-top:8px"; el.appendChild(statusEl);
  const out = document.createElement("div"); out.style.cssText="margin-top:8px"; el.appendChild(out);

  goBtn.onclick = async () => {
    if (!acct.value) { alert("クライアント(アカウント)を選んで。"); return; }
    goBtn.disabled = true; goBtn.textContent = "抽出中…(フォロー数が多いと時間かかる)"; out.innerHTML = ""; statusEl.innerHTML = "";
    try {
      const j = await gasFetch_("nonFollowBack", { userName: acct.value });
      if (j.error) { out.innerHTML = '<div class="err">'+esc(j.error)+'</div>'; goBtn.disabled=false; goBtn.textContent="🧹 非フォローバックを抽出"; return; }
      const cand = j.candidates || [];
      statusEl.innerHTML = '<div class="desc">フォロー中: '+(j.followingCount||0)+' / フォロワー: '+(j.followerCount||0)+' / 非フォローバック: <b style="color:var(--accent)">'+cand.length+'件</b><br>今日の解除済み: '+(j.todayUnfollowed||0)+'/30件</div>';
      if (!cand.length) { out.innerHTML = '<div class="muted" style="padding:8px">非フォローバックは見つからんかった。きれいな状態や👍</div>'; goBtn.disabled=false; goBtn.textContent="🧹 非フォローバックを抽出"; return; }
      let todayCount = j.todayUnfollowed || 0;
      cand.slice(0, 100).forEach((u) => {
        const card = document.createElement("div");
        card.style.cssText = "display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px;margin-top:6px;flex-wrap:wrap";
        card.innerHTML = '<div style="flex:1;min-width:140px"><div style="font-weight:700;font-size:13px">@'+esc(u.userName)+'</div><div style="font-size:11px;color:var(--muted)">'+esc(u.name||"")+' · フォロワー'+(u.followers||0)+'</div></div>';
        const open = document.createElement("a"); open.className="mini"; open.textContent="↗開く"; open.href="https://x.com/"+u.userName; open.target="_blank";
        open.style.cssText="text-decoration:none;padding:5px 9px;border-radius:7px;font-size:12px";
        const unf = document.createElement("button"); unf.className="mini"; unf.textContent="解除"; unf.style.cssText="padding:5px 12px;font-size:12px;background:#ff6b35;color:#fff;border:none";
        unf.onclick = async () => {
          if (todayCount >= 30) { alert("今日の解除上限(30件)に達した。明日また続けて。"); return; }
          unf.disabled = true; unf.textContent = "…";
          try {
            const r = await gasFetch_("unfollow", { screenName: acct.value, targetUserName: u.userName, targetId: u.id });
            if (r.ok) { todayCount = r.todayUnfollowed; unf.textContent="解除✓"; unf.style.background="#666"; card.style.opacity="0.5";
              statusEl.querySelector("div").innerHTML = statusEl.querySelector("div").innerHTML.replace(/今日の解除済み: \d+\/30件/, "今日の解除済み: "+todayCount+"/30件");
            } else { unf.disabled=false; unf.textContent="解除"; alert(r.error||"解除失敗"); }
          } catch(e) { unf.disabled=false; unf.textContent="解除"; alert(e.message); }
        };
        card.appendChild(open); card.appendChild(unf);
        out.appendChild(card);
      });
    } catch (e) { out.innerHTML = '<div class="err">'+e.message+'</div>'; }
    goBtn.disabled = false; goBtn.textContent = "🧹 非フォローバックを抽出";
  };
};

/* ---- 07+ 営業リプ(大手に絡んで新規フォロワー獲得) ---- */
BUILDERS.outreach = (el) => {
  head(el, "🎯 営業リプ", "伸びてる投稿のURLを貼る→刺さるリプを生成→コピーして飛んで送信。リプ欄で目立って新規フォロワーを取る。", [
    "Xで競艇・地域の伸びてる投稿を見つける",
    "その投稿URLを貼る→リプ生成",
    "コピー→アカに飛ぶ→リプ送信&フォロー",
  ]);

  /* 対象アカウント選択 */
  let acctVal = S.activeAccount;
  const actives = S.clients.filter((c)=>c.status==="active");
  if (actives.length) {
    fld(el, "自分のどのアカウントで営業する?");
    const asel = document.createElement("select");
    const od = document.createElement("option"); od.value="_default_"; od.textContent="共通設定(既定)"; asel.appendChild(od);
    actives.forEach((c)=>{ const o=document.createElement("option"); o.value=c.screen_name; o.textContent="@"+c.screen_name; asel.appendChild(o); });
    asel.value = S.activeAccount;
    asel.onchange = () => { acctVal = asel.value; loadCfgSync(acctVal); };
    el.appendChild(asel);
  }

  fld(el, "絡む投稿のURL");
  const urlIn = inp(el, "https://x.com/ユーザー名/status/12345...");
  fld(el, "投稿の本文(任意・貼るとより刺さるリプに)");
  const bodyIn = ta(el, 4, "その投稿の本文をコピペ(空でもOK)");
  fld(el, "トーン");
  const toneRef = chipsSingle(el, ["丁寧","共感","タメ口","ツッコミ"], "丁寧");
  fld(el, "作るもの");
  const kindRef = chipsSingle(el, ["リプ(返信で絡む)","引用RT(拡散狙い)","DM誘導(LINEへ)"], "リプ(返信で絡む)", false, () => updateBtnLabel());
  fld(el, "誘導先LINE(DM誘導の時だけ使う・任意)");
  const lineIn = inp(el, "https://lin.ee/xxxx など");
  /* ターゲット情報の表示エリア */
  const targetBox = document.createElement("div");
  targetBox.style.cssText = "margin:10px 0;display:none";
  el.appendChild(targetBox);

  /* 履歴警告エリア */
  const warnBox = document.createElement("div");
  warnBox.style.cssText = "margin:8px 0";
  el.appendChild(warnBox);

  /* URLからユーザー名を抜く */
  function extractUser(url) {
    const m = (url||"").match(/(?:x\.com|twitter\.com)\/([A-Za-z0-9_]+)/);
    return m ? m[1] : "";
  }

  /* 入力URLが変わったらターゲット情報と履歴警告を更新 */
  async function refreshTarget() {
    const user = extractUser(urlIn.value);
    if (!user) { targetBox.style.display="none"; warnBox.innerHTML=""; return; }
    /* ターゲットのプロフィール&投稿リンクボタン */
    targetBox.style.display = "block";
    targetBox.innerHTML = "";
    const lbl = document.createElement("p"); lbl.className="desc"; lbl.style.margin="0 0 6px";
    lbl.textContent = "ターゲット: @" + user; targetBox.appendChild(lbl);
    const row = document.createElement("div"); row.style.cssText="display:flex;gap:8px;flex-wrap:wrap";
    const profBtn = document.createElement("a");
    profBtn.href = "https://x.com/" + user; profBtn.target = "_blank";
    profBtn.className = "btn"; profBtn.style.cssText="margin:0;text-decoration:none;flex:1;text-align:center;min-width:120px";
    profBtn.textContent = "👤 @"+user+"に飛ぶ";
    row.appendChild(profBtn);
    if (/\/status\/\d+/.test(urlIn.value)) {
      const twBtn = document.createElement("a");
      twBtn.href = urlIn.value; twBtn.target = "_blank";
      twBtn.className = "btn"; twBtn.style.cssText="margin:0;text-decoration:none;flex:1;text-align:center;min-width:120px";
      twBtn.textContent = "💬 この投稿に飛ぶ";
      row.appendChild(twBtn);
    }
    targetBox.appendChild(row);

    /* 履歴チェック: この相手に最近絡んだか */
    try {
      const { data } = await sb.from("outreach_log")
        .select("created_at,status")
        .eq("account", acctVal).eq("target", user)
        .order("created_at", { ascending:false }).limit(1);
      warnBox.innerHTML = "";
      if (data && data.length) {
        const days = Math.floor((Date.now() - new Date(data[0].created_at).getTime()) / 86400000);
        if (days <= 7) {
          warnBox.innerHTML = '<div style="background:rgba(255,77,109,.12);border:1px solid var(--bad);border-radius:8px;padding:8px 10px;font-size:13px;color:var(--bad)">🔴 最近絡んだばかり('+days+'日前)。連投は控えめに。</div>';
        } else if (days <= 30) {
          warnBox.innerHTML = '<div style="background:rgba(255,193,7,.12);border:1px solid #ffc107;border-radius:8px;padding:8px 10px;font-size:13px;color:#ffc107">🟡 前に絡んだことあり('+days+'日前)。絡んでOKやけど一応。</div>';
        }
      }
    } catch(e) { /* テーブル未作成でも動く */ }
  }
  urlIn.oninput = refreshTarget;

  const btn = runBtn(el, "🎯 生成する");
  const out = outArea(el);
  /* 選択に応じてボタン文言を更新(chipsSingleのonChangeで駆動・常時タイマーなし) */
  const updateBtnLabel = () => {
    const k = kindRef.value;
    btn.textContent = k.indexOf("引用RT")>=0 ? "🎯 引用RT文を生成" : (k.indexOf("DM誘導")>=0 ? "🎯 DM誘導文を生成" : "🎯 刺さるリプを生成");
  };
  updateBtnLabel();

  btn.onclick = async () => {
    const url = urlIn.value.trim();
    const user = extractUser(url);
    const kindNow = kindRef.value;
    if (!user && kindNow.indexOf("DM誘導") < 0) { out.err("投稿のURLを貼って(x.com/ユーザー名/status/... の形)。DM誘導だけはURL無しでもOK。"); return; }
    await loadCfgFor(acctVal);
    btn.disabled = true; const orig = btn.textContent; btn.textContent = "生成中…";
    try {
      const body = bodyIn.value.trim();
      const tone = toneRef.value;
      const kind = kindRef.value;
      const lineUrl = lineIn.value.trim();
      const TONE_RULE = {
        "丁寧": "敬語(です・ます調)で丁寧に。落ち着いた大人の言葉づかい。馴れ馴れしくしない。",
        "共感": "相手の気持ちに寄り添い、共感を示す。優しく柔らかい言葉。",
        "タメ口": "フランクなタメ口。ただし失礼・馴れ馴れしすぎはNG。親しみやすく。",
        "ツッコミ": "軽妙なツッコミ・ユーモアを一言。相手を不快にさせない範囲で、クスッとさせる。",
      };
      const toneRule = (TONE_RULE[tone] || TONE_RULE["丁寧"]) + " 1つの文の中で敬語とタメ口を混ぜず、このトーンで最初から最後まで統一する。";
      const ctx = body
        ? `絡む投稿の本文:\n${body}\n\n`
        : `絡む相手: @${user} の投稿(本文は不明なので、競艇/地域系の一般的な内容と想定)\n\n`;

      let prompt;
      if (kind.indexOf("引用RT") >= 0) {
        /* 引用リポスト: 自分のフォロワーにも見える。拡散狙い */
        prompt =
          `${S.sns}で、フォロワーの多い他人の投稿を「引用リポスト(引用RT)」して、自分のフォロワーにも見せつつ元投稿の人にも気づいてもらい、新規フォロワーを狙う引用文を作る。\n\n` +
          ctx +
          `トーンは「${tone}」。${toneRule} 引用文を3案作る。\n` +
          `引用RTの鉄則:\n` +
          `- 元投稿に乗っかりつつ、自分の視点・専門性で付加価値を足す(競艇なら独自の見解、店なら地域目線)\n` +
          `- 自分のフォロワーにも「お、なるほど」と思わせる中身。単なる感想で終わらせない\n` +
          `- 元投稿者を立てる(けなさない・上から目線にしない)\n` +
          `- 100〜120字程度。ハッシュタグは付けすぎない(0〜2個)\n` +
          `出力は【案1】【案2】【案3】の見出しを付けて改行で区切る。前置き不要。日本語。${sc()}`;
      } else if (kind.indexOf("DM誘導") >= 0) {
        /* DM誘導: リプで反応くれた人をLINEへ。収益導線 */
        prompt =
          `競艇予想アカウントの運用で、リプやフォローで反応してくれた見込みの人に送る「DMメッセージ」を作る。狙いは、無料予想に興味を持ってくれた人を公式LINE(無料予想や限定情報を配信)へ自然に誘導すること。\n\n` +
          ctx +
          `トーンは「${tone}」。${toneRule} DM文を3案作る。\n` +
          (lineUrl ? `誘導先LINE: ${lineUrl}(各案の最後に自然に載せる)\n` : `※LINE URLは「(LINEはこちら→)」のように差し込み位置だけ示す\n`) +
          `DM誘導の鉄則:\n` +
          `- いきなり営業しない。まず反応へのお礼や軽い一言から入る\n` +
          `- 押し売り禁止。「無料で予想配信してる」「よかったら覗いてみて」くらいの軽さ\n` +
          `- 怪しい・スパムっぽい定型文にしない。一人ひとりに送ってる感を出す\n` +
          `- 3〜4行程度。絵文字は1〜2個まで\n` +
          `出力は【案1】【案2】【案3】の見出しを付けて改行で区切る。前置き不要。日本語。${sc()}`;
      } else {
        /* 通常のリプ */
        prompt =
          `${S.sns}で、フォロワーの多い他人の投稿に「営業リプ」を送り、リプ欄を見た人に興味を持たせて自分(@${user!==acctVal?acctVal:"自分"})のアカウントをフォローしてもらう狙いのリプ案を作る。\n\n` +
          ctx +
          `トーンは「${tone}」。${toneRule} リプ案を3つ作る。\n` +
          `営業リプの鉄則:\n` +
          `- まず相手の投稿に共感や付加価値(豆知識・気の利いた一言)を返す。いきなり自分の話をしない\n` +
          `- 媚びない・宣伝くさくない。専門性や個性がさりげなく伝わる(競艇なら予想の鋭さ、店なら地域愛やユーモア)\n` +
          `- 「フォローして」「予想見て」「フォローしとくと損ない」等の自分への誘導は絶対禁止。リプ欄で嫌われる\n` +
          `- 敬語とタメ口を混ぜない。指定トーンで統一\n` +
          `- 短く自然に(40〜60字)。絵文字は1個まで。敵を作らない\n` +
          `出力は【案1】【案2】【案3】の見出しを付けて各案を改行で区切る。前置き不要。日本語。${sc()}`;
      }
      const text = await callAI(prompt, false);

      /* 案ごとに分割してコピーボタン付きで表示 */
      out.clear();
      const cases = text.split(/【案\s*\d+】/).map(s=>s.trim()).filter(Boolean);
      const list = cases.length ? cases : [text.trim()];
      list.forEach((c, i) => {
        const card = document.createElement("div");
        card.style.cssText = "background:rgba(0,229,255,.04);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin:8px 0";
        const t = document.createElement("div");
        t.style.cssText = "font-size:13.5px;line-height:1.6;white-space:pre-wrap;margin-bottom:8px";
        t.textContent = c;
        card.appendChild(t);
        const cp = document.createElement("button");
        cp.className = "btn"; cp.style.cssText = "margin:0;padding:6px 12px;font-size:13px";
        cp.textContent = "📋 案"+(i+1)+"をコピー";
        cp.onclick = () => {
          navigator.clipboard.writeText(c);
          cp.textContent = "✓ コピーした!"; setTimeout(()=>cp.textContent="📋 案"+(i+1)+"をコピー", 1500);
        };
        card.appendChild(cp);
        out.box.appendChild(card);
      });

      /* 営業記録ボタン(送信したら押す→履歴に記録) */
      if (user) {
        const recRow = document.createElement("div");
        recRow.style.cssText = "margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center";
        const recBtn = document.createElement("button");
        recBtn.className = "btn"; recBtn.style.cssText = "margin:0;background:linear-gradient(135deg,#10b981,#059669)";
        recBtn.textContent = "✅ 営業した！と記録";
        recBtn.onclick = async () => {
          try {
            await sb.from("outreach_log").insert({ account: acctVal, target: user, tweet_url: url, status: "replied" });
            recBtn.textContent = "✓ 記録した"; recBtn.disabled = true;
            refreshTarget();
          } catch(e) { out.err("記録に失敗(outreach_logテーブル未作成かも): " + e.message); }
        };
        recRow.appendChild(recBtn);
        const hint = document.createElement("span"); hint.className="desc"; hint.textContent = "送ったら押す→次から「絡んだ」と分かる";
        recRow.appendChild(hint);
        out.box.appendChild(recRow);
      }
    } catch (e) { out.err(e.message); }
    finally { btn.disabled = false; btn.textContent = orig; }
  };

  /* 営業履歴の一覧表示 */
  fld(el, "最近の営業履歴");
  const histBox = document.createElement("div");
  el.appendChild(histBox);
  (async () => {
    try {
      const { data } = await sb.from("outreach_log")
        .select("target,status,created_at,tweet_url")
        .eq("account", acctVal)
        .order("created_at", { ascending:false }).limit(20);
      if (!data || !data.length) { histBox.innerHTML = '<p class="desc" style="margin:0">まだ営業履歴なし。絡んだら「記録」を押すとここに出る。</p>'; return; }
      histBox.innerHTML = "";
      data.forEach((r) => {
        const days = Math.floor((Date.now() - new Date(r.created_at).getTime()) / 86400000);
        const color = days<=7 ? "var(--bad)" : (days<=30 ? "#ffc107" : "var(--muted)");
        const row = document.createElement("div");
        row.style.cssText = "display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px";
        const left = document.createElement("a");
        left.href = "https://x.com/" + r.target; left.target="_blank";
        left.style.cssText = "color:var(--fg);text-decoration:none;font-weight:600";
        left.textContent = "@" + r.target;
        const right = document.createElement("span");
        right.style.color = color;
        right.textContent = days===0 ? "今日" : days+"日前";
        row.appendChild(left); row.appendChild(right);
        histBox.appendChild(row);
      });
    } catch(e) {
      histBox.innerHTML = '<p class="desc" style="margin:0;color:var(--bad)">履歴の読み込み失敗。Supabaseでv5のSQL(outreach_log)を実行して。</p>';
    }
  })();
};

BUILDERS.calendar = (el) => {
