<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>XPLOSION</title>
<!--
  ============================================================
  UWASA SNS OPS 合体版 — AIコックピット11機能 + 自動投稿管理
  ============================================================
  【セットアップ】
  1. 下のCONFIGに3つ入れる:
     - SUPABASE_URL : SupabaseのProject URL
     - SUPABASE_ANON: anon public(またはsb_publishable_)キー
     - GAS_URL      : GASウェブアプリのURL(認証リンク兼AI中継)
  2. GAS側(uwasa_x_autopost.gs v3)に ANTHROPIC_API_KEY を登録して再デプロイ
  3. このファイルをgithub.io等に置く
  ログインはSupabase Authのユーザー(Authentication > Users で作成)
-->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#04060C; --surface:#0F1422; --surface2:#0C1120; --border:#1D2A47;
    --accent:#FF2E7E; --accent2:#00E5FF; --violet:#B44DFF;
    --text:#EAF0FF; --muted:#7E8BA8; --ok:#3DFFA8; --bad:#FF7B7B;
    --mono:"SF Mono",ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box}
  body{
    margin:0;min-height:100vh;background:var(--bg);color:var(--text);
    font-family:"Hiragino Sans","Noto Sans JP",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    background-image:
      radial-gradient(ellipse 90% 40% at 50% -5%, rgba(255,46,126,.13), transparent),
      radial-gradient(ellipse 70% 40% at 90% 105%, rgba(0,229,255,.08), transparent),
      repeating-linear-gradient(0deg, rgba(29,42,71,.22) 0 1px, transparent 1px 34px),
      repeating-linear-gradient(90deg, rgba(29,42,71,.22) 0 1px, transparent 1px 34px);
  }
  .wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
  h1{font-size:20px;font-weight:900;letter-spacing:.06em;margin:0;
    background:linear-gradient(92deg,var(--accent),var(--violet),var(--accent2));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .sub{font-size:9px;letter-spacing:.3em;color:var(--muted);font-family:var(--mono);margin-top:2px}
  .hud{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;margin-top:14px;position:relative}
  .hud::before,.hud::after{content:"";position:absolute;width:14px;height:14px;border:1.5px solid rgba(0,229,255,.5);pointer-events:none}
  .hud::before{top:-1px;left:-1px;border-right:none;border-bottom:none;border-top-left-radius:14px}
  .hud::after{bottom:-1px;right:-1px;border-left:none;border-top:none;border-bottom-right-radius:14px}
  h2{margin:0;font-size:17px;font-weight:800}
  .desc{margin:6px 0 0;font-size:13.5px;line-height:1.7;color:var(--muted)}
  .howto{margin-top:12px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:10px 14px}
  .howto .hd{font-size:10px;font-weight:800;letter-spacing:.2em;color:var(--accent);font-family:var(--mono);margin-bottom:6px}
  .howto .st{display:flex;gap:9px;align-items:baseline;font-size:13px;line-height:1.8}
  .howto .st b{color:var(--accent);font-family:var(--mono);font-size:11.5px;font-weight:800}
  label.fld{display:block;font-size:10.5px;font-weight:800;letter-spacing:.18em;color:var(--accent2);font-family:var(--mono);margin:16px 0 8px}
  input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;
    color:var(--text);padding:12px 14px;font-size:15px;outline:none;font-family:inherit}
  textarea{line-height:1.6;resize:vertical}
  .btn{width:100%;padding:14px;border-radius:12px;border:none;cursor:pointer;margin-top:16px;
    background:linear-gradient(92deg,var(--accent),var(--violet));color:#fff;
    font-size:15px;font-weight:800;letter-spacing:.05em;box-shadow:0 0 18px rgba(255,46,126,.35)}
  .btn:disabled{opacity:.5;cursor:wait}
  .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--accent2);box-shadow:none}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{padding:8px 14px;border-radius:999px;border:1px solid var(--border);background:transparent;
    color:var(--muted);font-size:13px;font-weight:700;cursor:pointer}
  .chip.on{border-color:var(--accent);background:rgba(255,46,126,.12);color:var(--accent);box-shadow:0 0 12px rgba(255,46,126,.3)}
  .chip.on.cyan{border-color:var(--accent2);background:rgba(0,229,255,.1);color:var(--accent2);box-shadow:0 0 12px rgba(0,229,255,.25)}
  .out{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent2);
    border-radius:12px;padding:16px;margin-top:14px;position:relative;box-shadow:0 0 24px rgba(0,229,255,.06)}
  .out pre{white-space:pre-wrap;word-break:break-word;margin:0;font-family:inherit;font-size:14.5px;line-height:1.75}
  .copybtn{position:absolute;top:10px;right:10px;background:var(--surface2);color:var(--muted);
    border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer}
  nav{display:flex;gap:8px;overflow-x:auto;padding:12px 0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  nav::-webkit-scrollbar{display:none}
  .navbtn{flex-shrink:0;padding:9px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface);
    color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:7px}
  .navbtn b{font-size:9.5px;opacity:.75;font-family:var(--mono);font-weight:800}
  .navbtn.on{border-color:var(--accent);background:rgba(255,46,126,.12);color:var(--accent);box-shadow:0 0 14px rgba(255,46,126,.3)}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .snsw{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:3px;gap:2px}
  .snsbtn{width:40px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:999px;border:none;
    background:transparent;color:var(--muted);cursor:pointer}
  .snsbtn.on{background:linear-gradient(92deg,var(--accent),var(--violet));color:#fff;box-shadow:0 0 12px rgba(255,46,126,.45)}
  .modes{display:flex;align-items:center;gap:10px;margin-top:8px}
  .modes .lbl{font-size:9.5px;letter-spacing:.2em;color:var(--muted);font-family:var(--mono);flex-shrink:0}
  .row{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-top:10px;font-size:13.5px;line-height:1.7}
  .meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
  .pill{font-size:10.5px;font-weight:700;border-radius:999px;padding:2px 9px;border:1px solid}
  .pill.time{color:var(--ok);border-color:rgba(61,255,168,.4);font-family:var(--mono)}
  .pill.acct{color:var(--accent2);border-color:rgba(0,229,255,.4);font-family:var(--mono)}
  .pill.genre{color:var(--violet);border-color:rgba(180,77,255,.4)}
  .pill.type{color:var(--accent);border-color:rgba(255,46,126,.35)}
  .pill.st-pending{color:var(--violet);border-color:rgba(180,77,255,.4)}
  .pill.st-posted,.pill.st-active{color:var(--ok);border-color:rgba(61,255,168,.4)}
  .pill.st-error,.pill.st-revoked{color:var(--bad);border-color:rgba(255,123,123,.4)}
  .acts{display:flex;gap:8px;margin-top:10px}
  .mini{flex:1;padding:9px;border-radius:10px;border:1px solid var(--border);background:transparent;
    color:var(--muted);font-size:12.5px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none}
  .mini.primary{border:none;background:linear-gradient(92deg,var(--accent),var(--violet));color:#fff;font-weight:800}
  .mini.cyan{border-color:rgba(0,229,255,.4);color:var(--accent2)}
  .err{color:var(--bad);font-size:13px;margin-top:10px;line-height:1.5}
  .okmsg{color:var(--ok);font-size:13px;margin-top:10px}
  .muted{color:var(--muted);font-size:13px}
  .count{font-size:11px;color:var(--muted);text-align:right;margin-top:4px;font-family:var(--mono)}
  .count.over{color:var(--bad);font-weight:800}
  .hidden{display:none}
  .stat{flex:1;min-width:0;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:11px 8px;text-align:center}
  .stat .l{font-size:9.5px;color:var(--muted);font-weight:800;letter-spacing:.12em;font-family:var(--mono)}
  .stat .v{font-size:17px;font-weight:800;margin:3px 0 1px;white-space:nowrap;font-family:var(--mono)}
  .stat .s{font-size:10.5px;font-weight:700;white-space:nowrap}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <svg width="34" height="34" viewBox="0 0 48 48" aria-hidden="true">
        <defs>
          <linearGradient id="xg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#FF2E7E"/><stop offset=".55" stop-color="#B44DFF"/><stop offset="1" stop-color="#00E5FF"/>
          </linearGradient>
        </defs>
        <!-- バーストの火花 -->
        <g stroke="url(#xg)" stroke-width="2.4" stroke-linecap="round" opacity=".85">
          <line x1="24" y1="2"  x2="24" y2="8"/>
          <line x1="24" y1="40" x2="24" y2="46"/>
          <line x1="2"  y1="24" x2="8"  y2="24"/>
          <line x1="40" y1="24" x2="46" y2="24"/>
        </g>
        <!-- 鋭角のX -->
        <path d="M10 8 L21.2 24 L10 40 L17.4 40 L24 30.6 L30.6 40 L38 40 L26.8 24 L38 8 L30.6 8 L24 17.4 L17.4 8 Z"
          fill="url(#xg)"/>
      </svg>
      <div><h1>XPLOSION</h1><div class="sub">X OPERATION SYSTEM</div></div>
    </div>
    <div class="snsw" id="snsw"></div>
  </div>
  <div class="modes" id="modes"></div>
  <div id="modeWarn" class="err hidden">⚠ 文体プロファイル未学習。「文体学習」タブで先に学習させて。</div>

  <!-- ログイン -->
  <div id="loginCard" class="hud">
    <h2>ログイン</h2>
    <label class="fld">メールアドレス</label>
    <input id="email" type="email" autocomplete="username">
    <label class="fld">パスワード</label>
    <input id="password" type="password" autocomplete="current-password">
    <button class="btn" id="loginBtn">ログイン</button>
    <div class="err" id="loginErr"></div>
  </div>

  <div id="app" class="hidden">
    <nav id="nav"></nav>
    <div class="hud" id="content"></div>
    <button class="btn btn-ghost" id="logoutBtn">ログアウト</button>
  </div>
</div>

<script>
/* ============ CONFIG(ここを書き換える) ============ */
const SUPABASE_URL = "https://hwoltvzmsznprsbyrbaj.supabase.co";
const SUPABASE_ANON = "sb_publishable_1JsQKCxHNyH4fGzFUJeEHg_czjaZxPR";
const GAS_URL = "https://script.google.com/macros/s/AKfycbyQ3OxIQ3fA60kAOKf3_kcXWtE0N8A3WPH4c4uG-KdyiYwo2HIS0U8IjmS-AHftieOP/exec";
/* ================================================== */

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

/* ============ 状態 ============ */
const S = { sns: "X", mode: "標準", profile: "", genres: ["シーシャバー(店舗)","ゲーム制作","開発・ツール"], tab: "calendar", clients: [], activeAccount: "_default_" };

/* 生成設定のひな形 */
function defaultCfg() {
  return {
    useBiz: false, bizName: "", bizArea: "", bizType: "",
    tone: "カジュアル", emoji: "少なめ", words: "", wordFreq: 30, hook: 60,
    url: "", urlFreq: 20, ngWords: "", origProfile: "",
    useHours: false, openTime: "19:00", closeTime: "02:00",
    closedDays: [],
  };
}

/* 現在アクティブなアカウントの設定。各AI機能はこれを読む */
let CFG = defaultCfg();

/* アカウント名→設定 のキャッシュ */
const CFG_CACHE = {};

/* 指定アカウントの設定をSupabaseから読み込んでCFGにセット */
async function loadCfgFor(account) {
  S.activeAccount = account || "_default_";
  if (CFG_CACHE[S.activeAccount]) { CFG = CFG_CACHE[S.activeAccount]; return; }
  const saved = await kvGet("gen_config:" + S.activeAccount, null);
  const c = Object.assign(defaultCfg(), saved || {});
  CFG_CACHE[S.activeAccount] = c;
  CFG = c;
}
async function saveCfg() {
  CFG_CACHE[S.activeAccount] = CFG;
  await kvSet("gen_config:" + S.activeAccount, CFG);
}

/* 店舗情報の文を作る(オフor未入力なら空) */
function bizClause() {
  let extra = "";
  if (CFG.useHours) {
    extra = "営業時間は" + CFG.openTime + "〜" + CFG.closeTime + "。これと矛盾する時間を本文に書かない。";
  }
  if (CFG.closedDays && CFG.closedDays.length) {
    extra += "定休日は" + CFG.closedDays.join("・") + "曜。定休日には営業を促す告知をせず、休業のお知らせや営業再開日の案内など定休日に合った内容にする。営業日の投稿で定休日を来店日として案内しない。";
  }
  if (!CFG.useBiz) return extra ? "\n\n【店舗情報】" + extra : "";
  const parts = [];
  if (CFG.bizArea) parts.push(CFG.bizArea);
  if (CFG.bizType) parts.push(CFG.bizType);
  if (CFG.bizName) parts.push("「" + CFG.bizName + "」");
  let s = parts.length ? "対象の事業: " + parts.join("・") + "。" : "";
  if (extra) s += extra;
  return s;
}

/* 文体・絵文字・ワード・フックの指示をまとめて返す */
function sc() {
  let out = "";
  const biz = bizClause();
  if (biz) out += "\n\n" + biz;

  /* オリジナル文体(このアカウント専用に学習済みなら最優先) */
  if (CFG.origProfile && CFG.origProfile.trim()) {
    out += "\n\n【文体指示・最優先】以下はこのアカウントの本人の文体プロファイル。これに完全に従い、本人が書いたとしか思えない文章にせよ:\n" + CFG.origProfile;
  } else if (S.mode === "自分の文体" && S.profile) {
    out += "\n\n【文体指示】以下の文体プロファイルに完全に従い、本人が書いたとしか思えない文章にせよ:\n" + S.profile;
  } else if (S.mode === "バズ特化") {
    out += "\n\n【文体指示】書き手の個性より拡散力を最優先。スクロールを止める1行目・具体的な数字・感情の起伏・続きを読ませる構成で、バズに全振りした文章にせよ。";
  }

  /* トーン */
  const toneMap = {
    "丁寧": "丁寧で礼儀正しく、敬語ベースの落ち着いた性格",
    "カジュアル": "親しみやすく明るいカジュアルな性格",
    "専門的": "専門知識が豊富で説得力のある知的な性格",
    "フランク": "友達のように話すフランクでタメ口寄りの性格",
    "強め": "断言が多く勢いのある強気でグイグイくる性格",
  };
  out += "\n\n【書き手の性格】" + (toneMap[CFG.tone] || CFG.tone) + "で書く。";

  /* 絵文字 */
  const emojiMap = {
    "なし": "絵文字は一切使わない。",
    "少なめ": "絵文字は1投稿に0〜1個まで。",
    "普通": "絵文字を適度に(1投稿2〜3個)使う。",
    "多め": "絵文字を多めに(1投稿4個以上)使い華やかにする。",
  };
  out += emojiMap[CFG.emoji] || "";

  /* 入れたいワード */
  if (CFG.words.trim()) {
    out += "\n\n【必須ワード】次の語を投稿に自然に織り込む: " + CFG.words.trim() +
      "。ただし全投稿の約" + CFG.wordFreq + "%程度の頻度で登場させ、毎回は入れない(不自然にならない範囲で)。";
  }

  /* フック強度 */
  out += "\n\n【冒頭フック強度】" + CFG.hook + "%。" +
    (CFG.hook >= 70 ? "1行目で強烈に引き込み、続きを読まずにいられない出だしにする。"
     : CFG.hook >= 40 ? "1行目はそこそこ引きを作りつつ自然に。"
     : "1行目は誇張せず落ち着いた入りにする。");

  /* 入れたいURL */
  if (CFG.url.trim()) {
    out += "\n\n【URL挿入】次のURLを投稿末尾に置く: " + CFG.url.trim() +
      "。全投稿の約" + CFG.urlFreq + "%程度の頻度で入れ、毎回は入れない(告知・誘導したい投稿に絞る)。" +
      "Xでは140字にURL分を含めて収める。";
  }

  /* NGワード */
  if (CFG.ngWords.trim()) {
    out += "\n\n【禁止ワード】次の語は絶対に使わない(言い換えも含めて避ける): " + CFG.ngWords.trim() + "。";
  }

  return out;
}

/* ============ Supabase KV(設定保存) ============ */
async function kvGet(key, fallback) {
  const { data } = await sb.from("kv_store").select("value").eq("key", key).maybeSingle();
  return data && data.value !== null && data.value !== undefined ? data.value : fallback;
}
async function kvSet(key, value) {
  await sb.from("kv_store").upsert({ key, value, updated_at: new Date().toISOString() });
}

/* ============ AI呼び出し(GAS中継) ============ */
async function callAI(prompt, useSearch) {
  const { data } = await sb.auth.getSession();
  if (!data.session) throw new Error("ログインが切れた。リロードして。");
  const res = await fetch(GAS_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({ auth: data.session.access_token, prompt, useSearch: !!useSearch }),
  });
  const j = await res.json();
  if (j.error) throw new Error(j.error);
  return j.text;
}

/* ============ ログイン ============ */
$("loginBtn").onclick = async () => {
  $("loginErr").textContent = "";
  const { error } = await sb.auth.signInWithPassword({ email: $("email").value.trim(), password: $("password").value });
  if (error) { $("loginErr").textContent = "ログイン失敗: " + error.message; return; }
  enter();
};
$("logoutBtn").onclick = async () => { await sb.auth.signOut(); location.reload(); };
sb.auth.getSession().then(({ data }) => { if (data.session) enter(); });

async function enter() {
  $("loginCard").classList.add("hidden");
  $("app").classList.remove("hidden");
  S.profile = await kvGet("style_profile", "");
  S.genres = await kvGet("genres", S.genres);
  const legacy = await kvGet("gen_config", null);
  if (legacy) { CFG_CACHE["_default_"] = Object.assign(defaultCfg(), legacy); }
  await loadCfgFor("_default_");
  await loadClients();
  renderTop(); renderNav(); showTab(S.tab);
}

async function loadClients() {
  const { data } = await sb.from("clients").select("*").order("created_at");
  S.clients = data || [];
}

/* ============ ヘッダーUI ============ */
function renderTop() {
  $("snsw").innerHTML = "";
  ["X","Instagram"].forEach((s) => {
    const b = document.createElement("button");
    b.className = "snsbtn" + (S.sns === s ? " on" : "");
    b.title = s;
    b.innerHTML = s === "X"
      ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231 5.451-6.231zm-1.161 17.52h1.833L7.084 4.126H5.117l11.966 15.644z"/></svg>'
      : '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>';
    b.onclick = () => { S.sns = s; renderTop(); showTab(S.tab); };
    $("snsw").appendChild(b);
  });
  $("modes").innerHTML = '<span class="lbl">MODE</span>';
  const wrap = document.createElement("div"); wrap.className = "chips";
  ["標準","自分の文体","バズ特化"].forEach((m) => {
    const c = document.createElement("button");
    c.className = "chip" + (S.mode === m ? " on cyan" : "");
    c.textContent = m;
    c.onclick = () => { S.mode = m; renderTop(); };
    wrap.appendChild(c);
  });
  $("modes").appendChild(wrap);
  $("modeWarn").classList.toggle("hidden", !(S.mode === "自分の文体" && !S.profile));
}

/* ============ タブ ============ */
const TABS = [
  { id:"settings", num:"00", label:"⚙ 生成設定" },

/* ============ 共通部品 ============ */
function head(el, title, desc, steps) {
  const d = document.createElement("div");
  d.innerHTML = "<h2>" + esc(title) + '</h2><p class="desc">' + esc(desc) + "</p>" +
    '<div class="howto"><div class="hd">HOW TO USE</div>' +
    steps.map((s, i) => '<div class="st"><b>' + String(i + 1).padStart(2, "0") + "</b><span>" + esc(s) + "</span></div>").join("") +
    "</div>";
  el.appendChild(d);
}
function fld(el, label) {
  const l = document.createElement("label"); l.className = "fld"; l.textContent = "▸ " + label; el.appendChild(l);
}
function ta(el, rows, ph) {
  const t = document.createElement("textarea"); t.rows = rows; t.placeholder = ph || ""; el.appendChild(t); return t;
}
function inp(el, ph, type) {
  const t = document.createElement("input"); t.type = type || "text"; t.placeholder = ph || ""; el.appendChild(t); return t;
}
function chipsSingle(el, options, initial, cyan) {
  const w = document.createElement("div"); w.className = "chips"; el.appendChild(w);
  const state = { value: initial };
  function draw() {
    w.innerHTML = "";
    options.forEach((o) => {
      const c = document.createElement("button");
      c.className = "chip" + (state.value === o ? (cyan ? " on cyan" : " on") : "");
      c.textContent = o;
      c.onclick = () => { state.value = o; draw(); };
      w.appendChild(c);
    });
  }
  draw(); return state;
}
function chipsMulti(el, options, initial) {
  const w = document.createElement("div"); w.className = "chips"; el.appendChild(w);
  const state = { values: initial.slice() };
  function draw() {
    w.innerHTML = "";
    options.forEach((o) => {
      const c = document.createElement("button");
      c.className = "chip" + (state.values.includes(o) ? " on cyan" : "");
      c.textContent = o;
      c.onclick = () => {
        state.values = state.values.includes(o) ? state.values.filter((x) => x !== o) : [...state.values, o];
        draw();
      };
      w.appendChild(c);
    });
  }
  draw(); return state;
}
function runBtn(el, label) {
  const b = document.createElement("button"); b.className = "btn"; b.textContent = label; el.appendChild(b); return b;
}
function outArea(el) {
  const e = document.createElement("div"); el.appendChild(e);
  return {
    err(m) { e.innerHTML = m ? '<div class="err">⚠ ' + esc(m) + "</div>" : ""; },
    show(text) {
      e.innerHTML = '<div class="out"><button class="copybtn">コピー</button><pre></pre></div>';
      e.querySelector("pre").textContent = text;
      const cb = e.querySelector(".copybtn");
      cb.onclick = () => { navigator.clipboard.writeText(text); cb.textContent = "コピー済"; setTimeout(()=>cb.textContent="コピー",1500); };
    },
    clear() { e.innerHTML = ""; },
  };
}
async function runAI(btn, out, promptFn, useSearch) {
  out.clear(); out.err("");
  btn.disabled = true; const orig = btn.textContent; btn.textContent = "処理中…";
  try { out.show(await callAI(promptFn(), useSearch)); }
  catch (e) { out.err(e.message); }
  btn.disabled = false; btn.textContent = orig;
}

/* ============ 汎用AIタブ(02-08) ============ */
function aiTab(el, cfg) {
  head(el, cfg.title, cfg.desc, cfg.steps);
  const refs = {};
  cfg.fields.forEach((f) => {
    fld(el, f.label);
    if (f.type === "ta") refs[f.key] = ta(el, f.rows, f.ph);
    else if (f.type === "in") refs[f.key] = inp(el, f.ph);
    else if (f.type === "chips") refs[f.key] = chipsSingle(el, f.options, f.options[0]);
    else if (f.type === "multi") refs[f.key] = chipsMulti(el, f.options, f.initial || []);
  });
  const btn = runBtn(el, cfg.btn);
  const out = outArea(el);
  btn.onclick = () => {
    const v = {};
    for (const k in refs) v[k] = refs[k].value !== undefined ? refs[k].value : (refs[k].values || refs[k].value);
    cfg.fields.forEach((f) => { if (f.type === "ta" || f.type === "in") v[f.key] = refs[f.key].value; });
    if (!cfg.validate(v)) { out.err("入力が足りん。"); return; }
    runAI(btn, out, () => cfg.prompt(v), cfg.useSearch);
  };
}

/* スライダー付きフィールド(5%〜100%) */
function sliderField(el, label, key, onChange) {
  fld(el, label);
  const wrap = document.createElement("div");
  wrap.style.cssText = "display:flex;align-items:center;gap:12px";
  const range = document.createElement("input");
  range.type = "range"; range.min = "5"; range.max = "100"; range.step = "5"; range.value = CFG[key];
  range.style.cssText = "flex:1;accent-color:var(--accent)";
  const val = document.createElement("span");
  val.style.cssText = "font-family:var(--mono);font-weight:800;color:var(--accent2);min-width:46px;text-align:right";
  val.textContent = CFG[key] + "%";
  range.oninput = () => { CFG[key] = parseInt(range.value); val.textContent = CFG[key] + "%"; onChange(); };
  wrap.appendChild(range); wrap.appendChild(val); el.appendChild(wrap);
}

/* 単一選択チップを指定要素に描画(コールバック付き) */
function chipsSingleInto(host, options, initial, onChange) {
  const w = document.createElement("div"); w.className = "chips"; host.appendChild(w);
  let cur = initial;
  function draw() {
    w.innerHTML = "";
    options.forEach((o) => {
      const c = document.createElement("button");
      c.className = "chip" + (cur === o ? " on" : "");
      c.textContent = o;
      c.onclick = () => { cur = o; onChange(o); draw(); };
      w.appendChild(c);
    });
  }
  draw();
}

BUILDERS.calendar = (el) => {
  head(el, "投稿カレンダー自動生成",
    "事業ジャンルを配分した投稿計画+バズりやすい推奨時間付き。完成文はそのまま予約に送れる。",
    ["ジャンルを選ぶ(追加・×で削除可)","週間/月間と予定を入れて生成","「予約管理に送る」(一括可)→予約管理タブでGOを出すと自動投稿が確定"]);

  fld(el, "事業ジャンル(複数選択)");
  const gwrap = document.createElement("div"); gwrap.className = "chips"; el.appendChild(gwrap);
  let selected = S.genres.slice(0, 1);
  function drawGenres() {
    gwrap.innerHTML = "";
    S.genres.forEach((g) => {
      const c = document.createElement("button");
      c.className = "chip" + (selected.includes(g) ? " on" : "");
      c.textContent = g + " ";
      const x = document.createElement("span"); x.textContent = "×"; x.style.opacity = ".6"; x.style.marginLeft = "6px";
      x.onclick = (ev) => { ev.stopPropagation(); S.genres = S.genres.filter((y)=>y!==g); selected = selected.filter((y)=>y!==g); kvSet("genres", S.genres); drawGenres(); };
      c.appendChild(x);
      c.onclick = () => { selected = selected.includes(g) ? selected.filter((y)=>y!==g) : [...selected, g]; drawGenres(); };
      gwrap.appendChild(c);
    });
  }
  drawGenres();
  const addRow = document.createElement("div"); addRow.style.cssText = "display:flex;gap:8px;margin-top:10px"; el.appendChild(addRow);
  const gin = document.createElement("input"); gin.placeholder = "ジャンルを追加(例: 経営の学び)"; addRow.appendChild(gin);
  const gbtn = document.createElement("button"); gbtn.className = "mini cyan"; gbtn.style.flex = "0 0 70px"; gbtn.textContent = "追加"; addRow.appendChild(gbtn);
  gbtn.onclick = () => { const g = gin.value.trim(); if (!g || S.genres.includes(g)) return; S.genres.push(g); selected.push(g); gin.value = ""; kvSet("genres", S.genres); drawGenres(); };

  fld(el, "期間");
  const span = chipsSingle(el, ["週間","15日","月間"], "週間");
  fld(el, "予約送信先アカウント(Xのみ)");
  const acct = document.createElement("select"); el.appendChild(acct);
  S.clients.filter((c)=>c.status==="active").forEach((c)=>{ const o=document.createElement("option"); o.value=c.screen_name; o.textContent="@"+c.screen_name; acct.appendChild(o); });
  if (!acct.options.length) { const o=document.createElement("option"); o.textContent="(クライアント未登録)"; o.value=""; acct.appendChild(o); }
  acct.value = S.activeAccount;
  acct.onchange = async () => { await loadCfgFor(acct.value || "_default_"); if (lastPlan) renderPlan(lastPlan); };
  const acctHint = document.createElement("p"); acctHint.className = "desc"; acctHint.style.margin = "6px 0 0";
  acctHint.textContent = "選んだアカウントの「生成設定」(性格・絵文字・無料予想の有無など)で文章が作られる。";
  el.appendChild(acctHint);
  fld(el, "店・事業の予定やネタ(任意)");
  const events = ta(el, 4, "例:\n6/20 DJイベント\n新フレーバー入荷\n新作ゲームのデモ完成間近");

  const gen = runBtn(el, "カレンダーを生成する");
  const out = outArea(el);

  /* 特定日に1本だけ追加(空いた日の穴埋め用) */
  const addFld = document.createElement("div");
  addFld.style.cssText = "margin-top:16px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px";
  addFld.innerHTML = '<div style="font-size:10.5px;font-weight:800;letter-spacing:.18em;color:var(--accent2);font-family:var(--mono);margin-bottom:10px">▸ 特定の日に1本だけ追加</div>';
  const addDay = document.createElement("input"); addDay.type = "datetime-local";
  addDay.style.marginBottom = "8px"; addFld.appendChild(addDay);
  const addTheme = document.createElement("input"); addTheme.placeholder = "テーマ(任意・例: 週末営業の告知)";
  addTheme.style.marginBottom = "8px"; addFld.appendChild(addTheme);
  const addBtn = document.createElement("button"); addBtn.className = "mini cyan"; addBtn.style.width = "100%"; addBtn.textContent = "この日の投稿を1本作る";
  addFld.appendChild(addBtn);
  const addOut = document.createElement("div"); addFld.appendChild(addOut);
  el.appendChild(addFld);

  addBtn.onclick = async () => {
    if (!addDay.value) { return; }
    addBtn.disabled = true; addBtn.textContent = "生成中…";
    if (acct.value) await loadCfgFor(acct.value); else await loadCfgFor("_default_");
    const dt = new Date(addDay.value);
    const WD = ["日","月","火","水","木","金","土"];
    const p = {
      d: (dt.getMonth()+1) + "/" + dt.getDate(), w: WD[dt.getDay()],
      h: String(dt.getHours()).padStart(2,"0") + ":" + String(dt.getMinutes()).padStart(2,"0"),
      g: selected[0] || "", t: addTheme.value || "おまかせ", y: "単発",
    };
    try {
      await genOne(p);
      addOut.innerHTML = "";
      const box = document.createElement("div");
      box.style.cssText = "font-size:13.5px;line-height:1.7;white-space:pre-wrap;background:rgba(0,229,255,.04);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-top:10px";
      box.textContent = p._text; addOut.appendChild(box);
      const acts = document.createElement("div"); acts.className = "acts"; addOut.appendChild(acts);
      const re = document.createElement("button"); re.className = "mini"; re.textContent = "🔀 作り直し";
      re.onclick = async () => { re.disabled = true; await genOne(p, true); box.textContent = p._text; re.disabled = false; };
      acts.appendChild(re);
      const send = document.createElement("button"); send.className = "mini primary"; send.textContent = "予約管理に送る";
      send.onclick = async () => {
        if (!acct.value) { addOut.innerHTML += '<div class="err">クライアント未登録</div>'; return; }
        send.disabled = true;
        const { error } = await sb.from("scheduled_posts").insert({
          screen_name: acct.value, text: p._text, scheduled_at: dt.toISOString(), status: "draft",
        });
        if (error) { send.disabled = false; addOut.innerHTML += '<div class="err">'+error.message+'</div>'; return; }
        send.textContent = "送った✓";
      };
      acts.appendChild(send);
    } catch (e) { addOut.innerHTML = '<div class="err">'+e.message+'</div>'; }
    addBtn.disabled = false; addBtn.textContent = "この日の投稿を1本作る";
  };

  const listEl = document.createElement("div"); el.appendChild(listEl);
  let lastPlan = null;

  function parseJSONArr(text) {
    let t = text.replace(/```json|```/g, "").trim();
    t = t.slice(t.indexOf("["));
    try { return JSON.parse(t); }
    catch (e) { const cut = t.lastIndexOf("}"); if (cut > 0) return JSON.parse(t.slice(0, cut + 1) + "]"); throw e; }
  }

  gen.onclick = async () => {
    if (!selected.length) { out.err("ジャンルを1つ以上選んで。"); return; }
    out.clear(); out.err(""); listEl.innerHTML = "";
    gen.disabled = true; gen.textContent = "生成中…";
    /* 送信先アカウント専用の生成設定を適用(なければ共通) */
    if (acct.value) await loadCfgFor(acct.value); else await loadCfgFor("_default_");
    const today = new Date();
    const days = span.value === "週間" ? 7 : span.value === "15日" ? 15 : 30;
    const fmt = S.sns === "X" ? "140字以内" : "キャプション形式・ハッシュタグ5個";
    const timeRule = S.sns === "X"
      ? "Xの伸びやすい時間帯(通勤7-8時/昼12時/夜21-23時/深夜0-1時)を踏まえ、内容と客層に合う時間。夜営業の店の告知は夜〜深夜が強い"
      : "Instagramの伸びやすい時間帯(昼12時前後/夜20-22時)を踏まえる";
    try {
      const text = await callAI(
        `今日は${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日。${S.sns}アカウント用に、明日から${days}日分の投稿計画を作れ。1日1投稿。` +
        (CFG.closedDays && CFG.closedDays.length ? `\n\n【定休日】${CFG.closedDays.join("・")}曜は定休日。その曜日には来店を促す営業告知を入れず、休業のお知らせや「明日から営業」等の定休日に合った内容にする。` : "") +
        `\n\n【最重要・厳守】各投稿の"g"(ジャンル)は、必ず次のリストの文字列のどれかと完全一致させること。リスト外のジャンルは絶対に作らない。リストにない話題・派生ジャンル・関連トピックを足すことも禁止:\n${selected.map((g)=>"・「"+g+"」").join("\n")}\n\n上のジャンルだけをバランス良く配分し、店舗系は週末に厚く。\n\n予定・ネタ:\n${events.value||"特になし"}\n\nバズ狙いと告知をバランス良く。投稿時間は${timeRule}。\n\n` +
        (span.value === "週間"
          ? `JSON配列のみ出力(マークダウン記法・前置き禁止): [{"d":"6/13","w":"土","g":"ジャンル名","h":"21:00","t":"テーマ","y":"投稿の型","x":"完成した投稿文(${fmt})"}] 7要素。${sc()}`
          : `JSON配列のみ出力(マークダウン記法・前置き禁止): [{"d":"6/13","w":"土","g":"ジャンル名","h":"21:00","t":"テーマ(15字以内)","y":"型(6字以内)"}] ${days}要素。完成文は不要。`)
      );
      const parsed = parseJSONArr(text);
      /* AIが選択外ジャンルを混ぜてきたら除外。gが選択肢に部分一致するものだけ残す */
      const filtered = parsed.filter((p) => {
        if (!p.g) return true;
        return selected.some((g) => p.g === g || p.g.includes(g) || g.includes(p.g));
      });
      /* 週間は完成文(x)をそのまま反映 */
      filtered.forEach((p) => { if (p.x) p._text = p.x; });
      const dropped = parsed.length - filtered.length;
      renderPlan(filtered);
      if (dropped > 0) out.err("選択外ジャンルの投稿を" + dropped + "件除外した。再生成すると枠が埋まる。");

      /* 週間以外(15日・月間)は枠だけ来てるので、続けて全日分の本文を自動生成 */
      if (span.value !== "週間") {
        gen.textContent = "本文を生成中… 0/" + filtered.length;
        for (let i = 0; i < filtered.length; i++) {
          await genOne(filtered[i]);
          gen.textContent = "本文を生成中… " + (i+1) + "/" + filtered.length;
          renderPlan(filtered);
        }
      }
    } catch (e) { out.err("生成に失敗。もう一度押して。(" + e.message.slice(0, 80) + ")"); }
    gen.disabled = false; gen.textContent = "カレンダーを生成する";
  };

  function planDate(p) {
    const [m, d] = p.d.split("/").map(Number);
    const [hh, mm] = (p.h || "21:00").split(":").map(Number);
    const now = new Date();
    let y = now.getFullYear();
    if (m < now.getMonth() + 1 - 1) y += 1; // 年またぎ対策
    return new Date(y, m - 1, d, hh, mm || 0);
  }

  function renderPlan(plan) {
    lastPlan = plan;
    listEl.innerHTML = "";
    if (S.sns === "X") {
      const bulk = document.createElement("button");
      bulk.className = "btn"; bulk.textContent = "完成してる分を全部 予約管理に送る";
      bulk.onclick = async () => {
        if (!acct.value) { out.err("クライアント未登録。先に認証リンクから登録して。"); return; }
        const rows = plan.filter((p) => p._text).map((p) => ({
          screen_name: acct.value, text: p._text, scheduled_at: planDate(p).toISOString(), status: "draft",
        }));
        if (!rows.length) { out.err("完成した投稿文がまだない。"); return; }
        bulk.disabled = true;
        const { error } = await sb.from("scheduled_posts").insert(rows);
        if (error) { out.err("送信エラー: " + error.message); bulk.disabled = false; return; }
        bulk.textContent = rows.length + "件送った✓ 予約管理タブでGOを出すと確定";
      };
      listEl.appendChild(bulk);
    }
    plan.forEach((p, i) => {
      const div = document.createElement("div"); div.className = "row";
      const meta = document.createElement("div"); meta.className = "meta";
      meta.innerHTML = '<span class="pill time">' + esc(p.d) + "(" + esc(p.w||"") + ")</span>" +
        (p.g ? '<span class="pill genre">' + esc(p.g) + "</span>" : "") +
        '<span class="pill type">' + esc(p.y||"") + "</span>";
      div.appendChild(meta);

      /* 時刻編集(送る前にカーソルで) */
      const timeRow = document.createElement("div");
      timeRow.style.cssText = "display:flex;align-items:center;gap:8px;margin:6px 0";
      const clock = document.createElement("span"); clock.textContent = "⏰"; timeRow.appendChild(clock);
      const tIn = document.createElement("input"); tIn.type = "time"; tIn.value = (p.h||"21:00");
      tIn.style.cssText = "flex:0 0 auto;width:auto;padding:6px 10px;font-family:var(--mono)";
      tIn.onchange = () => { p.h = tIn.value; };
      timeRow.appendChild(tIn);
      div.appendChild(timeRow);

      const theme = document.createElement("div"); theme.style.cssText = "font-weight:700;margin-bottom:6px"; theme.textContent = p.t||"";
      div.appendChild(theme);

      const body = document.createElement("div"); div.appendChild(body);
      listEl.appendChild(div);

      const renderBody = () => {
        body.innerHTML = "";
        if (p._text) { drawText(body, p, p._text); }
        else {
          const hint = document.createElement("div"); hint.className = "muted"; hint.style.fontSize = "12.5px";
          hint.textContent = "(本文は生成中…/シャッフルで作り直せる)";
          body.appendChild(hint);
        }
      };

      /* p.h / p.t が変わった時に時刻欄・テーマ表示を同期 */
      const syncMeta = () => {
        tIn.value = p.h || "21:00";
        theme.textContent = p.t || "";
      };

      /* この日専用ツール: シャッフル(生成/作り直し) / 無料予想(競艇のみ) */
      const tools = document.createElement("div"); tools.className = "acts"; tools.style.marginTop = "8px";
      const shuf = document.createElement("button"); shuf.className = "mini cyan";
      shuf.textContent = p._text ? "🔀 シャッフル(作り直し)" : "✍ 投稿文を作る";
      shuf.onclick = async () => { shuf.disabled = true; shuf.textContent = "生成中…"; await genOne(p, !!p._text); shuf.disabled = false; shuf.textContent = "🔀 シャッフル(作り直し)"; syncMeta(); renderBody(); };
      tools.appendChild(shuf);
      /* 生成設定の「業種」に競艇/ボートが入ってる時だけ無料予想ボタンを出す */
      const bizText = (CFG.bizType || "");
      if (/競艇|ボートレース|ボート/.test(bizText)) {
        const yosou = document.createElement("button"); yosou.className = "mini"; yosou.textContent = "🚤 無料予想";
        yosou.onclick = async () => { yosou.disabled = true; yosou.textContent = "予想生成中…"; await genYosou(p); yosou.disabled = false; yosou.textContent = "🚤 無料予想"; syncMeta(); renderBody(); };
        tools.appendChild(yosou);
      }
      div.appendChild(tools);

      renderBody();
    });
  }

  /* 通常の1投稿生成(shuffle=trueで毎回違う角度に) */
  async function genOne(p, shuffle) {
    try {
      const variant = shuffle ? "\n※前回と違う切り口・フック・語り口で、新鮮な別パターンにすること。" : "";
      const text = await callAI(`${S.sns}投稿を1本書け。\n日付: ${p.d}(${p.w}) ${p.h||""}投稿予定 / ジャンル: ${p.g||""} / テーマ: ${p.t} / 型: ${p.y}\n${S.sns==="X"?"140字以内。":"キャプション形式・ハッシュタグ5個。"}投稿文のみ出力。前置き禁止。${variant}${sc()}`);
      p._text = text.trim();
    } catch (e) { out.err(e.message); }
  }

  /* 無料予想生成(Web検索で当日レース+5点予想) */
  async function genYosou(p) {
    try {
      const raw = await callAI(
        `今日(${p.d})の競艇(ボートレース)について、Web検索で当日開催の会場と注目レースを1つ調べ、その1レースの無料予想を作れ。\n\n必ず次のJSON形式のみで出力(マークダウン・前置き禁止):\n{"deadline":"HH:MM","post":"投稿本文"}\n\n- "deadline": 予想したレースの締切(発走)時刻を24時間表記で。検索で取れなければ妥当な時刻を推定\n- "post": 下記フォーマットの投稿本文(改行は\\nで表現)\n\n本文フォーマット:\n1行目「本日の無料予想を1レース公開」\n空行\n【会場名+R番号】(例: 【住之江12R】)\n本命：X-X-X\n対抗：X-X-X\n穴狙い：X-X-X\n抑え：X-X-X\n大穴：X-X-X\n空行\n展開予想を1〜2行(風・潮・進入隊形などの根拠)\n「回収率重視の厳選予想」「結果はあとで報告します」的な締め\n最後に「※予想は参考まで。投資は自己責任で」\n\nルール: 買い目は艇番1〜6の3連単フォーメーション風に5点。${sc()}`,
        true /* useSearch */
      );
      let parsed;
      try {
        let t = raw.replace(/```json|```/g, "").trim();
        t = t.slice(t.indexOf("{"), t.lastIndexOf("}") + 1);
        parsed = JSON.parse(t);
      } catch (e) { parsed = null; }

      if (parsed && parsed.post) {
        p._text = parsed.post.trim();
        /* 締切時刻の10分前を投稿時刻に自動セット */
        if (parsed.deadline && /^\d{1,2}:\d{2}$/.test(parsed.deadline)) {
          const [hh, mm] = parsed.deadline.split(":").map(Number);
          let total = hh * 60 + mm - 10; // 10分前
          if (total < 0) total = hh * 60 + mm;
          p.h = String(Math.floor(total/60)).padStart(2,"0") + ":" + String(total%60).padStart(2,"0");
          p._deadline = parsed.deadline;
        }
      } else {
        p._text = raw.trim(); // JSON失敗時はそのまま本文に
      }
      p.t = "無料予想" + (p._deadline ? "(締切" + p._deadline + ")" : "");
    } catch (e) { out.err(e.message); }
  }

  function drawText(body, p, text) {
    p._text = text;
    const box = document.createElement("div");
    box.style.cssText = "font-size:13.5px;line-height:1.7;white-space:pre-wrap;background:rgba(0,229,255,.04);border:1px solid var(--border);border-radius:10px;padding:10px 12px";
    box.textContent = text; body.appendChild(box);
    const acts = document.createElement("div"); acts.className = "acts"; body.appendChild(acts);
    const cp = document.createElement("button"); cp.className = "mini"; cp.textContent = "コピー";
    cp.onclick = () => { navigator.clipboard.writeText(text); cp.textContent = "コピー済"; setTimeout(()=>cp.textContent="コピー",1500); };
    acts.appendChild(cp);
    if (S.sns === "X") {
      const sd = document.createElement("button"); sd.className = "mini primary"; sd.textContent = "予約管理に送る";
      sd.onclick = async () => {
        if (!acct.value) { out.err("クライアント未登録。先に認証リンクから登録して。"); return; }
        sd.disabled = true;
        const { error } = await sb.from("scheduled_posts").insert({
          screen_name: acct.value, text: p._text, scheduled_at: planDate(p).toISOString(), status: "draft",
        });
        if (error) { out.err("送信エラー: " + error.message); sd.disabled = false; return; }
        sd.textContent = "送った✓";
      };
      acts.appendChild(sd);
      const a = document.createElement("a"); a.className = "mini"; a.textContent = "Xで投稿→";
      a.href = "https://twitter.com/intent/tweet?text=" + encodeURIComponent(p._text); a.target = "_blank";
      acts.appendChild(a);
    }
  }
};

/* ---- 09 推移記録 ---- */
BUILDERS.followers = (el) => {
  const METRICS = { X: ["フォロワー","インプ(日)"], Instagram: ["フォロワー","リーチ(日)"] };
  head(el, "フォロワー推移の記録",
    `毎日の数字を入れるだけで増減・ペース・目標到達予測を自動計算。${S.sns}の数字だけ表示(右上で切替)。同日は上書き。`,
    [`${S.sns}のアプリでフォロワー数を見る`,"数字を入れて「記録」","目標を設定すると「いつ届くか」も予測"]);

  fld(el, "記録する指標");
  const metric = chipsSingle(el, METRICS[S.sns], METRICS[S.sns][0]);
  fld(el, "今日の数値");
  const rowEl = document.createElement("div"); rowEl.style.cssText = "display:flex;gap:10px"; el.appendChild(rowEl);
  const num = document.createElement("input"); num.type = "number"; num.placeholder = "1234"; rowEl.appendChild(num);
  const rec = document.createElement("button"); rec.className = "mini primary"; rec.style.flex = "0 0 80px"; rec.textContent = "記録"; rowEl.appendChild(rec);
  const msg = document.createElement("div"); msg.className = "okmsg"; el.appendChild(msg);
  const statsEl = document.createElement("div"); el.appendChild(statsEl);
  const goalEl = document.createElement("div"); el.appendChild(goalEl);
  const chartEl = document.createElement("div"); el.appendChild(chartEl);
  const aiEl = document.createElement("div"); el.appendChild(aiEl);
  const histEl = document.createElement("div"); el.appendChild(histEl);

  let records = [], goals = {};
  const key = (m) => S.sns + ":" + m;
  const fmtJP = (d) => parseInt(d.slice(5,7)) + "/" + parseInt(d.slice(8,10));

  (async () => {
    records = await kvGet("followers", []);
    goals = await kvGet("goals", {});
    drawAll();
  })();

  rec.onclick = async () => {
    const n = parseInt(num.value); if (isNaN(n)) return;
    const today = new Date().toISOString().slice(0, 10);
    records = records.filter((r) => !(r.date === today && r.platform === key(metric.value)));
    records.push({ date: today, platform: key(metric.value), count: n });
    records.sort((a,b)=>a.date.localeCompare(b.date));
    await kvSet("followers", records);
    num.value = ""; msg.textContent = fmtJP(today) + " の" + metric.value + "を " + n.toLocaleString() + " で記録した";
    setTimeout(()=>msg.textContent="",2500);
    drawAll();
  };

  function fSeries() { return records.filter((r)=>r.platform===key("フォロワー")).sort((a,b)=>a.date.localeCompare(b.date)); }

  function drawAll() { drawStats(); drawGoal(); drawChart(); drawAI(); drawHist(); }

  function calcStats() {
    const fs = fSeries(); if (!fs.length) return null;
    const last = fs[fs.length-1];
    const prev = fs.length>1 ? fs[fs.length-2] : null;
    const since = (days) => {
      const cutoff = new Date(Date.now()-days*86400000).toISOString().slice(0,10);
      const base = fs.filter((r)=>r.date<=cutoff).pop() || fs[0];
      if (base.date === last.date) return null;
      const dd = Math.max(1, Math.round((new Date(last.date)-new Date(base.date))/86400000));
      return { diff: last.count-base.count, perDay: (last.count-base.count)/dd };
    };
    return { last, prevDiff: prev ? last.count-prev.count : null, w: since(7), m: since(30) };
  }
  const sign = (n) => (n>=0?"+":"")+Math.round(n).toLocaleString();
  const dc = (n) => n>=0 ? "var(--ok)" : "var(--bad)";

  function drawStats() {
    const st = calcStats(); statsEl.innerHTML = "";
    if (!st) return;
    const w = document.createElement("div"); w.style.cssText = "display:flex;gap:8px;margin-top:18px"; statsEl.appendChild(w);
    [["NOW", st.last.count.toLocaleString(), st.prevDiff!==null?"前回 "+sign(st.prevDiff):"", st.prevDiff!==null?dc(st.prevDiff):""],
     ["7 DAYS", st.w?sign(st.w.diff):"—", st.w?(st.w.perDay>=0?"+":"")+st.w.perDay.toFixed(1)+"/日":"記録待ち", st.w?dc(st.w.diff):""],
     ["30 DAYS", st.m?sign(st.m.diff):"—", st.m?(st.m.perDay>=0?"+":"")+st.m.perDay.toFixed(1)+"/日":"記録待ち", st.m?dc(st.m.diff):""]
    ].forEach(([l,v,s,c]) => {
      const d = document.createElement("div"); d.className = "stat";
      d.innerHTML = '<div class="l">'+l+'</div><div class="v">'+esc(v)+'</div>'+(s?'<div class="s" style="color:'+(c||"var(--muted)")+'">'+esc(s)+"</div>":"");
      w.appendChild(d);
    });
  }

  function drawGoal() {
    goalEl.innerHTML = "";
    fld(goalEl, "目標フォロワー数");
    const goal = goals[S.sns];
    const st = calcStats();
    if (goal) {
      let fc = null;
      if (st && st.w && st.w.perDay > 0) {
        const remain = goal - st.last.count;
        if (remain <= 0) fc = { done: true };
        else { const days = Math.ceil(remain/st.w.perDay); const d = new Date(Date.now()+days*86400000);
          fc = { days, date: (d.getMonth()+1)+"/"+d.getDate(), remain }; }
      }
      const d = document.createElement("div"); d.className = "row"; d.style.borderLeft = "3px solid var(--ok)";
      d.innerHTML = '<b style="color:var(--ok);font-family:var(--mono)">' + goal.toLocaleString() + "</b> " +
        (fc ? (fc.done ? "— 達成済み🎉" : "まで残り <b>"+fc.remain.toLocaleString()+"</b>。今のペースなら <b style='color:var(--accent2)'>約"+fc.days+"日後("+fc.date+")</b> に到達")
            : "— 7日分くらい記録が貯まると予測が出る") +
        ' <button class="mini" style="float:right;flex:none;padding:4px 8px;font-size:11px">変更</button>';
      d.querySelector("button").onclick = async () => { delete goals[S.sns]; await kvSet("goals", goals); drawGoal(); drawChart(); };
      goalEl.appendChild(d);
    } else {
      const w = document.createElement("div"); w.style.cssText = "display:flex;gap:10px"; goalEl.appendChild(w);
      const gi = document.createElement("input"); gi.type = "number"; gi.placeholder = "例: 1000"; w.appendChild(gi);
      const gb = document.createElement("button"); gb.className = "mini cyan"; gb.style.flex = "0 0 80px"; gb.textContent = "設定"; w.appendChild(gb);
      gb.onclick = async () => { const n = parseInt(gi.value); if (!n) return; goals[S.sns] = n; await kvSet("goals", goals); drawGoal(); drawChart(); };
    }
  }

  function drawChart() {
    chartEl.innerHTML = "";
    const pts = fSeries(); if (pts.length < 2) return;
    const W=340,H=190,PL=46,PR=12,PT=14,PB=26;
    const goal = goals[S.sns];
    const mn = Math.min(...pts.map((r)=>r.count)), mx = Math.max(...pts.map((r)=>r.count));
    const pad = Math.max(1, Math.round((mx-mn)*.1));
    const lo = mn-pad, hi = mx+pad, sp = hi-lo||1;
    const x = (i) => PL + (i/(pts.length-1))*(W-PL-PR);
    const y = (c) => PT + (1-(c-lo)/sp)*(H-PT-PB);
    const fmtV = (v) => v>=10000 ? (v/10000).toFixed(1)+"万" : v.toLocaleString();
    let svg = '<div class="fld" style="font-size:10px;font-weight:800;letter-spacing:.2em;color:var(--accent2);font-family:var(--mono);margin:16px 0 8px">FOLLOWER GRAPH</div>' +
      '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;background:var(--surface2);border-radius:12px;border:1px solid var(--border)">';
    [lo, lo+sp/2, hi].map(Math.round).forEach((v) => {
      svg += '<line x1="'+PL+'" x2="'+(W-PR)+'" y1="'+y(v)+'" y2="'+y(v)+'" stroke="#1D2A47" stroke-dasharray="3 4"/>' +
        '<text x="'+(PL-6)+'" y="'+(y(v)+3.5)+'" text-anchor="end" font-size="9.5" fill="#7E8BA8" font-family="Menlo">'+fmtV(v)+"</text>";
    });
    if (goal && goal>=lo && goal<=hi) {
      svg += '<line x1="'+PL+'" x2="'+(W-PR)+'" y1="'+y(goal)+'" y2="'+y(goal)+'" stroke="#3DFFA8" stroke-width="1.5" stroke-dasharray="5 4"/>' +
        '<text x="'+(W-PR)+'" y="'+(y(goal)-4)+'" text-anchor="end" font-size="9.5" fill="#3DFFA8" font-weight="700">目標 '+goal.toLocaleString()+"</text>";
    }
    const line = pts.map((r,i)=>(i?"L":"M")+x(i)+","+y(r.count)).join(" ");
    svg += '<path d="'+line+' L'+x(pts.length-1)+','+(H-PB)+' L'+PL+','+(H-PB)+' Z" fill="rgba(255,46,126,.1)"/>' +
      '<path d="'+line+'" fill="none" stroke="#FF2E7E" stroke-width="2.5" stroke-linejoin="round"/>';
    const step = Math.max(1, Math.ceil(pts.length/5));
    pts.forEach((r,i) => {
      svg += '<circle cx="'+x(i)+'" cy="'+y(r.count)+'" r="3.5" fill="#04060C" stroke="#FF2E7E" stroke-width="2"/>';
      if (i%step===0 || i===pts.length-1)
        svg += '<text x="'+x(i)+'" y="'+(H-8)+'" text-anchor="middle" font-size="9.5" fill="#7E8BA8" font-family="Menlo">'+fmtJP(r.date)+"</text>";
    });
    chartEl.innerHTML = svg + "</svg>";
  }

  function drawAI() {
    aiEl.innerHTML = "";
    const fs = fSeries(); if (fs.length < 3) return;
    const b = document.createElement("button"); b.className = "btn btn-ghost"; b.textContent = "AIに推移を分析させる"; aiEl.appendChild(b);
    const out = outArea(aiEl);
    b.onclick = () => runAI(b, out, () =>
      `${S.sns}アカウントのフォロワー推移:\n${fs.map((r)=>r.date+": "+r.count).join("\n")}\n目標: ${goals[S.sns]||"未設定"}\n\nこのデータから日本語で簡潔に:\n■伸びの評価(加速中/横ばい/鈍化+理由)\n■原因の仮説2つ\n■今週の打ち手3つ(${S.sns}の機能を使った具体策)\n前置き不要。`);
  }

  function drawHist() {
    histEl.innerHTML = "";
    const sr = records.filter((r)=>r.platform.startsWith(S.sns+":"));
    if (!sr.length) { histEl.innerHTML = '<div class="muted" style="text-align:center;margin-top:20px">まだ記録なし。今日の数字から始める。</div>'; return; }
    fld(histEl, "記録履歴(最新10件)");
    sr.slice().sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10).forEach((r) => {
      const d = document.createElement("div");
      d.style.cssText = "display:flex;align-items:center;justify-content:space-between;padding:9px 4px;border-bottom:1px solid var(--border);font-size:13.5px";
      d.innerHTML = '<span class="muted" style="width:48px;font-family:var(--mono)">'+fmtJP(r.date)+"</span>" +
        '<span class="muted" style="flex:1">'+esc(r.platform.split(":")[1])+"</span>" +
        '<b style="margin-right:12px;font-family:var(--mono)">'+r.count.toLocaleString()+"</b>" +
        '<button style="background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer">×</button>';
      d.querySelector("button").onclick = async () => {
        records = records.filter((x)=>!(x.date===r.date&&x.platform===r.platform));
        await kvSet("followers", records); drawAll();
      };
      histEl.appendChild(d);
    });
  }
};

    body.innerHTML = "";
    if (S.profile) {
      const d = document.createElement("div"); d.className = "row"; d.style.borderColor = "rgba(61,255,168,.35)";
      d.innerHTML = '<div style="font-size:10px;font-weight:800;letter-spacing:.2em;color:var(--ok);font-family:var(--mono);margin-bottom:8px">PROFILE LOADED ✓</div><pre style="white-space:pre-wrap;margin:0;font-family:inherit;font-size:13.5px;line-height:1.7"></pre>';
      d.querySelector("pre").textContent = S.profile;
      body.appendChild(d);
      const del = document.createElement("button"); del.className = "btn btn-ghost"; del.textContent = "削除して再学習する";
      del.onclick = async () => { S.profile = ""; await kvSet("style_profile", ""); renderTop(); draw(); };
      body.appendChild(del);
    } else {
      fld(body, "自分の過去投稿(5〜10本・「---」区切り推奨)");
      const posts = ta(body, 10, "自分の投稿1\n---\n自分の投稿2");
      const b = runBtn(body, "文体を学習する");
      const out = outArea(body);
      b.onclick = async () => {
        if (!posts.value.trim()) return;
        b.disabled = true; b.textContent = "学習中…";
        try {
          const t = await callAI(`以下は同一人物が書いたSNS投稿。この人の文体を完全に再現するためのプロファイルを作れ。\n\n${posts.value}\n\n出力(日本語・箇条書き・前置き不要):\n・一人称と読者への呼びかけ方\n・語尾の癖(です/ます・関西弁・言い切り等)\n・テンションと感情の出し方\n・絵文字/記号の使い方と頻度\n・改行と文の長さの癖\n・よく使う言い回し(実例5つ)\n・絶対に書かなそうな表現(NG例3つ)`);
          S.profile = t; await kvSet("style_profile", t); renderTop(); draw();
        } catch (e) { out.err(e.message); b.disabled = false; b.textContent = "文体を学習する"; }
      };
    }
  }
  draw();
};

/* ---- 12 予約管理 ---- */
BUILDERS.schedule = (el) => {
  head(el, "予約管理", "カレンダーから送った投稿はまず「承認待ち」に入る。GOを出した分だけ予約確定になり、時間が来たら自動投稿される。GOを出すまでは何も投稿されない。",
    ["承認待ちを確認 → 個別GOか「全部GO」","予約確定分は時間が来たらGASが自動投稿","ミスったらキャンセル(投稿前ならいつでも消せる)"]);
  fld(el, "アカウント");
  const acct = document.createElement("select"); el.appendChild(acct);
  S.clients.filter((c)=>c.status==="active").forEach((c)=>{ const o=document.createElement("option"); o.value=c.screen_name; o.textContent="@"+c.screen_name; acct.appendChild(o); });
  fld(el, "投稿日時");
  const when = document.createElement("input"); when.type = "datetime-local"; el.appendChild(when);
  fld(el, "本文");
  const text = ta(el, 5, "投稿する文面");
  const cnt = document.createElement("div"); cnt.className = "count"; cnt.textContent = "0字"; el.appendChild(cnt);
  text.addEventListener("input", () => { cnt.textContent = text.value.length + "字"; cnt.classList.toggle("over", text.value.length > 140); });
  fld(el, "画像/動画URL(任意)");
  const mediaIn = document.createElement("input"); mediaIn.placeholder = "https://〜.jpg / .png / .mp4 (直リンク)"; el.appendChild(mediaIn);
  const mediaHint = document.createElement("p"); mediaHint.className = "desc"; mediaHint.style.margin = "6px 0 0";
  mediaHint.textContent = "公開された画像/動画の直リンクURLを入れると添付される。Supabase StorageやImgur等にアップした画像URLでOK。画像は5MBまで。";
  el.appendChild(mediaHint);
  const save = runBtn(el, "予約する");
  const cancel = document.createElement("button"); cancel.className = "btn btn-ghost hidden"; cancel.textContent = "編集をやめる"; el.appendChild(cancel);
  const out = outArea(el);
  const pendEl = document.createElement("div"); el.appendChild(pendEl);
  const histEl = document.createElement("div"); el.appendChild(histEl);
  let editingId = null;

  function resetForm() { editingId = null; text.value = ""; when.value = ""; mediaIn.value = ""; cnt.textContent = "0字"; save.textContent = "予約する"; cancel.classList.add("hidden"); }
  cancel.onclick = resetForm;

  save.onclick = async () => {
    out.err("");
    if (!acct.value || !when.value || !text.value.trim()) { out.err("全部入れて。"); return; }
    save.disabled = true;
    const rec = { screen_name: acct.value, scheduled_at: new Date(when.value).toISOString(), text: text.value.trim(), media_url: mediaIn.value.trim() || null };
    const { error } = editingId
      ? await sb.from("scheduled_posts").update(rec).eq("id", editingId)
      : await sb.from("scheduled_posts").insert(rec);
    save.disabled = false;
    if (error) { out.err("保存エラー: " + error.message); return; }
    resetForm(); load();
  };

  function hhmm(iso) { const d = new Date(iso); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }
  function fmtD(iso) { const d = new Date(iso); return (d.getMonth()+1)+"/"+d.getDate()+" "+hhmm(iso); }

  function postRow(p, actions) {
    const d = document.createElement("div"); d.className = "row";
    d.innerHTML = '<div class="meta"><span class="pill time">'+hhmm(p.scheduled_at)+'</span><span class="pill acct">@'+esc(p.screen_name)+"</span>" +
      (p.media_url?'<span class="pill genre">🖼 画像</span>':"") + "</div>" +
      "<pre style='white-space:pre-wrap;margin:0;font-family:inherit'></pre>" +
      '<div class="acts">' + actions.map((a,i)=>'<button class="mini '+(a.primary?'primary':'')+'" data-i="'+i+'">'+a.label+'</button>').join("") + '</div>';
    d.querySelector("pre").textContent = p.text;
    actions.forEach((a,i)=>{ d.querySelector('[data-i="'+i+'"]').onclick = a.fn; });
    return d;
  }

  function editPost(p) {
    editingId = p.id; acct.value = p.screen_name; text.value = p.text; mediaIn.value = p.media_url || "";
    const dt = new Date(p.scheduled_at); dt.setMinutes(dt.getMinutes()-dt.getTimezoneOffset());
    when.value = dt.toISOString().slice(0,16); cnt.textContent = p.text.length+"字";
    save.textContent = "更新する"; cancel.classList.remove("hidden"); window.scrollTo({top:0,behavior:"smooth"});
  }

  async function load() {
    const { data, error } = await sb.from("scheduled_posts").select("*").order("scheduled_at");
    if (error) { out.err(error.message); return; }
    const byTime = (a,b) => a.scheduled_at.localeCompare(b.scheduled_at);
    const drafts = data.filter((p)=>p.status==="draft").sort(byTime);
    const pending = data.filter((p)=>p.status==="pending").sort(byTime);
    const done = data.filter((p)=>p.status!=="pending"&&p.status!=="draft").sort((a,b)=>(b.posted_at||b.scheduled_at).localeCompare(a.posted_at||a.scheduled_at)).slice(0,20);
    pendEl.innerHTML = "";

    /* 日付区切りヘッダーを挟みながらリスト描画 */
    const WD = ["日","月","火","水","木","金","土"];
    function dayLabel(iso) {
      const d = new Date(iso);
      return (d.getMonth()+1) + "/" + d.getDate() + "(" + WD[d.getDay()] + ")";
    }
    function renderList(host, items, makeActions) {
      let lastDay = "";
      items.forEach((p) => {
        const dl = dayLabel(p.scheduled_at);
        if (dl !== lastDay) {
          lastDay = dl;
          const hd = document.createElement("div");
          hd.style.cssText = "font-family:var(--mono);font-weight:800;font-size:12px;color:var(--accent);letter-spacing:.1em;margin:14px 0 4px;padding-bottom:4px;border-bottom:1px solid var(--border)";
          hd.textContent = "📅 " + dl;
          host.appendChild(hd);
        }
        host.appendChild(postRow(p, makeActions(p)));
      });
    }

    /* 承認待ち */
    fld(pendEl, "承認待ち(" + drafts.length + "件) — GOで予約確定");
    if (!drafts.length) pendEl.innerHTML += '<div class="muted">承認待ちなし</div>';
    else {
      const bulkRow = document.createElement("div"); bulkRow.className = "acts";
      const goAll = document.createElement("button"); goAll.className = "mini primary"; goAll.textContent = "全部GO(" + drafts.length + "件を一括確定)";
      goAll.onclick = async () => {
        await sb.from("scheduled_posts").update({ status: "pending" }).eq("status", "draft");
        load();
      };
      const delAll = document.createElement("button"); delAll.className = "mini"; delAll.textContent = "全部キャンセル";
      delAll.onclick = async () => {
        if (!confirm("承認待ち" + drafts.length + "件を全部キャンセルする?")) return;
        await sb.from("scheduled_posts").delete().eq("status", "draft");
        load();
      };
      bulkRow.appendChild(goAll); bulkRow.appendChild(delAll);
      pendEl.appendChild(bulkRow);
      renderList(pendEl, drafts, (p) => [
        { label: "GO", primary: true, fn: async () => { await sb.from("scheduled_posts").update({ status: "pending" }).eq("id", p.id); load(); } },
        { label: "編集", fn: () => editPost(p) },
        { label: "キャンセル", fn: async () => { await sb.from("scheduled_posts").delete().eq("id", p.id); load(); } },
      ]);
    }

    /* 予約確定 */
    fld(pendEl, "予約確定(" + pending.length + "件) — 時間が来たら自動投稿");
    if (!pending.length) pendEl.innerHTML += '<div class="muted">予約なし</div>';
    renderList(pendEl, pending, (p) => [
      { label: "編集", fn: () => editPost(p) },
      { label: "予約キャンセル", fn: async () => { if (!confirm("この予約をキャンセルする?")) return; await sb.from("scheduled_posts").delete().eq("id", p.id); load(); } },
    ]);
    histEl.innerHTML = ""; fld(histEl, "履歴(直近20件)");
    if (!done.length) histEl.innerHTML += '<div class="muted">履歴なし</div>';
    done.forEach((p) => {
      const d = document.createElement("div"); d.className = "row";
      d.innerHTML = '<div class="meta"><span class="pill time">'+fmtD(p.scheduled_at)+'</span><span class="pill acct">@'+esc(p.screen_name)+'</span><span class="pill st-'+p.status+'">'+(p.status==="posted"?"投稿済":"エラー")+"</span></div><pre style='white-space:pre-wrap;margin:0;font-family:inherit'></pre>"+(p.error_msg?'<div class="err">'+esc(p.error_msg)+"</div>":"");
      d.querySelector("pre").textContent = p.text;
      histEl.appendChild(d);
    });
  }
  load();
};

/* ---- 13 クライアント ---- */
BUILDERS.clients = (el) => {
  head(el, "クライアント管理", "連携済みアカウントの一覧。新規追加は認証リンクを相手に送って「許可」を押してもらうだけ。キーの受け渡し不要。",
    ["「認証リンクをコピー」を押す","LINE等でクライアントに送る","相手が許可したら一覧に自動で出る(更新ボタン)"]);
  const listEl = document.createElement("div"); el.appendChild(listEl);
  async function draw() {
    await loadClients();
    listEl.innerHTML = "";
    if (!S.clients.length) listEl.innerHTML = '<div class="muted">まだ登録なし。</div>';
    S.clients.forEach((c) => {
      const d = document.createElement("div"); d.className = "row";
      d.innerHTML = '<div class="meta"><span class="pill acct">@'+esc(c.screen_name)+'</span><span class="pill st-'+c.status+'">'+(c.status==="active"?"連携中":"連携解除")+'</span></div><span class="muted">登録: '+new Date(c.created_at).toLocaleDateString("ja-JP")+"</span>";
      listEl.appendChild(d);
    });
  }
  draw();
  const cp = document.createElement("button"); cp.className = "btn btn-ghost"; cp.textContent = "認証リンクをコピー(新規クライアント用)"; el.appendChild(cp);
  const ok = document.createElement("div"); ok.className = "okmsg"; el.appendChild(ok);
  cp.onclick = () => { navigator.clipboard.writeText(GAS_URL); ok.textContent = "コピーした。LINE等で送って。"; setTimeout(()=>ok.textContent="",2500); };
  const rf = document.createElement("button"); rf.className = "btn btn-ghost"; rf.textContent = "一覧を更新"; el.appendChild(rf);
  rf.onclick = draw;
};
</script>
